function MultiSelectDropdown({ label, options, selected, onChange, color }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const btnRef = React.useRef(null);
  const panelRef = React.useRef(null);
  const [pos, setPos] = useState({ top: 0, left: 0 });

  // Position the panel below the button using fixed positioning (escapes overflow:hidden)
  React.useEffect(() => {
    if (open && btnRef.current) {
      const rect = btnRef.current.getBoundingClientRect();
      setPos({ top: rect.bottom + 4, left: rect.left });
    }
  }, [open]);

  // Close on outside click
  React.useEffect(() => {
    if (!open) return;
    const handler = e => {
      if (btnRef.current && btnRef.current.contains(e.target)) return;
      if (panelRef.current && panelRef.current.contains(e.target)) return;
      setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const filtered = search ? options.filter(o => o.toLowerCase().includes(search.toLowerCase())) : options;
  const colors = { amber: { bg: '#fef3c7', border: '#d97706', text: '#92400e' }, blue: { bg: '#dbeafe', border: '#2563eb', text: '#1e40af' }, green: { bg: '#d1fae5', border: '#059669', text: '#065f46' } };
  const c = colors[color] || colors.blue;
  const hasSelection = selected.length > 0;
  const btnLabel = hasSelection ? `${label} (${selected.length})` : label;

  const toggle = (val) => {
    onChange(selected.includes(val) ? selected.filter(x => x !== val) : [...selected, val]);
  };

  return (
    <div style={{ display: 'inline-block' }}>
      <button ref={btnRef} onClick={() => { setOpen(!open); setSearch(''); }}
        style={{ padding: '4px 10px', fontSize: 11, border: hasSelection ? `1.5px solid ${c.border}` : '1px solid var(--border)',
          borderRadius: 4, background: hasSelection ? c.bg : 'white', color: hasSelection ? c.text : 'var(--text-secondary)',
          cursor: 'pointer', fontWeight: hasSelection ? 600 : 400, display: 'flex', alignItems: 'center', gap: 4 }}>
        {btnLabel}
        <span style={{ fontSize: 9, opacity: 0.6 }}>{open ? '▲' : '▼'}</span>
      </button>
      {open && ReactDOM.createPortal(
        <div ref={panelRef} style={{ position: 'fixed', top: pos.top, left: pos.left, width: 260, maxHeight: 320,
          background: 'white', border: '1px solid var(--border)', borderRadius: 6, boxShadow: '0 8px 24px rgba(0,0,0,0.15)',
          zIndex: 9999, display: 'flex', flexDirection: 'column' }}>
          {/* Search */}
          <div style={{ padding: '6px 8px', borderBottom: '1px solid var(--border)' }}>
            <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Search..."
              autoFocus style={{ width: '100%', padding: '4px 6px', border: '1px solid var(--border)', borderRadius: 4, fontSize: 11, outline: 'none' }} />
          </div>
          {/* Select all / Clear */}
          <div style={{ display: 'flex', gap: 8, padding: '4px 8px', borderBottom: '1px solid var(--border)', fontSize: 10 }}>
            <button onClick={() => onChange([...options])} style={{ background: 'none', border: 'none', color: c.border, cursor: 'pointer', fontWeight: 600, padding: 0 }}>Select all</button>
            <button onClick={() => onChange([])} style={{ background: 'none', border: 'none', color: '#dc2626', cursor: 'pointer', fontWeight: 600, padding: 0 }}>Clear</button>
          </div>
          {/* Options */}
          <div style={{ overflowY: 'auto', flex: 1, maxHeight: 240 }}>
            {filtered.map(opt => {
              const checked = selected.includes(opt);
              return (
                <label key={opt} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '4px 8px', cursor: 'pointer',
                  fontSize: 11, background: checked ? c.bg : 'transparent', borderLeft: checked ? `3px solid ${c.border}` : '3px solid transparent' }}
                  onMouseEnter={e => { if (!checked) e.currentTarget.style.background = '#f9fafb'; }}
                  onMouseLeave={e => { if (!checked) e.currentTarget.style.background = 'transparent'; }}>
                  <input type="checkbox" checked={checked} onChange={() => toggle(opt)}
                    style={{ width: 14, height: 14, accentColor: c.border, cursor: 'pointer' }} />
                  <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{opt}</span>
                </label>
              );
            })}
            {filtered.length === 0 && <div style={{ padding: '12px 8px', fontSize: 11, color: 'var(--text-muted)', textAlign: 'center' }}>No matches</div>}
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}

// Dropdown with checkboxes for each modality found in data.
// Excluded modalities are removed from SLA, volume, VPH calculations globally.
function ModalityExclusionFilter({ actualsData, cm, excludedModalities, setExcludedModalities }) {
  const [open, setOpen] = useState(false);
  const btnRef = React.useRef(null);
  const panelRef = React.useRef(null);
  const [pos, setPos] = useState({ top: 0, left: 0 });

  // Discover all modalities from actuals data
  const allModalities = useMemo(() => {
    if (!actualsData || !cm.modality) return [];
    const counts = {};
    actualsData.forEach(r => {
      const mod = (r[cm.modality] || '').trim();
      if (mod) counts[mod] = (counts[mod] || 0) + 1;
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([mod, count]) => ({
      raw: mod, normalized: normalizeModality(mod), count
    }));
  }, [actualsData, cm]);

  React.useEffect(() => {
    if (open && btnRef.current) {
      const rect = btnRef.current.getBoundingClientRect();
      setPos({ top: rect.bottom + 4, left: rect.left });
    }
  }, [open]);

  React.useEffect(() => {
    if (!open) return;
    const handler = e => {
      if (btnRef.current && btnRef.current.contains(e.target)) return;
      if (panelRef.current && panelRef.current.contains(e.target)) return;
      setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const toggle = (normalized) => {
    const next = new Set(excludedModalities);
    if (next.has(normalized)) next.delete(normalized);
    else next.add(normalized);
    setExcludedModalities(next);
  };

  const includeAll = () => setExcludedModalities(new Set());
  const resetDefaults = () => setExcludedModalities(new Set(DEFAULT_EXCLUDED_MODALITIES));

  const excludedCount = excludedModalities.size;

  if (allModalities.length === 0) return null;

  return (
    <div style={{ display: 'inline-block' }}>
      <button ref={btnRef} onClick={() => setOpen(!open)}
        style={{ padding: '4px 10px', fontSize: 11, border: excludedCount > 0 ? '1.5px solid #dc2626' : '1px solid var(--border)',
          borderRadius: 4, background: excludedCount > 0 ? '#fef2f2' : 'white', color: excludedCount > 0 ? '#991b1b' : 'var(--text-secondary)',
          cursor: 'pointer', fontWeight: excludedCount > 0 ? 600 : 400, display: 'flex', alignItems: 'center', gap: 4 }}>
        Modalities {excludedCount > 0 && <span style={{ background: '#dc2626', color: 'white', borderRadius: 3, padding: '0 4px', fontSize: 9 }}>{excludedCount} excluded</span>}
        <span style={{ fontSize: 9, opacity: 0.6 }}>{open ? '▲' : '▼'}</span>
      </button>
      {open && ReactDOM.createPortal(
        <div ref={panelRef} style={{ position: 'fixed', top: pos.top, left: pos.left, width: 300, maxHeight: 400,
          background: 'white', border: '1px solid var(--border)', borderRadius: 6, boxShadow: '0 8px 24px rgba(0,0,0,0.15)',
          zIndex: 9999, display: 'flex', flexDirection: 'column' }}>
          {/* Header */}
          <div style={{ padding: '8px 10px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-primary)' }}>Include/Exclude Modalities</span>
            <div style={{ display: 'flex', gap: 4 }}>
              <button onClick={includeAll} style={{ fontSize: 9, padding: '2px 6px', border: '1px solid var(--border)', borderRadius: 3, background: 'white', cursor: 'pointer', color: 'var(--accent-teal-dark)' }}>Include All</button>
              <button onClick={resetDefaults} style={{ fontSize: 9, padding: '2px 6px', border: '1px solid var(--border)', borderRadius: 3, background: 'white', cursor: 'pointer', color: 'var(--text-muted)' }}>Reset Defaults</button>
            </div>
          </div>
          <div style={{ fontSize: 9, padding: '4px 10px', color: 'var(--text-muted)', borderBottom: '1px solid var(--border)', background: '#f8fafc' }}>
            Unchecked modalities are excluded from SLA, volume, and VPH calculations
          </div>
          {/* Modality list */}
          <div style={{ overflowY: 'auto', flex: 1, padding: '4px 0' }}>
            {allModalities.map(m => {
              const isIncluded = !excludedModalities.has(m.normalized);
              const isDefault = DEFAULT_EXCLUDED_MODALITIES.includes(m.normalized);
              return (
                <label key={m.normalized} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 10px', cursor: 'pointer',
                  fontSize: 12, background: isIncluded ? 'transparent' : '#fef2f2', opacity: isIncluded ? 1 : 0.7 }}
                  onMouseOver={e => e.currentTarget.style.background = isIncluded ? '#f0fdf4' : '#fef2f2'}
                  onMouseOut={e => e.currentTarget.style.background = isIncluded ? 'transparent' : '#fef2f2'}>
                  <input type="checkbox" checked={isIncluded} onChange={() => toggle(m.normalized)}
                    style={{ width: 14, height: 14, accentColor: '#059669', cursor: 'pointer' }} />
                  <span style={{ flex: 1, fontWeight: isDefault ? 600 : 400 }}>{m.raw}</span>
                  <span style={{ fontSize: 10, color: 'var(--text-muted)', fontFamily: 'var(--font-mono)' }}>{m.count.toLocaleString()}</span>
                  {isDefault && !isIncluded && <span style={{ fontSize: 8, color: '#dc2626', fontWeight: 700 }}>DEFAULT</span>}
                </label>
              );
            })}
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}

// ========================== TAB: EXECUTIVE OVERVIEW ==========================
function OverviewTab({ actualsData, shiftScheduleData, incentiveData, vphData, masterRoster, excludedModalities, setExcludedModalities }) {
  const [serviceLine, setServiceLine] = useState('ALL');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const cm = useMemo(() => actualsData ? buildColMap(actualsData) : {}, [actualsData]);
  const icm = useMemo(() => incentiveData ? buildColMap(incentiveData) : {}, [incentiveData]);

  // Pre-filter actuals by SL + date range
  const filteredActuals = useMemo(() => {
    if (!actualsData) return null;
    let rows = actualsData;
    // Service line filter
    if (serviceLine !== 'ALL') {
      rows = rows.filter(r => {
        const partnerVal = cm.partner ? (r[cm.partner] || '') : '';
        const entityVal = cm.entityName ? (r[cm.entityName] || '') : '';
        if (serviceLine === 'TC') {
          return (partnerVal + ' ' + entityVal).toLowerCase().includes('transcarent') || r._detectedSL === 'TC';
        }
        const sl = mapPartnerToSL(partnerVal) || mapEntityToSL(entityVal);
        return sl === serviceLine || r._detectedSL === serviceLine;
      });
    }
    // Date range filter
    if (dateFrom || dateTo) {
      const from = dateFrom ? new Date(dateFrom) : null;
      const to = dateTo ? new Date(dateTo + 'T23:59:59') : null;
      rows = rows.filter(r => {
        const dt = parseDate(cm.date ? r[cm.date] : '');
        if (!dt) return false;
        if (from && dt < from) return false;
        if (to && dt > to) return false;
        return true;
      });
    }
    // Exclude modalities
    if (excludedModalities && excludedModalities.size > 0) {
      rows = rows.filter(r => !isExcludedModality(r, cm, excludedModalities));
    }
    return rows;
  }, [actualsData, serviceLine, dateFrom, dateTo, cm, excludedModalities]);

  // Build clinician→SL lookup from actuals (which have reliable SL via entity/partner)
  const clinicianSLMap = useMemo(() => {
    if (!filteredActuals) return {};
    const map = {};
    filteredActuals.forEach(r => {
      const clin = cm.clinician ? normalizeName(r[cm.clinician] || '') : '';
      if (!clin) return;
      const sl = mapPartnerToSL(cm.partner ? (r[cm.partner] || '') : '') || mapEntityToSL(cm.entityName ? (r[cm.entityName] || '') : '');
      if (sl && sl !== 'Mixed') map[clin] = sl;
    });
    return map;
  }, [filteredActuals, cm]);

  // Pre-filter shifts by SL + date range — with fallback SL detection
  const filteredShifts = useMemo(() => {
    if (!shiftScheduleData) return null;
    let rows = shiftScheduleData;
    if (serviceLine !== 'ALL') {
      rows = rows.filter(r => {
        // Try shift's own SL tag first
        if (r.sl === serviceLine) return true;
        // Fallback: try entity name → SL mapping
        const entitySL = r._entityName ? mapEntityToSL(r._entityName) : '';
        if (entitySL === serviceLine) return true;
        // Fallback: check if this clinician works this SL based on actuals
        if (r.clinician && clinicianSLMap[normalizeName(r.clinician)] === serviceLine) return true;
        return false;
      });
    }
    if (dateFrom || dateTo) {
      const from = dateFrom ? new Date(dateFrom) : null;
      const to = dateTo ? new Date(dateTo + 'T23:59:59') : null;
      rows = rows.filter(r => {
        if (!r.start) return false;
        if (from && r.start < from) return false;
        if (to && r.start > to) return false;
        return true;
      });
    }
    return rows;
  }, [shiftScheduleData, serviceLine, dateFrom, dateTo]);

  // Pre-filter incentives by SL + date range
  // Incentives don't have SL — infer from clinician name via clinicianSLMap (built from actuals)
  const filteredIncentives = useMemo(() => {
    if (!incentiveData) return null;
    let rows = incentiveData;
    if (serviceLine !== 'ALL') {
      rows = rows.filter(r => {
        const clin = icm.clinician ? normalizeName(r[icm.clinician] || '') : '';
        if (clin && clinicianSLMap[clin] === serviceLine) return true;
        // Also try entity name on incentive row
        const entity = icm.entityName ? (r[icm.entityName] || '') : '';
        if (entity && mapEntityToSL(entity) === serviceLine) return true;
        return false;
      });
    }
    if (dateFrom || dateTo) {
      const from = dateFrom ? new Date(dateFrom) : null;
      const to = dateTo ? new Date(dateTo + 'T23:59:59') : null;
      rows = rows.filter(r => {
        const raw = icm.date ? r[icm.date] : (icm.launchedTime ? r[icm.launchedTime] : '');
        const dt = parseDate(raw);
        if (!dt) return false;
        if (from && dt < from) return false;
        if (to && dt > to) return false;
        return true;
      });
    }
    return rows;
  }, [incentiveData, serviceLine, dateFrom, dateTo, icm, clinicianSLMap]);

  // Weekly trend data across ALL dimensions
  const weeklyTrends = useMemo(() => {
    const weeks = {};
    const getWeekKey = (dt) => {
      const d = new Date(dt);
      const mon = new Date(d); mon.setDate(mon.getDate() - mon.getDay() + (mon.getDay() === 0 ? -6 : 1));
      return mon.toISOString().slice(0, 10);
    };
    const ensure = (wk) => {
      if (!weeks[wk]) weeks[wk] = { volume: 0, slaMet: 0, slaMissed: 0, slaEligible: 0, totalRT: 0, rtCount: 0, hours: 0, shifts: 0, incentiveSpend: 0, incentiveCount: 0, clinicians: new Set(), states: new Set(), modalities: {}, uniqueClinShift: new Set() };
    };

    // Actuals → volume, SLA, response time, clinicians, states, modalities
    if (filteredActuals) {
      filteredActuals.forEach(r => {
        const dt = parseDate(cm.date ? r[cm.date] : '');
        if (!dt) return;
        if (isCanceled(r, cm)) return;
        const wk = getWeekKey(dt);
        ensure(wk);
        const w = weeks[wk];
        w.volume++;
        const clin = cm.clinician ? r[cm.clinician] : '';
        if (clin) w.clinicians.add(normalizeName(clin));
        const st = cm.state ? r[cm.state] : '';
        if (st) w.states.add(st);
        const mod = cm.modality ? (r[cm.modality] || 'Unknown') : 'Unknown';
        w.modalities[mod] = (w.modalities[mod] || 0) + 1;
        if (isSlaMet(r, cm)) { w.slaMet++; w.slaEligible++; }
        else if (isSlaMissed(r, cm)) { w.slaMissed++; w.slaEligible++; }
        const rtRaw = cm.responseTime ? r[cm.responseTime] : '';
        const rt = parseResponseTimeRobust(rtRaw);
        if (rt != null && rt >= 0) { w.totalRT += rt; w.rtCount++; }
      });
    }

    // Shifts → hours, shift count, headcount
    if (filteredShifts) {
      filteredShifts.filter(r => !r.unfilled && r.clinician).forEach(r => {
        if (!r.start) return;
        const wk = getWeekKey(r.start);
        ensure(wk);
        const w = weeks[wk];
        w.shifts++;
        w.hours += r.hours || 0;
        w.uniqueClinShift.add(normalizeName(r.clinician));
      });
    }

    // Incentives → spend, count
    if (filteredIncentives) {
      filteredIncentives.forEach(r => {
        const raw = icm.date ? r[icm.date] : (icm.launchedTime ? r[icm.launchedTime] : '');
        const dt = parseDate(raw);
        if (!dt) return;
        const wk = getWeekKey(dt);
        ensure(wk);
        const amt = parseFloat(String(icm.amount ? r[icm.amount] : '0').replace(/[^0-9.\-]/g, '')) || 0;
        weeks[wk].incentiveSpend += amt;
        weeks[wk].incentiveCount++;
      });
    }

    // Sort and compute derived metrics
    return Object.entries(weeks).sort(([a], [b]) => a.localeCompare(b)).map(([wk, w]) => ({
      week: wk,
      volume: w.volume,
      slaPct: w.slaEligible > 0 ? (w.slaMet / w.slaEligible * 100) : null,
      slaMet: w.slaMet,
      slaEligible: w.slaEligible,
      avgRT: w.rtCount > 0 ? w.totalRT / w.rtCount : null,
      vph: w.hours > 0 ? w.volume / w.hours : null,
      headcount: Math.max(w.clinicians.size, w.uniqueClinShift.size),
      hours: w.hours,
      shifts: w.shifts,
      incentiveSpend: w.incentiveSpend,
      incentiveCount: w.incentiveCount,
      stateCount: w.states.size,
      topModality: Object.entries(w.modalities).sort((a, b) => b[1] - a[1])[0]?.[0] || '—',
      modalities: w.modalities,
    }));
  }, [filteredActuals, filteredShifts, filteredIncentives, cm, icm]);

  // By-state breakdown
  const stateBreakdown = useMemo(() => {
    if (!filteredActuals) return [];
    const states = {};
    filteredActuals.forEach(r => {
      if (isCanceled(r, cm)) return;
      const st = cm.state ? (r[cm.state] || '').trim() : '';
      if (!st) return;
      if (!states[st]) states[st] = { state: st, volume: 0, slaMet: 0, slaEligible: 0, totalRT: 0, rtCount: 0, clinicians: new Set(), incentiveSpend: 0 };
      const s = states[st];
      s.volume++;
      const clin = cm.clinician ? r[cm.clinician] : '';
      if (clin) s.clinicians.add(normalizeName(clin));
      if (isSlaMet(r, cm)) { s.slaMet++; s.slaEligible++; }
      else if (isSlaMissed(r, cm)) { s.slaEligible++; }
      const rt = parseResponseTimeRobust(cm.responseTime ? r[cm.responseTime] : '');
      if (rt != null && rt >= 0) { s.totalRT += rt; s.rtCount++; }
    });
    // Add incentive spend by state
    if (filteredIncentives) {
      filteredIncentives.forEach(r => {
        const st = icm.state ? (r[icm.state] || '').trim() : '';
        if (st && states[st]) {
          const amt = parseFloat(String(icm.amount ? r[icm.amount] : '0').replace(/[^0-9.\-]/g, '')) || 0;
          states[st].incentiveSpend += amt;
        }
      });
    }
    return Object.values(states).map(s => ({
      ...s,
      slaPct: s.slaEligible > 0 ? (s.slaMet / s.slaEligible * 100) : null,
      avgRT: s.rtCount > 0 ? s.totalRT / s.rtCount : null,
      headcount: s.clinicians.size,
    })).sort((a, b) => b.volume - a.volume);
  }, [filteredActuals, filteredIncentives, cm, icm]);

  // By-modality breakdown
  const modalityBreakdown = useMemo(() => {
    if (!filteredActuals) return [];
    const mods = {};
    filteredActuals.forEach(r => {
      if (isCanceled(r, cm)) return;
      const mod = cm.modality ? (r[cm.modality] || 'Unknown') : 'Unknown';
      if (!mods[mod]) mods[mod] = { modality: mod, volume: 0, slaMet: 0, slaEligible: 0, totalRT: 0, rtCount: 0 };
      const m = mods[mod];
      m.volume++;
      if (isSlaMet(r, cm)) { m.slaMet++; m.slaEligible++; }
      else if (isSlaMissed(r, cm)) { m.slaEligible++; }
      const rt = parseResponseTimeRobust(cm.responseTime ? r[cm.responseTime] : '');
      if (rt != null && rt >= 0) { m.totalRT += rt; m.rtCount++; }
    });
    return Object.values(mods).map(m => ({
      ...m,
      slaPct: m.slaEligible > 0 ? (m.slaMet / m.slaEligible * 100) : null,
      avgRT: m.rtCount > 0 ? m.totalRT / m.rtCount : null,
      share: 0,
    })).sort((a, b) => b.volume - a.volume);
  }, [filteredActuals, cm]);

  // Auto-generated correlation insights
  const insights = useMemo(() => {
    const findings = [];
    if (weeklyTrends.length < 2) return findings;
    const recent = weeklyTrends.slice(-4);
    const prior = weeklyTrends.slice(-8, -4);
    if (recent.length === 0 || prior.length === 0) return findings;

    const avg = (arr, key) => { const vals = arr.map(r => r[key]).filter(v => v != null && !isNaN(v)); return vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : null; };
    const recentVol = avg(recent, 'volume'), priorVol = avg(prior, 'volume');
    const recentSla = avg(recent, 'slaPct'), priorSla = avg(prior, 'slaPct');
    const recentVph = avg(recent, 'vph'), priorVph = avg(prior, 'vph');
    const recentHC = avg(recent, 'headcount'), priorHC = avg(prior, 'headcount');
    const recentInc = avg(recent, 'incentiveSpend'), priorInc = avg(prior, 'incentiveSpend');

    const pctChg = (n, o) => o > 0 ? ((n - o) / o * 100) : null;
    const volChg = pctChg(recentVol, priorVol);
    const slaChg = recentSla != null && priorSla != null ? recentSla - priorSla : null;
    const vphChg = pctChg(recentVph, priorVph);
    const hcChg = pctChg(recentHC, priorHC);
    const incChg = pctChg(recentInc, priorInc);

    // Volume + SLA inverse correlation
    if (volChg != null && slaChg != null && volChg > 5 && slaChg < -2) {
      findings.push({ type: 'warning', title: 'Volume up but SLA declining', detail: `Volume increased ${volChg.toFixed(0)}% while SLA dropped ${Math.abs(slaChg).toFixed(1)}pp. Capacity may be under pressure.`, metrics: ['volume', 'sla'] });
    }

    // VPH dropping
    if (vphChg != null && vphChg < -10) {
      findings.push({ type: 'warning', title: 'VPH declining', detail: `VPH dropped ${Math.abs(vphChg).toFixed(0)}% (${priorVph?.toFixed(1)} → ${recentVph?.toFixed(1)}). Efficiency may be impacted by modality mix, training, or scheduling issues.`, metrics: ['vph'] });
    }

    // Headcount drop + SLA drop
    if (hcChg != null && slaChg != null && hcChg < -5 && slaChg < -2) {
      findings.push({ type: 'critical', title: 'Headcount & SLA both declining', detail: `Headcount down ${Math.abs(hcChg).toFixed(0)}% and SLA dropped ${Math.abs(slaChg).toFixed(1)}pp. Staffing gaps are likely affecting performance.`, metrics: ['headcount', 'sla'] });
    }

    // Incentive spend up but no volume improvement
    if (incChg != null && volChg != null && incChg > 20 && volChg < 5) {
      findings.push({ type: 'info', title: 'Incentive spend increasing without volume growth', detail: `Incentive spend up ${incChg.toFixed(0)}% but volume only changed ${volChg > 0 ? '+' : ''}${volChg.toFixed(0)}%. Review incentive ROI.`, metrics: ['incentive', 'volume'] });
    }

    // SLA improving
    if (slaChg != null && slaChg > 3) {
      findings.push({ type: 'success', title: 'SLA improving', detail: `SLA improved ${slaChg.toFixed(1)}pp over the last 4 weeks. ${vphChg > 0 ? 'VPH also trending up.' : ''}`, metrics: ['sla'] });
    }

    // State-level insights
    if (stateBreakdown.length > 0) {
      const lowSlaStates = stateBreakdown.filter(s => s.slaPct != null && s.slaPct < 85 && s.volume > 20);
      if (lowSlaStates.length > 0) {
        findings.push({ type: 'warning', title: `${lowSlaStates.length} state(s) below 85% SLA`, detail: lowSlaStates.slice(0, 5).map(s => `${s.state}: ${s.slaPct.toFixed(1)}% SLA (${s.volume} visits, ${s.headcount} clinicians)`).join('; '), metrics: ['state', 'sla'] });
      }
    }

    // Modality insight
    if (modalityBreakdown.length > 1) {
      const sorted = [...modalityBreakdown].sort((a, b) => (a.slaPct || 100) - (b.slaPct || 100));
      const worst = sorted[0], best = sorted[sorted.length - 1];
      if (worst.slaPct != null && best.slaPct != null && best.slaPct - worst.slaPct > 10) {
        findings.push({ type: 'info', title: 'SLA varies significantly by modality', detail: `${worst.modality}: ${worst.slaPct.toFixed(1)}% SLA vs ${best.modality}: ${best.slaPct.toFixed(1)}% SLA — a ${(best.slaPct - worst.slaPct).toFixed(1)}pp gap.`, metrics: ['modality', 'sla'] });
      }
    }

    return findings;
  }, [weeklyTrends, stateBreakdown, modalityBreakdown]);

  // Chart configs
  const trendChartConfig = useMemo(() => {
    if (weeklyTrends.length < 2) return null;
    const labels = weeklyTrends.map(w => w.week);
    return {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'SLA %', data: weeklyTrends.map(w => w.slaPct), borderColor: '#26AEBC', backgroundColor: 'rgba(38,174,188,0.1)', fill: false, tension: 0.3, pointRadius: 2, yAxisID: 'y' },
          { label: 'Volume', data: weeklyTrends.map(w => w.volume), borderColor: '#6C5CE7', backgroundColor: 'rgba(108,92,231,0.1)', fill: false, tension: 0.3, pointRadius: 2, yAxisID: 'y1' },
          { label: 'VPH', data: weeklyTrends.map(w => w.vph), borderColor: '#E17055', backgroundColor: 'rgba(225,112,85,0.1)', fill: false, tension: 0.3, pointRadius: 2, yAxisID: 'y2' },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { position: 'top', labels: { font: { size: 10 } } } },
        scales: {
          y: { type: 'linear', position: 'left', title: { display: true, text: 'SLA %', font: { size: 10 } }, min: 0, max: 100 },
          y1: { type: 'linear', position: 'right', title: { display: true, text: 'Volume', font: { size: 10 } }, grid: { drawOnChartArea: false } },
          y2: { type: 'linear', position: 'right', title: { display: true, text: 'VPH', font: { size: 10 } }, grid: { drawOnChartArea: false }, afterFit: (axis) => { axis.width = 40; } },
        }
      }
    };
  }, [weeklyTrends]);

  const headcountSpendConfig = useMemo(() => {
    if (weeklyTrends.length < 2) return null;
    const labels = weeklyTrends.map(w => w.week);
    const hasIncentive = weeklyTrends.some(w => w.incentiveSpend > 0);
    const datasets = [
      { label: 'Headcount', data: weeklyTrends.map(w => w.headcount), borderColor: '#00B894', backgroundColor: 'rgba(0,184,148,0.2)', fill: true, tension: 0.3, pointRadius: 2, yAxisID: 'y' },
    ];
    if (hasIncentive) {
      datasets.push({ label: 'Incentive $', data: weeklyTrends.map(w => w.incentiveSpend), borderColor: '#FDCB6E', backgroundColor: 'rgba(253,203,110,0.2)', fill: true, tension: 0.3, pointRadius: 2, yAxisID: 'y1' });
    }
    return {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { position: 'top', labels: { font: { size: 10 } } } },
        scales: {
          y: { type: 'linear', position: 'left', title: { display: true, text: 'Headcount', font: { size: 10 } } },
          ...(hasIncentive ? { y1: { type: 'linear', position: 'right', title: { display: true, text: 'Incentive $', font: { size: 10 } }, grid: { drawOnChartArea: false } } } : {}),
        }
      }
    };
  }, [weeklyTrends]);

  // Aggregate KPIs
  const kpis = useMemo(() => {
    if (!filteredActuals) return null;
    const totalVol = weeklyTrends.reduce((s, w) => s + w.volume, 0);
    const slaWeeks = weeklyTrends.filter(w => w.slaPct != null);
    const avgSla = slaWeeks.length > 0 ? slaWeeks.reduce((s, w) => s + w.slaPct, 0) / slaWeeks.length : null;
    const vphWeeks = weeklyTrends.filter(w => w.vph != null);
    const avgVph = vphWeeks.length > 0 ? vphWeeks.reduce((s, w) => s + w.vph, 0) / vphWeeks.length : null;
    const avgHC = weeklyTrends.length > 0 ? weeklyTrends.reduce((s, w) => s + w.headcount, 0) / weeklyTrends.length : 0;
    const totalInc = weeklyTrends.reduce((s, w) => s + w.incentiveSpend, 0);
    const rtWeeks = weeklyTrends.filter(w => w.avgRT != null);
    const avgRT = rtWeeks.length > 0 ? rtWeeks.reduce((s, w) => s + w.avgRT, 0) / rtWeeks.length : null;
    return { totalVol, avgSla, avgVph, avgHC: Math.round(avgHC), totalInc, avgRT, weekCount: weeklyTrends.length, stateCount: stateBreakdown.length };
  }, [weeklyTrends, stateBreakdown, filteredActuals]);

  const fmt$ = (v) => '$' + v.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  // Response time display — always show in minutes. Input may be seconds or minutes depending on source.
  const fmtRT = (v) => {
    if (v == null || isNaN(v)) return '—';
    // If value seems like raw seconds (> 5), convert to minutes
    const min = v > 5 ? v / 60 : v;
    if (min < 1) return (min * 60).toFixed(0) + 's';
    return min.toFixed(1) + ' min';
  };

  // Detect which SLs actually exist in the data — MUST be before early return to keep hook count stable
  const availableSLs = useMemo(() => {
    if (!actualsData) return new Set();
    const sls = new Set();
    actualsData.forEach(r => { if (r._detectedSL) sls.add(r._detectedSL); });
    return sls;
  }, [actualsData]);

  if (!actualsData && !shiftScheduleData) {
    return (
      <div className="empty-state">
        <div className="icon">📊</div>
        <h3>Executive Overview</h3>
        <p>Upload <strong>Actuals</strong> and <strong>Shift Schedule</strong> data to see cross-dimensional analysis.</p>
        <div className="hint">This tab correlates volume, SLA, VPH, headcount, incentive spend, modality, and state distribution — all in one place.</div>
      </div>
    );
  }

  const insightColors = { critical: '#E74C3C', warning: '#E17055', info: '#26AEBC', success: '#00B894' };

  const clearFilters = () => { setServiceLine('ALL'); setDateFrom(''); setDateTo(''); };
  const hasFilters = serviceLine !== 'ALL' || dateFrom || dateTo;

  return (
    <div>
      {/* Filters */}
      <div style={{ display: 'flex', gap: 12, marginBottom: 12, flexWrap: 'wrap', alignItems: 'flex-end' }}>
        <SLFilter value={serviceLine} onChange={setServiceLine} />

// ========================== DIAGNOSTICS ENGINE ==========================

// Decompose an SLA miss period into weighted contributing factors
// Returns { factors: [{name, weight, detail, raw, color}], slaPct, totalVisits, totalMisses }
function decomposeSLAMiss({ hourActuals, scheduledShifts, roster, baselineArrivals, cm, hourIndex }) {
  const FACTOR_COLORS = {
    staffing: '#3b82f6', volume: '#f59e0b', vph: '#ef4444',
    coverage: '#8b5cf6', modality: '#14b8a6'
  };

  // Count visits and misses
  const validRows = hourActuals.filter(r => !isCanceled(r, cm));
  const totalVisits = validRows.length;
  const missedRows = validRows.filter(r => isSlaMissed(r, cm));
  const totalMisses = missedRows.length;
  const slaPct = totalVisits > 0 ? ((totalVisits - totalMisses) / totalVisits * 100) : 100;

  if (totalMisses === 0 || totalVisits === 0) {
    return { factors: [], slaPct, totalVisits, totalMisses, met: true };
  }

  // Build clinician lookup from roster or TC_CLINICIANS
  const clinMap = {};
  if (roster && roster.length > 0) {
    roster.forEach(c => { clinMap[normalizeName(c.name)] = c; });
  } else {
    TC_CLINICIANS.forEach(c => { clinMap[normalizeName(c[0])] = { name: c[0], credential: c[1], vph: c[4], stateFlags: c[5] }; });
  }

  // 1. STAFFING GAP — were there enough clinicians?
  const actualHC = scheduledShifts ? scheduledShifts.length : 0;
  const rosterVPHs = Object.values(clinMap).map(c => c.vph || 1.5).filter(v => v > 0);
  const avgExpectedVPH = rosterVPHs.length > 0 ? rosterVPHs.reduce((a, b) => a + b, 0) / rosterVPHs.length : 1.5;
  const expectedHC = Math.ceil(totalVisits / Math.max(avgExpectedVPH, 0.5));
  const deltaStaff = expectedHC > 0 ? Math.max(0, expectedHC - actualHC) / expectedHC : 0;

  // 2. VOLUME SPIKE — did volume exceed baseline?
  const hIdx = hourIndex !== undefined && hourIndex < TC_ARRIVALS.length ? hourIndex : -1;
  const baseline = hIdx >= 0 ? TC_ARRIVALS[hIdx][24] : totalVisits;
  const deltaVol = baseline > 0 ? Math.max(0, totalVisits - baseline) / baseline : 0;

  // 3. VPH DECLINE — did clinicians underperform?
  let deltaVph = 0;
  if (scheduledShifts && scheduledShifts.length > 0) {
    const scheduledNames = scheduledShifts.map(s => normalizeName(s.clinician || s.Name || s.name || ''));
    const expectedVPHs = scheduledNames.map(n => clinMap[n]?.vph || avgExpectedVPH);
    const expectedAvg = expectedVPHs.reduce((a, b) => a + b, 0) / expectedVPHs.length;
    // Observed VPH = total visits / total clinician-hours
    const totalShiftHours = scheduledShifts.reduce((s, sh) => s + (sh.hours || 1), 0);
    const observedAvg = totalShiftHours > 0 ? totalVisits / totalShiftHours : 0;
    deltaVph = expectedAvg > 0 ? Math.max(0, expectedAvg - observedAvg) / expectedAvg : 0;
  }

  // 4. COVERAGE GAP — states with demand but no eligible clinician
  let deltaCov = 0;
  if (hIdx >= 0 && scheduledShifts && scheduledShifts.length > 0) {
    let uncovered = 0;
    let totalStateArrivals = 0;
    const stateElig = {};
    TC_STATES.forEach(st => { stateElig[st] = 0; });

    // Count state eligibility from scheduled clinicians
    scheduledShifts.forEach(s => {
      const n = normalizeName(s.clinician || s.Name || s.name || '');
      const c = clinMap[n];
      if (c && c.stateFlags) {
        TC_STATES.forEach((st, i) => { stateElig[st] += (c.stateFlags[i] || 0); });
      }
    });

    TC_STATES.forEach((st, si) => {
      const stArrivals = TC_ARRIVALS[hIdx][si];
      if (stArrivals > 0.01) {
        totalStateArrivals += stArrivals;
        if (stateElig[st] === 0) uncovered += stArrivals;
      }
    });
    deltaCov = totalStateArrivals > 0 ? uncovered / totalStateArrivals : 0;
  }

  // 5. MODALITY MIX — sync vs async ratio shift
  let deltaMod = 0;
  const modalityCol = cm.modality || cm.visitType;
  if (modalityCol) {
    let syncCount = 0, asyncCount = 0;
    validRows.forEach(r => {
      const mod = (r[modalityCol] || '').toLowerCase();
      if (mod.includes('sync') && !mod.includes('async')) syncCount++;
      else asyncCount++;
    });
    const totalMod = syncCount + asyncCount;
    // Baseline assumption: ~40% sync. If actual sync share is higher, it's harder to meet SLA
    const baselineSyncRatio = 0.4;
    const actualSyncRatio = totalMod > 0 ? syncCount / totalMod : 0;
    deltaMod = Math.max(0, actualSyncRatio - baselineSyncRatio);
  }

  // Normalize to 100%
  const rawDeltas = [
    { name: 'Staffing Gap', key: 'staffing', raw: deltaStaff, color: FACTOR_COLORS.staffing,
      detail: `Need ~${expectedHC} HC, had ${actualHC}` },
    { name: 'Volume Spike', key: 'volume', raw: deltaVol, color: FACTOR_COLORS.volume,
      detail: `${totalVisits} visits vs ${baseline.toFixed(1)} baseline` },
    { name: 'VPH Decline', key: 'vph', raw: deltaVph, color: FACTOR_COLORS.vph,
      detail: `Clinicians underperforming expected VPH` },
    { name: 'Coverage Gap', key: 'coverage', raw: deltaCov, color: FACTOR_COLORS.coverage,
      detail: `${(deltaCov * 100).toFixed(0)}% of demand in uncovered states` },
    { name: 'Modality Mix', key: 'modality', raw: deltaMod, color: FACTOR_COLORS.modality,
      detail: `Higher sync share increases difficulty` },
  ];

  const totalRaw = rawDeltas.reduce((s, d) => s + d.raw, 0);
  const factors = rawDeltas.map(d => ({
    ...d,
    weight: totalRaw > 0 ? Math.round(d.raw / totalRaw * 100) : 0,
  })).sort((a, b) => b.weight - a.weight);

  return { factors, slaPct, totalVisits, totalMisses, met: false };
}

// Compute per-hour alignment score (0–100) between shift coverage and expected demand
function computeAlignmentScore({ hourIndex, scheduledShifts, roster, volumeMultiplier = 1.0 }) {
  if (hourIndex < 0 || hourIndex >= TC_ARRIVALS.length) return { score: 0, sub: {}, detail: {} };

  const expectedDemand = TC_ARRIVALS[hourIndex][24] * volumeMultiplier;
  if (expectedDemand < 0.1) return { score: 100, sub: { capacity: 40, coverage: 30, vph: 20, modality: 10 }, detail: { demand: 0, capacity: 0 }, noDemand: true };

  // Build clinician lookup
  const clinMap = {};
  if (roster && roster.length > 0) {
    roster.forEach(c => { clinMap[normalizeName(c.name)] = c; });
  } else {
    TC_CLINICIANS.forEach(c => { clinMap[normalizeName(c[0])] = { name: c[0], credential: c[1], vph: c[4], stateFlags: c[5] }; });
  }

  // Sub-score 1: CAPACITY (40% weight) — scheduled capacity vs demand
  let capacitySum = 0;
  let vphSum = 0;
  let mdDoCount = 0;
  let totalClinicians = 0;
  const stateElig = {};
  TC_STATES.forEach(st => { stateElig[st] = 0; });

  if (scheduledShifts && scheduledShifts.length > 0) {
    scheduledShifts.forEach(s => {
      const n = normalizeName(s.clinician || s.Name || s.name || '');
      const c = clinMap[n];
      const vph = c?.vph || 1.5;
      capacitySum += vph;
      vphSum += vph;
      totalClinicians++;
      const cred = (c?.credential || s.credential || s.credClass || '').toUpperCase();
      if (cred.includes('MD') || cred.includes('DO')) mdDoCount++;
      if (c && c.stateFlags) {
        TC_STATES.forEach((st, i) => { stateElig[st] += (c.stateFlags[i] || 0); });
      }
    });
  }

  const capacityScore = Math.min(1, capacitySum / Math.max(expectedDemand, 0.1)) * 40;

  // Sub-score 2: COVERAGE (30% weight) — state coverage overlap
  let uncoveredArrivals = 0;
  let totalStateArrivals = 0;
  TC_STATES.forEach((st, si) => {
    const stArrivals = TC_ARRIVALS[hourIndex][si] * volumeMultiplier;
    if (stArrivals > 0.01) {
      totalStateArrivals += stArrivals;
      if (stateElig[st] === 0) uncoveredArrivals += stArrivals;
    }
  });
  const coverageScore = totalStateArrivals > 0 ? (1 - uncoveredArrivals / totalStateArrivals) * 30 : 30;

  // Sub-score 3: VPH QUALITY (20% weight) — avg VPH vs target
  const targetVPH = 1.64; // median from TC_CLINICIANS
  const avgVPH = totalClinicians > 0 ? vphSum / totalClinicians : 0;
  const vphScore = Math.min(1, avgVPH / targetVPH) * 20;

  // Sub-score 4: MODALITY FIT (10% weight) — MD/DO fraction for sync capability
  const modalityScore = totalClinicians > 0 ? (mdDoCount / totalClinicians) * 10 : 0;

  const score = Math.round(capacityScore + coverageScore + vphScore + modalityScore);
  const uncoveredStates = [];
  TC_STATES.forEach((st, si) => {
    const stArr = TC_ARRIVALS[hourIndex][si] * volumeMultiplier;
    if (stArr > 0.01 && stateElig[st] === 0) uncoveredStates.push({ state: st, arrivals: stArr });
  });
  uncoveredStates.sort((a, b) => b.arrivals - a.arrivals);

  return {
    score,
    sub: { capacity: Math.round(capacityScore), coverage: Math.round(coverageScore), vph: Math.round(vphScore), modality: Math.round(modalityScore) },
    detail: { demand: expectedDemand, capacity: capacitySum, hc: totalClinicians, avgVPH, uncoveredStates },
    overstaffed: capacitySum > expectedDemand * 1.5
  };
}

// ========================== FORECAST ENGINE ==========================

function runForecast(shifts, settings, dynamicRoster) {
  const { volumeMultiplier = 1.0, oncallEngaged = false, demandLow = 19, demandMid = 28 } = settings;

  // Build clinician lookup map — use dynamic roster if available, else fallback to static
  const clinMap = {};
  if (dynamicRoster && dynamicRoster.length > 0) {
    dynamicRoster.forEach(c => {
      clinMap[normalizeName(c.name)] = [c.name, c.credential, c.stateCount, c.restricted, c.vph, c.stateFlags || new Array(24).fill(0)];
    });
  } else {
    TC_CLINICIANS.forEach(c => { clinMap[normalizeName(c[0])] = c; });
  }

  // Parse shifts and match — separate unfilled (Not Assigned) from unmatched
  const matched = [];
  const unmatched = [];
  const unfilled = [];
  shifts.forEach(s => {
    const rawName = (s.Name || s.name || s['Clinician Name'] || '').trim();
    const norm = normalizeName(rawName);
    const isUnfilled = UNFILLED_NAMES.includes(norm.toLowerCase().trim());
    if (isUnfilled) {
      // Parse tags for incentive info
      const tagsRaw = (s.Tags || s.tags || s['Shift Tags'] || '').trim();
      const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
      const incentiveTag = tags.find(t => /incentiv|bonus|1\.5x|2x|2\.0x|1\.25x|3x/i.test(t));
      let incentiveMultiplier = null;
      if (incentiveTag) {
        const mMatch = incentiveTag.match(/([\d.]+)x/i);
        incentiveMultiplier = mMatch ? parseFloat(mMatch[1]) : 1.5; // default 1.5x if tagged but no multiplier
      }
      // Also check Bonus column if no incentive tag found
      if (!incentiveMultiplier) {
        const bonusVal = (s.Bonus || s.bonus || '').toString().trim();
        if (bonusVal) {
          const bMatch = bonusVal.match(/([\d.]+)x/i);
          if (bMatch) incentiveMultiplier = parseFloat(bMatch[1]);
          else if (parseFloat(bonusVal) > 0) incentiveMultiplier = parseFloat(bonusVal);
        }
      }
      unfilled.push({ ...s, _unfilled: true, _tags: tags, _incentiveTag: incentiveTag || null, _incentiveMultiplier: incentiveMultiplier });
    } else {
      const clin = clinMap[norm];
      if (clin) {
        matched.push({ ...s, clinician: clin });
      } else {
        unmatched.push(s);
      }
    }
  });

  // Determine forecast hours from shift times
  const startDate = settings.forecastStart ? new Date(settings.forecastStart) : new Date();
  // Start from current hour (not midnight) so we don't show already-past hours
  if (!settings.forecastStart) {
    startDate.setMinutes(0, 0, 0); // round down to current hour
  } else {
    startDate.setHours(0, 0, 0, 0);
  }

  // Build hourly aggregates for 7 days
  const hours = [];
  for (let h = 0; h < FORECAST_HOURS; h++) {
    const hourStart = new Date(startDate.getTime() + h * 3600000);
    const hourEnd = new Date(hourStart.getTime() + 3600000);

    // Count clinicians on shift during this hour
    let headcount = 0;
    let oncallCount = 0;
    let vphSum = 0;
    let openShifts = 0;
    let openIncentivized = 0;
    const stateElig = {};
    const oncallElig = {};
    TC_STATES.forEach(st => { stateElig[st] = 0; oncallElig[st] = 0; });

    matched.forEach(s => {
      const sStart = parseDate(s['Start Time'] || s['Start']);
      const sEnd = parseDate(s['End Time'] || s['End']);
      if (!sStart || !sEnd) return;

      // Check if shift overlaps this hour
      if (sStart < hourEnd && sEnd > hourStart) {
        const isOncall = (s['Entity Name'] || '').toLowerCase().includes('on call');
        const clin = s.clinician;
        if (isOncall) {
          oncallCount++;
          TC_STATES.forEach((st, i) => { oncallElig[st] += clin[5][i]; });
        } else {
          headcount++;
          vphSum += clin[4];
          TC_STATES.forEach((st, i) => { stateElig[st] += clin[5][i]; });
        }
      }
    });

    // Count unfilled (Not Assigned) shifts overlapping this hour
    unfilled.forEach(s => {
      const sStart = parseDate(s['Start Time'] || s['Start']);
      const sEnd = parseDate(s['End Time'] || s['End']);
      if (!sStart || !sEnd) return;
      if (sStart < hourEnd && sEnd > hourStart) {
        openShifts++;
        if (s._incentiveMultiplier) openIncentivized++;
      }
    });

    const avgVph = headcount > 0 ? vphSum / headcount : 0;
    const arrivals = h < TC_ARRIVALS.length ? TC_ARRIVALS[h][24] * volumeMultiplier : 0;
    const bucket = arrivals < demandLow ? 'low' : arrivals < demandMid ? 'mid' : 'high';

    // Per-state predictions
    let totalMiss = 0, totalOver30 = 0, totalOver60 = 0;
    const stateResults = {};

    TC_STATES.forEach((st, si) => {
      const stArrivals = h < TC_ARRIVALS.length ? TC_ARRIVALS[h][si] * volumeMultiplier : 0;
      if (stArrivals < 0.01) {
        stateResults[st] = { arrivals: 0, pMiss: 0, pOver30: 0, pOver60: 0, eMiss: 0, eOver30: 0, eOver60: 0 };
        return;
      }

      const elig0 = stateElig[st] || 0;
      const elig1 = oncallEngaged ? (oncallElig[st] || 0) : 0;
      const features = [elig0, elig1, headcount, stArrivals, avgVph, oncallEngaged ? (oncallElig[st] || 0) : 0];

      // Standardize
      const z = features.map((f, i) => (f - TC_MODEL.means[i]) / TC_MODEL.scales[i]);

      // Predict 3 outcomes
      const probs = TC_MODEL.coefs.map((coef, oi) => {
        const logit = TC_MODEL.intercepts[oi] + coef.reduce((s, c, i) => s + c * z[i], 0);
        return sigmoid(logit);
      });

      const eMiss = probs[0] * stArrivals;
      const eOver30 = probs[1] * stArrivals;
      const eOver60 = probs[2] * stArrivals;

      totalMiss += eMiss;
      totalOver30 += eOver30;
      totalOver60 += eOver60;

      stateResults[st] = { arrivals: stArrivals, pMiss: probs[0], pOver30: probs[1], pOver60: probs[2], eMiss, eOver30, eOver60, elig: elig0 };
    });

    hours.push({
      relHour: h, label: hourLabel(h, startDate), time: hourStart,
      headcount, oncallCount, avgVph, arrivals, bucket,
      totalMiss, totalOver30, totalOver60,
      openShifts, openIncentivized,
      stateElig, oncallElig, stateResults
    });
  }

  const totalArrivals = hours.reduce((s, h) => s + h.arrivals, 0);
  const totalMisses = hours.reduce((s, h) => s + h.totalMiss, 0);
  const totalOver30 = hours.reduce((s, h) => s + h.totalOver30, 0);
  const totalOver60 = hours.reduce((s, h) => s + h.totalOver60, 0);
  const slaRate = totalArrivals > 0 ? ((totalArrivals - totalMisses) / totalArrivals * 100) : 0;
  const worstHour = hours.reduce((w, h) => h.totalMiss > w.totalMiss ? h : w, hours[0]);

  // Unfilled shift summary — only shifts within the forecast window (startDate → +57h)
  const forecastEnd = new Date(startDate.getTime() + 57 * 3600000);
  const forecastUnfilled = unfilled.filter(u => {
    const sStart = parseDate(u['Start Time'] || u['Start']);
    const sEnd = parseDate(u['End Time'] || u['End']);
    if (!sStart || !sEnd) return false;
    return sStart < forecastEnd && sEnd > startDate; // overlaps forecast window
  });
  const totalOpenShifts = forecastUnfilled.length;
  const totalIncentivized = forecastUnfilled.filter(u => u._incentiveMultiplier).length;
  const incentiveBreakdown = {};
  forecastUnfilled.forEach(u => {
    if (u._incentiveMultiplier) {
      const key = u._incentiveMultiplier + 'x';
      incentiveBreakdown[key] = (incentiveBreakdown[key] || 0) + 1;
    }
  });
  const peakOpenHour = hours.reduce((w, h) => h.openShifts > (w?.openShifts || 0) ? h : w, null);

  return {
    hours, matched: matched.length, unmatched: unmatched.length,
    unmatchedNames: unmatched.map(u => u.Name || u.name),
    totalArrivals, totalMisses, totalOver30, totalOver60, slaRate,
    worstHour: worstHour ? worstHour.label : '',
    riskLevel: totalOver60 > 0 ? 'HIGH' : totalMisses > 5 ? 'MEDIUM' : 'LOW',
    // Unfilled shift data
    totalOpenShifts, totalIncentivized, incentiveBreakdown,
    unfilledShifts: forecastUnfilled,
    peakOpenHour: peakOpenHour ? peakOpenHour.label : ''
  };
}

// ========================== REACT COMPONENTS ==========================
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// KPI Card
function KpiCard({ label, value, sub, className = '' }) {
  return (
    <div className={`kpi-card ${className}`}>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">{value}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}

// Upload Zone
function UploadZone({ label, hint, onData, accept = '.csv' }) {
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);

  const handleFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      onData(parseCSV(text), file.name);
    };
    reader.readAsText(file);
  };

  return (
    <div
      className={`upload-zone ${dragOver ? 'dragover' : ''}`}
      onClick={() => inputRef.current?.click()}
      onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}
      onDrop={(e) => { e.preventDefault(); setDragOver(false); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }}
    >
      <div className="icon">+</div>
      <p>{label}</p>
      {hint && <div className="hint">{hint}</div>}
      <input ref={inputRef} type="file" accept={accept} style={{ display: 'none' }} onChange={(e) => { if (e.target.files[0]) handleFile(e.target.files[0]); }} />
    </div>
  );
}

// Chart wrapper
function ChartWrapper({ config, height = 320 }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    if (!canvasRef.current || !config) return;
    chartRef.current = new Chart(canvasRef.current, config);
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [config]);

  return <div style={{ position: 'relative', height }}><canvas ref={canvasRef} /></div>;
}

// Multi-select dropdown with search, select-all, and count badges
function MultiSelect({ label, options, selected, onChange, placeholder = 'All', countMap }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const wrapRef = useRef(null);

  // Close on outside click
  useEffect(() => {
    const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const filtered = options.filter(o => o.toLowerCase().includes(search.toLowerCase()));
  const allSelected = selected.length === 0; // empty = all
  const isSelected = (v) => selected.includes(v);

  const toggle = (v) => {
    if (isSelected(v)) {
      onChange(selected.filter(s => s !== v));
    } else {
      onChange([...selected, v]);
    }
  };

  const selectAll = () => onChange([]);
  const clearAll = () => onChange(['__NONE__']); // special sentinel to select nothing — practically unused
  const selectFiltered = () => onChange([...new Set([...selected, ...filtered])]);

  const removePill = (v, e) => {
    e.stopPropagation();
    onChange(selected.filter(s => s !== v));
  };

  const displayItems = allSelected ? [] : selected.slice(0, 3);
  const overflow = allSelected ? 0 : Math.max(0, selected.length - 3);

  return (
    <div className="form-group" style={{ marginBottom: 0 }} ref={wrapRef}>
      <label className="form-label">{label}</label>
      <div className="ms-wrap">
        <button type="button" className={`ms-trigger ${open ? 'open' : ''}`} onClick={() => { setOpen(!open); setSearch(''); }}>
          <div className="ms-pills">
            {allSelected ? (
              <span className="ms-placeholder">{placeholder}</span>
            ) : displayItems.length === 0 ? (
              <span className="ms-placeholder" style={{ color: 'var(--accent-red)' }}>None</span>
            ) : (
              <>
                {displayItems.map(v => (
                  <span key={v} className="ms-pill">{v}<span className="ms-x" onClick={(e) => removePill(v, e)}>&times;</span></span>
                ))}
                {overflow > 0 && <span className="ms-pill">+{overflow}</span>}
              </>
            )}
          </div>
          <span className="ms-arrow">&#9660;</span>
        </button>
        {open && (
          <div className="ms-dropdown">
            {options.length > 6 && (
              <div className="ms-search">
                <input autoFocus placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} />
              </div>
            )}
            <div className="ms-actions">
              <span onClick={selectAll}>All</span>
              {search && filtered.length > 0 && <span onClick={selectFiltered}>Select visible</span>}
              {!allSelected && <span onClick={() => onChange([])}>Clear</span>}
            </div>
            <div className="ms-list">
              {filtered.map(o => (
                <div key={o} className="ms-item" onClick={() => toggle(o)}>
                  <div className={`ms-check ${isSelected(o) ? 'checked' : ''}`}>{isSelected(o) ? '\u2713' : ''}</div>
                  <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{o}</span>
                  {countMap && countMap[o] !== undefined && <span className="ms-count">{countMap[o]}</span>}
                </div>
              ))}
              {filtered.length === 0 && <div style={{ padding: '8px 10px', color: 'var(--text-muted)', fontSize: 11 }}>No matches</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

  // Auto-run forecast when roster data loads
  const autoRan = useRef(false);
  useEffect(() => {
    if (rosterData && rosterData.length > 0 && !autoRan.current) {
      autoRan.current = true;
      // Short delay to ensure state is settled
      setTimeout(() => {
        const filtered = serviceLine !== 'ALL' ? rosterData.filter(r => mapEntityToSL(r['Entity Name']) === serviceLine) : rosterData;
        const result = runForecast(filtered, settings, masterRoster);
        setForecast(result);

                                <td>{en ? en.toLocaleTimeString('en-US', { timeZone: CT_TZ, hour: 'numeric', minute: '2-digit' }) : '—'}</td>

                                  {s._incentiveTag && <span style={{ marginLeft: 4, fontSize: 10, opacity: 0.7 }}>({s._incentiveTag})</span>}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </details>
                )}
              </div>
            )}

            {/* Unmatched (not unfilled, just unknown names) */}
            {forecast.unmatched > 0 && (

                <span className="alert-icon">!</span> {forecast.unmatched} shift(s) could not be matched to clinician lookup: {forecast.unmatchedNames.slice(0, 5).join(', ')}{forecast.unmatchedNames.length > 5 ? '...' : ''}
              </div>
            )}

            <div className="card" style={{ marginBottom: 16, overflow: 'hidden' }}>
              <div className="card-title">Hourly Performance Forecast</div>
              <div style={{ minHeight: 280, width: '100%' }}>
                <ChartWrapper config={hourlyChartConfig} height={300} />
              </div>
            </div>

            <div className="card" style={{ marginBottom: 16 }}>
              <div className="card-title">Hourly Detail</div>

                <table>
                  <thead>

                      <th>Hour</th><th>Arrivals</th><th>HC</th><th style={{ color: 'var(--accent-orange)' }} title="Unfilled/Not Assigned shifts">Open</th><th>Avg VPH</th><th>Bucket</th><th>Exp Miss</th><th>Exp &gt;30m</th><th>Exp &gt;60m</th>
                    </tr>

                      <tr key={h.relHour} className={h.totalMiss > 2 ? 'row-risk-high' : h.totalMiss > 1 ? 'row-risk-medium' : ''}>

// ========================== RECOMMENDATIONS PANEL ==========================
function RecommendationsPanel({ forecast, masterRoster, settings }) {
  const [whatIfClinicians, setWhatIfClinicians] = useState(2);
  const [whatIfVph, setWhatIfVph] = useState(1.5);

  const recommendations = useMemo(() => {
    if (!forecast) return [];
    const recs = [];

    // Staffing Gaps — hours with SLA < 90%
    forecast.hours.forEach(h => {
      if (h.arrivals < 1) return;
      const hourCapacity = h.headcount * h.avgVph;
      const hourSla = h.arrivals > 0 ? Math.max(0, ((h.arrivals - h.totalMiss) / h.arrivals) * 100) : 100;
      if (hourSla < 90) {
        // Estimate how many more clinicians needed
        const avgVph = masterRoster && masterRoster.length > 0
          ? masterRoster.filter(c => c.vph > 0).reduce((s, c) => s + c.vph, 0) / Math.max(masterRoster.filter(c => c.vph > 0).length, 1)
          : 1.5;
        const currentCapacity = h.headcount * h.avgVph;
        const needed = currentCapacity > 0 ? Math.ceil((h.arrivals / 0.9 - (h.arrivals - h.totalMiss)) / avgVph) : 1;
        recs.push({
          type: 'staffing', severity: 'high',
          text: `${h.label}: Need ~${Math.max(1, needed)} more clinician(s) to reach 90% (currently ${hourSla.toFixed(1)}%, HC=${h.headcount})`
        });
      }
    });

    // Coverage Gaps — states with 0 eligible clinicians during volume hours
    const stateGaps = {};
    forecast.hours.forEach(h => {
      Object.entries(h.stateResults || {}).forEach(([st, data]) => {
        if ((data.arrivals || 0) > 0 && (h.stateElig[st] || 0) === 0) {
          if (!stateGaps[st]) stateGaps[st] = 0;
          stateGaps[st]++;
        }
      });
    });
    Object.entries(stateGaps).sort((a, b) => b[1] - a[1]).slice(0, 5).forEach(([st, hrs]) => {
      recs.push({
        type: 'coverage', severity: 'high',
        text: `State ${st}: No coverage for ${hrs} hour(s) with expected volume`
      });
    });

    // Low VPH Alert — grouped with top offenders
    if (masterRoster) {
      const lowVph = masterRoster.filter(c => c.vph > 0 && c.vph < 1.0).sort((a, b) => a.vph - b.vph);
      if (lowVph.length > 0 && forecast.slaRate < 90) {
        const top5 = lowVph.slice(0, 5).map(c => `${c.name} (${c.vph.toFixed(2)})`).join(', ');
        const moreCount = lowVph.length > 5 ? ` +${lowVph.length - 5} more` : '';
        recs.push({
          type: 'vph', severity: 'medium',
          text: `${lowVph.length} clinician(s) below 1.0 VPH — worst: ${top5}${moreCount}`
        });
      }
    }

    // Volume Sensitivity Warning
    if (settings.volumeMultiplier > 1.0) {
      recs.push({
        type: 'volume', severity: settings.volumeMultiplier > 1.5 ? 'medium' : 'info',
        text: `Volume multiplier is ${settings.volumeMultiplier}× — confidence decreases above 1.5×`
      });
    }

    return recs;
  }, [forecast, masterRoster, settings]);

  // What-If Calculator
  const whatIfSla = useMemo(() => {
    if (!forecast) return null;
    const additionalCapacity = whatIfClinicians * whatIfVph * forecast.hours.length;
    const currentCapacity = forecast.hours.reduce((s, h) => s + h.headcount * h.avgVph, 0);
    const totalCapacity = currentCapacity + additionalCapacity;
    const totalArrivals = forecast.hours.reduce((s, h) => s + h.arrivals, 0);
    const capacityRatio = totalCapacity / Math.max(currentCapacity, 0.1);
    const newMisses = Math.max(0, forecast.totalMisses / capacityRatio);
    const newSla = totalArrivals > 0 ? ((totalArrivals - newMisses) / totalArrivals * 100) : 100;
    return Math.min(100, newSla);
  }, [forecast, whatIfClinicians, whatIfVph]);

  if (recommendations.length === 0 && forecast.slaRate >= 95) return null;

  const sevColor = { high: 'var(--accent-red)', medium: 'var(--accent-orange)', info: 'var(--accent-teal)' };
  const sevBg = { high: 'var(--accent-red-soft)', medium: 'var(--accent-orange-soft)', info: 'var(--accent-teal-soft)' };

  return (
    <div className="card" style={{ marginTop: 16, borderLeft: '3px solid var(--accent-red)' }}>
      <div className="card-title" style={{ color: 'var(--accent-red)' }}>&#9888; Forecast Recommendations — SLA at {forecast.slaRate.toFixed(1)}%</div>

      {recommendations.map((r, i) => (
        <div key={i} style={{ background: sevBg[r.severity], border: `1px solid ${sevColor[r.severity]}33`, borderRadius: 'var(--radius)', padding: '8px 12px', marginBottom: 8, fontSize: 12 }}>
          <span style={{ fontWeight: 700, color: sevColor[r.severity], marginRight: 6 }}>
            {r.severity === 'high' ? '🔴' : r.severity === 'medium' ? '🟠' : 'ℹ️'}
          </span>
          {r.text}
        </div>
      ))}

      {/* What-If Calculator */}
      <div style={{ marginTop: 14, padding: '12px 14px', background: 'var(--bg-primary)', borderRadius: 'var(--radius)', border: '1px solid var(--border)' }}>
        <div style={{ fontWeight: 700, fontSize: 12, marginBottom: 8 }}>What-If Calculator</div>
        <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap', fontSize: 12 }}>
          <label style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            Add
            <input type="number" min="1" max="50" value={whatIfClinicians} onChange={e => setWhatIfClinicians(Math.max(1, parseInt(e.target.value) || 1))}
              style={{ width: 50, padding: '3px 6px', border: '1px solid var(--border)', borderRadius: 4, fontSize: 12, textAlign: 'center' }} />
            clinician(s)
          </label>
          <label style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            with VPH
            <input type="number" min="0.5" max="5" step="0.1" value={whatIfVph} onChange={e => setWhatIfVph(Math.max(0.5, parseFloat(e.target.value) || 1.5))}
              style={{ width: 60, padding: '3px 6px', border: '1px solid var(--border)', borderRadius: 4, fontSize: 12, textAlign: 'center' }} />
          </label>
          <span style={{ fontWeight: 700, fontSize: 14, color: whatIfSla >= 90 ? 'var(--accent-teal)' : 'var(--accent-orange)' }}>
            → Est. SLA: {whatIfSla !== null ? whatIfSla.toFixed(1) + '%' : '-'}
          </span>
          {whatIfSla !== null && whatIfSla >= 90 && (
            <span style={{ fontSize: 11, color: 'var(--accent-teal)' }}>✓ Target achievable</span>
          )}
          {whatIfSla !== null && whatIfSla < 90 && (
            <span style={{ fontSize: 11, color: 'var(--accent-orange)' }}>✗ Still below 90% — try adding more</span>
          )}
        </div>
      </div>
    </div>
  );
}

// State Coverage Heatmap (shared)
function StateCoverageHeatmap({ hours, showAllStates = false }) {
  const states = showAllStates ? ALL_51_STATES : TC_STATES;
  // Show every 3rd hour label
  const gaps = [];
  states.forEach(st => {
    const zeroHours = hours.filter(h => (h.stateElig[st] || 0) === 0 && (h.stateResults?.[st]?.arrivals || 0) > 0);
    if (zeroHours.length > 0) {
      gaps.push({ state: st, hours: zeroHours.map(h => h.label).join(', '), count: zeroHours.length });
    }

  return (
    <div>
      <div className="heatmap-container" style={{ maxHeight: 500, overflowY: 'auto' }}>
        <table className="heatmap">
          <thead>
            <tr>
              <th className="state-label">State</th>
              {hours.map((h, i) => i % 3 === 0 ? <th key={i}>{h.label.replace(/am|pm/,'')}</th> : <th key={i} style={{ fontSize: 7 }}>{(h.relHour % 24)}</th>)}

          </thead>
          <tbody>
            {states.map(st => (
              <tr key={st}>
                <td className="state-label">{st}</td>
                {hours.map((h, i) => {
                  const val = h.stateElig[st] || 0;

                })}

            ))}
          </tbody>
        </table>
      </div>
      {gaps.length > 0 && (
        <div style={{ marginTop: 12 }}>
          {gaps.slice(0, 10).map(g => (
            <div className="gap-alert" key={g.state} style={{ marginBottom: 4 }}>
              <span className="alert-icon">!</span> <strong>{g.state}</strong>: 0 eligible clinicians for {g.count} hour(s) with volume
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ========================== TAB: STAFFING & COVERAGE (Module 1) ==========================
function StaffingTab({ shiftScheduleData, setShiftScheduleData, masterRoster, showToast, onShiftUpload }) {
  const [selSLs, setSelSLs] = useState([]);
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [viewWeek, setViewWeek] = useState(''); // '' = avg across all weeks, or 'YYYY-MM-DD' = specific week

  // Upload shift schedule CSV — delegates to centralized handler or falls back to local parsing
  const handleShiftUpload = (data, filename) => {
    if (onShiftUpload) {
      onShiftUpload(data, filename);
    } else {
      const parsed = parseShiftCSV(data, masterRoster);
      const uniqueSLs = new Set(parsed.map(r => r.sl).filter(Boolean));
      if (uniqueSLs.size > 15) parsed.forEach(r => { r.sl = ''; });
      setShiftScheduleData(parsed);
      showToast(`${parsed.length} shift records loaded from ${filename}`);
    }
  };

  // Available weeks for week-picker
  const weekOptions = useMemo(() => {
    if (!shiftScheduleData) return [];
    return [...new Set(shiftScheduleData.map(r => r.weekKey).filter(Boolean))].sort();
  }, [shiftScheduleData]);

  // Date range of dataset
  const dateRange = useMemo(() => {
    if (!shiftScheduleData || shiftScheduleData.length === 0) return null;
    const dates = shiftScheduleData.map(r => r.start).filter(Boolean).sort((a,b) => a-b);
    return { min: dates[0], max: dates[dates.length-1] };
  }, [shiftScheduleData]);

  // Filter by SL and date range
  const filtered = useMemo(() => {
    let d = shiftScheduleData || [];
    if (selSLs.length > 0) d = d.filter(r => selSLs.includes(r.sl));
    if (dateFrom) d = d.filter(r => r.start && r.start >= new Date(dateFrom));
    if (dateTo) { const end = new Date(dateTo); end.setHours(23,59,59); d = d.filter(r => r.start && r.start <= end); }
    if (viewWeek) d = d.filter(r => r.weekKey === viewWeek);
    return d;
  }, [shiftScheduleData, selSLs, dateFrom, dateTo, viewWeek]);

  // Split: filled shifts (actual coverage) vs unfilled (posted but never staffed)
  const filledShifts = useMemo(() => filtered.filter(r => !r.unfilled), [filtered]);
  const unfilledShifts = useMemo(() => filtered.filter(r => r.unfilled), [filtered]);

  // Count unique weeks in filled data (for averaging)
  const numWeeks = useMemo(() => {
    const wks = new Set(filledShifts.map(r => r.weekKey).filter(Boolean));
    return Math.max(wks.size, 1);
  }, [filledShifts]);

  // SL options
  const slOptions = useMemo(() => [...new Set((shiftScheduleData || []).map(r => r.sl).filter(Boolean))].sort(), [shiftScheduleData]);

  // Build 7×24 staffing heatmap — NORMALIZED per-week averages (filled shifts only)
  const heatmap = useMemo(() => {
    const grid = Array.from({ length: 7 }, () => Array.from({ length: 24 }, () => ({ total: 0, clinicians: new Set() })));
    filledShifts.forEach(r => {
      if (r.dow < 0 || r.hour < 0) return;
      const startH = r.hour;
      const span = Math.min(Math.ceil(r.hours), 12);
      for (let h = 0; h < span; h++) {
        const hh = (startH + h) % 24;
        const dd = h + startH >= 24 ? (r.dow + 1) % 7 : r.dow;
        grid[dd][hh].total++;
        grid[dd][hh].clinicians.add(r.clinician);
      }
    });
    // Normalize: show average per week
    return grid.map(row => row.map(cell => ({
      avg: +(cell.total / numWeeks).toFixed(1),
      total: cell.total,
      uniqueClinicians: cell.clinicians.size
    })));
  }, [filledShifts, numWeeks]);

  // Compute the dataset's own staffing pattern for gap analysis (filled shifts only)
  const analysis = useMemo(() => {
    // All unique weeks in the filled data
    const allWks = [...new Set(filledShifts.map(r => r.weekKey).filter(Boolean))].sort();
    // Group by weekKey → dow → hour → count unique clinicians
    const weekSlots = {};
    filledShifts.forEach(r => {
      if (r.dow < 0 || r.hour < 0 || !r.weekKey) return;
      const startH = r.hour;
      const span = Math.min(Math.ceil(r.hours), 12);
      for (let h = 0; h < span; h++) {
        const hh = (startH + h) % 24;
        const dd = h + startH >= 24 ? (r.dow + 1) % 7 : r.dow;
        const key = `${dd}-${hh}`;
        if (!weekSlots[key]) weekSlots[key] = {};
        if (!weekSlots[key][r.weekKey]) weekSlots[key][r.weekKey] = new Set();
        weekSlots[key][r.weekKey].add(r.clinician);
      }
    });
    // For each DOW×Hour cell, compute median clinician count across weeks
    const medianGrid = Array.from({ length: 7 }, () => Array(24).fill(0));
    const minGrid = Array.from({ length: 7 }, () => Array(24).fill(0));
    for (let dow = 0; dow < 7; dow++) {
      for (let h = 0; h < 24; h++) {
        const key = `${dow}-${h}`;
        const weeks = weekSlots[key] || {};
        const counts = Object.values(weeks).map(s => s.size).sort((a,b) => a-b);
        if (counts.length > 0) {
          const mid = Math.floor(counts.length / 2);
          medianGrid[dow][h] = counts.length % 2 ? counts[mid] : (counts[mid-1] + counts[mid]) / 2;
          minGrid[dow][h] = counts[0];
        }
      }
    }
    // Variability analysis: for each slot, how OFTEN does coverage drop 30%+ below median?
    // A slot that dropped once in 68 weeks is noise. A slot that drops in 20% of weeks is a pattern.
    const weakSlots = [];
    for (let dow = 0; dow < 7; dow++) {
      for (let h = 0; h < 24; h++) {
        const med = medianGrid[dow][h];
        if (med < 2) continue; // skip very low-traffic slots
        const key = `${dow}-${h}`;
        const cellWeeks = weekSlots[key] || {};
        const threshold = med * 0.70;
        // Count weeks below threshold and track which ones
        const badWeeks = [];
        const counts = [];
        allWks.forEach(wk => {
          const cnt = cellWeeks[wk] ? cellWeeks[wk].size : 0;
          counts.push(cnt);
          if (cnt < threshold) badWeeks.push(wk);
        });
        const dropRate = allWks.length > 0 ? badWeeks.length / allWks.length : 0;
        // Only flag if drops happen in >25% of weeks AND ≥4 weeks (persistent pattern)
        if (badWeeks.length >= 4 && dropRate > 0.25) {
          const mean = counts.reduce((a,b) => a+b, 0) / (counts.length || 1);
          const stddev = Math.sqrt(counts.reduce((a,v) => a + (v-mean)**2, 0) / (counts.length || 1));
          const cv = mean > 0 ? stddev / mean : 0; // coefficient of variation
          weakSlots.push({ dow, h, median: med, min: minGrid[dow][h], badWeeks, dropRate, cv,
            worstWeek: badWeeks.sort((a,b) => {
              const ca = cellWeeks[a] ? cellWeeks[a].size : 0;
              const cb = cellWeeks[b] ? cellWeeks[b].size : 0;
              return ca - cb;
            })[0] || '' });
        }
      }
    }
    // Sort by drop frequency (most unreliable first), cap at top 20
    weakSlots.sort((a,b) => b.dropRate - a.dropRate || b.cv - a.cv);
    // Peak hour and trough hour
    const hourlyAvg = Array(24).fill(0);
    for (let h = 0; h < 24; h++) {
      for (let dow = 0; dow < 7; dow++) hourlyAvg[h] += heatmap[dow][h].avg;
      hourlyAvg[h] = +(hourlyAvg[h] / 7).toFixed(1);
    }
    const peakHour = hourlyAvg.indexOf(Math.max(...hourlyAvg));
    const troughHour = hourlyAvg.slice(6, 23).indexOf(Math.min(...hourlyAvg.slice(6, 23))) + 6; // core hours only
    return { medianGrid, minGrid, weakSlots, hourlyAvg, peakHour, troughHour, weekSlots };
  }, [filledShifts, heatmap, numWeeks]);

  // Credential mix by 4-hour block — show AVERAGES per week (filled shifts only)
  const credMix = useMemo(() => {
    const blocks = ['00-03', '04-07', '08-11', '12-15', '16-19', '20-23'];
    const bySL = {};
    filledShifts.forEach(r => {
      const bl = blocks[Math.floor(r.hour / 4)] || blocks[0];
      const sl = r.sl || 'All';
      const key = `${sl}|${bl}`;
      if (!bySL[key]) bySL[key] = { mddo: 0, nppa: 0, other: 0 };
      if (r.credClass === 'MD/DO') bySL[key].mddo++;
      else if (r.credClass === 'NP/PA') bySL[key].nppa++;
      else bySL[key].other++;
    });
    // Normalize per week
    Object.values(bySL).forEach(v => { v.mddo = +(v.mddo/numWeeks).toFixed(1); v.nppa = +(v.nppa/numWeeks).toFixed(1); v.other = +(v.other/numWeeks).toFixed(1); });
    return { blocks, bySL, sls: [...new Set(filledShifts.map(r => r.sl || 'All'))].sort() };
  }, [filledShifts, numWeeks]);

  // All unique week keys for context
  const allWeekKeys = useMemo(() => [...new Set(filledShifts.map(r => r.weekKey).filter(Boolean))].sort(), [filledShifts]);

  // Alerts — enriched with temporal context (which weeks, worst week)
  const alerts = useMemo(() => {
    const a = [];
    const ws = analysis.weekSlots || {};
    const totalWks = allWeekKeys.length;
    const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    // 1. Low-coverage core hours (avg < 2 clinicians during 7am-11pm)
    let lowCells = [];
    const lowWeekSet = new Set();
    for (let dow = 0; dow < 7; dow++) {
      for (let h = 7; h < 23; h++) {
        if (heatmap[dow][h].avg < 2 && analysis.medianGrid[dow][h] < 2) {
          lowCells.push(`${DOW[dow]} ${String(h).padStart(2,'0')}:00`);
          // Find which weeks had < 2 for this cell
          const cellWeeks = ws[`${dow}-${h}`] || {};
          allWeekKeys.forEach(wk => {
            const cnt = cellWeeks[wk] ? cellWeeks[wk].size : 0;
            if (cnt < 2) lowWeekSet.add(wk);
          });
        }
      }
    }
    if (lowCells.length > 0) {
      const sorted = [...lowWeekSet].sort();
      a.push({ level: 'CRITICAL', msg: `${lowCells.length} core-hour slot(s) avg under 2 clinicians`,
        detail: lowCells.slice(0,5).join(', ') + (lowCells.length > 5 ? ` +${lowCells.length-5} more` : ''),
        worstWeek: sorted[0] || '', affectedWeeks: sorted, weekCount: sorted.length, totalWks });
    }

    // 2. Variability — slots with PERSISTENT drops (≥25% of weeks, ≥4 occurrences)
    if (analysis.weakSlots.length > 0) {
      const allBadWeeks = new Set();
      analysis.weakSlots.forEach(w => (w.badWeeks || []).forEach(wk => allBadWeeks.add(wk)));
      const sorted = [...allBadWeeks].sort();
      const avgDropRate = analysis.weakSlots.reduce((s, w) => s + w.dropRate, 0) / analysis.weakSlots.length;
      a.push({ level: avgDropRate > 0.25 ? 'CRITICAL' : 'HIGH',
        msg: `${analysis.weakSlots.length} slot(s) with recurring coverage drops`,
        detail: `Avg ${(avgDropRate * 100).toFixed(0)}% of weeks below threshold — see Variability table`,
        worstWeek: sorted[0] || '', affectedWeeks: sorted, weekCount: sorted.length, totalWks });
    }

    // 3. Weekend vs weekday disparity — identify worst weekends
    const wkdayAvg = [1,2,3,4,5].reduce((s,d) => s + heatmap[d].reduce((ss,c) => ss+c.avg, 0), 0) / 5;
    const wkndAvg = [0,6].reduce((s,d) => s + heatmap[d].reduce((ss,c) => ss+c.avg, 0), 0) / 2;
    if (wkdayAvg > 0 && wkndAvg / wkdayAvg < 0.50) {
      // Find weekends with worst coverage
      const wkndWeeks = {};
      allWeekKeys.forEach(wk => {
        let wkndShifts = 0;
        [0,6].forEach(d => { for (let h = 0; h < 24; h++) { const c = ws[`${d}-${h}`]; if (c && c[wk]) wkndShifts += c[wk].size; }});
        wkndWeeks[wk] = wkndShifts;
      });
      const sorted = Object.entries(wkndWeeks).sort((a,b) => a[1]-b[1]).map(e => e[0]);
      a.push({ level: 'HIGH', msg: `Weekend staffing at ${pct(wkndAvg/wkdayAvg)} of weekday levels`,
        detail: 'Significant weekend coverage gap',
        worstWeek: sorted[0] || '', affectedWeeks: sorted.slice(0, Math.ceil(sorted.length/2)), weekCount: totalWks, totalWks });
    }

    // 4. NP/PA ratio > 80% — track per-week breakdown (filled shifts only)
    const credByWeek = {};
    filledShifts.forEach(r => {
      if (!r.weekKey) return;
      const bl = ['00-03','04-07','08-11','12-15','16-19','20-23'][Math.floor(r.hour / 4)] || '00-03';
      const sl = r.sl || 'All';
      const key = `${sl}|${bl}|${r.weekKey}`;
      if (!credByWeek[key]) credByWeek[key] = { mddo: 0, nppa: 0, other: 0 };
      if (r.credClass === 'MD/DO') credByWeek[key].mddo++;
      else if (r.credClass === 'NP/PA') credByWeek[key].nppa++;
      else credByWeek[key].other++;
    });
    // Only fire NP/PA alerts for recognized SL groupings (not individual clinician names)
    const knownSLs = new Set(['TC', 'CSL', 'WSL', 'All', '']);
    let nppaAlertCount = 0;
    Object.entries(credMix.bySL).forEach(([key, v]) => {
      if (nppaAlertCount >= 4) return; // cap at 4 NP/PA findings
      const total = v.mddo + v.nppa + v.other;
      if (total >= 3 && v.nppa / total > 0.80) {
        const [sl, bl] = key.split('|');
        // Skip if SL looks like a person's name (not a real service line)
        if (!knownSLs.has(sl) && sl.includes(' ') && sl.length > 6) return;
        // Find which weeks had >80% NP/PA for this SL+block
        const badWeeks = allWeekKeys.filter(wk => {
          const wv = credByWeek[`${sl}|${bl}|${wk}`];
          if (!wv) return false;
          const wt = wv.mddo + wv.nppa + wv.other;
          return wt >= 2 && wv.nppa / wt > 0.80;
        }).sort();
        nppaAlertCount++;
        a.push({ level: 'HIGH', msg: `NP/PA ratio ${pct(v.nppa / total)}${sl && sl !== 'All' ? ` in ${sl}` : ''} during ${bl}h`,
          detail: `Exceeds 80% MD/DO threshold`,
          worstWeek: badWeeks[0] || '', affectedWeeks: badWeeks, weekCount: badWeeks.length, totalWks });
      }
    });

    return a;
  }, [heatmap, analysis, credMix, allWeekKeys, filledShifts]);

  const DOW_LABELS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  if (!shiftScheduleData) {
    return (
      <div>
        <h2>📊 Staffing & Coverage</h2>
        <p style={{color:'var(--text-muted)',marginBottom:16}}>Upload shift schedule data to visualize coverage patterns, credential mix, and staffing variability.</p>
        <UploadZone onData={handleShiftUpload} label="Drop Shift Schedule CSV here" hint="Expected: Clinician, Shift Start, Shift End, Service Line, Credential" />
      </div>
    );
  }

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <h2 style={{margin:0}}>📊 Staffing & Coverage</h2>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <UploadZone onData={handleShiftUpload} label="+ Add Shift Data" hint="CSV with shift schedule: Clinician Name, Shift Start/End, Credential, Service Line" />
          <button className="btn-secondary" onClick={() => exportToCSV(filtered.map(r => ({
            Clinician: r.unfilled ? '(Unfilled)' : r.clinician, Start: r.start ? formatDate(r.start) : '', SL: r.sl, Credential: r.credential, Hours: r.hours, Unfilled: r.unfilled ? 'Yes' : ''
          })), 'staffing_report.csv')}>⬇ Export</button>
          <button className="btn-secondary" style={{color:'var(--accent-red)'}} onClick={() => {
            if (window.confirm('Clear shift schedule data?')) { setShiftScheduleData(null); showToast('Shift data cleared'); }
          }}>✕ Clear</button>
        </div>
      </div>

      {/* Findings Strip — compact, collapsible, with temporal drill-down */}
      {alerts.length > 0 && (() => {
        const critCount = alerts.filter(a => a.level === 'CRITICAL').length;
        const highCount = alerts.filter(a => a.level === 'HIGH').length;
        return (
