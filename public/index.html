              { label: 'Actual Avg', data: avgHourly, borderColor: 'rgba(20,184,166,1)', backgroundColor: 'rgba(20,184,166,0.1)', fill: true, tension: 0.3 },
              { label: 'TC Baseline', data: tcBaseline, borderColor: 'rgba(156,163,175,0.8)', borderDash: [6,3], fill: false, pointRadius: 0 },
            ]
          },
          options: { responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { y: { beginAtZero: true, title: { display: true, text: 'Consults / Hour' } } } }
        };

        return (
          <details style={{ marginBottom: 16 }}>
            <summary className="section-toggle">📈 Arrival Curve — Actual vs Baseline</summary>
            {flagged.length > 0 && (
              <div className="gap-alert warn" style={{marginBottom:8}}>
                ⚠️ {flagged.length} hour(s) deviate &gt;25% from baseline: {flagged.map(h => `${String(h).padStart(2,'0')}:00`).join(', ')}
              </div>
            )}
            <div className="card">
              <ChartWrapper config={arrivalConfig} height={260} />
            </div>
          </details>
        );
      })()}

      {/* F. Weekly Volume Anomaly Detection (Module 3C) */}
      {slData.length > 20 && (() => {
        // Bucket by week
        const weekMap = {};
        slData.forEach(r => {
          const d = parseDate(r[cm.date] || '');
          if (!d) return;
          const wk = new Date(d); wk.setDate(wk.getDate() - wk.getDay());
          const key = wk.toISOString().slice(0, 10);
          weekMap[key] = (weekMap[key] || 0) + 1;
        });
        const weeks = Object.keys(weekMap).sort();
        const vols = weeks.map(w => weekMap[w]);
        const { mean, sigma, anomalies } = weeklyAnomaly(vols);

        // Partner volume mix
        const partnerWeekly = {};
        slData.forEach(r => {
          const d = parseDate(r[cm.date] || '');
          if (!d) return;
          const wk = new Date(d); wk.setDate(wk.getDate() - wk.getDay());
          const key = wk.toISOString().slice(0, 10);
          const p = (r[cm.partner] || 'Unknown').toLowerCase().trim();
          if (!partnerWeekly[key]) partnerWeekly[key] = {};
          partnerWeekly[key][p] = (partnerWeekly[key][p] || 0) + 1;
        });
        const partners = [...new Set(slData.map(r => (r[cm.partner] || 'Unknown').toLowerCase().trim()))].sort();
        const colors = ['rgba(20,184,166,0.7)','rgba(245,158,11,0.7)','rgba(239,68,68,0.7)','rgba(99,102,241,0.7)','rgba(34,197,94,0.7)','rgba(168,85,247,0.7)'];

        const volumeConfig = {
          type: 'line',
          data: {
            labels: weeks.map(w => w.slice(5)),
            datasets: [{
              label: 'Weekly Volume', data: vols, borderColor: 'rgba(20,184,166,1)', backgroundColor: 'rgba(20,184,166,0.1)', fill: true, tension: 0.2,
              pointBackgroundColor: vols.map((_, i) => anomalies.includes(i) ? 'rgba(239,68,68,1)' : 'rgba(20,184,166,1)'),
              pointRadius: vols.map((_, i) => anomalies.includes(i) ? 6 : 3),
            }]
          },
          options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        };

        const mixConfig = {
          type: 'bar',
          data: {
            labels: weeks.map(w => w.slice(5)),
            datasets: partners.slice(0, 6).map((p, pi) => ({
              label: (PARTNER_META[p] || {}).label || p, data: weeks.map(w => (partnerWeekly[w] || {})[p] || 0),
              backgroundColor: colors[pi % colors.length],
            }))
          },
          options: { responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } }
        };

        return (
          <details style={{ marginBottom: 16 }}>
            <summary className="section-toggle">📊 Weekly Volume Trends & Anomaly Detection</summary>
            {anomalies.length > 0 && (
              <div className="gap-alert" style={{marginBottom:8}}>
                🔴 {anomalies.length} anomalous week(s) detected (outside ±2σ): {anomalies.map(i => weeks[i]?.slice(5)).join(', ')} — Mean: {mean.toFixed(0)}, σ: {sigma.toFixed(1)}
              </div>
            )}
            <div className="grid-2">
              <div className="card">
                <div className="card-title">Weekly Volume (red dots = anomalies)</div>
                <ChartWrapper config={volumeConfig} height={220} />
              </div>
              <div className="card">
                <div className="card-title">Partner Volume Mix</div>
                <ChartWrapper config={mixConfig} height={220} />
              </div>
            </div>
          </details>
        );
      })()}

      {/* G. Forecast vs Actuals (Module 3D) */}
      {forecast && slData.length > 0 && (() => {
        const actualHourly = Array(24).fill(0);
        const actualDays = new Set();
        slData.forEach(r => { const d = parseDate(r[cm.date] || ''); if (d) { actualHourly[ctHour(d)]++; actualDays.add(d.toDateString()); } });
        const nDays = actualDays.size || 1;
        const avgActual = actualHourly.map(v => +(v / nDays).toFixed(2));
        const forecastHourly = Array(24).fill(0);
        for (let h = 0; h < 24; h++) {
          let sum = 0;
          for (let d = 0; d < 7; d++) { const idx = d * 24 + h; if (idx < TC_ARRIVALS.length) sum += TC_ARRIVALS[idx][24]; }
          forecastHourly[h] = +(sum / 7).toFixed(2);
        }
        const ratios = avgActual.map((a, h) => forecastHourly[h] > 0 ? +(a / forecastHourly[h]).toFixed(2) : 0);
        const overallAccuracy = forecastHourly.reduce((s,v)=>s+v,0) > 0
          ? (1 - Math.abs(avgActual.reduce((s,v)=>s+v,0) - forecastHourly.reduce((s,v)=>s+v,0)) / forecastHourly.reduce((s,v)=>s+v,0)) * 100 : 0;
        const peakDevHour = ratios.reduce((best, r, h) => Math.abs(r - 1) > Math.abs(best.r - 1) ? {h, r} : best, {h:0, r: ratios[0]});
        // Check volume waiver
        const partnerKey = serviceLine === 'TC' ? 'transcarent' : serviceLine === 'EZ' ? 'ez health' : null;
        const waiver = partnerKey ? VOLUME_WAIVER[partnerKey] : null;
        const waiverHours = waiver ? ratios.map((r, h) => r >= waiver ? h : -1).filter(h => h >= 0) : [];

        return (
          <details style={{ marginBottom: 16 }}>
            <summary className="section-toggle">🎯 Forecast vs Actuals</summary>
            <div className="kpi-grid" style={{marginBottom:12}}>
              <KpiCard label="Forecast Accuracy" value={`${overallAccuracy.toFixed(1)}%`} className={overallAccuracy < 80 ? 'sla-red' : overallAccuracy < 90 ? 'sla-yellow' : ''} />
              <KpiCard label="Peak Deviation Hour" value={`${String(peakDevHour.h).padStart(2,'0')}:00 (${(peakDevHour.r * 100).toFixed(0)}%)`} />
            </div>
            {waiverHours.length > 0 && (
              <div className="gap-alert warn" style={{marginBottom:8}}>
                ⚠️ Volume waiver threshold ({((waiver||0)*100).toFixed(0)}%) exceeded at: {waiverHours.map(h => `${String(h).padStart(2,'0')}:00`).join(', ')}
              </div>
            )}
            <div className="table-wrap">
              <table style={{fontSize:12}}>
                <thead><tr><th>Hour</th><th>Forecast</th><th>Actual</th><th>Ratio</th><th>Flag</th></tr></thead>
                <tbody>
                  {ratios.map((r, h) => forecastHourly[h] > 0.1 && (
                    <tr key={h} style={{background: r > (waiver || 1.5) ? 'var(--accent-red-soft)' : r > 1.25 ? 'var(--accent-orange-soft)' : ''}}>
                      <td>{String(h).padStart(2,'0')}:00</td>
                      <td style={{textAlign:'right'}}>{forecastHourly[h]}</td>
                      <td style={{textAlign:'right'}}>{avgActual[h]}</td>
                      <td style={{textAlign:'right',fontWeight:600}}>{(r*100).toFixed(0)}%</td>
                      <td>{waiver && r >= waiver ? <span className="violation-badge">WAIVER</span> : r > 1.25 ? <span style={{color:'var(--accent-orange)',fontWeight:600}}>+25%</span> : ''}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </details>
        );
      })()}
    </div>
  );
}

// ========================== TAB: DIAGNOSTICS ==========================
function DiagnosticsTab({ actualsData, forecast, shiftScheduleData, masterRoster, calloutData, showToast }) {
  const [serviceLine, setServiceLine] = useState('ALL');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [expandedRow, setExpandedRow] = useState(null);
  const [hcDelta, setHcDelta] = useState(0);
  const [vphMultiplier, setVphMultiplier] = useState(1.0);
  const [volumeMultiplier, setVolumeMultiplier] = useState(1.0);
  const [hoveredHour, setHoveredHour] = useState(null);

  // Column map for actuals
  const cm = useMemo(() => actualsData && actualsData.length > 0 ? buildColMap(actualsData[0]) : {}, [actualsData]);

  // Filter actuals by SL and date range
  const filteredActuals = useMemo(() => {
    if (!actualsData) return [];
    let rows = actualsData;
    if (serviceLine !== 'ALL') {
      rows = rows.filter(r => {
        const partnerVal = cm.partner ? (r[cm.partner] || '') : '';
        const entityVal = cm.entityName ? (r[cm.entityName] || '') : '';
        if (serviceLine === 'TC') {
          return (partnerVal + ' ' + entityVal).toLowerCase().includes('transcarent') || r._detectedSL === 'TC';
        }
        const sl = mapPartnerToSL(partnerVal) || mapEntityToSL(entityVal);
        return sl === serviceLine || r._detectedSL === serviceLine;
      });
    }
    if (dateFrom || dateTo) {
      const from = dateFrom ? new Date(dateFrom) : null;
      const to = dateTo ? new Date(dateTo + 'T23:59:59') : null;
      rows = rows.filter(r => {
        const dt = parseDate(cm.date ? r[cm.date] : '');
        if (!dt) return false;
        if (from && dt < from) return false;
        if (to && dt > to) return false;
        return true;
      });
    }
    return rows;
  }, [actualsData, serviceLine, dateFrom, dateTo, cm]);

  // Filter shifts by SL
  const filteredShifts = useMemo(() => {
    if (!shiftScheduleData) return [];
    if (serviceLine === 'ALL') return shiftScheduleData;
    return shiftScheduleData.filter(s => s.sl === serviceLine);
  }, [shiftScheduleData, serviceLine]);

  // ============================
  // SECTION A: SLA DECOMPOSITION
  // ============================
  const decomposition = useMemo(() => {
    if (!filteredActuals || filteredActuals.length < 5) return null;

    // Group actuals by date + hour
    const hourBuckets = {};
    filteredActuals.forEach(r => {
      const dt = parseDate(cm.date ? r[cm.date] : '');
      if (!dt) return;
      const dateStr = ctDateStr(dt);
      const hour = ctHour(dt);
      const key = `${dateStr}_${hour}`;
      if (!hourBuckets[key]) hourBuckets[key] = { rows: [], date: dateStr, hour, dt };
      hourBuckets[key].rows.push(r);
    });

    // For each hour-bucket, compute decomposition
    const results = [];
    Object.entries(hourBuckets).forEach(([key, bucket]) => {
      const { rows, date, hour } = bucket;
      // Find shifts overlapping this hour
      const hourStart = new Date(date + 'T' + String(hour).padStart(2, '0') + ':00:00');
      const hourEnd = new Date(hourStart.getTime() + 3600000);
      const overlappingShifts = filteredShifts.filter(s => {
        const sStart = parseDate(s['Start Time'] || s['Start'] || s.start);
        const sEnd = parseDate(s['End Time'] || s['End'] || s.end);
        return sStart && sEnd && sStart < hourEnd && sEnd > hourStart;
      });

      const result = decomposeSLAMiss({
        hourActuals: rows, scheduledShifts: overlappingShifts,
        roster: masterRoster, baselineArrivals: null, cm, hourIndex: hour
      });

      if (!result.met && result.totalMisses > 0) {
        results.push({ key, date, hour, label: `${date} ${hour}:00`, ...result });
      }
    });

    results.sort((a, b) => b.totalMisses - a.totalMisses);

    // Aggregate: which factor is most frequently the top driver?
    const driverCounts = {};
    results.forEach(r => {
      if (r.factors.length > 0) {
        const top = r.factors[0];
        driverCounts[top.name] = (driverCounts[top.name] || 0) + 1;
      }
    });
    const primaryDriver = Object.entries(driverCounts).sort((a, b) => b[1] - a[1])[0];
    const worstHour = results[0] || null;

    return { results, primaryDriver: primaryDriver ? primaryDriver[0] : 'N/A', worstHour, totalPeriods: results.length };
  }, [filteredActuals, filteredShifts, masterRoster, cm]);

  // ============================
  // SECTION B: ALIGNMENT SCORES
  // ============================
  const alignmentData = useMemo(() => {
    const scores = [];
    for (let h = 0; h < 24; h++) {
      // Find shifts overlapping hour h (using today as reference)
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const hourStart = new Date(today.getTime() + h * 3600000);
      const hourEnd = new Date(hourStart.getTime() + 3600000);

      const overlapping = filteredShifts.filter(s => {
        const sStart = parseDate(s['Start Time'] || s['Start'] || s.start);
        const sEnd = parseDate(s['End Time'] || s['End'] || s.end);
        if (!sStart || !sEnd) return false;
        // Match by hour-of-day regardless of date
        const sP0 = ctParts(sStart), sP1 = ctParts(sEnd);
        const sH0 = sP0.hour + (sP0.minute > 0 ? sP0.minute / 60 : 0);
        const sH1 = sP1.hour + (sP1.minute > 0 ? sP1.minute / 60 : 0);
        const endH = sH1 <= sH0 ? sH1 + 24 : sH1; // handle overnight
        return h >= sH0 && h < endH;
      });

      const result = computeAlignmentScore({ hourIndex: h, scheduledShifts: overlapping, roster: masterRoster });
      scores.push({ hour: h, label: `${h === 0 ? '12' : h > 12 ? h - 12 : h}${h < 12 ? 'a' : 'p'}`, ...result });
    }

    const active = scores.filter(s => !s.noDemand);
    const avgScore = active.length > 0 ? Math.round(active.reduce((s, a) => s + a.score, 0) / active.length) : 0;
    const understaffed = active.filter(s => s.score < 50).length;
    const overstaffed = active.filter(s => s.overstaffed).length;
    const worstGap = active.reduce((w, s) => (!w || s.score < w.score) ? s : w, null);

    return { scores, avgScore, understaffed, overstaffed, worstGap };
  }, [filteredShifts, masterRoster]);

  // ============================
  // SECTION C: WHAT-IF SIMULATOR
  // ============================
  const whatIf = useMemo(() => {
    if (!shiftScheduleData || shiftScheduleData.length === 0) return null;

    // Baseline forecast
    const baselineResult = runForecast(shiftScheduleData, { volumeMultiplier: 1.0 }, masterRoster);

    // Build modified shifts
    let modifiedShifts = [...shiftScheduleData];

    if (hcDelta !== 0) {
      // Sort by VPH (from roster lookup)
      const clinMap = {};
      if (masterRoster && masterRoster.length > 0) {
        masterRoster.forEach(c => { clinMap[normalizeName(c.name)] = c; });
      } else {
        TC_CLINICIANS.forEach(c => { clinMap[normalizeName(c[0])] = { name: c[0], vph: c[4] }; });
      }

      const withVPH = modifiedShifts.map(s => {
        const n = normalizeName(s.Name || s.name || s['Clinician Name'] || '');
        const c = clinMap[n];
        return { ...s, _vph: c?.vph || 1.5 };
      }).sort((a, b) => b._vph - a._vph);

      if (hcDelta > 0) {
        // Add synthetic shifts by duplicating top-VPH clinicians
        for (let i = 0; i < hcDelta && withVPH.length > 0; i++) {
          const template = withVPH[i % withVPH.length];
          modifiedShifts.push({ ...template, _synthetic: true });
        }
      } else {
        // Remove lowest-VPH clinicians
        const sorted = [...withVPH].sort((a, b) => a._vph - b._vph);
        modifiedShifts = sorted.slice(Math.abs(hcDelta));
      }
    }

    // Build modified roster with VPH multiplier
    let modifiedRoster = masterRoster;
    if (vphMultiplier !== 1.0 && masterRoster && masterRoster.length > 0) {
      modifiedRoster = masterRoster.map(c => ({ ...c, vph: c.vph * vphMultiplier }));
    } else if (vphMultiplier !== 1.0) {
      // No custom roster — create modified TC_CLINICIANS-based roster
      modifiedRoster = TC_CLINICIANS.map(c => ({
        name: c[0], credential: c[1], stateCount: c[2], restricted: c[3],
        vph: c[4] * vphMultiplier, stateFlags: c[5]
      }));
    }

    const projectedResult = runForecast(modifiedShifts, { volumeMultiplier }, modifiedRoster);

    const slaDelta = projectedResult.slaRate - baselineResult.slaRate;
    const missDelta = projectedResult.totalMisses - baselineResult.totalMisses;
    // Cost estimate: ~$75/hr per clinician, 8 hour shift average
    const costImpact = hcDelta * 8 * 75;

    return {
      baseline: baselineResult,
      projected: projectedResult,
      slaDelta,
      missDelta,
      costImpact,
      matchedBaseline: baselineResult.matched,
      matchedProjected: projectedResult.matched,
    };
  }, [shiftScheduleData, masterRoster, hcDelta, vphMultiplier, volumeMultiplier]);

  // ============ RENDER ============

  if (!actualsData && !shiftScheduleData) {
    return (
      <div className="empty-state">
        <div className="icon">&#128300;</div>
        <p>Upload actuals and/or shift data to unlock diagnostics</p>
        <div className="hint">The Diagnostics tab decomposes SLA misses, scores shift-demand alignment, and simulates staffing scenarios</div>
      </div>
    );
  }

  const fmtHour = (h) => `${h === 0 ? '12' : h > 12 ? h - 12 : h}:00 ${h < 12 ? 'AM' : 'PM'}`;

  return (
    <div>
      <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap', marginBottom: 16 }}>
        <SLFilter value={serviceLine} onChange={setServiceLine} />
        <div style={{ display: 'flex', gap: 8, alignItems: 'center', fontSize: 12 }}>
          <label>From</label>
          <input type="date" className="form-input" value={dateFrom} onChange={e => setDateFrom(e.target.value)} style={{ fontSize: 11, padding: '4px 8px' }} />
          <label>To</label>
          <input type="date" className="form-input" value={dateTo} onChange={e => setDateTo(e.target.value)} style={{ fontSize: 11, padding: '4px 8px' }} />
        </div>
      </div>

      {/* ===== SECTION A: SLA DECOMPOSITION ENGINE ===== */}
      <details open className="diag-section">
        <summary>🔬 SLA Decomposition Engine — "The Why Machine"</summary>

        {!decomposition || decomposition.totalPeriods === 0 ? (
          <div className="card" style={{ textAlign: 'center', padding: 24 }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>✅</div>
            <div style={{ fontWeight: 600 }}>No SLA misses detected in this period</div>
            <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 4 }}>All hours are meeting SLA targets</div>
          </div>
        ) : (
          <div>
            <div className="grid-4" style={{ marginBottom: 12 }}>
              <KpiCard label="Miss Periods" value={decomposition.totalPeriods} sub="Hours with SLA < 100%" />
              <KpiCard label="Primary Driver" value={decomposition.primaryDriver} sub="Most frequent top factor" />
              <KpiCard label="Worst Hour" value={decomposition.worstHour ? fmtHour(decomposition.worstHour.hour) : '—'} sub={decomposition.worstHour ? `${decomposition.worstHour.totalMisses} misses` : ''} />
              <KpiCard label="Worst SLA" value={decomposition.worstHour ? decomposition.worstHour.slaPct.toFixed(1) + '%' : '—'} sub={decomposition.worstHour ? decomposition.worstHour.date : ''} />
            </div>

            <div className="card">
              <div className="card-title">Decomposition by Hour</div>
              <div className="table-wrap" style={{ maxHeight: 400, overflowY: 'auto' }}>
                <table>
                  <thead>
                    <tr>
                      <th>Date/Hour</th>
                      <th style={{ textAlign: 'right' }}>Visits</th>
                      <th style={{ textAlign: 'right' }}>Misses</th>
                      <th style={{ textAlign: 'right' }}>SLA %</th>
                      <th style={{ width: '40%' }}>Attribution</th>
                    </tr>
                  </thead>
                  <tbody>
                    {decomposition.results.slice(0, 50).map((r, idx) => (
                      <React.Fragment key={r.key}>
                        <tr className={`decomp-row ${expandedRow === idx ? 'expanded' : ''}`} onClick={() => setExpandedRow(expandedRow === idx ? null : idx)}>
                          <td style={{ fontWeight: 600, fontSize: 12 }}>{r.date} {fmtHour(r.hour)}</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{r.totalVisits}</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)', color: 'var(--accent-red)' }}>{r.totalMisses}</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)', color: r.slaPct < 80 ? 'var(--accent-red)' : r.slaPct < 90 ? 'var(--accent-orange)' : undefined }}>{r.slaPct.toFixed(1)}%</td>
                          <td>
                            <div style={{ display: 'flex', height: 22, borderRadius: 4, overflow: 'hidden' }}>
                              {r.factors.filter(f => f.weight > 0).map(f => (
                                <div key={f.key} style={{ width: `${f.weight}%`, background: f.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, color: '#fff', fontWeight: 600 }} title={`${f.name}: ${f.weight}%`}>
                                  {f.weight > 12 ? `${f.weight}%` : ''}
                                </div>
                              ))}
                            </div>
                          </td>
                        </tr>
                        {expandedRow === idx && (
                          <tr>
                            <td colSpan={5} style={{ background: 'var(--bg-primary)', padding: 12 }}>
                              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                                {r.factors.map(f => (
                                  <div key={f.key} style={{ flex: '1 1 180px', padding: 8, background: 'var(--bg-secondary)', borderRadius: 6, border: '1px solid var(--border)' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                                      <span className="factor-chip" style={{ background: f.color }}>{f.weight}%</span>
                                      <span style={{ fontWeight: 600, fontSize: 11 }}>{f.name}</span>
                                    </div>
                                    <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>{f.detail}</div>
                                  </div>
                                ))}
                              </div>
                            </td>
                          </tr>
                        )}
                      </React.Fragment>
                    ))}
                  </tbody>
                </table>
              </div>

              {/* Legend */}
              <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', fontSize: 11, marginTop: 10, paddingTop: 8, borderTop: '1px solid var(--border)' }}>
                {[{ key: 'staffing', label: 'Staffing', color: '#3b82f6' }, { key: 'volume', label: 'Volume', color: '#f59e0b' }, { key: 'vph', label: 'VPH', color: '#ef4444' }, { key: 'coverage', label: 'Coverage', color: '#8b5cf6' }, { key: 'modality', label: 'Modality', color: '#14b8a6' }].map(f => (
                  <span key={f.key}><span style={{ display: 'inline-block', width: 10, height: 10, borderRadius: 2, background: f.color, marginRight: 4, verticalAlign: 'middle' }}></span>{f.label}</span>
                ))}
              </div>
            </div>
          </div>
        )}
      </details>

      {/* ===== SECTION B: SHIFT-DEMAND ALIGNMENT ===== */}
      <details open className="diag-section">
        <summary>📊 Shift-Demand Alignment — "The Gap Detector"</summary>

        {!shiftScheduleData || shiftScheduleData.length === 0 ? (
          <div className="card" style={{ textAlign: 'center', padding: 24 }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>📋</div>
            <div style={{ fontWeight: 600 }}>Upload shift data to see alignment scores</div>
          </div>
        ) : (
          <div>
            <div className="grid-4" style={{ marginBottom: 12 }}>
              <KpiCard label="Avg Score" value={alignmentData.avgScore + '/100'} sub="Across active hours" className={alignmentData.avgScore < 50 ? 'kpi-red' : alignmentData.avgScore < 80 ? 'kpi-orange' : ''} />
              <KpiCard label="Understaffed" value={alignmentData.understaffed} sub="Hours scoring < 50" />
              <KpiCard label="Overstaffed" value={alignmentData.overstaffed} sub="Hours with excess capacity" />
              <KpiCard label="Worst Gap" value={alignmentData.worstGap ? fmtHour(alignmentData.worstGap.hour) : '—'} sub={alignmentData.worstGap ? `Score: ${alignmentData.worstGap.score}` : ''} />
            </div>

            <div className="card">
              <div className="card-title">24-Hour Alignment Timeline</div>
              <div style={{ position: 'relative' }}>
                <div className="alignment-timeline">
                  {alignmentData.scores.map((s, i) => {
                    const color = s.noDemand ? '#e2e6eb' : s.overstaffed ? '#3b82f6' : s.score >= 80 ? '#22c55e' : s.score >= 50 ? '#f59e0b' : '#ef4444';
                    const height = s.noDemand ? 20 : Math.max(20, (s.score / 100) * 100);
                    return (
                      <div key={i} className="alignment-bar"
                        style={{ height: `${height}%`, background: color }}
                        onMouseEnter={() => setHoveredHour(i)}
                        onMouseLeave={() => setHoveredHour(null)}>
                        <div className="bar-label">{s.label}</div>
                        {!s.noDemand && <div className="bar-value" style={{ color }}>{s.score}</div>}
                      </div>
                    );
                  })}
                </div>

                {/* Hover tooltip */}
                {hoveredHour !== null && !alignmentData.scores[hoveredHour].noDemand && (
                  <div className="diag-tooltip" style={{ left: Math.min(hoveredHour * 4.16, 75) + '%', top: -10 }}>
                    <div style={{ fontWeight: 700, marginBottom: 4 }}>{fmtHour(hoveredHour)} — Score: {alignmentData.scores[hoveredHour].score}/100</div>
                    <div style={{ fontSize: 10 }}>
                      <div>Demand: {alignmentData.scores[hoveredHour].detail.demand.toFixed(1)} visits</div>
                      <div>Capacity: {alignmentData.scores[hoveredHour].detail.capacity.toFixed(1)} VPH</div>
                      <div>HC: {alignmentData.scores[hoveredHour].detail.hc} clinicians</div>
                      <div style={{ marginTop: 4 }}>
                        Capacity: {alignmentData.scores[hoveredHour].sub.capacity}/40 |
                        Coverage: {alignmentData.scores[hoveredHour].sub.coverage}/30 |
                        VPH: {alignmentData.scores[hoveredHour].sub.vph}/20 |
                        Modality: {alignmentData.scores[hoveredHour].sub.modality}/10
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* Legend */}
              <div style={{ display: 'flex', gap: 16, fontSize: 11, marginTop: 24, paddingTop: 8, borderTop: '1px solid var(--border)' }}>
                {[{ color: '#22c55e', label: 'Well Aligned (80–100)' }, { color: '#f59e0b', label: 'Gap (50–79)' }, { color: '#ef4444', label: 'Severe Gap (0–49)' }, { color: '#3b82f6', label: 'Overstaffed' }, { color: '#e2e6eb', label: 'No Demand' }].map(l => (
                  <span key={l.label}><span style={{ display: 'inline-block', width: 12, height: 12, borderRadius: 2, background: l.color, marginRight: 4, verticalAlign: 'middle' }}></span>{l.label}</span>
                ))}
              </div>
            </div>

            {/* State coverage gaps for worst hours */}
            {(() => {
              const worstHours = alignmentData.scores
                .filter(s => !s.noDemand && s.detail.uncoveredStates && s.detail.uncoveredStates.length > 0)
                .sort((a, b) => a.score - b.score)
                .slice(0, 5);
              if (worstHours.length === 0) return null;
              return (
                <div className="card" style={{ marginTop: 12 }}>
                  <div className="card-title">State Coverage Gaps — Worst Hours</div>
                  <div className="table-wrap">
                    <table>
                      <thead>
                        <tr><th>Hour</th><th style={{ textAlign: 'right' }}>Score</th><th>Uncovered States</th><th style={{ textAlign: 'right' }}>Uncovered Arrivals</th></tr>
                      </thead>
                      <tbody>
                        {worstHours.map((h, i) => (
                          <tr key={i}>
                            <td style={{ fontWeight: 600 }}>{fmtHour(h.hour)}</td>
                            <td style={{ textAlign: 'right' }}>
                              <span className="score-badge" style={{ background: h.score >= 80 ? '#22c55e' : h.score >= 50 ? '#f59e0b' : '#ef4444', width: 28, height: 28, fontSize: 10 }}>{h.score}</span>
                            </td>
                            <td>{h.detail.uncoveredStates.map(s => s.state).join(', ')}</td>
                            <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{h.detail.uncoveredStates.reduce((s, st) => s + st.arrivals, 0).toFixed(1)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })()}
          </div>
        )}
      </details>

      {/* ===== SECTION C: WHAT-IF SIMULATOR ===== */}
      <details open className="diag-section">
        <summary>🔮 What-If Simulator — "The Crystal Ball"</summary>

        {!shiftScheduleData || shiftScheduleData.length === 0 ? (
          <div className="card" style={{ textAlign: 'center', padding: 24 }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🔮</div>
            <div style={{ fontWeight: 600 }}>Upload shift data to enable scenario simulation</div>
          </div>
        ) : (
          <div>
            <div className="card" style={{ marginBottom: 12 }}>
              <div className="card-title">Scenario Parameters</div>
              <div className="slider-group">
                <label>Headcount Δ</label>
                <input type="range" min={-10} max={10} step={1} value={hcDelta} onChange={e => setHcDelta(parseInt(e.target.value))} />
                <span className="slider-value" style={{ color: hcDelta > 0 ? 'var(--accent-green)' : hcDelta < 0 ? 'var(--accent-red)' : undefined }}>
                  {hcDelta > 0 ? '+' : ''}{hcDelta}
                </span>
              </div>
              <div className="slider-group">
                <label>VPH Multiplier</label>
                <input type="range" min={0.5} max={2.0} step={0.1} value={vphMultiplier} onChange={e => setVphMultiplier(parseFloat(e.target.value))} />
                <span className="slider-value">{vphMultiplier.toFixed(1)}x</span>
              </div>
              <div className="slider-group">
                <label>Volume Multiplier</label>
                <input type="range" min={0.5} max={2.0} step={0.1} value={volumeMultiplier} onChange={e => setVolumeMultiplier(parseFloat(e.target.value))} />
                <span className="slider-value">{volumeMultiplier.toFixed(1)}x</span>
              </div>
              <div style={{ textAlign: 'right', marginTop: 8 }}>
                <button className="btn btn-secondary btn-sm" onClick={() => { setHcDelta(0); setVphMultiplier(1.0); setVolumeMultiplier(1.0); }}>Reset to Baseline</button>
              </div>
            </div>

            {whatIf && (
              <div>
                <div className="grid-4" style={{ marginBottom: 12 }}>
                  <KpiCard
                    label="Projected SLA %"
                    value={whatIf.projected.slaRate.toFixed(1) + '%'}
                    sub={<span className={`delta-indicator ${whatIf.slaDelta >= 0 ? 'positive' : 'negative'}`}>
                      {whatIf.slaDelta >= 0 ? '▲' : '▼'} {Math.abs(whatIf.slaDelta).toFixed(1)}pp vs baseline
                    </span>}
                  />
                  <KpiCard
                    label="Projected Misses"
                    value={whatIf.projected.totalMisses.toFixed(1)}
                    sub={<span className={`delta-indicator ${whatIf.missDelta <= 0 ? 'positive' : 'negative'}`}>
                      {whatIf.missDelta <= 0 ? '▼' : '▲'} {Math.abs(whatIf.missDelta).toFixed(1)} vs baseline
                    </span>}
                  />
                  <KpiCard
                    label="Risk Level"
                    value={whatIf.projected.riskLevel}
                    sub={`Baseline: ${whatIf.baseline.riskLevel}`}
                    className={whatIf.projected.riskLevel === 'HIGH' ? 'kpi-red' : whatIf.projected.riskLevel === 'MEDIUM' ? 'kpi-orange' : ''}
                  />
                  <KpiCard
                    label="Cost Impact"
                    value={whatIf.costImpact !== 0 ? `${whatIf.costImpact > 0 ? '+' : ''}$${Math.abs(whatIf.costImpact).toLocaleString()}/day` : '$0'}
                    sub={hcDelta !== 0 ? `${Math.abs(hcDelta)} clinician${Math.abs(hcDelta) > 1 ? 's' : ''} × 8h × $75/hr` : 'No HC change'}
                  />
                </div>

                {/* Comparison table */}
                <div className="card">
                  <div className="card-title">Baseline vs Projected Comparison</div>
                  <div className="table-wrap">
                    <table>
                      <thead>
                        <tr><th>Metric</th><th style={{ textAlign: 'right' }}>Baseline</th><th style={{ textAlign: 'right' }}>Projected</th><th style={{ textAlign: 'right' }}>Delta</th></tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td style={{ fontWeight: 600 }}>SLA Rate</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{whatIf.baseline.slaRate.toFixed(1)}%</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{whatIf.projected.slaRate.toFixed(1)}%</td>
                          <td style={{ textAlign: 'right' }}><span className={`delta-indicator ${whatIf.slaDelta >= 0 ? 'positive' : 'negative'}`}>{whatIf.slaDelta >= 0 ? '+' : ''}{whatIf.slaDelta.toFixed(1)}pp</span></td>
                        </tr>
                        <tr>
                          <td style={{ fontWeight: 600 }}>Expected Misses</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{whatIf.baseline.totalMisses.toFixed(1)}</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{whatIf.projected.totalMisses.toFixed(1)}</td>
                          <td style={{ textAlign: 'right' }}><span className={`delta-indicator ${whatIf.missDelta <= 0 ? 'positive' : 'negative'}`}>{whatIf.missDelta > 0 ? '+' : ''}{whatIf.missDelta.toFixed(1)}</span></td>
                        </tr>
                        <tr>
                          <td style={{ fontWeight: 600 }}>Over 30min</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{whatIf.baseline.totalOver30.toFixed(1)}</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{whatIf.projected.totalOver30.toFixed(1)}</td>
                          <td style={{ textAlign: 'right' }}><span className={`delta-indicator ${whatIf.projected.totalOver30 <= whatIf.baseline.totalOver30 ? 'positive' : 'negative'}`}>{(whatIf.projected.totalOver30 - whatIf.baseline.totalOver30) > 0 ? '+' : ''}{(whatIf.projected.totalOver30 - whatIf.baseline.totalOver30).toFixed(1)}</span></td>
                        </tr>
                        <tr>
                          <td style={{ fontWeight: 600 }}>Over 60min</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{whatIf.baseline.totalOver60.toFixed(1)}</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{whatIf.projected.totalOver60.toFixed(1)}</td>
                          <td style={{ textAlign: 'right' }}><span className={`delta-indicator ${whatIf.projected.totalOver60 <= whatIf.baseline.totalOver60 ? 'positive' : 'negative'}`}>{(whatIf.projected.totalOver60 - whatIf.baseline.totalOver60) > 0 ? '+' : ''}{(whatIf.projected.totalOver60 - whatIf.baseline.totalOver60).toFixed(1)}</span></td>
                        </tr>
                        <tr>
                          <td style={{ fontWeight: 600 }}>Total Arrivals</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{whatIf.baseline.totalArrivals.toFixed(0)}</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{whatIf.projected.totalArrivals.toFixed(0)}</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{(whatIf.projected.totalArrivals - whatIf.baseline.totalArrivals).toFixed(0)}</td>
                        </tr>
                        <tr>
                          <td style={{ fontWeight: 600 }}>Worst Hour</td>
                          <td style={{ textAlign: 'right' }}>{whatIf.baseline.worstHour}</td>
                          <td style={{ textAlign: 'right' }}>{whatIf.projected.worstHour}</td>
                          <td></td>
                        </tr>
                        <tr>
                          <td style={{ fontWeight: 600 }}>Risk Level</td>
                          <td style={{ textAlign: 'right' }}><span style={{ color: whatIf.baseline.riskLevel === 'HIGH' ? 'var(--accent-red)' : whatIf.baseline.riskLevel === 'MEDIUM' ? 'var(--accent-orange)' : 'var(--accent-green)' }}>{whatIf.baseline.riskLevel}</span></td>
                          <td style={{ textAlign: 'right' }}><span style={{ color: whatIf.projected.riskLevel === 'HIGH' ? 'var(--accent-red)' : whatIf.projected.riskLevel === 'MEDIUM' ? 'var(--accent-orange)' : 'var(--accent-green)' }}>{whatIf.projected.riskLevel}</span></td>
                          <td></td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </details>
    </div>
  );
}

// ========================== TAB: HISTORICAL LOG ==========================
function HistoricalTab({ history, setHistory }) {
  const [editIdx, setEditIdx] = useState(null);
  const [editSL, setEditSL] = useState('');
  const [editNote, setEditNote] = useState('');
  const [confirmDelete, setConfirmDelete] = useState(null);

  const startEdit = (idx) => {
    setEditIdx(idx);
    setEditSL(history[idx].serviceLine || '');
    setEditNote(history[idx].note || '');
  };

  const saveEdit = (idx) => {
    setHistory(h => h.map((item, i) => i === idx ? { ...item, serviceLine: editSL, note: editNote } : item));
    setEditIdx(null);
  };

  const deleteEntry = (idx) => {
    setHistory(h => h.filter((_, i) => i !== idx));
    setConfirmDelete(null);
  };

  const clearAll = () => {
    if (window.confirm('Delete ALL history entries? This cannot be undone.')) {
      setHistory([]);
    }
  };

  const slBadge = (sl) => {
    const colors = {
      'TC': { bg: 'var(--accent-teal-soft)', color: 'var(--accent-teal-dark)' },
      'CSL': { bg: 'var(--accent-blue-soft)', color: 'var(--accent-blue)' },
      'WSL': { bg: '#f3e8ff', color: '#7c3aed' },
      'Mixed': { bg: 'var(--accent-orange-soft)', color: 'var(--accent-orange)' },
    };
    const c = colors[sl] || { bg: 'var(--bg-primary)', color: 'var(--text-muted)' };
    return <span style={{ padding: '2px 10px', borderRadius: 8, fontSize: 10, fontWeight: 700, background: c.bg, color: c.color }}>{sl}</span>;
  };

  if (!history || history.length === 0) {
    return (
      <div className="empty-state">
        <div className="icon">&#128197;</div>
        <p>No historical data yet</p>
        <div className="hint">Upload actuals data — snapshots are automatically saved here each time you upload.</div>
      </div>
    );
  }

  // Summary stats
  const totalUploads = history.length;
  const slCounts = {};
  history.forEach(h => { slCounts[h.serviceLine] = (slCounts[h.serviceLine] || 0) + 1; });
  const totalVisits = history.reduce((s, h) => s + (h.consults || 0), 0);

  return (
    <div>
      {/* Summary */}
      <div className="kpi-grid" style={{ marginBottom: 16 }}>
        <KpiCard label="Total Uploads" value={totalUploads} />
        <KpiCard label="Total Visits Tracked" value={totalVisits.toLocaleString()} />
        {Object.entries(slCounts).map(([sl, cnt]) => (
          <KpiCard key={sl} label={sl + ' Uploads'} value={cnt} />
        ))}
      </div>

      <div className="card">
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <div className="card-title" style={{ marginBottom: 0 }}>Performance History</div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn btn-secondary btn-sm" onClick={clearAll} style={{ color: 'var(--accent-red)', fontSize: 11 }}>
              Clear All History
            </button>
          </div>
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Period</th><th>Service Line</th><th>Total Visits</th><th>SLA Eligible</th><th>SLA Met %</th><th>Source File</th><th>Notes</th><th>Saved At</th><th style={{ width: 100 }}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {history.slice().reverse().map((h, ri) => {
                const idx = history.length - 1 - ri; // real index
                const isEditing = editIdx === idx;
                return (
                  <tr key={idx}>
                    <td style={{ fontWeight: 600, whiteSpace: 'nowrap' }}>{h.period}</td>
                    <td>
                      {isEditing ? (
                        <select className="form-select" style={{ padding: '2px 6px', fontSize: 11, width: 80 }} value={editSL} onChange={e => setEditSL(e.target.value)}>
                          {['TC', 'CSL', 'WSL', 'Mixed', 'Unknown'].map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      ) : slBadge(h.serviceLine)}
                    </td>
                    <td>{h.consults?.toLocaleString()}</td>
                    <td>{h.slaEligible?.toLocaleString() || '-'}</td>
                    <td style={{ fontWeight: 600, color: (h.slaRate || 0) === 0 ? 'var(--text-muted)' : (h.slaRate || 0) < 80 ? 'var(--accent-red)' : (h.slaRate || 0) < 90 ? 'var(--accent-orange)' : 'var(--accent-green)' }}>
                      {(h.slaRate || 0) === 0 ? '-' : h.slaRate?.toFixed(1) + '%'}
                    </td>
                    <td style={{ color: 'var(--text-muted)', fontSize: 11, maxWidth: 160, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={h.filename}>{h.filename || '-'}</td>
                    <td>
                      {isEditing ? (
                        <input className="form-input" style={{ padding: '2px 6px', fontSize: 11, width: 120 }} value={editNote} onChange={e => setEditNote(e.target.value)} placeholder="Add note..." />
                      ) : (
                        <span style={{ color: 'var(--text-muted)', fontSize: 11 }}>{h.note || ''}</span>
                      )}
                    </td>
                    <td style={{ color: 'var(--text-muted)', fontSize: 11, whiteSpace: 'nowrap' }}>{h.savedAt}</td>
                    <td>
                      {isEditing ? (
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button className="btn btn-primary btn-sm" style={{ padding: '2px 8px', fontSize: 10 }} onClick={() => saveEdit(idx)}>Save</button>
                          <button className="btn btn-secondary btn-sm" style={{ padding: '2px 8px', fontSize: 10 }} onClick={() => setEditIdx(null)}>Cancel</button>
                        </div>
                      ) : confirmDelete === idx ? (
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button className="btn btn-sm" style={{ padding: '2px 8px', fontSize: 10, background: 'var(--accent-red)', color: '#fff', border: 'none' }} onClick={() => deleteEntry(idx)}>Confirm</button>
                          <button className="btn btn-secondary btn-sm" style={{ padding: '2px 8px', fontSize: 10 }} onClick={() => setConfirmDelete(null)}>No</button>
                        </div>
                      ) : (
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button className="btn btn-secondary btn-sm" style={{ padding: '2px 6px', fontSize: 10 }} onClick={() => startEdit(idx)} title="Edit service line & notes">Edit</button>
                          <button className="btn btn-secondary btn-sm" style={{ padding: '2px 6px', fontSize: 10, color: 'var(--accent-red)' }} onClick={() => setConfirmDelete(idx)} title="Delete entry">Del</button>
                        </div>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      <div style={{ marginTop: 12, fontSize: 11, color: 'var(--text-muted)' }}>
        Tip: Service lines are auto-detected from uploaded data. Use "Edit" to correct any mislabeled entries. History is stored in your browser's local storage.
      </div>
    </div>
  );
}

// ========================== TAB: STATE COVERAGE ==========================
function StateCoverageTab({ forecast }) {
  if (!forecast) {
    return (
      <div className="empty-state">
        <div className="icon">&#127758;</div>
        <p>Run a forecast first to see state coverage analysis</p>
        <div className="hint">Upload a roster on the Forecast tab and click "Run Forecast"</div>
      </div>
    );
  }

  // License summary
  const licenseSummary = {};
  ALL_51_STATES.forEach(st => { licenseSummary[st] = { count: 0, volume: 0 }; });
  TC_CLINICIANS.forEach(c => {
    TC_STATES.forEach((st, i) => {
      if (c[5][i]) licenseSummary[st].count++;
    });
  });
  // Add volume from arrivals
  TC_STATES.forEach((st, si) => {
    licenseSummary[st].volume = TC_ARRIVALS.reduce((sum, row) => sum + row[si], 0);
  });

  const coverageScore = (() => {
    let covered = 0, total = 0;
    forecast.hours.forEach(h => {
      TC_STATES.forEach(st => {
        if ((h.stateResults?.[st]?.arrivals || 0) > 0) {
          total++;
          if ((h.stateElig[st] || 0) > 0) covered++;
        }
      });
    });
    return total > 0 ? (covered / total * 100) : 100;
  })();

  return (
    <div>
      <div className="kpi-grid" style={{ marginBottom: 16 }}>
        <KpiCard label="Coverage Score" value={coverageScore.toFixed(1) + '%'} sub="% of state-hours with coverage" className={coverageScore < 90 ? 'warn' : 'good'} />
        <KpiCard label="States Tracked" value={TC_STATES.length} sub={`of ${ALL_51_STATES.length} total`} />
      </div>

      <div className="card" style={{ marginBottom: 16 }}>
        <div className="card-title">Coverage Heatmap (Eligible Clinicians by State x Hour)</div>
        <StateCoverageHeatmap hours={forecast.hours} />
      </div>

      <div className="card">
        <div className="card-title">License Summary by State</div>
        <div className="table-wrap" style={{ maxHeight: 400, overflowY: 'auto' }}>
          <table>
            <thead><tr><th>State</th><th>Licensed Clinicians</th><th>Total Volume (57h)</th><th>Coverage Ratio</th></tr></thead>
            <tbody>
              {TC_STATES.sort((a, b) => (licenseSummary[b]?.volume || 0) - (licenseSummary[a]?.volume || 0)).map(st => (
                <tr key={st}>
                  <td style={{ fontWeight: 600 }}>{st}</td>
                  <td>{licenseSummary[st]?.count || 0}</td>
                  <td>{(licenseSummary[st]?.volume || 0).toFixed(1)}</td>
                  <td style={{ color: (licenseSummary[st]?.count || 0) < 3 ? 'var(--accent-red)' : 'inherit' }}>
                    {licenseSummary[st]?.volume > 0 ? ((licenseSummary[st]?.count || 0) / licenseSummary[st].volume * 10).toFixed(1) + ' per 10 visits' : '-'}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ========================== TAB: CLINICIAN DETAIL ==========================
function ClinicianTab({ actualsData, masterRoster, setMasterRoster, rosterChangelog, setRosterChangelog, showToast, incidentData, setIncidentData, calloutData }) {
  const [showChangelog, setShowChangelog] = useState(false);
  const [rosterFilter, setRosterFilter] = useState('all'); // 'all' | 'unmatched' | 'lowvph'

  const clinicians = useMemo(() => {
    return masterRoster.map(c => {
      const statesLicensed = (c.stateFlags || []).filter(f => f).length;
      // Compute historical average VPH for deviation detection
      const hist = c.vphHistory || [];
      const histVphs = hist.filter(h => h.vph > 0).map(h => h.vph);
      const historicalAvg = histVphs.length > 0 ? histVphs.reduce((s, v) => s + v, 0) / histVphs.length : 0;
      const vphDeviation = historicalAvg > 0 && c.vph > 0 ? ((c.vph - historicalAvg) / historicalAvg * 100) : 0;
      const vphAlert = Math.abs(vphDeviation) > 20 && histVphs.length >= 1;
      const vphColor = c.vph > 0 ? vphThresholdClass(c.vph, 'Mixed') : '';
      let flags = c.unmatched ? 'New (Unmatched)' : vphColor === 'vph-red' ? 'Low VPH' : statesLicensed < 10 ? 'Low Coverage' : '';
      if (vphAlert) flags = flags ? flags + ' | VPH Shift' : 'VPH Shift';
      return {
        ...c, statesLicensed, flags, historicalAvg, vphDeviation, vphAlert,
        vphSource: c.source === 'seed' ? 'seed' : 'computed'
      };
    });
  }, [masterRoster]);

  const displayClinicians = useMemo(() => {
    let list = clinicians;
    if (rosterFilter === 'unmatched') list = list.filter(c => c.unmatched);
    if (rosterFilter === 'lowvph') list = list.filter(c => c.vph > 0 && vphThresholdClass(c.vph, 'Mixed') === 'vph-red' && !c.unmatched);
    if (rosterFilter === 'vphalert') list = list.filter(c => c.vphAlert);
    return list.sort((a, b) => b.vph - a.vph);
  }, [clinicians, rosterFilter]);

  const creds = clinicians.reduce((acc, c) => { acc[c.credential] = (acc[c.credential] || 0) + 1; return acc; }, {});
  const credClasses = clinicians.reduce((acc, c) => { const cls = classifyCredential(c.credential); acc[cls] = (acc[cls] || 0) + 1; return acc; }, {});
  const mddoCount = credClasses['MD/DO'] || 0;
  const nppaCount = credClasses['NP/PA'] || 0;
  const credRatio = (mddoCount + nppaCount) > 0 ? `${mddoCount}:${nppaCount}` : '—';
  const restrictedCount = clinicians.filter(c => c.restricted === 1).length;
  const avgVph = clinicians.filter(c => c.vph > 0).reduce((s, c) => s + c.vph, 0) / Math.max(clinicians.filter(c => c.vph > 0).length, 1);
  const unmatchedCount = clinicians.filter(c => c.unmatched).length;
  const vphAlertCount = clinicians.filter(c => c.vphAlert).length;
  const computedCount = clinicians.filter(c => c.vphSource === 'computed').length;
  const lastUpdated = masterRoster.reduce((latest, c) => c.lastUpdated > latest ? c.lastUpdated : latest, '');

  const handleRosterCSV = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      const rows = parseCSV(evt.target.result);
      if (rows.length === 0) { showToast('No valid data in CSV'); return; }
      const { updatedRoster, changes } = reconcileRosterFromCSV(masterRoster, rows, file.name);
      setMasterRoster(updatedRoster);
      if (changes.length > 0) {
        setRosterChangelog(prev => [...prev, ...changes]);
        showToast(`Roster reconciled: ${changes.length} change(s) from ${file.name}`);
      } else {
        showToast('Roster CSV processed — no changes detected');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const acceptUnmatched = (name) => {
    setMasterRoster(prev => prev.map(c => c.name === name ? { ...c, unmatched: false } : c));
    setRosterChangelog(prev => [...prev, { type: 'accepted', name, timestamp: new Date().toISOString(), source: 'manual', detail: 'Accepted into roster' }]);
    showToast(`${name} accepted into roster`);
  };
  const dismissUnmatched = (name) => {
    setMasterRoster(prev => prev.filter(c => c.name !== name));
    setRosterChangelog(prev => [...prev, { type: 'dismissed', name, timestamp: new Date().toISOString(), source: 'manual', detail: 'Removed from roster' }]);
    showToast(`${name} removed from roster`);
  };
  const acceptAllUnmatched = () => {
    const names = masterRoster.filter(c => c.unmatched).map(c => c.name);
    setMasterRoster(prev => prev.map(c => c.unmatched ? { ...c, unmatched: false } : c));
    setRosterChangelog(prev => [...prev, ...names.map(n => ({ type: 'accepted', name: n, timestamp: new Date().toISOString(), source: 'bulk accept', detail: 'Accepted into roster' }))]);
    showToast(`${names.length} unmatched clinician(s) accepted into roster`);
  };

  const resetToDefault = () => {
    const seed = TC_CLINICIANS.map(c => ({
      name: c[0], credential: c[1], stateCount: c[2], restricted: c[3], vph: c[4],
      stateFlags: c[5], source: 'seed', lastUpdated: new Date().toISOString(),
      vphHistory: [{ vph: c[4], date: new Date().toISOString(), source: 'seed' }]
    }));
    setMasterRoster(seed);
    setRosterChangelog(prev => [...prev, { type: 'reset', name: 'ALL', timestamp: new Date().toISOString(), source: 'manual reset' }]);
    showToast('Roster reset to default seed values — upload actuals to compute live VPH');
  };

  return (
    <div>
      {/* Last Reconciled Banner */}
      <div style={{ background: 'var(--accent-teal-soft)', border: '1px solid #c5e8ec', borderRadius: 'var(--radius)', padding: '8px 14px', marginBottom: 16, fontSize: 12, color: 'var(--accent-teal-dark)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 }}>
        <span><strong>Master Roster</strong> — {clinicians.length} clinicians | Last updated: {lastUpdated ? new Date(lastUpdated).toLocaleString('en-US', { timeZone: CT_TZ }) : 'Seed data'}{unmatchedCount > 0 && <span style={{ color: 'var(--accent-orange)', fontWeight: 600 }}> | {unmatchedCount} unmatched</span>}</span>
        <div style={{ display: 'flex', gap: 6 }}>
          <label className="btn btn-secondary btn-sm" style={{ cursor: 'pointer', marginBottom: 0 }}
            title="CSV with clinician roster: Name, Credential, VPH (optional). Names are matched against existing roster — new names appear as 'Unmatched' for review.">
            &#128194; Upload Roster CSV
            <input type="file" accept=".csv" style={{ display: 'none' }} onChange={handleRosterCSV} />
          </label>
          <button className="btn btn-secondary btn-sm" style={{ marginBottom: 0, color: 'var(--accent-orange)', borderColor: 'var(--accent-orange)' }} onClick={resetToDefault}>Reset to Default</button>
          <button className="btn btn-secondary btn-sm" style={{ marginBottom: 0 }} onClick={() => setShowChangelog(!showChangelog)}>
            {showChangelog ? 'Hide' : 'Show'} Changelog ({rosterChangelog.length})
          </button>
        </div>
      </div>

      {/* Changelog */}
      {showChangelog && rosterChangelog.length > 0 && (
        <div className="card" style={{ marginBottom: 16, padding: 14 }}>
          <div className="card-title">Roster Changelog (last 50)</div>
          <div className="table-wrap" style={{ maxHeight: 250, overflowY: 'auto' }}>
            <table>
              <thead><tr><th>Time</th><th>Type</th><th>Name</th><th>Details</th><th>Source</th></tr></thead>
              <tbody>
                {[...rosterChangelog].reverse().slice(0, 50).map((c, i) => (
                  <tr key={i}>
                    <td style={{ fontSize: 10, whiteSpace: 'nowrap' }}>{new Date(c.timestamp).toLocaleString('en-US', { timeZone: CT_TZ })}</td>
                    <td><span style={{ fontSize: 10, fontWeight: 600, padding: '2px 6px', borderRadius: 8, background: c.type === 'added' ? '#26AEBC22' : c.type === 'reset' ? '#ef444422' : '#F59E0B22', color: c.type === 'added' ? 'var(--accent-teal)' : c.type === 'reset' ? 'var(--accent-red)' : 'var(--accent-orange)' }}>{c.type}</span></td>
                    <td style={{ fontWeight: 500 }}>{c.name}</td>
                    <td style={{ fontSize: 11 }}>{c.old ? `${c.old} → ${c.new}` : ''}{c.detail && <span style={{ color: 'var(--text-muted)', fontSize: 10, marginLeft: 4 }}>({c.detail})</span>}</td>
                    <td style={{ fontSize: 10, color: 'var(--text-muted)' }}>{c.source}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      <div className="kpi-grid">
        <KpiCard label="Total Clinicians" value={clinicians.length} />
        <KpiCard label="MD / DO" value={mddoCount} sub={`${(mddoCount / Math.max(clinicians.length, 1) * 100).toFixed(0)}% of roster`} />
        <KpiCard label="NP / PA" value={nppaCount} sub={`${(nppaCount / Math.max(clinicians.length, 1) * 100).toFixed(0)}% of roster`} />
        <KpiCard label="MD:NP Ratio" value={credRatio} sub="doctor vs advanced practice" />
        <KpiCard label="Avg VPH" value={avgVph.toFixed(2)} sub={`${computedCount} computed, ${clinicians.length - computedCount} seed`} />
        {restrictedCount > 0 && <KpiCard label="Restricted" value={restrictedCount} className="warn" sub="limited state coverage" />}
        <KpiCard label="VPH Alerts" value={vphAlertCount} className={vphAlertCount > 0 ? 'alert' : ''} sub="> 20% deviation" />
        {unmatchedCount > 0 && <KpiCard label="Unmatched" value={unmatchedCount} className="warn" />}
        {(credClasses['Unknown'] || 0) > 0 && <KpiCard label="No Credential" value={credClasses['Unknown']} sub="credential not detected" />}
      </div>

      {/* Unmatched Clinicians Banner */}
      {unmatchedCount > 0 && (
        <div style={{ background: 'var(--accent-orange-soft)', border: '1px solid #fde68a', borderRadius: 'var(--radius)', padding: '10px 14px', marginBottom: 12, fontSize: 12 }}>
          <strong style={{ color: '#92400e' }}>&#128270; {unmatchedCount} unmatched clinician(s)</strong>
          <span style={{ color: '#92400e' }}> — these names appeared in an uploaded CSV but don't match anyone in the existing roster. They may be new hires, name variations (e.g. "Bob" vs "Robert"), or data entry differences.</span>
          <div style={{ marginTop: 6, fontSize: 11, color: 'var(--text-muted)' }}>
            <strong>To resolve:</strong> Click "Accept" to add them to the roster permanently, or "Dismiss" to remove them. You can also filter by "Unmatched" below to review them all.
          </div>
        </div>
      )}

      {/* VPH Alert Banner */}
      {vphAlertCount > 0 && (
        <div style={{ background: 'var(--accent-red-soft)', border: '1px solid #f5c6cb', borderRadius: 'var(--radius)', padding: '8px 14px', marginBottom: 12, fontSize: 12 }}>
          <strong style={{ color: 'var(--accent-red)' }}>&#9888; {vphAlertCount} clinician(s) have VPH that shifted {'>'} 20% from their historical average.</strong>
          {' '}This may indicate changes in efficiency, case mix, or scheduling. Filter by "VPH Alert" to review.
        </div>
      )}

      {/* Filter Buttons */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
        {[
          { key: 'all', label: `All (${clinicians.length})` },
          { key: 'vphalert', label: `VPH Alert (${vphAlertCount})` },
          { key: 'unmatched', label: `Unmatched (${unmatchedCount})` },
          { key: 'lowvph', label: `Low VPH (${clinicians.filter(c => c.vph > 0 && vphThresholdClass(c.vph, 'Mixed') === 'vph-red' && !c.unmatched).length})` }
        ].map(f => (
          <button key={f.key} className={`btn btn-sm ${rosterFilter === f.key ? 'btn-primary' : 'btn-secondary'}`}
            style={{ padding: '3px 10px', fontSize: 11 }}
            onClick={() => setRosterFilter(f.key)}>
            {f.label}
          </button>
        ))}
        {unmatchedCount > 0 && (
          <button className="btn btn-sm" style={{ padding: '3px 10px', fontSize: 11, marginLeft: 'auto', background: 'var(--accent-teal)', color: '#fff', border: 'none' }}
            onClick={acceptAllUnmatched}>
            ✓ Accept All Unmatched ({unmatchedCount})
          </button>
        )}
      </div>

      <div className="card">
        <div className="card-title">Clinician Roster {rosterFilter !== 'all' && <span style={{ fontSize: 11, fontWeight: 400, color: 'var(--text-muted)' }}>— filtered: {rosterFilter}</span>}</div>
        <div className="table-wrap" style={{ maxHeight: 500, overflowY: 'auto' }}>
          <table>
            <thead>
              <tr><th>Name</th><th>Credential</th><th>Current VPH</th><th>Historical VPH</th><th>Δ</th><th>States</th><th>Source</th><th>Flags</th><th style={{width:80}}></th></tr>
            </thead>
            <tbody>
              {displayClinicians.map(c => {
                const devColor = c.vphAlert ? (c.vphDeviation > 0 ? 'var(--accent-teal)' : 'var(--accent-red)') : 'var(--text-muted)';
                return (
                  <tr key={c.name} style={{ background: c.vphAlert ? 'var(--accent-red-soft)' : c.unmatched ? 'var(--accent-orange-soft)' : 'transparent' }}>
                    <td style={{ fontWeight: 500 }}>{c.name}</td>
                    <td>{c.credential && c.credential !== '?' ? (
                      <span style={{ display: 'inline-flex', gap: 4, alignItems: 'center' }}>
                        <span style={{ background: classifyCredential(c.credential) === 'MD/DO' ? '#E8F4FD' : classifyCredential(c.credential) === 'NP/PA' ? '#F0FFF4' : '#F5F5F5', color: classifyCredential(c.credential) === 'MD/DO' ? '#1A5276' : classifyCredential(c.credential) === 'NP/PA' ? '#1E8449' : '#777', padding: '1px 6px', borderRadius: 3, fontSize: 10, fontWeight: 700 }}>{c.credential}</span>
                        <span style={{ fontSize: 9, color: 'var(--text-muted)' }}>{classifyCredential(c.credential)}</span>
                      </span>
                    ) : <span style={{ color: 'var(--text-muted)', fontSize: 11 }}>—</span>}</td>
                    <td style={{ fontFamily: 'var(--font-mono)', fontWeight: 600 }} className={c.vph > 0 ? vphThresholdClass(c.vph, 'Mixed') : ''}>
                      {c.vph > 0 ? c.vph.toFixed(2) : '-'}
                      <span style={{ fontSize: 9, marginLeft: 3, color: 'var(--text-muted)' }}>{c.vphSource === 'computed' ? '●' : '○'}</span>
                    </td>
                    <td style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-muted)' }}>
                      {c.historicalAvg > 0 ? c.historicalAvg.toFixed(2) : '-'}
                      {(c.vphHistory || []).length > 1 && <span style={{ fontSize: 9, marginLeft: 2 }}>({c.vphHistory.length})</span>}
                    </td>
                    <td style={{ fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: c.vphAlert ? 700 : 400, color: devColor }}>
                      {c.historicalAvg > 0 && c.vph > 0 ? (c.vphDeviation > 0 ? '+' : '') + c.vphDeviation.toFixed(0) + '%' : '-'}
                    </td>
                    <td>{c.statesLicensed}</td>
                    <td style={{ fontSize: 10, color: 'var(--text-muted)' }}>{c.source || '-'}</td>
                    <td>{c.flags && <span style={{ color: c.vphAlert ? 'var(--accent-red)' : c.unmatched ? 'var(--accent-red)' : 'var(--accent-orange)', fontSize: 11, fontWeight: 600 }}>{c.flags}</span>}</td>
                    <td style={{whiteSpace:'nowrap'}}>
                      {c.unmatched && (<>
                        <button onClick={() => acceptUnmatched(c.name)} className="btn btn-sm" style={{fontSize:9,padding:'1px 6px',marginRight:3,background:'var(--accent-teal)',color:'#fff',border:'none',borderRadius:4,cursor:'pointer'}}>Accept</button>
                        <button onClick={() => dismissUnmatched(c.name)} className="btn btn-sm" style={{fontSize:9,padding:'1px 6px',background:'transparent',color:'var(--accent-red)',border:'1px solid var(--accent-red)',borderRadius:4,cursor:'pointer'}}>Dismiss</button>
                      </>)}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{ marginTop: 8, fontSize: 10, color: 'var(--text-muted)' }}>
          ● = VPH computed from actuals data &nbsp; ○ = VPH from seed/CSV &nbsp; Historical VPH shows average across all prior snapshots &nbsp; Δ = deviation from historical average
        </div>
      </div>

      {/* Incident Scorecard (Module 4A) */}
      <details style={{marginTop:16}}>
        <summary className="section-toggle">⚠️ Incident Scorecard</summary>
        {!incidentData ? (
          <UploadZone onData={(data, fn) => {
            const cm2 = buildColMap(data);
            const parsed = data.map(r => ({
              clinician: normalizeName(r[cm2.clinician] || r[cm2.name] || ''),
              type: r[cm2.incidentType] || 'Unknown',
              sub: r[cm2.incidentSub] || '',
              date: parseDate(r[cm2.incidentDate] || r[cm2.date] || ''),
              sl: r[cm2.sl] || mapEntityToSL(r[cm2.partner] || '') || '',
            })).filter(r => r.clinician);
            setIncidentData(parsed);
            saveUploadData('incidents', parsed, fn);
            showToast(`${parsed.length} incident records loaded`);
          }} label="Drop Incident CSV here" hint="Expected: Clinician, Incident Type, Sub Category, Date" />
        ) : (() => {
          const byClin = {};
          incidentData.forEach(r => {
            if (!byClin[r.clinician]) byClin[r.clinician] = { name: r.clinician, Camping: 0, 'Improper Workflow': 0, Attendance: 0, Participation: 0, total: 0 };
            const t = INCIDENT_TYPES.includes(r.type) ? r.type : 'Participation';
            byClin[r.clinician][t]++;
            byClin[r.clinician].total++;
          });
          const rows = Object.values(byClin).sort((a, b) => b.total - a.total);
          return (
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:12,color:'var(--text-muted)'}}>{incidentData.length} incidents across {rows.length} clinicians</span>
                <button className="btn-secondary" style={{fontSize:11}} onClick={() => { setIncidentData(null); showToast('Incident data cleared'); }}>✕ Clear Incidents</button>
              </div>
              <div className="table-wrap">
                <table style={{fontSize:12}}>
                  <thead><tr><th>Clinician</th>{INCIDENT_TYPES.map(t=><th key={t} style={{textAlign:'center'}}>{t}</th>)}<th>Total</th><th>Risk</th></tr></thead>
                  <tbody>
                    {rows.slice(0, 25).map((r, i) => {
                      const lvl = riskLevel(r.total * 2);
                      return (
                        <tr key={i}>
                          <td style={{fontWeight:600}}>{r.name}</td>
                          {INCIDENT_TYPES.map(t=><td key={t} style={{textAlign:'center',color:r[t]>0?'var(--accent-red)':''}}>{r[t]||''}</td>)}
                          <td style={{textAlign:'center',fontWeight:700}}>{r.total}</td>
                          <td><span className={riskClass(lvl)}>{lvl}</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          );
        })()}
      </details>

      {/* Cross-Domain Risk View (Module 4D) */}
      <details style={{marginTop:16}}>
        <summary className="section-toggle">🎯 Cross-Domain Risk View</summary>
        {(() => {
          const riskMap = {};
          // Seed from master roster
          masterRoster.forEach(m => {
            const name = normalizeName(m.name);
            if (!riskMap[name]) riskMap[name] = { name, incidents: 0, callouts: 0, calloutViol: 0, vph: m.vph || 0, slaMisses: 0, slaTotal: 0 };
            riskMap[name].vph = m.vph || 0;
          });
          // Add incident counts
          if (incidentData) incidentData.forEach(r => {
            if (!riskMap[r.clinician]) riskMap[r.clinician] = { name: r.clinician, incidents: 0, callouts: 0, calloutViol: 0, vph: 0, slaMisses: 0, slaTotal: 0 };
            riskMap[r.clinician].incidents++;
          });
          // Add callout counts
          if (calloutData) calloutData.forEach(r => {
            if (!riskMap[r.clinician]) riskMap[r.clinician] = { name: r.clinician, incidents: 0, callouts: 0, calloutViol: 0, vph: 0, slaMisses: 0, slaTotal: 0 };
            riskMap[r.clinician].callouts++;
            if (r.violation) riskMap[r.clinician].calloutViol++;
          });
          // Add SLA performance from actuals
          if (actualsData) {
            const acm = buildColMap(actualsData);
            actualsData.forEach(r => {
              const clin = normalizeName(r[acm.clinician] || '');
              if (!clin || isCanceled(r, acm)) return;
              if (!riskMap[clin]) riskMap[clin] = { name: clin, incidents: 0, callouts: 0, calloutViol: 0, vph: 0, slaMisses: 0, slaTotal: 0 };
              riskMap[clin].slaTotal++;
              if (isSlaMissed(r, acm)) riskMap[clin].slaMisses++;
            });
          }
          const allRisk = Object.values(riskMap)
            .filter(r => r.incidents > 0 || r.callouts > 0 || r.slaMisses > 0)
            .map(r => {
              const slaMissRate = r.slaTotal > 0 ? r.slaMisses / r.slaTotal : 0;
              const score = computeRiskScore(r.incidents, r.callouts, r.vph, slaMissRate);
              return { ...r, slaMissRate, score, level: riskLevel(score) };
            })
            .sort((a, b) => b.score - a.score);

          if (allRisk.length === 0) return <p style={{color:'var(--text-muted)',fontSize:13}}>Upload incident and/or call-out data to see cross-domain risk analysis.</p>;

          return (
            <div>
              <div className="kpi-grid" style={{marginBottom:12}}>
                <KpiCard label="Critical Risk" value={allRisk.filter(r=>r.level==='Critical').length} className={allRisk.some(r=>r.level==='Critical')?'sla-red':''} />
                <KpiCard label="High Risk" value={allRisk.filter(r=>r.level==='High').length} className={allRisk.some(r=>r.level==='High')?'sla-yellow':''} />
                <KpiCard label="Clinicians Analyzed" value={allRisk.length} />
              </div>
              <div className="table-wrap">
                <table style={{fontSize:12}}>
                  <thead><tr><th>Clinician</th><th>Incidents</th><th>Call-Outs</th><th>VPH</th><th>SLA Miss %</th><th>Score</th><th>Risk</th></tr></thead>
                  <tbody>
                    {allRisk.slice(0, 15).map((r, i) => (
                      <tr key={i}>
                        <td style={{fontWeight:600}}>{r.name}</td>
                        <td style={{textAlign:'right'}}>{r.incidents}</td>
                        <td style={{textAlign:'right'}}>{r.callouts}{r.calloutViol > 0 ? <span style={{color:'var(--accent-red)',fontSize:10}}> ({r.calloutViol} viol)</span> : ''}</td>
                        <td style={{textAlign:'right'}} className={r.vph > 0 ? vphThresholdClass(r.vph, 'Mixed') : ''}>{r.vph > 0 ? r.vph.toFixed(2) : '-'}</td>
                        <td style={{textAlign:'right',color:r.slaMissRate > 0.15 ? 'var(--accent-red)' : ''}}>{r.slaTotal > 0 ? pct(r.slaMissRate) : '-'}</td>
                        <td style={{textAlign:'right',fontWeight:700}}>{r.score}</td>
                        <td><span className={riskClass(r.level)}>{r.level}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        })()}
      </details>
    </div>
  );
}

// ========================== TAB: REVIEW & ESCALATION ==========================
function ReviewTab({ shiftScheduleData, actualsData, masterRoster, showToast }) {
  const { user, profile } = useAuth();
  const [flags, setFlags] = useState([]);
  const [generated, setGenerated] = useState(false);
  const [filterStatus, setFilterStatus] = useState('pending'); // 'pending' | 'kept' | 'declined' | 'all'
  const [saving, setSaving] = useState(false);

  // Auto-generate flags by cross-referencing shift schedule + actuals
  const generateFlags = () => {
    if (!shiftScheduleData || !actualsData) return;

    const cm = buildColMap(actualsData);
    const newFlags = [];

    // Find date overlap between shift data and actuals
    const shiftDates = shiftScheduleData.map(r => r.start).filter(Boolean);
    const actualDates = actualsData.map(r => parseDate(cm.date ? r[cm.date] : '')).filter(Boolean);
    if (shiftDates.length === 0 || actualDates.length === 0) return;

    const overlapStart = new Date(Math.max(Math.min(...shiftDates), Math.min(...actualDates)));
    const overlapEnd = new Date(Math.min(Math.max(...shiftDates), Math.max(...actualDates)));
    if (overlapEnd < overlapStart) {
      showToast('No date overlap between shift schedule and actuals', 'error');
      return;
    }

    // Build clinician → shift count map from shift data (only filled shifts in overlap period)
    const shiftsByClin = {};
    shiftScheduleData.filter(r => !r.unfilled && r.clinician && r.start >= overlapStart && r.start <= overlapEnd).forEach(r => {
      const norm = normalizeName(r.clinician);
      if (!shiftsByClin[norm]) shiftsByClin[norm] = { name: r.clinician, shifts: 0, hours: 0, dates: [] };
      shiftsByClin[norm].shifts++;
      shiftsByClin[norm].hours += r.hours || 0;
      shiftsByClin[norm].dates.push(r.start);
    });

    // Build clinician → visit count from actuals in overlap period
    const visitsByClin = {};
    actualsData.forEach(r => {
      const dt = parseDate(cm.date ? r[cm.date] : '');
      if (!dt || dt < overlapStart || dt > overlapEnd) return;
      if (isCanceled(r, cm)) return; // skip canceled
      const name = normalizeName(cm.clinician ? r[cm.clinician] : (r[cm.name] || ''));
      if (!name) return;
      if (!visitsByClin[name]) visitsByClin[name] = { visits: 0, slaMet: 0, slaMissed: 0 };
      visitsByClin[name].visits++;
      if (isSlaMet(r, cm)) visitsByClin[name].slaMet++;
      if (isSlaMissed(r, cm)) visitsByClin[name].slaMissed++;
    });

    // Compute peer average visits-per-shift
    const peerRatios = [];
    Object.entries(shiftsByClin).forEach(([norm, s]) => {
      const v = visitsByClin[norm];
      if (v && s.shifts > 0) peerRatios.push(v.visits / s.shifts);
    });
    const avgVisitsPerShift = peerRatios.length > 0 ? peerRatios.reduce((a, b) => a + b, 0) / peerRatios.length : 0;

    // FLAG 1: Scheduled but NO visits (potential absence / no-show)
    Object.entries(shiftsByClin).forEach(([norm, s]) => {
      const v = visitsByClin[norm];
      if (!v || v.visits === 0) {
        const firstShift = new Date(Math.min(...s.dates));
        const lastShift = new Date(Math.max(...s.dates));
        newFlags.push({
          id: crypto.randomUUID(),
          clinician_name: s.name,
          category: 'scheduled_no_visits',
          severity: 'critical',
          detail: `Scheduled for ${s.shifts} shift(s) (${s.hours.toFixed(0)}h) but had 0 visits in actuals during the same period. Investigate for absence, no-show, or data mismatch.`,
          evidence: { shifts: s.shifts, hours: s.hours, visits: 0, periodStart: formatDate(firstShift), periodEnd: formatDate(lastShift) },
          shift_window_start: formatDate(firstShift),
          shift_window_end: formatDate(lastShift),
          status: 'pending',
          created_at: new Date().toISOString()
        });
      }
    });

    // FLAG 2: Scheduled but LOW volume (< 40% of peer average)
    if (avgVisitsPerShift > 0) {
      Object.entries(shiftsByClin).forEach(([norm, s]) => {
        const v = visitsByClin[norm];
        if (!v || v.visits === 0) return; // already caught by Flag 1
        const ratio = v.visits / s.shifts;
        if (ratio < avgVisitsPerShift * 0.4 && v.visits > 0 && s.shifts >= 3) {
          const firstShift = new Date(Math.min(...s.dates));
          const lastShift = new Date(Math.max(...s.dates));
          newFlags.push({
            id: crypto.randomUUID(),
            clinician_name: s.name,
            category: 'scheduled_low_volume',
            severity: 'high',
            detail: `${v.visits} visits across ${s.shifts} shifts (${ratio.toFixed(1)} visits/shift) — peer avg is ${avgVisitsPerShift.toFixed(1)}. Possible low utilization or assignment issue.`,
            evidence: { shifts: s.shifts, visits: v.visits, visitsPerShift: ratio, peerAvg: avgVisitsPerShift, periodStart: formatDate(firstShift), periodEnd: formatDate(lastShift) },
            shift_window_start: formatDate(firstShift),
            shift_window_end: formatDate(lastShift),
            status: 'pending',
            created_at: new Date().toISOString()
          });
        }
      });
    }

    // FLAG 3: High SLA miss rate (> 25% and at least 10 eligible visits)
    Object.entries(visitsByClin).forEach(([norm, v]) => {
      const eligible = v.slaMet + v.slaMissed;
      if (eligible >= 10 && v.slaMissed / eligible > 0.25) {
        const clinName = shiftsByClin[norm]?.name || norm;
        newFlags.push({
          id: crypto.randomUUID(),
          clinician_name: clinName,
          category: 'high_sla_miss',
          severity: v.slaMissed / eligible > 0.40 ? 'critical' : 'high',
          detail: `SLA miss rate ${(v.slaMissed / eligible * 100).toFixed(0)}% (${v.slaMissed} of ${eligible}) — significantly above acceptable threshold.`,
          evidence: { visits: v.visits, slaMet: v.slaMet, slaMissed: v.slaMissed, missRate: v.slaMissed / eligible },
          status: 'pending',
          created_at: new Date().toISOString()
        });
      }
    });

    // FLAG 4: Unscheduled visits (in actuals but NOT on schedule)
    Object.entries(visitsByClin).forEach(([norm, v]) => {
      if (!shiftsByClin[norm] && v.visits >= 5) {
        newFlags.push({
          id: crypto.randomUUID(),
          clinician_name: norm,
          category: 'unscheduled_visits',
          severity: 'medium',
