// ========================== FORECAST vs ACTUAL COMPONENT ==========================
function ForecastVsActual({ forecast, actualsData, shiftScheduleData, cm }) {
  // Match forecast hours to actual performance
  const comparison = useMemo(() => {
    if (!forecast || !forecast.hours || !actualsData) return null;

    // Group actuals by date+hour (Central Time)
    const actualsByHour = {};
    actualsData.forEach(r => {
      const dt = parseDate(cm.date ? r[cm.date] : '');
      if (!dt) return;
      const key = ctHourKey(dt); // YYYY-MM-DDTHH in CT
      if (!actualsByHour[key]) actualsByHour[key] = { total: 0, met: 0, missed: 0, times: [] };
      actualsByHour[key].total++;
      const sla = cm.slaStatus ? (r[cm.slaStatus] || '').toLowerCase() : '';
      if (sla.includes('met') || sla.includes('within')) actualsByHour[key].met++;
      else if (sla.includes('miss') || sla.includes('breach') || sla.includes('over')) actualsByHour[key].missed++;
      const rt = cm.responseTime ? parseFloat(r[cm.responseTime]) : NaN;
      if (!isNaN(rt)) actualsByHour[key].times.push(rt);
    });

    // Match forecast hours to actuals
    const rows = [];
    let totalForecastVol = 0, totalActualVol = 0;
    let totalForecastMiss = 0, totalActualMiss = 0;
    let forecastedSLASum = 0, actualSLASum = 0, matchedCount = 0;

    forecast.hours.forEach(h => {
      const hourStart = h.time || null;
      let key = null;
      if (hourStart) {
        key = ctHourKey(new Date(hourStart));
      }
      const actual = key ? actualsByHour[key] : null;

      const forecastVol = h.arrivals;
      const forecastMiss = h.totalMiss;
      const forecastHC = h.headcount;
      const forecastSLA = forecastVol > 0 ? ((forecastVol - forecastMiss) / forecastVol * 100) : 100;

      const actualVol = actual ? actual.total : null;
      const actualMiss = actual ? actual.missed : null;
      const actualSLA = actual && (actual.met + actual.missed) > 0 ? (actual.met / (actual.met + actual.missed) * 100) : null;

      totalForecastVol += forecastVol;
      totalForecastMiss += forecastMiss;
      if (actual) {
        totalActualVol += actual.total;
        totalActualMiss += actual.missed;
        forecastedSLASum += forecastSLA;
        actualSLASum += actualSLA || 0;
        matchedCount++;
      }

      rows.push({
        label: h.label,
        forecastVol: forecastVol.toFixed(1),
        forecastHC: forecastHC,
        forecastMiss: forecastMiss.toFixed(2),
        forecastSLA: forecastSLA.toFixed(1),
        actualVol: actualVol !== null ? actualVol : '—',
        actualMiss: actualMiss !== null ? actualMiss : '—',
        actualSLA: actualSLA !== null ? actualSLA.toFixed(1) : '—',
        hasActual: actual !== null,
        slaDelta: actualSLA !== null ? (actualSLA - forecastSLA).toFixed(1) : null,
        volDelta: actualVol !== null ? (actualVol - forecastVol).toFixed(1) : null,
      });
    });

    const overallForecastSLA = totalForecastVol > 0 ? ((totalForecastVol - totalForecastMiss) / totalForecastVol * 100) : 0;
    const overallActualSLA = totalActualVol > 0 ? ((totalActualVol - totalActualMiss) / totalActualVol * 100) : 0;

    return {
      rows,
      summary: {
        forecastVol: totalForecastVol,
        actualVol: totalActualVol,
        forecastMiss: totalForecastMiss,
        actualMiss: totalActualMiss,
        forecastSLA: overallForecastSLA,
        actualSLA: overallActualSLA,
        matchedHours: matchedCount,
        accuracy: matchedCount > 0 ? (100 - Math.abs(overallForecastSLA - overallActualSLA)).toFixed(1) : null
      }
    };
  }, [forecast, actualsData, cm]);

  if (!comparison) return null;

  const s = comparison.summary;

  return (
    <div className="card" style={{ marginTop: 20, borderTop: '3px solid var(--accent-teal)' }}>
      <div className="card-title" style={{ fontSize: 14 }}>🎯 Forecast vs Actual</div>
      <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 12 }}>
        Comparing model predictions to actual performance. <strong>{s.matchedHours} of {comparison.rows.length} forecast hours</strong> have matching actuals data.
        {s.matchedHours === 0 && <span style={{ color: 'var(--accent-orange)', fontWeight: 600 }}> — No overlap between forecast window and actuals dates. Upload actuals that cover today/this week to see comparisons.</span>}
        {s.matchedHours > 0 && s.matchedHours < 24 && <span> Only hours where both forecast and actuals exist are compared.</span>}
      </div>

      {/* Summary KPIs */}
      <div className="kpi-grid" style={{ marginBottom: 16 }}>
        <KpiCard label="Forecasted Volume" value={s.forecastVol.toFixed(0)} />
        <KpiCard label="Actual Volume" value={s.actualVol > 0 ? s.actualVol.toLocaleString() : 'No data'} />
        <KpiCard label="Forecasted SLA" value={s.forecastSLA.toFixed(1) + '%'} className={s.forecastSLA < 80 ? 'alert' : s.forecastSLA < 90 ? 'warn' : 'good'} />
        <KpiCard label="Actual SLA" value={s.actualVol > 0 ? s.actualSLA.toFixed(1) + '%' : '—'} className={s.actualSLA < 80 ? 'alert' : s.actualSLA < 90 ? 'warn' : 'good'} />
        {s.accuracy && <KpiCard label="Forecast Accuracy" value={s.accuracy + '%'} sub="SLA prediction accuracy" className={parseFloat(s.accuracy) > 90 ? 'good' : parseFloat(s.accuracy) > 80 ? 'warn' : 'alert'} />}
      </div>

      {/* Hourly comparison table */}
      <div className="table-wrap" style={{ maxHeight: 400, overflowY: 'auto' }}>
        <table style={{ fontSize: 11 }}>
          <thead>
            <tr>
              <th>Hour</th>
              <th style={{ borderRight: '2px solid var(--border)' }}>FC HC</th>
              <th>FC Volume</th>
              <th>Act Volume</th>
              <th style={{ borderRight: '2px solid var(--border)' }}>Vol Δ</th>
              <th>FC SLA%</th>
              <th>Act SLA%</th>
              <th>SLA Δ</th>
            </tr>
          </thead>
          <tbody>
            {comparison.rows.map((r, i) => (
              <tr key={i} style={{ background: r.hasActual ? 'transparent' : '#f9fafb' }}>
                <td style={{ fontWeight: 600 }}>{r.label}</td>
                <td style={{ borderRight: '2px solid var(--border)' }}>{r.forecastHC}</td>
                <td>{r.forecastVol}</td>
                <td style={{ fontWeight: r.hasActual ? 600 : 400 }}>{r.actualVol}</td>
                <td style={{ borderRight: '2px solid var(--border)', color: r.volDelta !== null ? (parseFloat(r.volDelta) > 5 ? '#dc2626' : parseFloat(r.volDelta) < -5 ? '#059669' : 'var(--text-muted)') : 'var(--text-muted)', fontSize: 10 }}>
                  {r.volDelta !== null ? (parseFloat(r.volDelta) > 0 ? '+' : '') + r.volDelta : '—'}
                </td>
                <td>{r.forecastSLA}%</td>
                <td style={{ fontWeight: r.hasActual ? 600 : 400 }}>{r.actualSLA !== '—' ? r.actualSLA + '%' : '—'}</td>
                <td style={{ color: r.slaDelta !== null ? (parseFloat(r.slaDelta) >= 0 ? '#059669' : '#dc2626') : 'var(--text-muted)', fontWeight: r.slaDelta !== null ? 600 : 400, fontSize: 10 }}>
                  {r.slaDelta !== null ? (parseFloat(r.slaDelta) > 0 ? '+' : '') + r.slaDelta + 'pp' : '—'}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

            </div>
            <div className="formula-desc" style={{ marginTop: 8 }}>
              When you see <strong>"Avg VPH"</strong> for a given hour in the Forecast, it means: sum of all active (on-shift) clinicians' current VPH values, divided by the number of active clinicians.
            </div>
            <div className="formula-eq">Avg VPH (hourly) = Sum(active clinicians' VPH) / Headcount</div>

              <strong>Data Quality Rules:</strong> Records are rejected if completed_visits is null/negative or both hours fields are missing. Records are warned if scheduled_hours is absent (worked hours used as fallback) or if visits exceed hours x 12 (sanity ceiling).
            </div>
          </div>

          <div className="formula-block">
            <div className="formula-label">2. Hourly Capacity</div>
            <div className="formula-eq">Capacity = Headcount x Average VPH</div>
            <div className="formula-desc">
              This is the theoretical maximum visits the team can handle in one hour. Shown as the navy line on the Forecast chart. When arrivals exceed capacity, expect response times to increase and SLA to degrade. Example: 8 clinicians with Avg VPH 1.64 = capacity of 13.1 visits/hour.
            </div>
          </div>

          <div className="formula-block">
            <div className="formula-label">3. SLA Prediction Model (Logistic Regression)</div>
            <div className="formula-desc">
              The forecast engine uses a trained multinomial logistic regression model to predict three outcomes per state per hour: probability of SLA miss, probability of response &gt;30 minutes, and probability of response &gt;60 minutes.
            </div>
            <div className="formula-desc" style={{ marginTop: 8, fontWeight: 600 }}>Step 1: Build feature vector (6 features per state per hour)</div>
            <div className="formula-eq">features = [stateEligible, oncallEligible, headcount, stateArrivals, avgVPH, oncallElig]</div>
            <div className="formula-desc">
              <ul style={{ paddingLeft: 16, marginTop: 4 }}>
                <li><strong>stateEligible</strong>: # of regular-shift clinicians licensed in this state this hour</li>
                <li><strong>oncallEligible</strong>: # of on-call clinicians licensed in this state (0 if On-Call = No)</li>
                <li><strong>headcount</strong>: total clinicians on regular shifts this hour</li>
                <li><strong>stateArrivals</strong>: expected visits for this state this hour (from historical data x volume multiplier)</li>
                <li><strong>avgVPH</strong>: average visits-per-hour of active clinicians</li>
                <li><strong>oncallElig</strong>: same as oncallEligible (model uses it twice as feature 2 and 6)</li>
              </ul>
            </div>
            <div className="formula-desc" style={{ marginTop: 8, fontWeight: 600 }}>Step 2: Standardize features</div>
            <div className="formula-eq">z[i] = (feature[i] - mean[i]) / scale[i]</div>
            <div className="formula-desc">Each feature is centered and scaled using pre-computed training statistics (means and standard deviations) so the model weights apply correctly.</div>
            <div className="formula-desc" style={{ marginTop: 8, fontWeight: 600 }}>Step 3: Compute logit and probability</div>
            <div className="formula-eq">logit = intercept + (coef[0]*z[0] + coef[1]*z[1] + ... + coef[5]*z[5])</div>
            <div className="formula-eq">probability = 1 / (1 + e^(-logit))   [sigmoid function]</div>
            <div className="formula-desc">This produces a probability between 0 and 1 for each outcome (miss, &gt;30min, &gt;60min).</div>
            <div className="formula-desc" style={{ marginTop: 8, fontWeight: 600 }}>Step 4: Convert to expected counts</div>
            <div className="formula-eq">Expected Misses = P(miss) x stateArrivals</div>
            <div className="formula-eq">Expected &gt;30min = P(&gt;30min) x stateArrivals</div>
            <div className="formula-desc">Summed across all states and hours to produce the overall forecast.</div>
          </div>

          <div className="formula-block">
            <div className="formula-label">4. Overall SLA Rate</div>
            <div className="formula-eq">SLA Rate = (Total Arrivals - Total Misses) / Total Arrivals x 100%</div>
            <div className="formula-desc">
              Used in both the Forecast tab (predicted SLA from model) and Performance tab (actual SLA from uploaded data). A "miss" is any visit where the SLA status indicates the response time target was not met.
            </div>
          </div>

          <div className="formula-block">
            <div className="formula-label">5. SLA Met / Missed / Canceled Classification</div>
            <div className="formula-desc">
              When actuals data is uploaded, each row is classified by examining the SLA Status column:
            </div>
            <div className="formula-eq">
              Canceled: status contains "cancel" (case-insensitive) → excluded from SLA calculations{'\n'}
              SLA Met: status contains "met" AND does NOT contain "miss"{'\n'}
              SLA Missed: status contains "miss"
            </div>
            <div className="formula-desc" style={{ marginTop: 4 }}>
              The columns checked are: SLA Status, Current Status, Consult Status, and SLA Start Status. Canceled visits are always excluded from SLA rate calculations.
            </div>
          </div>

          <div className="formula-block">
            <div className="formula-label">6. Response Time Parsing</div>
            <div className="formula-desc">
              Response time values from CSV exports come in multiple formats. The parser handles all of them:
            </div>
            <div className="formula-eq">
              "0 h 23 m" → 23 minutes{'\n'}
              "1 h 5 m" → 65 minutes{'\n'}
              "44,754" (comma-delimited seconds) → 44754 / 60 = 745.9 minutes{'\n'}
              "1800" (raw number &gt; 300) → 1800 / 60 = 30 minutes (assumed seconds){'\n'}
              "25.5" (raw number &le; 300) → 25.5 minutes (assumed already in minutes)
            </div>
          </div>

          <div className="formula-block">
            <div className="formula-label">7. Demand Bucketing</div>
            <div className="formula-eq">
              If arrivals &lt; Low Cutoff (default 19) → "low" demand (green){'\n'}
              If arrivals &lt; Mid Cutoff (default 28) → "mid" demand (orange){'\n'}
              Otherwise → "high" demand (red)
            </div>
            <div className="formula-desc">
              These are visual labels only and do not affect model predictions. See the Parameters Guide for details.
            </div>
          </div>

          <div className="formula-block">
            <div className="formula-label">8. State Coverage Score</div>
            <div className="formula-eq">
              Coverage = (# state-hour pairs with &ge;1 eligible clinician AND volume &gt; 0) / (# state-hour pairs with volume &gt; 0) x 100%
            </div>
            <div className="formula-desc">
              A state-hour pair is "covered" if at least one clinician licensed in that state is on shift during that hour. Pairs with zero expected volume are excluded from the calculation.
            </div>
          </div>

          <div className="formula-block">
            <div className="formula-label">9. Risk Level Classification</div>
            <div className="formula-eq">
              HIGH: any expected &gt;60min visits across the forecast period{'\n'}
              MEDIUM: total expected misses &gt; 5{'\n'}
              LOW: all other cases
            </div>
          </div>

          <div style={{ marginTop: 24, padding: 16, background: 'var(--bg-primary)', borderRadius: 'var(--radius)', border: '1px solid var(--border)' }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 8 }}>How to Verify Numbers</div>
            <ul style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.8, paddingLeft: 20 }}>
              <li>The Forecast tab's "Hourly Detail" table shows per-hour breakdowns — multiply arrivals by the miss probability shown in the State Coverage Heatmap to verify expected misses.</li>
              <li>The Performance tab's KPIs should match: Total Offered = your CSV row count; SLA Eligible = Total - Canceled; SLA % = Met / Eligible x 100.</li>
              <li>Export filtered data to CSV using the Export button and verify counts in Excel/Sheets.</li>
              <li>Historical Log snapshots record SLA% at upload time — compare against Performance tab to confirm consistency.</li>
            </ul>
          </div>
        </div>
      )}

      {section === 'ops' && (
        <div>
          <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:20,lineHeight:1.6}}>
            The Ops Dashboard modules add staffing intelligence, attendance tracking, incident management, and automated root cause analysis. These complement the core Forecast and Performance tabs.
          </div>
          <div className="formula-block">
            <div className="formula-label">Partner SLA Contractual Thresholds</div>
            <div className="formula-eq">Transcarent (Tier 1): First Contact ≤10min ≥95% | Uptime ≥99.7% | Satisfaction ≥4.0</div>
            <div className="formula-eq">LifeMD (Tier 2): Sync ≤60min | Async ≤4hrs | Miss rate &lt;10%</div>
            <div className="formula-eq">EZ Health (Tier 2): Primary 90% in 24hr | Secondary 90% in 72hr</div>
            <div className="formula-eq">WHOOP (Tier 2): Uptime ≥99.9%</div>
            <div className="formula-eq">ixLayer/J&J (Tier 3): Tech Sev1 ≤4hrs | Clinical ≤1 biz day</div>
            <div className="formula-desc">Traffic lights: Green = at or above target, Yellow = between warn and target, Red = below critical threshold.</div>
          </div>
          <div className="formula-block">
            <div className="formula-label">Composite Risk Score (Cross-Domain)</div>
            <div className="formula-eq">Score = (Incidents × 2) + (Call-Outs × 3) + (Low VPH bonus: +5 if VPH &lt; 1.0) + (SLA miss bonus: +4 if miss rate &gt; 15%)</div>
            <div className="formula-eq">Critical: ≥15 | High: ≥10 | Moderate: ≥5 | Low: &lt;5</div>
          </div>
          <div className="formula-block">
            <div className="formula-label">Call-Out Violation Policy</div>
            <div className="formula-eq">Violation = less than 24 hours notice before shift start</div>
            <div className="formula-eq">Caution: 3-4 call-outs | Action Required: 5-9 | Escalation: 10+</div>
          </div>
          <div className="formula-block">
            <div className="formula-label">Causal Chain Logic (5-Step Decision Tree)</div>
            <div className="formula-eq">1. Staffing Gap → 2. Volume Anomaly → 3. Clinician Performance → 4. Attendance → 5. Credential Mix</div>
            <div className="formula-desc">Each step is flagged (red) or clear (green). The first flagged step is identified as the primary driver. Attribution weights are computed based on which factors are flagged.</div>
          </div>
          <div className="formula-block">
            <div className="formula-label">Volume Waiver & Drift Detection</div>
            <div className="formula-eq">Waiver: Transcarent ≥125% of forecast | EZ Health ≥130%</div>
            <div className="formula-eq">Baseline Drift: ≥20% deviation sustained 3+ consecutive weeks</div>
            <div className="formula-eq">Anomaly Detection: Weekly volumes outside ±2 standard deviations</div>
          </div>
        </div>
      )}
    </div>
  );
}

  const [overrideSL, setOverrideSL] = useState(pending.detectedSL);

                </select>
              ) : (

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-muted)', marginBottom: 4 }}>DETECTED COLUMNS</div>

// ========================== SMART IMPORT MODAL ==========================
function SmartImportModal({ rawData, filename, fileSizeBytes, masterRoster, onCommitShifts, onCommitRoster, onCancel, showToast }) {
  const DOW_LABELS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  // Parse all rows once
  const cm = React.useMemo(() => buildColMap(rawData), [rawData]);
  const parsedRows = React.useMemo(() => rawData.map(r => parseAryaRow(r, cm)).filter(r => r._startDate), [rawData, cm]);
  const filterOptions = React.useMemo(() => extractFilterOptions(parsedRows), [parsedRows]);

  // File metadata
  const fileSize = fileSizeBytes < 1024 ? fileSizeBytes + ' B' : fileSizeBytes < 1048576 ? (fileSizeBytes / 1024).toFixed(1) + ' KB' : (fileSizeBytes / 1048576).toFixed(1) + ' MB';
  const dateRangeStr = filterOptions.dateRange.min && filterOptions.dateRange.max
    ? `${filterOptions.dateRange.min.toLocaleDateString('en-US', { timeZone: CT_TZ, month: 'short', day: 'numeric' })} — ${filterOptions.dateRange.max.toLocaleDateString('en-US', { timeZone: CT_TZ, month: 'short', day: 'numeric', year: 'numeric' })}`
    : '?';

  // Filter state
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [selClinicians, setSelClinicians] = useState([]);
  const [selEntities, setSelEntities] = useState([]);
  const [selTags, setSelTags] = useState([]);
  const [selDows, setSelDows] = useState([]);
  const [showUnfilled, setShowUnfilled] = useState(true);
  const [sortCol, setSortCol] = useState('_startDate');
  const [sortDir, setSortDir] = useState('asc');

  const resetFilters = () => { setDateFrom(''); setDateTo(''); setSelClinicians([]); setSelEntities([]); setSelTags([]); setSelDows([]); setShowUnfilled(true); };

  // Filter pipeline (AND logic)
  const filteredRows = React.useMemo(() => {
    let rows = parsedRows;
    if (dateFrom) { const d = new Date(dateFrom); rows = rows.filter(r => r._startDate >= d); }
    if (dateTo) { const d = new Date(dateTo); d.setHours(23, 59, 59, 999); rows = rows.filter(r => r._startDate <= d); }
    if (selClinicians.length > 0) rows = rows.filter(r => selClinicians.includes(r._name));
    if (selEntities.length > 0) rows = rows.filter(r => selEntities.includes(r._entityName));
    if (selTags.length > 0) rows = rows.filter(r => r._tags.some(t => selTags.includes(t)));
    if (!showUnfilled) rows = rows.filter(r => !r._unfilled);
    if (selDows.length > 0) rows = rows.filter(r => selDows.includes(r._dow));
    return rows;
  }, [parsedRows, dateFrom, dateTo, selClinicians, selEntities, selTags, showUnfilled, selDows]);

  // Sort
  const sortedRows = React.useMemo(() => {
    const sorted = [...filteredRows];
    sorted.sort((a, b) => {
      let cmp = 0;
      switch (sortCol) {
        case '_name': cmp = a._name.localeCompare(b._name); break;
        case '_entityName': cmp = a._entityName.localeCompare(b._entityName); break;
        case '_sl': cmp = (a._sl || '').localeCompare(b._sl || ''); break;
        case '_startDate': cmp = (a._startDate || 0) - (b._startDate || 0); break;
        case '_hours': cmp = a._hours - b._hours; break;
        default: cmp = 0;
      }
      return sortDir === 'desc' ? -cmp : cmp;
    });
    return sorted;
  }, [filteredRows, sortCol, sortDir]);

  // Summary stats
  const uniqueClinicians = React.useMemo(() => new Set(filteredRows.filter(r => !r._unfilled).map(r => r._name)).size, [filteredRows]);
  const totalHours = React.useMemo(() => Math.round(filteredRows.reduce((s, r) => s + r._hours, 0) * 10) / 10, [filteredRows]);
  const unfilledInView = React.useMemo(() => filteredRows.filter(r => r._unfilled).length, [filteredRows]);

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  };
  const sortArrow = (col) => sortCol === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';

  // Actions
  const handleUseAsShifts = () => {
    const rawRows = filteredRows.map(r => r._raw);
    onCommitShifts(rawRows, filename);
  };

  const handleUseAsRoster = () => {
    onCommitRoster(filteredRows, filename);
  };

  const handleDownloadCSV = () => {
    if (filteredRows.length === 0) return;
    const headers = Object.keys(filteredRows[0]._raw);
    const csvRows = [headers.map(h => `"${h}"`).join(',')];
    filteredRows.forEach(r => {
      csvRows.push(headers.map(h => `"${(r._raw[h] || '').replace(/"/g, '""')}"`).join(','));
    });
    const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `filtered-${filename}`; a.click();
    URL.revokeObjectURL(url);
    showToast(`Downloaded ${filteredRows.length} rows as filtered-${filename}`);
  };

  // Entity options with SL labels for display
  const entityOptions = React.useMemo(() => filterOptions.entities.map(e => e.name), [filterOptions]);
  const entitySLMap = React.useMemo(() => Object.fromEntries(filterOptions.entities.map(e => [e.name, e.sl])), [filterOptions]);

  // Clinician count map (shifts per clinician)
  const clinCountMap = React.useMemo(() => {
    const m = {};
    parsedRows.forEach(r => { if (!r._unfilled && r._name) m[r._name] = (m[r._name] || 0) + 1; });
    return m;
  }, [parsedRows]);

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal-content smart-import-modal">
        <div className="modal-header">
          <h3 style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 18 }}>📦</span> Smart Import
            <span style={{ fontSize: 12, fontWeight: 400, color: 'var(--text-muted)' }}>{filename}</span>
          </h3>
          <button onClick={onCancel} style={{ background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', color: 'var(--text-muted)', padding: '0 4px' }}>&times;</button>
        </div>
        <div className="modal-body" style={{ overflow: 'auto', flex: 1 }}>

          {/* Metadata bar */}
          <div className="smart-import-meta">
            <div><span style={{ color: 'var(--text-muted)' }}>Rows:</span> <strong>{parsedRows.length.toLocaleString()}</strong></div>
            <div><span style={{ color: 'var(--text-muted)' }}>Size:</span> <strong>{fileSize}</strong></div>
            <div><span style={{ color: 'var(--text-muted)' }}>Date Range:</span> <strong>{dateRangeStr}</strong></div>
            <div><span style={{ color: 'var(--text-muted)' }}>Clinicians:</span> <strong>{filterOptions.clinicians.length}</strong></div>
            <div><span style={{ color: 'var(--text-muted)' }}>Entities:</span> <strong>{filterOptions.entities.length}</strong></div>
            <div><span style={{ color: 'var(--text-muted)' }}>Unfilled:</span> <strong>{filterOptions.unfilledCount}</strong></div>
          </div>

          {/* Filter panel */}
          <div className="smart-import-filters">
            <div className="form-group">
              <label>From</label>
              <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} />
            </div>
            <div className="form-group">
              <label>To</label>
              <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} />
            </div>
            <MultiSelect label="Clinicians" options={filterOptions.clinicians} selected={selClinicians} onChange={setSelClinicians} placeholder="All" countMap={clinCountMap} />
            <MultiSelect label="Entity" options={entityOptions} selected={selEntities} onChange={setSelEntities} placeholder="All" />
            {filterOptions.tags.length > 0 && (

            )}
            <div className="form-group">
              <label>Day of Week</label>
              <div className="dow-pills">
                {DOW_LABELS.map((d, i) => (
                  <button key={i} className={`dow-pill ${selDows.includes(i) ? 'active' : ''}`}
                    onClick={() => setSelDows(prev => prev.includes(i) ? prev.filter(x => x !== i) : [...prev, i])}>{d}</button>

              </div>
            </div>
            <div className="form-group" style={{ display: 'flex', flexDirection: 'column' }}>
              <label>Unfilled Shifts</label>
              <button className={`toggle-chip ${showUnfilled ? 'on' : ''}`} onClick={() => setShowUnfilled(!showUnfilled)}>
                {showUnfilled ? '✓ Showing' : '✗ Hidden'}

            </div>
            <div className="form-group" style={{ display: 'flex', alignItems: 'flex-end' }}>
              <button className="btn btn-secondary btn-sm" onClick={resetFilters} style={{ fontSize: 11 }}>Reset Filters</button>

          </div>

          {/* Summary bar */}
          <div className="smart-import-summary">
            <span>Showing <span className="count">{filteredRows.length.toLocaleString()}</span> of {parsedRows.length.toLocaleString()} rows</span>

          </div>

          {/* Preview table */}
          <div className="smart-import-table">
            <table>
              <thead>
                <tr>

// ========================== ROSTER RECONCILIATION ==========================

// Compute VPH per clinician from actuals data
function computeVphFromActuals(actualsRows, cm) {
  const clinField = cm.clinician;
  if (!clinField) return {};

  // Group visits by clinician, count non-canceled visits
  const clinStats = {};
  actualsRows.forEach(r => {
    const rawName = (r[clinField] || '').trim();
    if (!rawName) return;
    if (isCanceled(r, cm)) return; // exclude canceled
    const parsed = parseNameCredential(rawName);
    const norm = parsed.normalized;
    if (!norm) return;
    if (!clinStats[norm]) clinStats[norm] = { name: parsed.cleanName, credential: parsed.credential, visits: 0, dates: new Set() };
    // If this row has a credential and existing entry doesn't, capture it
    if (parsed.credential && !clinStats[norm].credential) clinStats[norm].credential = parsed.credential;
    clinStats[norm].visits++;
    // Track unique dates to estimate hours worked
    const d = parseDate(cm.date ? r[cm.date] : '');
    if (d) clinStats[norm].dates.add(d.toISOString().slice(0, 10));
  });

  // Simplified Raw VPH estimate from actuals — full 4-variant computation in VPH tab
  const HOURS_PER_DAY = 8;
  const result = {};
  Object.entries(clinStats).forEach(([norm, stat]) => {
    const workDays = stat.dates.size || 1;
    const totalHours = workDays * HOURS_PER_DAY;
    result[norm] = {
      name: stat.name,
      credential: stat.credential || '',
      rawVph: totalHours > 0 ? (stat.visits / totalHours) : 0,
      visits: stat.visits,
      workDays,
      totalHours
    };
  });
  return result;
}

function reconcileRosterFromActuals(currentRoster, actualsRows, cm, sourceName) {
  const changes = [];
  const rosterMap = {};
  currentRoster.forEach((c, i) => { rosterMap[normalizeName(c.name)] = i; });

  const clinField = cm.clinician;
  if (!clinField) return { updatedRoster: currentRoster, changes };

  // Compute VPH from this actuals dataset
  const vphData = computeVphFromActuals(actualsRows, cm);

  const updatedRoster = currentRoster.map(c => ({ ...c }));
  const now = new Date().toISOString();

  // Process all clinicians found in actuals
  Object.entries(vphData).forEach(([norm, data]) => {
    const idx = rosterMap[norm];
    if (idx !== undefined) {
      // Existing clinician — update VPH from computed data
      const existing = updatedRoster[idx];
      const newVph = data.rawVph;

      // Store previous VPH in history array
      if (!existing.vphHistory) existing.vphHistory = [];
      if (existing.vph > 0) {
        existing.vphHistory.push({ vph: existing.vph, date: existing.lastUpdated || now, source: existing.source || 'prior' });
      }

      // Track if VPH changed meaningfully (> 0.01 difference)
      if (newVph > 0 && Math.abs(newVph - existing.vph) > 0.01) {
        changes.push({
          type: 'vph_computed', name: data.name,
          old: existing.vph.toFixed(4), new: newVph.toFixed(4),
          detail: `${data.visits} visits / ${data.totalHours}h = ${newVph.toFixed(4)} VPH`,
          timestamp: now, source: sourceName
        });
        existing.vph = newVph;
      }

      // Update credential if currently unknown and we parsed one from the name
      if ((!existing.credential || existing.credential === '?') && data.credential) {
        changes.push({ type: 'credential_parsed', name: existing.name, detail: `Credential detected: ${data.credential} (${classifyCredential(data.credential)})`, timestamp: now, source: sourceName });
        existing.credential = data.credential;
      }

      // Update display name to clean version (strip embedded credentials)
      if (data.name && existing.name !== data.name && data.name.length > 2) {
        existing.name = data.name;
      }

      existing.lastUpdated = now;
      existing.source = sourceName;
      existing.lastVisits = data.visits;
      existing.lastWorkDays = data.workDays;
    } else {
      // New clinician not in roster — add with parsed credential from name
      const parsedCred = data.credential || '';
      const entry = {
        name: data.name, credential: parsedCred || '?', stateCount: 0, restricted: 0,
        vph: data.rawVph,
        stateFlags: new Array(24).fill(0), source: sourceName, lastUpdated: now,
        unmatched: true, lastVisits: data.visits, lastWorkDays: data.workDays,
        vphHistory: []
      };
      updatedRoster.push(entry);
      rosterMap[norm] = updatedRoster.length - 1;
      const credInfo = parsedCred ? ` | Credential: ${parsedCred} (${classifyCredential(parsedCred)})` : '';
      changes.push({ type: 'added', name: data.name, detail: `VPH computed: ${data.rawVph.toFixed(4)}${credInfo}`, timestamp: now, source: sourceName });
    }
  });

  return { updatedRoster, changes };
}

function reconcileRosterFromCSV(currentRoster, csvRows, sourceName) {
  const changes = [];
  const now = new Date().toISOString();
  const csvMap = {};

  // Build map from CSV (expect columns: Name, Credential, VPH, etc.)
  const cm = buildColMap(csvRows);
  csvRows.forEach(r => {
    const name = (cm.clinician ? r[cm.clinician] : r['Name'] || r['name'] || '').trim();
    if (!name) return;
    const norm = normalizeName(name);
    csvMap[norm] = {
      name,
      credential: r[resolveCol(Object.keys(r), 'credential')] || r['Credential'] || r['credential'] || '?',
      vph: parseFloat(r[resolveCol(Object.keys(r), 'vph')] || r['VPH'] || r['vph'] || 0) || 0,
    };
  });

  const rosterMap = {};
  currentRoster.forEach((c, i) => { rosterMap[normalizeName(c.name)] = i; });

  const updatedRoster = currentRoster.map(c => ({ ...c }));

  // Check for changes in existing clinicians
  Object.entries(csvMap).forEach(([norm, csvC]) => {
    const idx = rosterMap[norm];
    if (idx !== undefined) {
      // Existing clinician — check for field changes
      const existing = updatedRoster[idx];
      if (csvC.credential !== '?' && csvC.credential !== existing.credential) {
        changes.push({ type: 'credential_changed', name: csvC.name, old: existing.credential, new: csvC.credential, timestamp: now, source: sourceName });
        existing.credential = csvC.credential;
        existing.lastUpdated = now;
      }
      if (csvC.vph > 0 && Math.abs(csvC.vph - existing.vph) > 0.01) {
        changes.push({ type: 'vph_changed', name: csvC.name, old: existing.vph.toFixed(2), new: csvC.vph.toFixed(2), timestamp: now, source: sourceName });
        existing.vph = csvC.vph;
        existing.lastUpdated = now;
      }
      existing.source = sourceName;
      existing.unmatched = false;
    } else {
      // New clinician from CSV
      updatedRoster.push({
        name: csvC.name, credential: csvC.credential, stateCount: 0, restricted: 0, vph: csvC.vph,
        stateFlags: new Array(24).fill(0), source: sourceName, lastUpdated: now, unmatched: true
      });
      changes.push({ type: 'added', name: csvC.name, timestamp: now, source: sourceName });
    }
  });

  return { updatedRoster, changes };
}

// ========================== WEEKLY PERFORMANCE REPORT TAB ==========================
function WeeklyPerfTab({ weeklyPerfData, setWeeklyPerfData, showToast }) {
  const { user } = useAuth();
  const [selectedWeek, setSelectedWeek] = useState('');
  const [uploading, setUploading] = useState(false);
  const [uploadProgress, setUploadProgress] = useState('');
  const [uploadResults, setUploadResults] = useState([]);
  const [viewMode, setViewMode] = useState('report'); // 'report' | 'trends'
  const [trendRange, setTrendRange] = useState('4w'); // '1w' | '4w' | '13w' | '26w'
  const [expandedSections, setExpandedSections] = useState({
    sync: true, dow: true, hod: true, incentives: true, async: true, cv: true, callouts: true
  });

  const weeks = useMemo(() => Object.keys(weeklyPerfData || {}).sort((a, b) => b.localeCompare(a)), [weeklyPerfData]);

  // Auto-select most recent week
  useEffect(() => {
    if (weeks.length > 0 && (!selectedWeek || !weeks.includes(selectedWeek))) {
      setSelectedWeek(weeks[0]);
    }
  }, [weeks]);

  const currentWeekData = weeklyPerfData?.[selectedWeek] || {};
  const prevWeekKey = useMemo(() => {
    if (!selectedWeek) return null;
    const d = new Date(selectedWeek);
    d.setDate(d.getDate() - 7);
    return d.toISOString().split('T')[0];
  }, [selectedWeek]);
  const prevWeekData = weeklyPerfData?.[prevWeekKey] || {};

  const toggleSection = (s) => setExpandedSections(prev => ({ ...prev, [s]: !prev[s] }));

  // ---- File Upload Handler ----
  const handleWprUpload = async (files) => {
    if (!files?.length) return;
    setUploading(true);
    setUploadResults([]);
    const results = [];

    for (const file of files) {
      try {
        setUploadProgress(`Reading ${file.name}...`);
        const text = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result);
          reader.onerror = () => reject(new Error('File read failed'));
          reader.readAsText(file);
        });

        // Parse headers to identify
        const firstLine = text.split('\n')[0];
        const headers = parseCSVLine(firstLine).map(h => h.trim());
        const lineCount = text.split('\n').length - 1;
        const fileType = identifyWprFile(headers, lineCount);

        if (!fileType) {
          results.push({ file: file.name, status: 'skip', message: 'Unrecognized format' });
          continue;
        }

        setUploadProgress(`Processing ${file.name} (${fileType})...`);

        // For large raw files, use chunked parser directly
        let processed;
        if (fileType === 'raw_sla_events') {
          processed = await processWprFile(fileType, text, null, (done, total) => {
            setUploadProgress(`Processing ${file.name}: ${done.toLocaleString()} / ${total.toLocaleString()} rows...`);
          });
        } else {
          const rows = parseCSV(text);
          processed = await processWprFile(fileType, text, rows);
        }

        if (!processed) {
          results.push({ file: file.name, status: 'skip', message: 'Parser returned no data' });
          continue;
        }

        // Determine week ending — try to detect from data, fallback to current week
        let weekEnding = selectedWeek || getWeekEnding(new Date().toISOString());

        // Try to detect from first data date
        if (Array.isArray(processed)) {
          // Multiple sections (raw SLA)
        } else if (processed.data) {
          // Check for date fields in data
          const dataArr = Array.isArray(processed.data) ? processed.data : processed.data?.partners || [];
          // Use current selectedWeek or auto-detect
        }

        if (!weekEnding) weekEnding = getWeekEnding(new Date().toISOString());

        // Save to state and Supabase
        const sections = Array.isArray(processed) ? processed : [processed];
        for (const sec of sections) {
          if (sec?.section && sec?.data) {
            setWeeklyPerfData(prev => {
              const updated = { ...prev };
              if (!updated[weekEnding]) updated[weekEnding] = {};
              updated[weekEnding] = { ...updated[weekEnding], [sec.section]: sec.data };
              return updated;
            });
            saveWeeklyPerfSection(weekEnding, sec.section, sec.data, file.name);
          }
        }

        results.push({ file: file.name, status: 'ok', message: `${fileType} → ${sections.length} section(s)`, weekEnding });
      } catch (err) {
        console.error('[WPR upload]', file.name, err);
        results.push({ file: file.name, status: 'error', message: err.message });
      }
    }

    setUploadResults(results);
    setUploadProgress('');
    setUploading(false);
    const okCount = results.filter(r => r.status === 'ok').length;
    if (okCount > 0) showToast(`${okCount} file(s) processed for Weekly Report`);
  };

  // ---- Week selector for uploads ----
  const [weekInput, setWeekInput] = useState(() => {
    const d = new Date();
    const day = d.getDay();
    const diff = day === 0 ? 0 : 7 - day;
    d.setDate(d.getDate() + diff);
    return d.toISOString().split('T')[0];
  });

  // ---- Auto-Narrative Generator ----
  const generateNarratives = useMemo(() => {
    if (!currentWeekData || Object.keys(currentWeekData).length === 0) return [];
    const bullets = [];

    // Sync narratives
    if (currentWeekData.sync) {
      const s = currentWeekData.sync;
      const prevS = prevWeekData?.sync;
      if (s.totals) {
        if (prevS?.totals) {
          const slaDelta = s.totals.slaPct - prevS.totals.slaPct;
          if (Math.abs(slaDelta) > 1) {
            bullets.push({ section: 'sync', severity: Math.abs(slaDelta) > 5 ? 'high' : 'medium',
              text: `Sync SLA ${slaDelta > 0 ? 'improved' : 'declined'} by ${Math.abs(slaDelta).toFixed(1)}pp WoW (${prevS.totals.slaPct}% → ${s.totals.slaPct}%)`
            });
          }
          const volDelta = s.totals.offered - prevS.totals.offered;
          const volPct = prevS.totals.offered > 0 ? (volDelta / prevS.totals.offered) * 100 : 0;
          if (Math.abs(volPct) > 10) {
            bullets.push({ section: 'sync', severity: 'medium',
              text: `Sync volume ${volDelta > 0 ? 'increased' : 'decreased'} by ${Math.abs(volPct).toFixed(0)}% WoW (${prevS.totals.offered} → ${s.totals.offered} visits)`
            });
          }
        }
        // Flag partners under 70% SLA
        (s.partners || []).filter(p => p.slaPct < 70 && p.offered > 5).forEach(p => {
          bullets.push({ section: 'sync', severity: 'high',
            text: `${p.name}: sync SLA at ${p.slaPct}% (${p.offered} visits) — below 70% threshold`
          });
        });
      }
    }

    // DoW narratives
    if (currentWeekData.dow) {
      const worst = [...currentWeekData.dow].sort((a, b) => a.slaPct - b.slaPct)[0];
      if (worst && worst.slaPct < 50) {
        bullets.push({ section: 'dow', severity: 'high',
          text: `${worst.day} had worst SLA at ${worst.slaPct}% (${worst.consults} consults)`
        });
      }
      const best = [...currentWeekData.dow].sort((a, b) => b.slaPct - a.slaPct)[0];
      if (best && worst && best.slaPct - worst.slaPct > 20) {
        bullets.push({ section: 'dow', severity: 'medium',
          text: `Large DoW spread: ${best.day} (${best.slaPct}%) vs ${worst.day} (${worst.slaPct}%) — ${(best.slaPct - worst.slaPct).toFixed(0)}pp gap`
        });
      }
    }

    // HoD narratives
    if (currentWeekData.hod) {
      const lowHours = currentWeekData.hod.filter(h => h.slaPct < 50 && h.consults > 3);
      if (lowHours.length > 0) {
        const hourLabels = lowHours.map(h => `${h.hour}:00`).join(', ');
        bullets.push({ section: 'hod', severity: 'high',
          text: `${lowHours.length} hour(s) below 50% SLA: ${hourLabels}`
        });
      }
    }

    // Async narratives
    if (currentWeekData.async) {
      const a = currentWeekData.async;
      const prevA = prevWeekData?.async;
      if (a.totals && prevA?.totals) {
        const slaDelta = a.totals.slaPct - prevA.totals.slaPct;
        if (Math.abs(slaDelta) > 1) {
          bullets.push({ section: 'async', severity: Math.abs(slaDelta) > 5 ? 'high' : 'medium',
            text: `Async SLA ${slaDelta > 0 ? 'improved' : 'declined'} by ${Math.abs(slaDelta).toFixed(1)}pp WoW (${prevA.totals.slaPct}% → ${a.totals.slaPct}%)`
          });
        }
      }
      (a.partners || []).filter(p => p.slaPct < 80 && p.offered > 5).forEach(p => {
        bullets.push({ section: 'async', severity: 'medium',
          text: `${p.name}: async SLA at ${p.slaPct}% (${p.offered} visits) — below 80% target`
        });
      });
    }

    // Incentive narratives
    if (currentWeekData.incentives) {
      const inc = currentWeekData.incentives;
      const prevInc = prevWeekData?.incentives;
      if (prevInc) {
        const spendDelta = inc.totalSpend - prevInc.totalSpend;
        const spendPct = prevInc.totalSpend > 0 ? (spendDelta / prevInc.totalSpend) * 100 : 0;
        if (Math.abs(spendPct) > 15) {
          bullets.push({ section: 'incentives', severity: 'medium',
            text: `Incentive spend ${spendDelta > 0 ? 'increased' : 'decreased'} by ${Math.abs(spendPct).toFixed(0)}% WoW ($${prevInc.totalSpend.toLocaleString()} → $${inc.totalSpend.toLocaleString()})`
          });
        }
      }
      if (inc.byPartner?.length > 0) {
        const topPartner = inc.byPartner[0];
        const topPct = inc.totalSpend > 0 ? (topPartner.spend / inc.totalSpend) * 100 : 0;
        if (topPct > 70) {
          bullets.push({ section: 'incentives', severity: 'medium',
            text: `${topPartner.name} accounts for ${topPct.toFixed(0)}% of incentive spend ($${topPartner.spend.toLocaleString()})`
          });
        }
      }
    }

    // Sort by severity
    const severityOrder = { high: 0, medium: 1, low: 2 };
    return bullets.sort((a, b) => (severityOrder[a.severity] || 2) - (severityOrder[b.severity] || 2));
  }, [currentWeekData, prevWeekData]);

  // ---- Copy Report to Clipboard ----
  const copyReport = () => {
    let md = `# Weekly Performance Report — Week Ending ${selectedWeek}\n\n`;

    if (currentWeekData.sync) {
      md += `## Sync Visits Offered\n`;
      md += `| Partner | Offered | SLA % | Avg Wait | Median Wait |\n|---|---|---|---|---|\n`;
      (currentWeekData.sync.partners || []).forEach(p => {
        md += `| ${p.name} | ${p.offered} | ${p.slaPct}% | ${p.avgWait} | ${p.medianWait} |\n`;
      });
      if (currentWeekData.sync.totals) {
        md += `| **TOTAL** | **${currentWeekData.sync.totals.offered}** | **${currentWeekData.sync.totals.slaPct}%** | | |\n\n`;
      }
    }

    if (currentWeekData.dow) {
      md += `## Day of Week Performance\n`;
      md += `| Day | Consults | SLA % | Median RT | Avg RT |\n|---|---|---|---|---|\n`;
      currentWeekData.dow.forEach(d => {
        md += `| ${d.day} | ${d.consults} | ${d.slaPct}% | ${d.medianRT} | ${d.avgRT} |\n`;
      });
      md += '\n';
    }

    if (currentWeekData.hod) {
      md += `## Hourly Performance\n`;
      md += `| Hour | Consults | SLA % | Median RT | Avg RT |\n|---|---|---|---|---|\n`;
      currentWeekData.hod.forEach(h => {
        md += `| ${h.hour}:00 | ${h.consults} | ${h.slaPct}% | ${h.medianRT} | ${h.avgRT} |\n`;
      });
      md += '\n';
    }

    if (currentWeekData.incentives) {
      const inc = currentWeekData.incentives;
      md += `## Incentive Spend\n`;
      md += `Total: $${inc.totalSpend?.toLocaleString()} (${inc.totalCount} payouts)\n\n`;
      if (inc.byPartner?.length) {
        md += `| Partner | Spend | Count |\n|---|---|---|\n`;
        inc.byPartner.forEach(p => { md += `| ${p.name} | $${p.spend.toLocaleString()} | ${p.count} |\n`; });
        md += '\n';
      }
    }

    if (currentWeekData.async) {
      md += `## Async Visits Offered\n`;
      md += `| Partner | Offered | SLA % |\n|---|---|---|\n`;
      (currentWeekData.async.partners || []).forEach(p => {
        md += `| ${p.name} | ${p.offered} | ${p.slaPct}% |\n`;
      });
      md += '\n';
    }

    if (currentWeekData.completions || currentWeekData.rejectReasons) {
      md += `## Completion Breakdown\n`;
      if (currentWeekData.completions?.length) {
        md += `| Date | Completed | Referred Out | Rejected |\n|---|---|---|---|\n`;
        currentWeekData.completions.forEach(c => {
          md += `| ${c.date} | ${c.completed} | ${c.referredOut} | ${c.rejected} |\n`;
        });
      }
      if (currentWeekData.rejectReasons?.length) {
        md += `\n**Reject Reasons (Prior 30 Days):**\n`;
        md += `| Reason | Count | % |\n|---|---|---|\n`;
        currentWeekData.rejectReasons.forEach(r => {
          md += `| ${r.reason} | ${r.count} | ${r.pct}% |\n`;
        });
      }
      md += '\n';
    }

    if (generateNarratives.length > 0) {
      md += `## Key Callouts\n`;
      generateNarratives.slice(0, 10).forEach(b => {
        const icon = b.severity === 'high' ? '🔴' : b.severity === 'medium' ? '🟡' : '🟢';
        md += `- ${icon} ${b.text}\n`;
      });
    }

    navigator.clipboard.writeText(md).then(() => showToast('Report copied to clipboard'));
  };

  // ---- Section Header Component ----
  const SectionHeader = ({ id, title, icon, count }) => (
    <div className="card-title" style={{ cursor: 'pointer', userSelect: 'none', display: 'flex', alignItems: 'center', gap: 8 }}
      onClick={() => toggleSection(id)}>
      <span>{expandedSections[id] ? '▼' : '▶'}</span>
      <span>{icon} {title}</span>
      {count != null && <span style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 400 }}>({count})</span>}
    </div>
  );

  // ---- SLA color helper ----
  const slaColor = (pct) => pct >= 90 ? '#059669' : pct >= 70 ? '#d97706' : '#dc2626';
  const slaBg = (pct) => pct >= 90 ? '#d1fae5' : pct >= 70 ? '#fef3c7' : '#fee2e2';

  // ---- KPI Card ----
  const KpiCard = ({ label, value, subValue, color }) => (
    <div style={{ flex: '1 1 140px', padding: '12px 16px', background: 'var(--bg-primary)', borderRadius: 'var(--radius)', border: '1px solid var(--border)', minWidth: 120 }}>
      <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, textTransform: 'uppercase', marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 700, color: color || 'var(--text-primary)' }}>{value}</div>
      {subValue && <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>{subValue}</div>}
    </div>
  );

  // ---- WoW Badge ----
  const WowBadge = ({ current, prev, type }) => {
    const w = formatWow(current, prev, type);
    if (w.text === '—') return <span style={{ color: 'var(--text-muted)', fontSize: 11 }}>—</span>;
    const color = w.className === 'wow-up' ? '#059669' : w.className === 'wow-down' ? '#dc2626' : 'var(--text-muted)';

  const TrendView = () => {

    const asyncTrendData = reversedWeeks.map(w => ({

              datasets: [
                { label: 'Volume', data: syncTrendData.map(d => d.volume), backgroundColor: 'rgba(59,130,246,0.5)', yAxisID: 'y' },
                { type: 'line', label: 'SLA %', data: syncTrendData.map(d => d.slaPct), borderColor: '#059669', borderWidth: 2, pointRadius: 4, yAxisID: 'y1', tension: 0.3 },
              ]
            }} options={{
              responsive: true, plugins: { legend: { position: 'top' } },
              scales: {
                y: { type: 'linear', position: 'left', title: { display: true, text: 'Volume' } },
                y1: { type: 'linear', position: 'right', min: 0, max: 100, title: { display: true, text: 'SLA %' }, grid: { drawOnChartArea: false } }
              }
            }} height={220} />
          </div>
        )}

        {asyncTrendData.length > 1 && (
          <div className="card" style={{ marginBottom: 16 }}>
            <div className="card-title">📈 Async SLA & Volume Trend</div>
            <ChartWrapper type="bar" data={{
              labels: asyncTrendData.map(d => d.week),
              datasets: [
                { label: 'Volume', data: asyncTrendData.map(d => d.volume), backgroundColor: 'rgba(168,85,247,0.5)', yAxisID: 'y' },
                { type: 'line', label: 'SLA %', data: asyncTrendData.map(d => d.slaPct), borderColor: '#059669', borderWidth: 2, pointRadius: 4, yAxisID: 'y1', tension: 0.3 },

            }} options={{
              responsive: true, plugins: { legend: { position: 'top' } },
              scales: {
                y: { type: 'linear', position: 'left', title: { display: true, text: 'Volume' } },
                y1: { type: 'linear', position: 'right', min: 0, max: 100, title: { display: true, text: 'SLA %' }, grid: { drawOnChartArea: false } }
              }
            }} height={220} />
          </div>
        )}

        {/* DoW Heatmap */}
        {currentWeekData.dow && (
          <div className="card" style={{ marginBottom: 16 }}>
            <div className="card-title">📊 Day of Week SLA Distribution</div>
            <ChartWrapper type="bar" data={{
              labels: currentWeekData.dow.map(d => d.day),
              datasets: [{
                label: 'SLA %',
                data: currentWeekData.dow.map(d => d.slaPct),

              <label className="btn btn-primary" style={{ cursor: 'pointer' }}>

              </label>
            </div>
          </div>
        </div>
      </div>

  }

  return (
    <div>
      {/* Header Controls */}
      <div className="card" style={{ marginBottom: 16, display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: '1 1 auto' }}>
          <span style={{ fontWeight: 700, fontSize: 14 }}>📋 Weekly Report</span>
          <select value={selectedWeek} onChange={e => setSelectedWeek(e.target.value)}
            style={{ fontSize: 12, padding: '4px 8px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--bg-primary)' }}>
            {weeks.map(w => <option key={w} value={w}>Week ending {w}</option>)}
          </select>
