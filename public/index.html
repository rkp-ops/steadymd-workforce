<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteadyMD Workforce Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg-primary: #f5f7fa;
  --bg-secondary: #ffffff;
  --bg-card: #ffffff;
  --bg-card-hover: #f8fafb;
  --bg-input: #ffffff;
  --border: #e2e6eb;
  --border-light: #cdd3db;
  --text-primary: #173360;
  --text-secondary: #404040;
  --text-muted: #8b95a5;
  --accent-teal: #26AEBC;
  --accent-teal-soft: #e6f6f8;
  --accent-teal-dark: #1d96a3;
  --accent-red: #FF264D;
  --accent-red-soft: #fff0f3;
  --accent-orange: #e8850c;
  --accent-orange-soft: #fef5e7;
  --accent-blue: #173360;
  --accent-blue-soft: #ebeef3;
  --accent-green: #0d9e6d;
  --accent-green-soft: #e6f7f0;
  --font-sans: 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 6px;
  --radius-lg: 10px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; font-size: 13px; overflow-x: hidden; }
#root { min-height: 100vh; overflow-x: hidden; }

/* Header */
.header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 100; }
.header-title { font-size: 18px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
.header-title .logo { color: var(--accent-teal); font-weight: 700; }
.header-controls { display: flex; align-items: center; gap: 12px; }

/* Service Line Pills (inline per-tab filter) */
.sl-pills { display: inline-flex; gap: 2px; }
.sl-pill { padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; font-size: 11px; font-weight: 600; font-family: var(--font-sans); background: transparent; color: var(--text-muted); transition: all 0.15s; line-height: 1.4; }
.sl-pill.active { background: var(--accent-teal); color: #fff; border-color: var(--accent-teal); }
.sl-pill:hover:not(.active) { color: var(--text-primary); background: var(--bg-card-hover); }
.tab-sl-filter { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 11px; color: var(--text-muted); }
.tab-sl-filter label { font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }

/* Lookback Banner */
.lookback-banner { background: var(--accent-teal-soft); border-bottom: 1px solid #c5e8ec; padding: 6px 24px; font-size: 12px; color: var(--accent-teal-dark); display: flex; align-items: center; gap: 8px; }
.lookback-banner strong { font-weight: 600; }

/* Status Badge */
.status-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
.status-ready { background: var(--accent-teal-soft); color: var(--accent-teal-dark); }
.status-running { background: var(--accent-orange-soft); color: var(--accent-orange); }
.status-complete { background: var(--accent-green-soft); color: var(--accent-green); }

/* Tabs */
.tab-bar { display: flex; flex-wrap: nowrap; background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 16px; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: thin; }
.tab-bar::-webkit-scrollbar { height: 3px; }
.tab-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.tab-btn { padding: 6px 10px; border: none; background: none; cursor: pointer; font-size: 11px; font-weight: 500; color: var(--text-muted); font-family: var(--font-sans); border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active { color: var(--accent-teal); border-bottom-color: var(--accent-teal); font-weight: 600; }

/* Content */
.content { padding: 16px 20px; max-width: 100%; margin: 0 auto; box-sizing: border-box; overflow: hidden; }

/* Cards */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); overflow: hidden; }
.card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px; }

/* KPI Cards */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm); }
.kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 4px; }
.kpi-value { font-size: 24px; font-weight: 700; color: var(--text-primary); font-family: var(--font-mono); }
.kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.kpi-card.alert { border-left: 3px solid var(--accent-red); }
.kpi-card.warn { border-left: 3px solid var(--accent-orange); }
.kpi-card.good { border-left: 3px solid var(--accent-green); }

/* Upload Zone */
.upload-zone { border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
.upload-zone:hover, .upload-zone.dragover { border-color: var(--accent-teal); background: var(--accent-teal-soft); }
.upload-zone .icon { font-size: 28px; margin-bottom: 8px; }
.upload-zone p { font-size: 13px; color: var(--text-secondary); }
.upload-zone .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 8px 12px; font-weight: 600; color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); background: var(--bg-primary); position: sticky; top: 0; }
td { padding: 7px 12px; border-bottom: 1px solid var(--border); }
tr:hover td { background: var(--bg-card-hover); }
.row-risk-high td { background: var(--accent-red-soft); }
.row-risk-medium td { background: var(--accent-orange-soft); }

/* Heatmap */
.heatmap-container { overflow-x: auto; }
.heatmap { border-collapse: collapse; font-size: 11px; font-family: var(--font-mono); }
.heatmap th, .heatmap td { padding: 3px 6px; text-align: center; min-width: 32px; border: 1px solid var(--bg-primary); }
.heatmap th { background: var(--bg-primary); font-size: 9px; color: var(--text-muted); font-weight: 600; }
.heatmap .state-label { text-align: left; font-weight: 600; color: var(--text-primary); min-width: 40px; background: var(--bg-primary); position: sticky; left: 0; z-index: 1; }

/* Inputs */
.form-group { margin-bottom: 12px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; display: block; }
.form-input, .form-select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: var(--font-sans); background: var(--bg-input); color: var(--text-primary); }
.form-input:focus, .form-select:focus { outline: none; border-color: var(--accent-teal); box-shadow: 0 0 0 2px var(--accent-teal-soft); }
textarea.form-input { min-height: 120px; font-family: var(--font-mono); font-size: 11px; resize: vertical; }

/* Buttons */
.btn { padding: 8px 18px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; font-size: 13px; font-weight: 600; font-family: var(--font-sans); transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--accent-teal); color: #fff; border-color: var(--accent-teal); }
.btn-primary:hover { background: var(--accent-teal-dark); }
.btn-secondary { background: var(--bg-secondary); color: var(--text-primary); }
.btn-secondary:hover { background: var(--bg-primary); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
@media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* Sidebar Layout */
.layout-with-sidebar { display: grid; grid-template-columns: 240px minmax(0, 1fr); gap: 12px; overflow: hidden; }
.layout-with-sidebar > * { min-width: 0; }
.sidebar { position: sticky; top: 76px; max-height: calc(100vh - 96px); overflow-y: auto; }
@media (max-width: 1100px) { .layout-with-sidebar { grid-template-columns: 1fr; } .sidebar { position: static; max-height: none; } }

/* Gap Alerts */
.gap-alert { background: var(--accent-red-soft); border: 1px solid #fcc; border-radius: var(--radius); padding: 8px 12px; font-size: 12px; color: var(--accent-red); margin-top: 8px; }
.gap-alert .alert-icon { margin-right: 4px; }

/* Filter Chips */
.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.filter-chip { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; border: 1px solid var(--border); background: var(--bg-secondary); cursor: pointer; }
.filter-chip.active { background: var(--accent-teal); color: #fff; border-color: var(--accent-teal); }

/* Chart container */
.chart-container { position: relative; height: 320px; }

/* Collapsible */
.collapsible-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 10px 0; }
.collapsible-header:hover { color: var(--accent-teal); }
.collapse-icon { transition: transform 0.2s; }
.collapse-icon.open { transform: rotate(180deg); }

/* Section divider */
.section-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* Toast */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--text-primary); color: #fff; padding: 12px 20px; border-radius: var(--radius); font-size: 13px; z-index: 1000; box-shadow: var(--shadow-md); animation: slideUp 0.3s; max-width: 480px; line-height: 1.4; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Btn hover improvements */
.btn:active { transform: scale(0.97); }
.btn-secondary:active { background: var(--border); }

/* Upload Preview Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s; }
.modal-content { background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: 0 8px 32px rgba(0,0,0,0.18); width: 90%; max-width: 720px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 15px; font-weight: 700; color: var(--text-primary); margin: 0; }
.modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Help & Formulas Tab */
.help-toggle { display: flex; gap: 0; margin-bottom: 20px; }
.help-toggle-btn { padding: 10px 24px; border: 1px solid var(--border); background: var(--bg-secondary); cursor: pointer; font-size: 13px; font-weight: 600; font-family: var(--font-sans); color: var(--text-muted); transition: all 0.15s; }
.help-toggle-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.help-toggle-btn:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
.help-toggle-btn.active { background: var(--accent-teal); color: #fff; border-color: var(--accent-teal); }
.param-card { border-left: 3px solid var(--accent-teal); background: var(--bg-card); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
.param-card .param-name { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.param-card .param-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
.param-card.warn-card { border-left-color: var(--accent-orange); }
.param-card.danger-card { border-left-color: var(--accent-red); }
.formula-block { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px; }
.formula-block .formula-label { font-size: 13px; font-weight: 700; color: var(--accent-teal-dark); margin-bottom: 6px; }
.formula-block .formula-eq { font-family: var(--font-mono); font-size: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; margin: 6px 0; color: var(--text-primary); }
.formula-block .formula-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
.help-warn { background: var(--accent-orange-soft); border: 1px solid #f0c97a; border-radius: var(--radius); padding: 8px 12px; font-size: 12px; color: var(--accent-orange); margin-top: 8px; display: flex; align-items: flex-start; gap: 6px; }
.help-example { background: var(--accent-teal-soft); border-radius: var(--radius); padding: 8px 12px; font-size: 12px; color: var(--accent-teal-dark); margin-top: 8px; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
.empty-state p { font-size: 14px; }
.empty-state .hint { font-size: 12px; margin-top: 6px; }

/* VPH Threshold Colors */
.vph-red { color: #C0392B; font-weight: bold; }
.vph-yellow { color: #B7950B; font-weight: bold; }
.vph-green { color: #1E8449; font-weight: bold; }
.vph-cell-red { background-color: #FDE8E8; }
.vph-cell-yellow { background-color: #FEF9E7; }
.vph-cell-green { background-color: #E9F7EF; }
.vph-card-red { border-left: 3px solid var(--accent-red) !important; }
.vph-card-yellow { border-left: 3px solid var(--accent-orange) !important; }
.vph-card-green { border-left: 3px solid #1E8449 !important; }
.vph-sub-tabs { display: flex; gap: 0; margin-bottom: 16px; }
.vph-sub-tab { padding: 8px 18px; border: 1px solid var(--border); background: var(--bg-secondary); cursor: pointer; font-size: 12px; font-weight: 600; font-family: var(--font-sans); color: var(--text-muted); transition: all 0.15s; }
.vph-sub-tab:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.vph-sub-tab:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
.vph-sub-tab.active { background: var(--accent-teal); color: #fff; border-color: var(--accent-teal); }
.vph-pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
.vph-pill.red { background: #FDE8E8; color: #C0392B; }
.vph-pill.yellow { background: #FEF9E7; color: #B7950B; }
.vph-pill.green { background: #E9F7EF; color: #1E8449; }

/* Staffing Heatmap (Module 1) */
.staffing-green { background: var(--accent-green-soft); color: var(--accent-green); font-weight: 600; text-align: center; }
.staffing-yellow { background: var(--accent-orange-soft); color: var(--accent-orange); font-weight: 600; text-align: center; }
.staffing-red { background: var(--accent-red-soft); color: var(--accent-red); font-weight: 700; text-align: center; }
/* SLA Traffic Light (Module 2) */
.sla-green { color: var(--accent-green); font-weight: 700; }
.sla-yellow { color: var(--accent-orange); font-weight: 700; }
.sla-red { color: var(--accent-red); font-weight: 700; }
.sla-card-green { border-left: 4px solid var(--accent-green) !important; }
.sla-card-yellow { border-left: 4px solid var(--accent-orange) !important; }
.sla-card-red { border-left: 4px solid var(--accent-red) !important; }
/* Risk Badges (Module 4) */
.risk-critical { background: #fde8e8; color: #c0392b; font-weight: 700; padding: 2px 8px; border-radius: 10px; font-size: 10px; display: inline-block; }
.risk-high { background: #fef3cd; color: #856404; font-weight: 700; padding: 2px 8px; border-radius: 10px; font-size: 10px; display: inline-block; }
.risk-moderate { background: var(--accent-orange-soft); color: var(--accent-orange); padding: 2px 8px; border-radius: 10px; font-size: 10px; display: inline-block; }
.risk-low { background: var(--accent-green-soft); color: var(--accent-green); padding: 2px 8px; border-radius: 10px; font-size: 10px; display: inline-block; }
/* Causal Chain (Module 6) */
.causal-chain { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 16px 0; }
.causal-node { border: 2px solid var(--border); border-radius: var(--radius); padding: 10px 14px; min-width: 130px; text-align: center; font-size: 12px; }
.causal-node.flagged { border-color: var(--accent-red); background: var(--accent-red-soft); }
.causal-node.clear { border-color: var(--accent-green); background: var(--accent-green-soft); }
.causal-arrow { color: var(--text-muted); font-size: 16px; }
/* Violation & Call-out Badges (Module 5) */
.violation-badge { background: var(--accent-red-soft); color: var(--accent-red); font-weight: 700; padding: 2px 8px; border-radius: 10px; font-size: 10px; display: inline-block; }
.callout-caution { background: var(--accent-orange-soft); color: var(--accent-orange); font-weight: 600; padding: 2px 8px; border-radius: 10px; font-size: 10px; display: inline-block; }
.callout-action { background: #fef3cd; color: #856404; font-weight: 700; padding: 2px 8px; border-radius: 10px; font-size: 10px; display: inline-block; }
.callout-escalation { background: var(--accent-red-soft); color: var(--accent-red); font-weight: 700; padding: 2px 8px; border-radius: 10px; font-size: 10px; display: inline-block; }
.gap-alert { background: var(--accent-red-soft); border: 1px solid var(--accent-red); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 12px; font-size: 12px; color: var(--accent-red); }
.gap-alert.warn { background: var(--accent-orange-soft); border-color: var(--accent-orange); color: #856404; }

/* Findings Strip — compact alert summary */
.findings-strip { border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; margin-bottom: 12px; }
.findings-strip summary { display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: pointer; list-style: none; user-select: none; }
.findings-strip summary::-webkit-details-marker { display: none; }
.findings-strip summary::before { content: '▸'; font-size: 10px; color: var(--text-muted); transition: transform 0.15s; }
.findings-strip[open] summary::before { transform: rotate(90deg); }
.findings-strip .fs-label { color: var(--text-muted); font-weight: 500; }
.findings-strip .fs-pills { display: flex; gap: 6px; align-items: center; }
.findings-pill { padding: 1px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; line-height: 18px; display: inline-flex; align-items: center; gap: 3px; }
.findings-pill.crit { background: var(--accent-red-soft); color: var(--accent-red); }
.findings-pill.high { background: #fef3cd; color: #856404; }
.findings-pill.med { background: var(--accent-orange-soft); color: var(--accent-orange); }
.findings-pill.info { background: var(--accent-teal-soft); color: var(--accent-teal); }
.findings-list { padding: 0 12px 8px 12px; }
.findings-list .finding-row { display: flex; align-items: baseline; gap: 8px; padding: 3px 0; font-size: 11px; color: var(--text-primary); border-top: 1px solid var(--border-light, #f0f0f0); }
.findings-list .finding-row:first-child { border-top: none; }
.findings-list .finding-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.findings-list .finding-dot.crit { background: var(--accent-red); }
.findings-list .finding-dot.high { background: #d4a017; }
.findings-list .finding-dot.med { background: var(--accent-orange); }
.findings-list button:hover { background: var(--accent-teal-soft) !important; border-color: var(--accent-teal) !important; }

/* Multi-select dropdown */
.ms-wrap { position: relative; min-width: 160px; }
.ms-trigger { display: flex; align-items: center; justify-content: space-between; gap: 6px; width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; font-family: var(--font-sans); background: var(--bg-input); color: var(--text-primary); cursor: pointer; min-height: 32px; text-align: left; }
.ms-trigger:focus, .ms-trigger.open { border-color: var(--accent-teal); box-shadow: 0 0 0 2px var(--accent-teal-soft); outline: none; }
.ms-trigger .ms-arrow { font-size: 8px; color: var(--text-muted); flex-shrink: 0; }

<script type="text/babel">
// ========================== SUPABASE CLIENT ==========================
const SUPABASE_URL = 'https://eeszygextbqglayglvfm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_txIrKbYtv9kjSKXjQVJFbw_hzUsLNEK';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ========================== UPLOAD PERSISTENCE (Supabase) ==========================
// ====== DATA PERSISTENCE via Supabase Storage (not DB jsonb — avoids bloat) ======
// Saves upload data as JSON files in Supabase Storage bucket 'uploads'
// Metadata (filename, row_count, detected_sl) still goes in upload_data table but WITHOUT the data column

async function saveUploadData(type, data, filename, detectedSL) {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.user?.id) { console.warn('[saveUploadData] No session'); return; }
    const uid = session.user.id;
    const payload = JSON.stringify(data);
    const sizeMB = (payload.length / 1048576).toFixed(2);
    const rowCount = Array.isArray(data) ? data.length : 0;
    console.log(`[saveUploadData] ${type}: ${rowCount} rows, ${sizeMB}MB`);

    // Save data as file in Storage bucket
    const storagePath = `${uid}/${type}.json`;
    const blob = new Blob([payload], { type: 'application/json' });
    const { error: storageError } = await supabase.storage.from('uploads').upload(storagePath, blob, { upsert: true });
    if (storageError) { console.error(`[saveUploadData] Storage FAILED for ${type}:`, storageError.message); return; }

    // Save lightweight metadata in DB (NO data column)
    const { error: dbError } = await supabase.from('upload_data').upsert({
      user_id: uid, upload_type: type,
      filename: filename || null, data: '[]', // empty placeholder — real data in Storage
      row_count: rowCount, detected_sl: detectedSL || null,
    }, { onConflict: 'user_id,upload_type' });
    if (dbError) console.warn(`[saveUploadData] DB metadata error (non-critical):`, dbError.message);
    console.log(`[saveUploadData] ${type} saved OK (${sizeMB}MB to Storage)`);
  } catch (e) { console.error('[saveUploadData] Exception:', type, e); }
}

// Load all persisted uploads for current user — reads from Storage bucket
async function loadAllUploadData() {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.user?.id) { console.warn('[loadAllUploadData] No session'); return null; }
    const uid = session.user.id;
    console.log('[loadAllUploadData] Loading for user:', uid);

    // List files in user's storage folder
    const { data: files, error: listErr } = await supabase.storage.from('uploads').list(uid);
    if (listErr) { console.error('[loadAllUploadData] Storage list error:', listErr.message); return null; }
    if (!files || files.length === 0) {
      console.log('[loadAllUploadData] No files in storage — checking DB fallback...');
      // Fallback: try loading from DB (legacy data before migration)
      return await loadAllUploadDataFromDB();
    }

    console.log('[loadAllUploadData] Found files:', files.map(f => f.name).join(', '));

    // Also load metadata from DB for filenames/detected_sl
    let metaMap = {};
    try {
      const { data: metaRows } = await supabase.from('upload_data')
        .select('upload_type, filename, row_count, detected_sl')
        .eq('user_id', uid);
      (metaRows || []).forEach(r => { metaMap[r.upload_type] = r; });
    } catch (e) { console.warn('[loadAllUploadData] Metadata query failed (non-critical):', e.message); }

    const result = {};
    for (const file of files) {
      const type = file.name.replace('.json', '');
      try {
        const { data: fileData, error: dlErr } = await supabase.storage.from('uploads').download(`${uid}/${file.name}`);
        if (dlErr) { console.error(`[loadAllUploadData] Download failed for ${type}:`, dlErr.message); continue; }
        const text = await fileData.text();
        const parsed = JSON.parse(text);
        const meta = metaMap[type] || {};
        result[type] = { data: parsed, filename: meta.filename || file.name, rowCount: meta.row_count || parsed.length, detectedSL: meta.detected_sl };
        console.log(`[loadAllUploadData] ${type}: ${Array.isArray(parsed) ? parsed.length : '?'} rows loaded from Storage`);
      } catch (e) { console.error(`[loadAllUploadData] PARSE FAILED for ${type}:`, e); }
    }
    return result;
  } catch (e) { console.error('[loadAllUploadData] Exception:', e); return null; }
}

// Legacy DB fallback for data saved before Storage migration
async function loadAllUploadDataFromDB() {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.user?.id) return null;
    const { data, error } = await supabase.from('upload_data')
      .select('upload_type, data, filename, row_count, detected_sl')
      .eq('user_id', session.user.id);
    if (error) { console.warn('[loadAllUploadDataFromDB] Query error:', error.message); return null; }
    const result = {};
    (data || []).forEach(row => {
      try {
        const parsed = typeof row.data === 'string' ? JSON.parse(row.data) : row.data;
        if (Array.isArray(parsed) && parsed.length > 0) {
          result[row.upload_type] = { data: parsed, filename: row.filename, rowCount: row.row_count, detectedSL: row.detected_sl };
        }
      } catch (e) { /* skip corrupt rows */ }
    });
    return Object.keys(result).length > 0 ? result : null;
  } catch (e) { console.warn('[loadAllUploadDataFromDB]', e); return null; }
}

// Clear persisted uploads (specific type or all)
async function clearUploadData(type) {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.user?.id) return;
    const uid = session.user.id;
    // Clear from Storage
    if (type) {
      await supabase.storage.from('uploads').remove([`${uid}/${type}.json`]);
    } else {
      const { data: files } = await supabase.storage.from('uploads').list(uid);
      if (files?.length > 0) await supabase.storage.from('uploads').remove(files.map(f => `${uid}/${f.name}`));
    }
    // Clear DB metadata
    let q = supabase.from('upload_data').delete().eq('user_id', uid);
    if (type) q = q.eq('upload_type', type);
    await q;
  } catch (e) { console.warn('[clearUploadData]', e); }
}

// ========================== WEEKLY PERF SNAPSHOTS (Supabase) ==========================
// Save a single section for a given week — upserts by (user_id, week_ending, section)

    await supabase.from('weekly_perf_snapshots').upsert({

      week_ending: weekEnding,

      data,
      source_file: sourceFile || null,
    }, { onConflict: 'user_id,week_ending,section' });

// Load all weekly perf data for current user → { "2026-03-08": { sync: {...}, dow: [...], ... }, ... }
async function loadWeeklyPerfData() {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.user?.id) return {};
    const { data, error } = await supabase.from('weekly_perf_snapshots')
      .select('week_ending, section, data, source_file')
      .eq('user_id', session.user.id)
      .order('week_ending', { ascending: false });
    if (error) throw error;
    const result = {};
    (data || []).forEach(row => {
      const wk = row.week_ending;
      if (!result[wk]) result[wk] = {};
      result[wk][row.section] = row.data;
    });
    return result;
  } catch (e) { console.warn('[loadWeeklyPerfData]', e); return {}; }
}

async function clearWeeklyPerfData(weekEnding) {
  try {

// ========================== WPR FILE IDENTIFICATION ==========================
// Identifies which parser a CSV maps to based on its column headers
function identifyWprFile(headers, rowCount) {
  const h = new Set(headers.map(c => c.toLowerCase().trim()));
  const hasAll = (...cols) => cols.every(c => [...h].some(hdr => hdr.includes(c.toLowerCase())));
  const hasAny = (...cols) => cols.some(c => [...h].some(hdr => hdr.includes(c.toLowerCase())));

  // Dashboard 1: Hourly On-Demand Response Time
  if (hasAll('hour', '# of consults', '% sli met') && !hasAny('dow', 'day of week')) return 'hourly_summary';
  if (hasAll('dow', '# of consults', '% sli met')) return 'dow_performance';
  if (hasAll('hour') && rowCount >= 24 && headers.length > 10) {
    if (hasAny('monday', 'tuesday', 'sunday', 'dow')) return 'hourly_by_dow';
    return 'hourly_by_day';
  }

  // Dashboard 2: WFM Performance
  if (hasAll('partner name', 'offered visits', 'avg wait')) return 'sync_visits';
  if (hasAll('partner name', 'offered visits') && !hasAny('avg wait', 'average wait')) return 'async_visits';
  if (hasAll('week', 'visits') && hasAny('service level', 'sl', 'sla')) {
    if (hasAny('episode')) return 'async_trend';
    return 'sync_trend';
  }
  if (hasAll('full name', 'suffix', 'offered visits')) return 'clinician_breakdown';
  if (hasAll('date') && hasAny('completed', 'referred out', 'rejected')) return 'completions';
  if (hasAll('reason', 'count') && hasAny('%', 'percent')) return 'reject_reasons';
  if (hasAll('state') && hasAll('offered visits', 'avg wait')) return 'state_sync';
  if (hasAll('state') && hasAll('offered visits') && !hasAny('avg wait')) return 'state_async';
  if (hasAll('date') && headers.length > 5 && hasAny('amazon', 'lifemd', 'noom')) return 'aging_async';

  // Raw transactional files
  if (hasAll('sla status', 'sla duration') && rowCount > 5000) return 'raw_sla_events';
  if (hasAll('sli status', 'effective response time')) return 'raw_response_time';
  if (hasAll('amount', 'clinician full name') || (hasAll('amount') && hasAny('license type', 'launched time'))) return 'raw_incentives';

  // Hourly arrival (Dashboard 2 tile)
  if (hasAll('hour', '# visits', 'service level') && !hasAny('consults')) return 'hourly_arrival';

  return null; // Unknown format
}

// ========================== WPR CORE PARSERS ==========================
// Helper: parse numeric values from various formats
function wprNum(val) {
  if (val == null) return 0;
  const s = String(val).replace(/[%$,\s]/g, '');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

// Helper: parse duration in seconds
function wprDurationSec(val) {
  if (val == null) return 0;
  const s = String(val);
  // "0 h 4 m" format
  const hm = s.match(/(\d+)\s*h\s*(\d+)\s*m/);
  if (hm) return parseInt(hm[1]) * 3600 + parseInt(hm[2]) * 60;
  // "HH:MM:SS" format
  const hms = s.match(/(\d+):(\d+):(\d+)/);
  if (hms) return parseInt(hms[1]) * 3600 + parseInt(hms[2]) * 60 + parseInt(hms[3]);
  // Numeric seconds
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

// Helper: get the Sunday ending a given date's week
function getWeekEnding(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return null;
  const day = ctDow(d);
  const diff = day === 0 ? 0 : 7 - day;
  d.setDate(d.getDate() + diff);
  return ctDateStr(d);
}

// Helper: resolve column from row using flexible matching
function wprCol(row, ...names) {
  const keys = Object.keys(row);
  for (const n of names) { if (n in row) return n; }
  const norm = s => s.toLowerCase().replace(/[_\s]+/g, '');
  for (const n of names) {
    const found = keys.find(k => norm(k) === norm(n));
    if (found) return found;
  }
  for (const n of names) {
    const found = keys.find(k => norm(k).includes(norm(n)));
    if (found) return found;
  }
  return names[0];
}

// 1. Sync Visits Offered
function parseSyncVisitsOffered(rows) {
  if (!rows?.length) return null;
  const partners = rows.map(r => ({
    name: r[wprCol(r, 'Partner Name', 'partner_name', 'Partner')] || '',
    offered: wprNum(r[wprCol(r, 'Offered Visits', 'offered_visits')]),
    slaPct: wprNum(r[wprCol(r, 'Service Level', 'SL', 'SLA %')]),
    avgWait: r[wprCol(r, 'Avg Wait', 'Average Wait Time', 'avg_wait')] || '',
    medianWait: r[wprCol(r, 'Median Wait', 'Median Wait Time', 'median_wait')] || '',
  })).filter(p => p.name);
  const totalOffered = partners.reduce((s, p) => s + p.offered, 0);
  const weightedSLA = totalOffered > 0 ? partners.reduce((s, p) => s + p.slaPct * p.offered, 0) / totalOffered : 0;
  return { partners, totals: { offered: totalOffered, slaPct: Math.round(weightedSLA * 10) / 10 } };
}

// 2. Async Visits Offered
function parseAsyncVisitsOffered(rows) {
  if (!rows?.length) return null;
  const partners = rows.map(r => ({
    name: r[wprCol(r, 'Partner Name', 'partner_name', 'Partner')] || '',
    offered: wprNum(r[wprCol(r, 'Offered Visits', 'offered_visits')]),
    slaPct: wprNum(r[wprCol(r, 'Service Level', 'SL', 'SLA %')]),
  })).filter(p => p.name);
  const totalOffered = partners.reduce((s, p) => s + p.offered, 0);
  const weightedSLA = totalOffered > 0 ? partners.reduce((s, p) => s + p.slaPct * p.offered, 0) / totalOffered : 0;
  return { partners, totals: { offered: totalOffered, slaPct: Math.round(weightedSLA * 10) / 10 } };
}

// 5. Day-of-Week Performance
function parseDowPerformance(rows) {

  });

    byDay: Object.entries(byDay).map(([date, v]) => ({ date, ...v })).sort((a, b) => a.date.localeCompare(b.date)),
    byClinician: Object.entries(byClinician).map(([name, v]) => ({ name, ...v })).sort((a, b) => b.spend - a.spend),

// 13. Large file chunked aggregator for raw SLA events (73MB)
async function parseRawSlaEventsChunked(text, onProgress) {
  const lines = text.split('\n');
  const headers = parseCSVLine(lines[0]).map(h => h.trim());
  const total = lines.length - 1;
  const BATCH = 10000;

  // Aggregation buckets
  const byPartner = {}, byState = {}, byHour = {}, byDay = {}, byDow = {};
  let totalMet = 0, totalMissed = 0, totalCount = 0;

  for (let i = 1; i < lines.length; i += BATCH) {
    const end = Math.min(i + BATCH, lines.length);
    for (let j = i; j < end; j++) {
      if (!lines[j].trim()) continue;
      const vals = parseCSVLine(lines[j]);
      const row = {};
      headers.forEach((h, idx) => { row[h] = (vals[idx] || '').trim(); });

      const partner = row[wprCol(row, 'Partner Name', 'partner_name')] || 'Unknown';
      const state = row[wprCol(row, 'Us State', 'State', 'state')] || 'Unknown';
      const status = (row[wprCol(row, 'Sla Status', 'SLA Status', 'sla_status')] || '').toUpperCase();
      const startAt = row[wprCol(row, 'Effective Start At', 'effective_start_at', 'SLA Event Start')] || '';
      const durSec = wprNum(row[wprCol(row, 'SLA Duration', 'sla_duration')]);

      const met = status.includes('MET') && !status.includes('MISS');
      if (met) totalMet++; else totalMissed++;
      totalCount++;

      // Parse date/hour
      let hour = -1, day = '', dow = '';
      if (startAt) {
        const dt = new Date(startAt);
        if (!isNaN(dt.getTime())) {
          hour = ctHour(dt);
          day = ctDateStr(dt);
          dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][ctDow(dt)];
        }
      }

      // Accumulate
      if (!byPartner[partner]) byPartner[partner] = { met: 0, missed: 0, total: 0, durSum: 0 };
      byPartner[partner].total++; byPartner[partner].durSum += durSec;
      if (met) byPartner[partner].met++; else byPartner[partner].missed++;

      if (state !== 'Unknown') {
        if (!byState[state]) byState[state] = { met: 0, missed: 0, total: 0 };
        byState[state].total++;
        if (met) byState[state].met++; else byState[state].missed++;
      }

      if (hour >= 0) {
        if (!byHour[hour]) byHour[hour] = { met: 0, missed: 0, total: 0 };
        byHour[hour].total++;
        if (met) byHour[hour].met++; else byHour[hour].missed++;
      }

      if (day) {
        if (!byDay[day]) byDay[day] = { met: 0, missed: 0, total: 0 };
        byDay[day].total++;
        if (met) byDay[day].met++; else byDay[day].missed++;
      }

      if (dow) {
        if (!byDow[dow]) byDow[dow] = { met: 0, missed: 0, total: 0 };
        byDow[dow].total++;
        if (met) byDow[dow].met++; else byDow[dow].missed++;
      }
    }
    if (onProgress) onProgress(Math.min(end, total), total);
    // Yield to event loop
    await new Promise(r => setTimeout(r, 0));
  }

  return {
    summary: { totalCount, totalMet, totalMissed, slaPct: totalCount > 0 ? Math.round(totalMet / totalCount * 1000) / 10 : 0 },
    byPartner: Object.entries(byPartner).map(([name, v]) => ({
      name, ...v, slaPct: v.total > 0 ? Math.round(v.met / v.total * 1000) / 10 : 0,
      avgDurMin: v.total > 0 ? Math.round(v.durSum / v.total / 60 * 10) / 10 : 0
    })).sort((a, b) => b.total - a.total),
    byState: Object.entries(byState).map(([state, v]) => ({
      state, ...v, slaPct: v.total > 0 ? Math.round(v.met / v.total * 1000) / 10 : 0
    })).sort((a, b) => b.total - a.total),
    byHour: Array.from({ length: 24 }, (_, h) => {
      const v = byHour[h] || { met: 0, missed: 0, total: 0 };
      return { hour: h, ...v, slaPct: v.total > 0 ? Math.round(v.met / v.total * 1000) / 10 : 0 };
    }),
    byDay: Object.entries(byDay).map(([date, v]) => ({
      date, ...v, slaPct: v.total > 0 ? Math.round(v.met / v.total * 1000) / 10 : 0
    })).sort((a, b) => a.date.localeCompare(b.date)),
    byDow: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d => {
      const v = byDow[d] || { met: 0, missed: 0, total: 0 };
      return { day: d, ...v, slaPct: v.total > 0 ? Math.round(v.met / v.total * 1000) / 10 : 0 };
    }),
  };
}

// 14. Raw Response Time Details aggregator
function parseRawResponseTime(rows) {
  if (!rows?.length) return null;
  const byPartner = {}, byHour = {}, byState = {};
  let totalMet = 0, totalMissed = 0, totalCount = 0, totalRTMinutes = 0;

  rows.forEach(r => {
    const partner = r[wprCol(r, 'Partner Name', 'Partner', 'partner_name')] || 'Unknown';
    const state = r[wprCol(r, 'State', 'Us State', 'state')] || 'Unknown';
    const status = (r[wprCol(r, 'SLI Status', 'sli_status')] || '').toLowerCase();
    const rtStr = r[wprCol(r, 'Effective Response Time', 'effective_response_time')] || '';
    const startStr = r[wprCol(r, 'SLI Effective Start', 'Effective Start', 'effective_start')] || '';

    const met = status.includes('met') && !status.includes('miss');
    if (met) totalMet++; else totalMissed++;
    totalCount++;

    const rtMin = parseResponseTime(rtStr);
    if (rtMin !== null) totalRTMinutes += rtMin;

    let hour = -1;
    if (startStr) { const dt = new Date(startStr); if (!isNaN(dt.getTime())) hour = ctHour(dt); }

    if (!byPartner[partner]) byPartner[partner] = { met: 0, missed: 0, total: 0, rtSum: 0, rtCount: 0 };
    byPartner[partner].total++;
    if (met) byPartner[partner].met++; else byPartner[partner].missed++;
    if (rtMin !== null) { byPartner[partner].rtSum += rtMin; byPartner[partner].rtCount++; }

    if (state !== 'Unknown') {
      if (!byState[state]) byState[state] = { met: 0, missed: 0, total: 0 };
      byState[state].total++;
      if (met) byState[state].met++; else byState[state].missed++;
    }

    if (hour >= 0) {
      if (!byHour[hour]) byHour[hour] = { met: 0, missed: 0, total: 0, rtSum: 0, rtCount: 0 };
      byHour[hour].total++;
      if (met) byHour[hour].met++; else byHour[hour].missed++;
      if (rtMin !== null) { byHour[hour].rtSum += rtMin; byHour[hour].rtCount++; }
    }
  });

  return {
    summary: { totalCount, totalMet, totalMissed, slaPct: totalCount > 0 ? Math.round(totalMet / totalCount * 1000) / 10 : 0, avgRTMin: totalCount > 0 ? Math.round(totalRTMinutes / totalCount * 10) / 10 : 0 },
    byPartner: Object.entries(byPartner).map(([name, v]) => ({
      name, ...v, slaPct: v.total > 0 ? Math.round(v.met / v.total * 1000) / 10 : 0,
      avgRTMin: v.rtCount > 0 ? Math.round(v.rtSum / v.rtCount * 10) / 10 : 0
    })).sort((a, b) => b.total - a.total),
    byHour: Array.from({ length: 24 }, (_, h) => {
      const v = byHour[h] || { met: 0, missed: 0, total: 0, rtSum: 0, rtCount: 0 };
      return { hour: h, ...v, slaPct: v.total > 0 ? Math.round(v.met / v.total * 1000) / 10 : 0, avgRTMin: v.rtCount > 0 ? Math.round(v.rtSum / v.rtCount * 10) / 10 : 0 };
    }),
    byState: Object.entries(byState).map(([state, v]) => ({
      state, ...v, slaPct: v.total > 0 ? Math.round(v.met / v.total * 1000) / 10 : 0
    })).sort((a, b) => b.total - a.total),
  };
}

// ========================== WPR DISPATCH: Process identified file ==========================
async function processWprFile(fileType, text, rows, onProgress) {
  switch (fileType) {
    case 'sync_visits': return { section: 'sync', data: parseSyncVisitsOffered(rows) };
    case 'async_visits': return { section: 'async', data: parseAsyncVisitsOffered(rows) };
    case 'sync_trend': return { section: 'syncTrend', data: parseSyncTrend(rows) };
    case 'async_trend': return { section: 'asyncTrend', data: parseAsyncTrend(rows) };
    case 'dow_performance': return { section: 'dow', data: parseDowPerformance(rows) };
    case 'hourly_summary': return { section: 'hod', data: parseHourlyPerfSummary(rows) };
    case 'hourly_arrival': return { section: 'hodArrival', data: parseHourlyArrival(rows) };
    case 'clinician_breakdown': return { section: 'clinicians', data: parseClinBreakdown(rows) };
    case 'completions': return { section: 'completions', data: parseCompletions(rows) };
    case 'reject_reasons': return { section: 'rejectReasons', data: parseRejectReasons(rows) };
    case 'state_sync': return { section: 'stateSync', data: parseStateSyncVisits(rows) };
    case 'state_async': return { section: 'stateAsync', data: parseStateAsyncVisits(rows) };
    case 'raw_sla_events': {
      const data = await parseRawSlaEventsChunked(text, onProgress);
      // Raw SLA produces multiple sections
      return [
        { section: 'rawSla', data: data.summary },
        { section: 'rawSlaByPartner', data: data.byPartner },
        { section: 'rawSlaByHour', data: data.byHour },
        { section: 'rawSlaByDay', data: data.byDay },
        { section: 'rawSlaByDow', data: data.byDow },
        { section: 'rawSlaByState', data: data.byState },
      ];
    }
    case 'raw_response_time': return { section: 'rawRT', data: parseRawResponseTime(rows) };
    case 'raw_incentives': return { section: 'incentives', data: parseWprIncentivesDetail(rows) };
    default: return null;
  }
}

// ========================== WOW COMPARISON UTILITY ==========================
function getWowDelta(current, prev) {
  if (current == null || prev == null) return null;
  const delta = current - prev;
  const pctChange = prev !== 0 ? (delta / Math.abs(prev)) * 100 : (current !== 0 ? 100 : 0);
  return { delta, pctChange: Math.round(pctChange * 10) / 10 };
}

function formatWow(current, prev, type) {
  const w = getWowDelta(current, prev);
  if (!w) return { text: '—', className: 'wow-neutral', arrow: '' };
  const abs = Math.abs(w.delta);
  const pct = Math.abs(w.pctChange);
  let arrow, className;

  if (type === 'sla' || type === 'positive') {
    // Higher is better
    arrow = w.delta > 0 ? '▲' : w.delta < 0 ? '▼' : '—';
    className = w.delta > 0 ? 'wow-up' : w.delta < 0 ? 'wow-down' : 'wow-neutral';
  } else if (type === 'wait' || type === 'negative') {
    // Lower is better
    arrow = w.delta > 0 ? '▲' : w.delta < 0 ? '▼' : '—';
    className = w.delta < 0 ? 'wow-up' : w.delta > 0 ? 'wow-down' : 'wow-neutral';
  } else {
    // Neutral (volume) — just show direction
    arrow = w.delta > 0 ? '▲' : w.delta < 0 ? '▼' : '—';
    className = 'wow-neutral';
  }

  const deltaStr = type === 'sla' ? `${w.delta > 0 ? '+' : ''}${w.delta.toFixed(1)}pp` :
    type === 'pct' ? `${w.delta > 0 ? '+' : ''}${w.pctChange.toFixed(1)}%` :
    `${w.delta > 0 ? '+' : ''}${Math.round(w.delta)}`;

  return { text: `${arrow} ${deltaStr}`, className, arrow, delta: w.delta, pctChange: w.pctChange };
}

// ========================== AUTH WRAPPER ==========================
function AuthWrapper() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    // Check existing session
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        setUser(session.user);
        loadProfile(session.user.id);
      }
      setLoading(false);
    });

    // Listen for auth changes
    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
      if (session?.user) {
        setUser(session.user);
        loadProfile(session.user.id);
      } else {
        setUser(null);
        setProfile(null);
      }
    });

    return () => subscription.unsubscribe();
  }, []);

  const loadProfile = async (userId) => {
    const { data } = await supabase.from('profiles').select('*').eq('id', userId).single();
    if (data) setProfile(data);

  let cred = '';

  // Step 1: Extract credential after comma: "Smith, NP" or "John Smith, NP-C"
  const commaMatch = n.match(CRED_REGEX_AFTER_COMMA);
  if (commaMatch) {
    cred = commaMatch[1].toUpperCase().replace(/[^A-Z]/g, '');
    n = n.replace(CRED_REGEX_AFTER_COMMA, '').trim();
  }

  // Step 2: If no credential found, check for trailing credential after space: "John Smith NP-C"
  if (!cred) {
    const spaceMatch = n.match(CRED_REGEX_SPACE_END);
    if (spaceMatch) {
      cred = spaceMatch[1].toUpperCase().replace(/[^A-Z]/g, '');
      n = n.replace(CRED_REGEX_SPACE_END, '').trim();
    }
  }

  // Step 3: Handle "Dr." prefix → MD (most common)
  if (!cred && CRED_REGEX_PREFIX.test(n)) {
    cred = 'MD';
    n = n.replace(CRED_REGEX_PREFIX, '').trim();
  }

  // Step 4: Handle "Last, First" format
  if (n.includes(',')) {
    const parts = n.split(',').map(s => s.trim());
    if (parts.length === 2 && parts[0] && parts[1]) {
      n = parts[1] + ' ' + parts[0];
    }
  }

  // Step 5: Clean to just alpha + spaces + hyphens, title-case
  const cleaned = n.replace(/[^a-zA-Z\s-]/g, '').replace(/\s+/g, ' ').trim();
  const titleCase = cleaned.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');

  // Build normalized version for matching
  const normalized = cleaned.toLowerCase();

  return { cleanName: titleCase, credential: cred, normalized };
}

function normalizeName(name) {
  if (!name) return '';
  return parseNameCredential(name).normalized;
}

function mapEntityToSL(entityName) {
  if (!entityName) return 'CSL';
  const lower = entityName.toLowerCase();
  for (const [key, sl] of Object.entries(ENTITY_SL_MAP)) {
    if (lower.includes(key)) return sl;
  }
  return 'CSL';
}

function mapPartnerToSL(partnerName) {
  if (!partnerName) return 'CSL';
  const lower = partnerName.toLowerCase();
  for (const [key, sl] of Object.entries(PARTNER_SL_MAP)) {
    if (lower.includes(key)) return sl;
  }
  return 'CSL';
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(current); current = ''; }
    else { current += ch; }
  }
  result.push(current);
  return result;
}

// ====== CENTRAL TIME UTILITIES ======
// ALL times in this app are Central Time (America/Chicago), regardless of browser locale.
const CT_TZ = 'America/Chicago';

// Get CT components from a Date object
function ctParts(d) {
  // Intl.DateTimeFormat gives us the date/time parts in CT
  const parts = {};
  new Intl.DateTimeFormat('en-US', {
    timeZone: CT_TZ, year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  }).formatToParts(d).forEach(p => { parts[p.type] = p.value; });
  return {
    year: parseInt(parts.year), month: parseInt(parts.month) - 1, day: parseInt(parts.day),
    hour: parseInt(parts.hour === '24' ? '0' : parts.hour), minute: parseInt(parts.minute), second: parseInt(parts.second),
    dow: new Intl.DateTimeFormat('en-US', { timeZone: CT_TZ, weekday: 'short' }).format(d),
    dowIndex: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(
      new Intl.DateTimeFormat('en-US', { timeZone: CT_TZ, weekday: 'short' }).format(d)
    ),
  };
}

// Get CT hour (0-23) from a Date
function ctHour(d) { return ctParts(d).hour; }

// Get CT day-of-week index (0=Sun) from a Date
function ctDow(d) { return ctParts(d).dowIndex; }

// Get CT date string YYYY-MM-DD from a Date
function ctDateStr(d) {
  const p = ctParts(d);
  return `${p.year}-${String(p.month + 1).padStart(2, '0')}-${String(p.day).padStart(2, '0')}`;
}

// Get CT hour key YYYY-MM-DDTHH from a Date
function ctHourKey(d) {
  const p = ctParts(d);
  return `${p.year}-${String(p.month + 1).padStart(2, '0')}-${String(p.day).padStart(2, '0')}T${String(p.hour).padStart(2, '0')}`;
}

// Format a Date in CT for display
function ctFmtDate(d, opts) {
  return d.toLocaleDateString('en-US', { timeZone: CT_TZ, ...opts });
}
function ctFmtTime(d, opts) {
  return d.toLocaleTimeString('en-US', { timeZone: CT_TZ, hour: 'numeric', minute: '2-digit', ...opts });
}
function ctFmtDateTime(d) {
  return d.toLocaleString('en-US', { timeZone: CT_TZ, month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

function parseResponseTime(str) {
  if (!str) return null;
  const m = str.match(/(\d+)\s*h\s*(\d+)\s*m/);
  if (m) return parseInt(m[1]) * 60 + parseInt(m[2]);
  const sec = parseFloat(str);
  if (!isNaN(sec)) return sec / 60;
  return null;
}

function formatDate(d) {
  if (!d) return '';
  return d.toLocaleDateString('en-US', { timeZone: CT_TZ, month: 'short', day: 'numeric', year: 'numeric' });
}

function sigmoid(x) { return 1.0 / (1.0 + Math.exp(-x)); }

function heatColor(val, max) {
  if (val === 0) return '#fee2e2';
  if (val === 1) return '#fef3c7';
  if (val === 2) return '#d1fae5';
  return '#a7f3d0';
}

function pct(n, d) { return d > 0 ? ((n / d) * 100).toFixed(1) + '%' : '0%'; }

// Flexible column resolver — tries exact match, then case/whitespace/underscore-insensitive
function resolveCol(row, ...candidates) {
  if (!row) return null;
  const keys = Object.keys(row);
  for (const c of candidates) { if (c in row) return c; }
  const norm = s => s.toLowerCase().replace(/[_\s]+/g, '');
  for (const c of candidates) {
    const found = keys.find(k => norm(k) === norm(c));
    if (found) return found;
  }
  // Partial match fallback
  for (const c of candidates) {
    const found = keys.find(k => norm(k).includes(norm(c)) || norm(c).includes(norm(k)));
    if (found) return found;
  }
  return null;
}
function getVal(row, ...candidates) {
  const col = resolveCol(row, ...candidates);
  return col ? (row[col] || '') : '';
}

// Auto-detect which service line a dataset belongs to from its content
function classifyModality(modalityStr) {
  if (!modalityStr) return 'Other';
  const lower = modalityStr.toLowerCase().trim();
  if (!lower) return 'Other';
  if (lower.includes('async')) return 'Async';
  if (lower.includes('scheduled')) return 'Scheduled';
  if (lower.includes('sync') || lower.includes('video') || lower.includes('phone')) return 'Sync';
  return 'Other';
}

// Detect if an incentive CSV is the manual/audit format vs Looker export
function isManualIncentiveFormat(data) {
  if (!data || data.length === 0) return false;
  const keys = Object.keys(data[0] || {}).map(k => k.toLowerCase().trim());
  // Manual format has "submitted for payment by:" and "select the reason" columns
  const hasSubmittedBy = keys.some(k => k.includes('submitted for payment by'));
  const hasReason = keys.some(k => k.includes('select the reason') || k.includes('reason for launching'));
  const hasTimestamp = keys.some(k => k === 'timestamp');
  // Looker format has "launched time", "claimed time", "time in board", "dollars_claimed" etc.
  const hasLookerCols = keys.some(k => k.includes('launched time') || k.includes('claimed time') || k.includes('time in board') || k.includes('dollars_claimed') || k.includes('dollars_launched'));
  if (hasSubmittedBy || hasReason || (hasTimestamp && !hasLookerCols)) return true;
  return false;
}

function detectServiceLineFromData(data) {
  if (!data || data.length === 0) return 'Unknown';
  const cm = buildColMap(data);

  // Check for TC-specific file formats by column structure first
  // SLI Download files are TC-only (columns: SLI Status, SLI Effective Start, etc.)
  const keys = Object.keys(data[0] || {});
  const keysLower = keys.map(k => k.toLowerCase().trim());
  const hasSliCols = keysLower.some(k => k.includes('sli status') || k.includes('sli effective') || k.includes('sli due') || k.includes('sli received') || k.includes('sli completed'));
  // If file has SLI-specific columns and NO partner/entity columns, it's TC
  if (hasSliCols && !cm.partner && !cm.entityName) return 'TC';
  // If file has SLI columns and no identifiable non-TC partners, still TC
  if (hasSliCols && !cm.partner) return 'TC';

  const sample = data.slice(0, Math.min(100, data.length));
  let tc = 0, csl = 0, wsl = 0, unidentified = 0;
  sample.forEach(r => {
    const partner = (cm.partner ? (r[cm.partner] || '') : '').toLowerCase().trim();
    const entity = (cm.entityName ? (r[cm.entityName] || '') : '').toLowerCase().trim();
    const program = (cm.program ? (r[cm.program] || '') : '').toLowerCase().trim();
    const combined = partner + ' ' + entity + ' ' + program;

    if (combined.includes('transcarent')) { tc++; return; }

    // Only classify if we have identifiable partner/entity info
    if (partner || entity) {
      const sl = partner ? mapPartnerToSL(partner) : mapEntityToSL(entity);
      if (sl === 'TC') tc++;
      else if (sl === 'WSL') wsl++;
      else if (sl === 'CSL') csl++;
      else unidentified++;
    } else {
      unidentified++;
    }
  });

  // If most rows lack partner/entity info, use column structure hints
  if (unidentified > sample.length * 0.7) {
    if (hasSliCols) return 'TC';
    return 'Unknown';
  }

  if (tc > csl && tc > wsl) return 'TC';
  if (wsl > csl && wsl > tc) return 'WSL';
  if (csl > tc && csl > wsl) return 'CSL';
  if (tc + csl + wsl === 0) return 'Unknown';
  return 'Mixed';
}

// Check if a row represents a canceled visit
function isCanceled(row, cm) {
  const status = (cm.status ? (row[cm.status] || '') : '').toLowerCase();
  const slaStatus = (cm.slaStatus ? (row[cm.slaStatus] || '') : '').toLowerCase();
  const sliDetails = (cm.slaStartStatus ? (row[cm.slaStartStatus] || '') : '').toLowerCase();
  return status.includes('cancel') || slaStatus.includes('cancel') || sliDetails.includes('cancel');
}

// ====== MODALITY EXCLUSION SYSTEM ======
// Modalities excluded by default from SLA, volume, and VPH calculations.
// Users can include/exclude any modality via the filter control.
const DEFAULT_EXCLUDED_MODALITIES = ['chart_addendum', 'prior_authorization'];

// Normalize modality string for comparison
function normalizeModality(mod) {
  return (mod || '').toLowerCase().trim().replace(/[\s-]+/g, '_');
}

// Check if a row should be excluded based on modality
function isExcludedModality(row, cm, excludedSet) {
  if (!excludedSet || excludedSet.size === 0) return false;
  const mod = cm.modality ? (row[cm.modality] || '') : '';
  return excludedSet.has(normalizeModality(mod));
}

// Combined check: canceled OR excluded modality
function isExcludedRow(row, cm, excludedSet) {
  return isCanceled(row, cm) || isExcludedModality(row, cm, excludedSet);
}

// ====== PRE-AGGREGATION ENGINE ======
// Pre-computes daily summaries from raw actuals on upload.
// Tabs use these ~500-row summaries instead of filtering 55k+ raw rows on every interaction.
function preAggregateActuals(rawRows, cm) {
  if (!rawRows || rawRows.length === 0) return null;
  const t0 = performance.now();

  // Group by (date, SL, partner, modality, state, clinician, program)
  const dailyMap = {};
  const ensure = (key) => {
    if (!dailyMap[key]) dailyMap[key] = {
      date: '', sl: '', partner: '', modality: '', state: '', clinician: '', program: '',
      total: 0, canceled: 0, slaMet: 0, slaMissed: 0, slaUnknown: 0,
      rtSum: 0, rtCount: 0, rtValues: [],
      hour: null, dow: null, normalizedModality: '',
    };
    return dailyMap[key];
  };

  rawRows.forEach(r => {
    const dt = parseDate(cm.date ? r[cm.date] : '');
    const dateStr = dt ? ctDateStr(dt) : 'unknown';
    const partner = cm.partner ? (r[cm.partner] || '').trim() : '';
    const entityVal = cm.entityName ? (r[cm.entityName] || '').trim() : '';
    const sl = mapPartnerToSL(partner) || mapEntityToSL(entityVal) || r._detectedSL || '';
    const modality = cm.modality ? (r[cm.modality] || '').trim() : '';
    const state = cm.state ? (r[cm.state] || '').trim() : '';
    const clinician = cm.clinician ? (r[cm.clinician] || '').trim() : '';
    const program = cm.program ? (r[cm.program] || '').trim() : '';

    const key = `${dateStr}|${sl}|${partner}|${modality}|${state}`;
    const agg = ensure(key);
    agg.date = dateStr;
    agg.sl = sl;
    agg.partner = partner;
    agg.modality = modality;
    agg.state = state;
    agg.normalizedModality = normalizeModality(modality);
    if (!agg.clinicians) agg.clinicians = new Set();
    if (clinician) agg.clinicians.add(clinician.toLowerCase());
    agg.program = agg.program || program;
    if (dt) { agg.hour = ctHour(dt); agg.dow = ctDow(dt); }

    const canceled = isCanceled(r, cm);
    if (canceled) { agg.canceled++; agg.total++; return; }
    agg.total++;

    if (isSlaMet(r, cm)) agg.slaMet++;
    else if (isSlaMissed(r, cm)) agg.slaMissed++;
    else agg.slaUnknown++;

    const rt = parseResponseTimeRobust(cm.responseTime ? r[cm.responseTime] : '');
    if (rt !== null && rt >= 0) { agg.rtSum += rt; agg.rtCount++; }
  });

  // Convert to array and finalize
  const rows = Object.values(dailyMap).map(a => {
    a.clinicianCount = a.clinicians ? a.clinicians.size : 0;
    delete a.clinicians; // don't keep the Set
    a.avgRT = a.rtCount > 0 ? a.rtSum / a.rtCount : null;
    a.slaPct = (a.slaMet + a.slaMissed) > 0 ? (a.slaMet / (a.slaMet + a.slaMissed) * 100) : null;
    return a;
  });

  console.log(`[preAggregate] ${rawRows.length} raw rows → ${rows.length} aggregate rows in ${(performance.now() - t0).toFixed(0)}ms`);
  return rows;
}

// Check if a row's SLA was met — handles all known value formats
function isSlaMet(row, cm) {
  const sla = (cm.slaStatus ? (row[cm.slaStatus] || '') : '').toLowerCase().trim();
  // Exact matches: "met", "MET"
  if (sla === 'met') return true;
  // SLI format: "Completed: Met Target"
  if (sla.includes('met target') || sla.includes('met_target')) return true;
  // Negative matches: "MISSED", "Completed: Missed Target"
  if (sla.includes('miss')) return false;
  // If it starts with "met" or contains "met" but not "missed"
  if (sla.includes('met') && !sla.includes('miss')) return true;
  return false;
}

// Check if SLA was missed
function isSlaMissed(row, cm) {
  const sla = (cm.slaStatus ? (row[cm.slaStatus] || '') : '').toLowerCase().trim();
  if (sla === 'missed') return true;
  if (sla.includes('miss')) return true;
  return false;
}

// Parse response time — handles "0 h 23 m", seconds as number, and comma-formatted seconds like "44,754"
function parseResponseTimeRobust(str) {
  if (!str) return null;
  const s = String(str).trim();
  // "0 h 23 m" format
  const hm = s.match(/(\d+)\s*h\s*(\d+)\s*m/);
  if (hm) return parseInt(hm[1]) * 60 + parseInt(hm[2]);
  // Remove commas from numbers like "44,754"
  const cleaned = s.replace(/,/g, '');
  const sec = parseFloat(cleaned);
  if (!isNaN(sec)) return sec / 60; // seconds → minutes
  return null;
}

// Export data array to CSV file download — strips internal columns
function exportToCSV(data, filename) {
  if (!data || data.length === 0) return;
  const internalCols = new Set(['_detectedSL', '_sourceFile']);
  const headers = Object.keys(data[0]).filter(h => !internalCols.has(h));
  const escape = (val) => {
    const s = String(val ?? '');
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const csv = [
    headers.map(escape).join(','),
    ...data.map(row => headers.map(h => escape(row[h])).join(','))
  ].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// Export summary table (array of objects) to CSV
function exportSummaryToCSV(rows, headers, filename) {
  const escape = (val) => {
    const s = String(val ?? '');
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const csv = [
    headers.map(h => escape(h.label || h.key)).join(','),
    ...rows.map(row => headers.map(h => escape(row[h.key])).join(','))
  ].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// Time-bucket data by day or week for trend charts
function bucketByPeriod(rows, cm, granularity) {
  const buckets = {};
  rows.forEach(r => {
    const d = parseDate(cm.date ? r[cm.date] : '');
    if (!d) return;
    let key;
    if (granularity === 'week') {
      const monday = new Date(d);
      monday.setDate(monday.getDate() - monday.getDay() + (monday.getDay() === 0 ? -6 : 1));
      key = monday.toISOString().slice(0, 10);
    } else {
      key = d.toISOString().slice(0, 10);
    }
    if (!buckets[key]) buckets[key] = { date: key, total: 0, canceled: 0, met: 0, missed: 0, times: [] };
    buckets[key].total++;
    if (isCanceled(r, cm)) { buckets[key].canceled++; return; }
    if (isSlaMet(r, cm)) buckets[key].met++;
    if (isSlaMissed(r, cm)) buckets[key].missed++;
    const t = parseResponseTimeRobust(cm.responseTime ? r[cm.responseTime] : '');
    if (t !== null && t >= 0) buckets[key].times.push(t);
  });
  return Object.values(buckets).sort((a, b) => a.date.localeCompare(b.date));
}

// Hour label for relative hour
function hourLabel(relHour, startDate) {
  const DOW = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const dayOffset = Math.floor(relHour / 24);
  const d = startDate ? new Date(startDate) : new Date();
  d.setDate(d.getDate() + dayOffset);
  const dayName = DOW[ctDow(d)];
  const h = relHour % 24;
  const ampm = h < 12 ? 'am' : 'pm';
  const hh = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${dayName} ${hh}${ampm}`;
}
const FORECAST_HOURS = 168; // 7 days

function classifyCredential(cred) {
  if (!cred) return 'Unknown';
  const c = cred.toUpperCase().replace(/[^A-Z]/g, '');
  if (['MD','DO'].includes(c)) return 'MD/DO';
  if (['NP','PA','PAC','FNP','DNP','APRN','NPC','AGNP'].includes(c)) return 'NP/PA';
  return 'Other';
}
// Parse raw shift CSV data into structured shift objects (shared by Forecast + Staffing)
const UNFILLED_NAMES = ['not assigned', 'unassigned', 'open', 'open shift', 'vacant', 'tbd', 'unfilled', 'needs coverage', ''];
function parseShiftCSV(data, masterRoster) {
  const cm = buildColMap(data);
  return data.map(r => {
    const rawName = normalizeName(r[cm.clinician] || r[cm.name] || '');
    const start = parseDate(r[cm.shiftStart] || r[cm.date] || '');
    const end = parseDate(r[cm.shiftEnd] || '');
    const unfilled = UNFILLED_NAMES.includes(rawName.toLowerCase().trim());
    const clinName = unfilled ? '' : rawName;
    let sl = '';
    if (cm.sl && r[cm.sl]) {
      const raw = r[cm.sl].trim();
      const lower = raw.toLowerCase();
      if (lower.includes('transcarent') || lower === 'tc') sl = 'TC';
      else if (lower.includes('weight') || lower === 'wsl' || lower.includes('futur') || lower.includes('noom') || lower.includes('ez health') || lower.includes('ixlayer')) sl = 'WSL';
      else if (lower === 'csl' || lower.includes('amazon') || lower.includes('lifemd') || lower.includes('whoop') || lower.includes('general med')) sl = 'CSL';
      else sl = raw;
    }
    if (!sl && cm.partner && r[cm.partner]) sl = mapEntityToSL(r[cm.partner]);
    if (!sl && cm.entityName && r[cm.entityName]) sl = mapEntityToSL(r[cm.entityName]);
    if (!sl) sl = '';
    const cred = r[cm.credential] || '';
    const hrs = parseFloat(r[cm.scheduledHrs]) || (start && end ? (end - start) / 3600000 : 8);
    const rosterEntry = !unfilled ? (masterRoster || []).find(m => normalizeName(m.name) === clinName) : null;
    return {
      clinician: clinName, start, end, sl, unfilled,
      credential: cred || (rosterEntry ? rosterEntry.credential || '' : ''),
      hours: hrs, dow: start ? ctDow(start) : -1, hour: start ? ctHour(start) : -1,
      credClass: classifyCredential(cred || (rosterEntry ? rosterEntry.credential || '' : '')),
      weekKey: start ? (() => { const d = new Date(start); d.setDate(d.getDate() - d.getDay()); return d.toISOString().slice(0,10); })() : ''
    };
  }).filter(r => r.start && (r.clinician || r.unfilled));
}

// Parse a single Arya CSV row into an enriched object for Smart Import filtering
function parseAryaRow(row, cm) {
  const rawName = (row[cm.clinician] || row[cm.name] || '').trim();
  const normalizedName = normalizeName(rawName);
  const unfilled = UNFILLED_NAMES.includes(normalizedName.toLowerCase().trim());
  const entityName = (row[cm.entityName] || '').trim();
  const sl = entityName ? mapEntityToSL(entityName) : '';
  const startStr = row[cm.shiftStart] || row[cm.date] || '';
  const endStr = row[cm.shiftEnd] || '';
  const startDate = parseDate(startStr);
  const endDate = parseDate(endStr);
  const hours = parseFloat(row[cm.scheduledHrs]) || (startDate && endDate ? (endDate - startDate) / 3600000 : 0);
  const tagsRaw = (row[cm.tags] || '').trim();
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
  const cred = row[cm.credential] || '';
  const parsed = parseNameCredential(rawName);
  return {
    _name: unfilled ? 'Not Assigned' : (parsed.cleanName || normalizedName),
    _email: (row[cm.user] || '').trim(),
    _entityName: entityName,
    _sl: sl,
    _startDate: startDate,
    _endDate: endDate,
    _dateStr: startDate ? startDate.toLocaleDateString('en-US', { timeZone: CT_TZ, month: 'short', day: 'numeric' }) : '',
    _startTimeStr: startDate ? startDate.toLocaleTimeString('en-US', { timeZone: CT_TZ, hour: 'numeric', minute: '2-digit' }) : '',
    _endTimeStr: endDate ? endDate.toLocaleTimeString('en-US', { timeZone: CT_TZ, hour: 'numeric', minute: '2-digit' }) : '',
    _hours: Math.round(hours * 100) / 100,
    _tags: tags,
    _dow: startDate ? ctDow(startDate) : -1,
    _unfilled: unfilled,
    _credential: cred || parsed.credential || '',
    _raw: row  // preserve original row for downstream use
  };
}

// Extract all unique filter options from an array of parsed Arya rows
function extractFilterOptions(parsedRows) {
  const clinSet = new Set();
  const entityMap = new Map(); // entity name → SL
  const tagSet = new Set();
  let minDate = null, maxDate = null;
  let totalHours = 0, unfilledCount = 0;
  const dowSet = new Set();

  parsedRows.forEach(r => {
    if (!r._unfilled && r._name) clinSet.add(r._name);
    if (r._unfilled) unfilledCount++;
    if (r._entityName) entityMap.set(r._entityName, r._sl);
    r._tags.forEach(t => tagSet.add(t));
    if (r._startDate) {
      if (!minDate || r._startDate < minDate) minDate = r._startDate;
      if (!maxDate || r._startDate > maxDate) maxDate = r._startDate;
      dowSet.add(r._dow);
    }
    totalHours += r._hours || 0;
  });

  const clinicians = [...clinSet].sort((a, b) => a.localeCompare(b));
  const entities = [...entityMap.entries()].map(([name, sl]) => ({ name, sl })).sort((a, b) => a.name.localeCompare(b.name));
  const tags = [...tagSet].sort();
  return { clinicians, entities, tags, dateRange: { min: minDate, max: maxDate }, dows: [...dowSet].sort(), totalHours: Math.round(totalHours * 10) / 10, unfilledCount };
}

function staffingColor(filled, required) {
  if (required <= 0) return '';
  const gap = required - filled;
  if (gap <= 0) return 'staffing-green';
  if (gap <= 2) return 'staffing-yellow';
  return 'staffing-red';
}
function slaTrafficLight(value, metric) {
  if (value >= metric.target) return 'sla-green';
  if (value >= (metric.warn || metric.target * 0.95)) return 'sla-yellow';
  return 'sla-red';
}
function slaCardClass(value, metric) {
  if (value >= metric.target) return 'sla-card-green';
  if (value >= (metric.warn || metric.target * 0.95)) return 'sla-card-yellow';
  return 'sla-card-red';
}
function computeRiskScore(incidentCount, calloutCount, vph, slaMissRate) {
  let score = 0;
  score += (incidentCount || 0) * 2;
  score += (calloutCount || 0) * 3;
  if (vph > 0 && vph < 1.0) score += 5;
  if (slaMissRate > 0.15) score += 4;
  return score;
}
function riskLevel(score) {
  if (score >= 15) return 'Critical';
  if (score >= 10) return 'High';
  if (score >= 5) return 'Moderate';
  return 'Low';
}
function riskClass(lvl) { return 'risk-' + lvl.toLowerCase(); }
function isCalloutViolation(hoursBefore) {
  return typeof hoursBefore === 'number' && hoursBefore < CALLOUT_VIOLATION_HOURS;
}
function calloutSeverity(total) {
  if (total >= CALLOUT_THRESHOLDS.escalation) return 'Escalation';
  if (total >= CALLOUT_THRESHOLDS.action) return 'Action';
  if (total >= CALLOUT_THRESHOLDS.caution) return 'Caution';
  return 'OK';
}
function calloutSeverityClass(sev) {
  if (sev === 'Escalation') return 'callout-escalation';
  if (sev === 'Action') return 'callout-action';
  if (sev === 'Caution') return 'callout-caution';
  return '';
}
function weeklyAnomaly(weeklyVolumes) {
  if (weeklyVolumes.length < 4) return { mean: 0, sigma: 0, anomalies: [] };
  const mean = weeklyVolumes.reduce((a, b) => a + b, 0) / weeklyVolumes.length;
  const variance = weeklyVolumes.reduce((a, v) => a + (v - mean) ** 2, 0) / weeklyVolumes.length;
  const sigma = Math.sqrt(variance);
  const anomalies = weeklyVolumes.map((v, i) => Math.abs(v - mean) > 2 * sigma ? i : -1).filter(i => i >= 0);
  return { mean, sigma, anomalies };
}

// ========================== VPH COMPUTATION ENGINE ==========================

// Break deduction based on scheduled hours (SteadyMD policy — June 2024)
function getBreakMinutes(scheduledHours) {
  if (scheduledHours > 10) return 105;
  if (scheduledHours > 5) return 60;
  if (scheduledHours > 4) return 15;
  return 0;
}

// Adjusted VPH with break deduction and floor guard
function calcAdjustedVPH(completedVisits, scheduledHours) {
  const breakHours = getBreakMinutes(scheduledHours) / 60;
  const adjustedHours = Math.max(VPH_FLOOR_HOURS, scheduledHours - breakHours);
  return completedVisits / adjustedHours;
}

// Classify modality for VPH threshold bands (Sync/Async/Mixed)
function classifyVphModality(modalityStr) {
  if (!modalityStr) return 'Mixed';
  const lower = modalityStr.toLowerCase().trim();
  if (!lower) return 'Mixed';
  if (lower.includes('async') || lower.includes('message') || lower.includes('messaging') || lower.includes('asynchronous')) return 'Async';
  if (lower.includes('sync') || lower.includes('video') || lower.includes('phone') || lower.includes('live') || lower.includes('synchronous')) return 'Sync';
  return 'Mixed';
}

// Get CSS class for VPH threshold color coding
function vphThresholdClass(vph, modality) {
  if (vph == null || isNaN(vph)) return '';
  const mod = classifyVphModality(modality);
  const t = VPH_THRESHOLDS[mod] || VPH_THRESHOLDS.Sync;
  if (vph < t.red) return 'vph-red';
  if (vph < t.yellow) return 'vph-yellow';
  return 'vph-green';
}

// Get pill variant for VPH threshold
function vphPillVariant(vph, modality) {
  const cls = vphThresholdClass(vph, modality);
  return cls.replace('vph-', '') || 'green';
}

// Validate a VPH record per spec Section 10
function validateVphRecord(rec) {
  const warnings = [];
  const visits = parseFloat(rec.completed_visits);
  if (isNaN(visits) || visits < 0) return { valid: false, warnings, error: 'Invalid or missing completed_visits' };
  const sched = parseFloat(rec.scheduled_hours) || 0;
  const worked = parseFloat(rec.worked_hours) || 0;
  if (sched <= 0 && worked <= 0) return { valid: false, warnings, error: 'Both scheduled_hours and worked_hours are null/zero' };
  if (sched <= 0 && worked > 0) warnings.push('scheduled_hours missing — using worked_hours for break deduction');
  const denom = sched > 0 ? sched : worked;
  if (visits > denom * 12) warnings.push('Unusually high: ' + visits + ' visits in ' + denom.toFixed(1) + 'h — verify data');
  return { valid: true, warnings, error: null };
}

// Compute all 4 VPH variants for a single normalized record
function computeVphVariants(rec) {
  const visits = parseFloat(rec.completed_visits) || 0;
  const sched = parseFloat(rec.scheduled_hours) || 0;
  const worked = parseFloat(rec.worked_hours) || 0;
  const hasScheduled = sched > 0;
  const hasWorked = worked > 0;
  const breakInput = hasScheduled ? sched : worked;
  const breakHrs = getBreakMinutes(breakInput) / 60;
  const adjustedHrs = Math.max(VPH_FLOOR_HOURS, breakInput - breakHrs);
  return {
    rawVph: hasWorked ? visits / Math.max(worked, VPH_FLOOR_HOURS) : null,
    vpch: hasScheduled ? visits / Math.max(sched, VPH_FLOOR_HOURS) : null,
    adjustedVph: visits / adjustedHrs,
    usedWorkedFallback: !hasScheduled && hasWorked,
  };
}

// Build VPH-specific column map from CSV headers
function buildVphColMap(data) {
  if (!data || data.length === 0) return {};
  const s = data[0];
  return {
    clinician_id: resolveCol(s, 'clinician_id', 'Clinician ID', 'Provider ID'),
    clinician_name: resolveCol(s, 'clinician_name', 'Clinician Name', 'Clinician Display Name', 'Provider Name', 'Name', 'Clinician', 'Provider'),
    credential: resolveCol(s, 'credential', 'Credential', 'License Type', 'Cred'),
    partner: resolveCol(s, 'partner', 'Partner', 'Partner Name', 'Entity Name', 'Entity', 'Service Line', 'Client'),
    shift_date: resolveCol(s, 'shift_date', 'Shift Date', 'Date', 'Work Date', 'Schedule Date'),
    shift_start: resolveCol(s, 'shift_start', 'Shift Start', 'Clock In', 'Start Time'),
    shift_end: resolveCol(s, 'shift_end', 'Shift End', 'Clock Out', 'End Time'),
    scheduled_hours: resolveCol(s, 'scheduled_hours', 'Scheduled Hours', 'Scheduled Hrs', 'Sched Hours', 'Hrs Scheduled', 'Shift Hours', 'Hours Scheduled'),
    worked_hours: resolveCol(s, 'worked_hours', 'Worked Hours', 'Hours Worked', 'Actual Hours', 'Hrs Worked', 'Clocked Hours'),
    completed_visits: resolveCol(s, 'completed_visits', 'Completed Visits', 'Visits', 'Visit Count', 'Consults Completed', 'Total Visits', 'Completed'),
    modality: resolveCol(s, 'modality', 'Modality', 'Interaction Mode', 'Visit Type', 'Type', 'Consult Type'),

// Normalize a raw CSV row to the internal VPH schema
function normalizeVphRecord(row, vcm) {
  const g = (field) => vcm[field] ? (row[vcm[field]] || '').toString().trim() : '';
  const pf = (field) => { const v = parseFloat(g(field).replace(/,/g, '')); return isNaN(v) ? null : v; };
  const partnerRaw = g('partner');
  const partnerLower = partnerRaw.toLowerCase();
  const partnerSl = VPH_PARTNER_ENTITY_MAP[partnerLower] || Object.entries(VPH_PARTNER_ENTITY_MAP).find(([k]) => partnerLower.includes(k))?.[1] || partnerRaw;
  // Derive worked_hours from shift_start/end if not provided directly
  let workedHours = pf('worked_hours');
  if (workedHours == null && g('shift_start') && g('shift_end')) {
    const parseT = (t) => { const m = t.match(/(\d{1,2}):(\d{2})/); return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : null; };
    const s = parseT(g('shift_start')), e = parseT(g('shift_end'));
    if (s != null && e != null) workedHours = Math.max(0, (e >= s ? e - s : 1440 - s + e)) / 60;
  }
  return {
    clinician_id: g('clinician_id') || normalizeName(g('clinician_name')),
    clinician_name: g('clinician_name'),
    credential: g('credential'),
    partner: partnerRaw,
    partner_sl: partnerSl,
    shift_date: g('shift_date'),
    shift_start: g('shift_start'),
    shift_end: g('shift_end'),
    scheduled_hours: pf('scheduled_hours'),
    worked_hours: workedHours,
    completed_visits: pf('completed_visits'),
    modality: g('modality'),
    rel_hour: pf('rel_hour'),
  };
}
