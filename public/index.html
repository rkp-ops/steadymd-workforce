          <details className="findings-strip">
            <summary>
              <span className="fs-label">{alerts.length} finding{alerts.length !== 1 ? 's' : ''}</span>
              <span className="fs-pills">
                {critCount > 0 && <span className="findings-pill crit">{critCount} critical</span>}
                {highCount > 0 && <span className="findings-pill high">{highCount} high</span>}
              </span>
            </summary>
            <div className="findings-list">
              {alerts.map((a, i) => (
                <div key={i} className="finding-row" style={{flexWrap:'wrap'}}>
                  <span className={`finding-dot ${a.level === 'CRITICAL' ? 'crit' : 'high'}`}></span>
                  <span style={{flex:1,minWidth:200}}>
                    <strong>{a.msg}</strong>
                    {a.detail && <span style={{color:'var(--text-muted)',marginLeft:6}}> — {a.detail}</span>}
                  </span>
                  <span style={{display:'flex',gap:6,alignItems:'center',fontSize:10,color:'var(--text-muted)',flexShrink:0}}>
                    {a.totalWks > 1 && <span>{a.weekCount} of {a.totalWks} wk{a.totalWks !== 1 ? 's' : ''}</span>}
                    {a.worstWeek && (
                      <button onClick={(e) => { e.preventDefault(); setViewWeek(a.worstWeek); }}
                        style={{background:'none',border:'1px solid var(--border)',borderRadius:4,padding:'1px 6px',fontSize:10,cursor:'pointer',color:'var(--accent-teal)',whiteSpace:'nowrap'}}
                        title={`View week of ${a.worstWeek}`}>
                        ↗ wk of {a.worstWeek}
                      </button>
                    )}
                  </span>
                </div>
              ))}
            </div>
          </details>
        );
      })()}

      {/* Filters */}
      <div className="filter-bar">
        <label>From <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} /></label>
        <label>To <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} /></label>
        {weekOptions.length > 1 && (
          <label>Week <select value={viewWeek} onChange={e => setViewWeek(e.target.value)} style={{padding:'4px 8px',borderRadius:4,border:'1px solid var(--border)',fontSize:12}}>
            <option value="">All weeks (avg)</option>
            {weekOptions.map(w => {
              const d = new Date(w + 'T12:00:00'); // noon to avoid timezone issues
              const label = !isNaN(d.getTime()) ? d.toLocaleDateString('en-US', { timeZone: CT_TZ, month: 'short', day: 'numeric' }) : w;
              return <option key={w} value={w}>Week of {label}</option>;
            })}
          </select></label>
        )}
        {slOptions.length > 1 && <MultiSelect label="Service Line" options={slOptions} selected={selSLs} onChange={setSelSLs} />}
        <span style={{color:'var(--text-muted)',fontSize:12}}>{filledShifts.length} filled{unfilledShifts.length > 0 ? ` + ${unfilledShifts.length} unfilled` : ''} shifts · {numWeeks} week{numWeeks !== 1 ? 's' : ''}{dateRange ? ` · ${formatDate(dateRange.min)} – ${formatDate(dateRange.max)}` : ''}</span>
      </div>

      {/* KPI Row */}
      <div className="kpi-grid">
        <KpiCard label="Filled Shifts" value={filledShifts.length} />
        <KpiCard label="Unique Clinicians" value={new Set(filledShifts.map(r => r.clinician).filter(Boolean)).size} />
        {unfilledShifts.length > 0 && <KpiCard label="Unfilled Shifts" value={unfilledShifts.length} className="alert" />}
        <KpiCard label="Avg Clinicians/Hr (Peak)" value={`${analysis.hourlyAvg[analysis.peakHour]} @ ${String(analysis.peakHour).padStart(2,'0')}:00`} />
        <KpiCard label="Avg Clinicians/Hr (Trough)" value={`${analysis.hourlyAvg[analysis.troughHour]} @ ${String(analysis.troughHour).padStart(2,'0')}:00`} className={analysis.hourlyAvg[analysis.troughHour] < 3 ? 'sla-yellow' : ''} />
      </div>

      {/* Staffing Heatmap — AVERAGED per week */}
      <details open style={{marginTop:16}}>
        <summary className="section-toggle">🗓️ Avg Clinicians On-Shift (DOW × Hour){viewWeek ? ` — Week of ${viewWeek}` : ` — ${numWeeks}-Week Average`}</summary>
        <div className="table-wrap" style={{overflowX:'auto'}}>
          <table style={{fontSize:11,minWidth:900}}>
            <thead><tr><th>Day</th>{Array.from({length:24},(_,h)=><th key={h} style={{textAlign:'center',padding:'2px 4px'}}>{String(h).padStart(2,'0')}</th>)}</tr></thead>
            <tbody>
              {DOW_LABELS.map((d, dow) => (
                <tr key={dow}>
                  <td style={{fontWeight:600,whiteSpace:'nowrap'}}>{d}</td>
                  {Array.from({length:24}, (_,h) => {
                    const cell = heatmap[dow][h];
                    const med = analysis.medianGrid[dow][h];
                    // Color by absolute level: green ≥10, teal 5-9, yellow 2-4, red <2 during core hours
                    const v = cell.avg;
                    const isCore = h >= 7 && h < 23;
                    let bg = '';
                    if (v > 0) {
                      if (v >= 10) bg = '#d1fae5';
                      else if (v >= 5) bg = '#e0f2fe';
                      else if (v >= 2) bg = '#fef9c3';
                      else if (isCore) bg = '#fde8e8';
                    }
                    // Bold red if this cell dropped 30%+ below median in some week
                    const weak = analysis.weakSlots.find(w => w.dow === dow && w.h === h);
                    return (
                      <td key={h} style={{textAlign:'center',padding:'3px 4px',fontSize:11,background:bg,color: weak ? 'var(--accent-red)' : v < 2 && isCore ? '#92400e' : '',fontWeight: weak ? 700 : 400}}
                        title={`${d} ${String(h).padStart(2,'0')}:00 — Avg: ${v} clinicians/week | Median: ${med}${weak ? ` | Min week: ${weak.min} (⚠ variable)` : ''}`}>
                        {v > 0 ? v : ''}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{display:'flex',gap:16,marginTop:8,fontSize:11,color:'var(--text-muted)',flexWrap:'wrap'}}>
            <span><span style={{display:'inline-block',width:14,height:10,borderRadius:2,background:'#d1fae5',marginRight:4,verticalAlign:'middle'}}></span>≥10 clinicians</span>
            <span><span style={{display:'inline-block',width:14,height:10,borderRadius:2,background:'#e0f2fe',marginRight:4,verticalAlign:'middle'}}></span>5-9</span>
            <span><span style={{display:'inline-block',width:14,height:10,borderRadius:2,background:'#fef9c3',marginRight:4,verticalAlign:'middle'}}></span>2-4</span>
            <span><span style={{display:'inline-block',width:14,height:10,borderRadius:2,background:'#fde8e8',marginRight:4,verticalAlign:'middle'}}></span>&lt;2 (core hours)</span>
            <span><span style={{fontWeight:700,color:'var(--accent-red)',marginRight:4}}>Red text</span>= high week-to-week variability</span>
          </div>
        </div>
      </details>

      {/* Credential Mix — averaged per week */}
      <details style={{marginTop:16}}>
        <summary className="section-toggle">🩺 Credential Mix by Time Block (avg/week)
          <span style={{ fontSize: 10, fontWeight: 400, color: 'var(--text-muted)', marginLeft: 8 }}>
            {selSLs.length > 0 ? `SL: ${selSLs.join(', ')}` : 'All SLs'} | {dateRange ? `${formatDate(dateRange.min)} – ${formatDate(dateRange.max)}` : 'All dates'} | {filtered.length} shifts
          </span>
        </summary>
        <div className="table-wrap">
          <table>
            <thead><tr><th>SL</th>{credMix.blocks.map(b => <th key={b} style={{textAlign:'center'}}>{b}</th>)}</tr></thead>
            <tbody>
              {credMix.sls.map(sl => (
                <tr key={sl}>
                  <td style={{fontWeight:600}}>{sl}</td>
                  {credMix.blocks.map(bl => {
                    const v = credMix.bySL[`${sl}|${bl}`] || { mddo: 0, nppa: 0, other: 0 };
                    const total = v.mddo + v.nppa + v.other;
                    const npRatio = total > 0 ? v.nppa / total : 0;
                    return (
                      <td key={bl} style={{textAlign:'center',fontSize:11,background: total > 2 && npRatio > 0.80 ? 'var(--accent-red-soft)' : ''}}>
                        {total > 0 ? <span>{v.mddo} <span style={{color:'var(--text-muted)'}}>MD</span> | {v.nppa} <span style={{color:'var(--text-muted)'}}>NP</span></span> : '-'}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </details>

      {/* Hourly Staffing Curve */}
      <details style={{marginTop:16}}>
        <summary className="section-toggle">📈 Hourly Staffing Curve
          <span style={{ fontSize: 10, fontWeight: 400, color: 'var(--text-muted)', marginLeft: 8 }}>
            {selSLs.length > 0 ? `SL: ${selSLs.join(', ')}` : 'All SLs'} | {viewWeek ? `Week of ${viewWeek}` : `${numWeeks}-wk avg`}
          </span>
        </summary>
        <ChartWrapper config={{
          type: 'bar', data: {
            labels: Array.from({length:24}, (_, h) => `${String(h).padStart(2,'0')}:00`),
            datasets: [{
              label: 'Avg Clinicians On-Shift', data: analysis.hourlyAvg,
              backgroundColor: analysis.hourlyAvg.map(v => v >= 10 ? 'rgba(20,184,166,0.6)' : v >= 5 ? 'rgba(59,130,246,0.5)' : v >= 2 ? 'rgba(245,158,11,0.5)' : 'rgba(239,68,68,0.5)'),
            }]
          }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, title: { display: true, text: 'Avg Clinicians' } } } }
        }} height={220} />
      </details>

      {/* Variability Analysis — slots with RECURRING coverage drops, not one-offs */}
      {analysis.weakSlots.length > 0 && (
        <details style={{marginTop:16}}>
          <summary className="section-toggle">⚠️ Consistently Unreliable Slots ({analysis.weakSlots.length})</summary>
          <p style={{fontSize:11,color:'var(--text-muted)',margin:'4px 0 12px'}}>
            Slots where staffing dropped 30%+ below median in more than 25% of weeks — persistent patterns, not occasional dips.
          </p>
          <div className="table-wrap">
            <table style={{fontSize:12}}>
              <thead><tr>
                <th style={{textAlign:'left'}}>Slot</th>
                <th style={{textAlign:'center'}}>Median</th>
                <th style={{textAlign:'center'}}>Drop Frequency</th>
                <th style={{textAlign:'center'}}>Variability</th>
                <th style={{textAlign:'center'}}>Worst Week</th>
                <th style={{width:50}}></th>
              </tr></thead>
              <tbody>
                {analysis.weakSlots.slice(0,20).map((w, i) => (
                  <tr key={i} style={{background: w.dropRate > 0.30 ? 'var(--accent-red-soft)' : w.dropRate > 0.20 ? 'var(--accent-orange-soft)' : ''}}>
                    <td style={{fontWeight:600}}>{DOW_LABELS[w.dow]} {String(w.h).padStart(2,'0')}:00</td>
                    <td style={{textAlign:'center'}}>{w.median} clin</td>
                    <td style={{textAlign:'center',fontWeight:700,color: w.dropRate > 0.25 ? 'var(--accent-red)' : 'var(--accent-orange)'}}>
                      {w.badWeeks.length} of {numWeeks} wks ({(w.dropRate * 100).toFixed(0)}%)
                    </td>
                    <td style={{textAlign:'center',color:'var(--text-muted)'}}>{w.cv >= 0.5 ? '🔴 High' : w.cv >= 0.3 ? '🟡 Mod' : '◽ Low'}</td>
                    <td style={{textAlign:'center',fontSize:10,color:'var(--text-muted)'}}>{w.worstWeek || '—'}</td>
                    <td style={{textAlign:'center'}}>
                      {w.worstWeek && <button onClick={() => setViewWeek(w.worstWeek)}
                        style={{background:'none',border:'1px solid var(--border)',borderRadius:4,padding:'1px 6px',fontSize:10,cursor:'pointer',color:'var(--accent-teal)'}}>
                        ↗ View
                      </button>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </details>
      )}
    </div>
  );
}

// ========================== TAB: PERFORMANCE ==========================
function PerformanceTab({ actualsData, lookbackWeeks, excludedModalities, setExcludedModalities }) {
  const [serviceLine, setServiceLine] = useState('ALL');
  // Multi-select filter state — empty array = "all"
  const [selPartners, setSelPartners] = useState([]);
  const [selPrograms, setSelPrograms] = useState([]);
  const [selModalities, setSelModalities] = useState([]);
  const [selStates, setSelStates] = useState([]);
  const [selClinicians, setSelClinicians] = useState([]);
  const [includeScheduled, setIncludeScheduled] = useState(false);
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');

  // Deferred rendering — show spinner while heavy computation runs
  const [ready, setReady] = useState(false);
  useEffect(() => {
    setReady(false);
    const t = setTimeout(() => setReady(true), 50); // yield to browser, then compute
    return () => clearTimeout(t);
  }, [actualsData]);

  // Build column map from actual data
  const cm = useMemo(() => buildColMap(actualsData), [actualsData]);

  // Row accessor helpers
  const rowPartner = useCallback(r => cm.partner ? (r[cm.partner] || '') : '', [cm]);
  const rowProgram = useCallback(r => cm.program ? (r[cm.program] || '') : '', [cm]);
  const rowModality = useCallback(r => {
    const mod = cm.modality ? (r[cm.modality] || '') : '';
    if (mod) return mod;
    return cm.consultType ? (r[cm.consultType] || '') : '';
  }, [cm]);
  const rowState = useCallback(r => cm.state ? (r[cm.state] || '') : '', [cm]);
  const rowClinician = useCallback(r => cm.clinician ? (r[cm.clinician] || '') : '', [cm]);

  // Service line pre-filter (base — before scheduled exclusion)
  const slFilteredBase = useMemo(() => {
    if (!actualsData || actualsData.length === 0) return [];
    if (serviceLine === 'ALL') return actualsData;
    return actualsData.filter(r => {
      const partnerVal = cm.partner ? (r[cm.partner] || '') : '';
      const entityVal = cm.entityName ? (r[cm.entityName] || '') : '';
      if (serviceLine === 'TC') {
        const combined = (partnerVal + ' ' + entityVal).toLowerCase();
        return combined.includes('transcarent') || r._detectedSL === 'TC';
      }
      const sl = mapPartnerToSL(partnerVal) || mapEntityToSL(entityVal);
      return sl === serviceLine || r._detectedSL === serviceLine;
    });
  }, [actualsData, serviceLine, cm]);

  // Exclude globally excluded modalities (chart_addendum, prior_auth, etc)
  const slFilteredNoExcluded = useMemo(() => {
    if (!excludedModalities || excludedModalities.size === 0) return slFilteredBase;
    return slFilteredBase.filter(r => !isExcludedModality(r, cm, excludedModalities));
  }, [slFilteredBase, excludedModalities, cm]);

  // Exclude scheduled modalities by default
  const slFilteredNoSched = useMemo(() => {
    if (includeScheduled) return slFilteredNoExcluded;
    return slFilteredNoExcluded.filter(r => classifyModality(rowModality(r)) !== 'Scheduled');
  }, [slFilteredNoExcluded, includeScheduled, rowModality]);

  // Apply date range filter
  const slFiltered = useMemo(() => {
    let d = slFilteredNoSched;
    if (dateFrom || dateTo) {
      d = d.filter(r => {
        const dt = parseDate(cm.date ? r[cm.date] : '');
        if (!dt) return true; // keep rows with no date (shouldn't happen in real data)
        if (dateFrom && dt < new Date(dateFrom)) return false;
        if (dateTo) { const end = new Date(dateTo); end.setHours(23,59,59); if (dt > end) return false; }
        return true;
      });
    }
    return d;
  }, [slFilteredNoSched, dateFrom, dateTo, cm]);

  // Modality category summary (always computed from slFilteredBase so all 3 categories are visible)
  const modalityCategorySummary = useMemo(() => {
    const cats = { Async: { total: 0, met: 0, missed: 0, times: [] }, Sync: { total: 0, met: 0, missed: 0, times: [] }, Scheduled: { total: 0, met: 0, missed: 0, times: [] }, Other: { total: 0, met: 0, missed: 0, times: [] } };
    slFilteredBase.forEach(r => {
      if (isCanceled(r, cm)) return;
      const cat = classifyModality(rowModality(r));
      cats[cat].total++;
      if (isSlaMet(r, cm)) cats[cat].met++;
      if (isSlaMissed(r, cm)) cats[cat].missed++;
      const t = parseResponseTimeRobust(cm.responseTime ? r[cm.responseTime] : '');
      if (t !== null && t >= 0) cats[cat].times.push(t);
    });
    return cats;
  }, [slFilteredBase, cm, rowModality]);

  // Count scheduled exclusions for UI display
  const scheduledCount = useMemo(() => {
    return slFilteredBase.filter(r => classifyModality(rowModality(r)) === 'Scheduled').length;
  }, [slFilteredBase, rowModality]);

  // Apply user multi-select filters
  const filtered = useMemo(() => {
    if (slFiltered.length === 0) return [];
    return slFiltered.filter(r => {
      if (selPartners.length > 0 && !selPartners.includes(rowPartner(r))) return false;
      if (selPrograms.length > 0 && !selPrograms.includes(rowProgram(r))) return false;
      if (selModalities.length > 0 && !selModalities.includes(rowModality(r))) return false;
      if (selStates.length > 0 && !selStates.includes(rowState(r))) return false;
      if (selClinicians.length > 0 && !selClinicians.includes(rowClinician(r))) return false;
      return true;
    });
  }, [slFiltered, selPartners, selPrograms, selModalities, selStates, selClinicians, rowPartner, rowProgram, rowModality, rowState, rowClinician]);

  // Cascading filter options: each filter's options are computed applying all OTHER active filters
  const cascadeOptions = useMemo(() => {
    if (slFiltered.length === 0) return { partners: [], programs: [], modalities: [], states: [], clinicians: [] };

    const passesExcept = (r, skip) => {
      if (skip !== 'partner' && selPartners.length > 0 && !selPartners.includes(rowPartner(r))) return false;
      if (skip !== 'program' && selPrograms.length > 0 && !selPrograms.includes(rowProgram(r))) return false;
      if (skip !== 'modality' && selModalities.length > 0 && !selModalities.includes(rowModality(r))) return false;
      if (skip !== 'state' && selStates.length > 0 && !selStates.includes(rowState(r))) return false;
      if (skip !== 'clinician' && selClinicians.length > 0 && !selClinicians.includes(rowClinician(r))) return false;
      return true;
    };

    const pSet = new Set(), prSet = new Set(), mSet = new Set(), sSet = new Set(), cSet = new Set();
    const pCount = {}, prCount = {}, mCount = {}, sCount = {}, cCount = {};

    slFiltered.forEach(r => {
      const p = rowPartner(r), pr = rowProgram(r), mod = rowModality(r), st = rowState(r), cl = rowClinician(r);
      if (passesExcept(r, 'partner') && p) { pSet.add(p); pCount[p] = (pCount[p] || 0) + 1; }
      if (passesExcept(r, 'program') && pr) { prSet.add(pr); prCount[pr] = (prCount[pr] || 0) + 1; }
      if (passesExcept(r, 'modality') && mod) { mSet.add(mod); mCount[mod] = (mCount[mod] || 0) + 1; }
      if (passesExcept(r, 'state') && st) { sSet.add(st); sCount[st] = (sCount[st] || 0) + 1; }
      if (passesExcept(r, 'clinician') && cl) { cSet.add(cl); cCount[cl] = (cCount[cl] || 0) + 1; }
    });

    return {
      partners: [...pSet].sort(), programs: [...prSet].sort(), modalities: [...mSet].sort(), states: [...sSet].sort(), clinicians: [...cSet].sort(),
      pCount, prCount, mCount, sCount, cCount
    };
  }, [slFiltered, selPartners, selPrograms, selModalities, selStates, selClinicians, rowPartner, rowProgram, rowModality, rowState, rowClinician]);

  // Calculate stats
  const stats = useMemo(() => {
    if (filtered.length === 0) return null;
    const totalOffered = filtered.length;
    const canceled = filtered.filter(r => isCanceled(r, cm)).length;
    const slaEligible = filtered.filter(r => !isCanceled(r, cm));
    const slaTotal = slaEligible.length;
    const slaMet = slaEligible.filter(r => isSlaMet(r, cm)).length;
    const slaMissed = slaEligible.filter(r => isSlaMissed(r, cm)).length;
    const slaRate = slaTotal > 0 ? (slaMet / slaTotal * 100) : 0;

    // Response times
    const times = slaEligible.map(r => {
      const raw = cm.responseTime ? r[cm.responseTime] : '';
      return parseResponseTimeRobust(raw);
    }).filter(t => t !== null && t >= 0);
    const avgTime = times.length > 0 ? times.reduce((a, b) => a + b, 0) / times.length : 0;
    const sortedTimes = [...times].sort((a, b) => a - b);
    const medianTime = sortedTimes.length > 0 ? sortedTimes[Math.floor(sortedTimes.length / 2)] : 0;
    const over30 = times.filter(t => t > 30).length;
    const over60 = times.filter(t => t > 60).length;

    // By state
    const byState = {};
    slaEligible.forEach(r => {
      const st = cm.state ? (r[cm.state] || 'Unknown') : 'Unknown';
      if (!byState[st]) byState[st] = { total: 0, met: 0, missed: 0, times: [], clinicians: new Set() };
      byState[st].total++;
      if (isSlaMet(r, cm)) byState[st].met++;
      if (isSlaMissed(r, cm)) byState[st].missed++;
      const cl = rowClinician(r); if (cl) byState[st].clinicians.add(cl);
      const t = parseResponseTimeRobust(cm.responseTime ? r[cm.responseTime] : '');
      if (t !== null && t >= 0) byState[st].times.push(t);
    });

    // By clinician
    const byClin = {};
    slaEligible.forEach(r => {
      const name = cm.clinician ? (r[cm.clinician] || 'Unknown') : 'Unknown';
      if (!byClin[name]) byClin[name] = { total: 0, met: 0, missed: 0, times: [], partners: new Set(), states: new Set() };
      byClin[name].total++;
      if (isSlaMet(r, cm)) byClin[name].met++;
      if (isSlaMissed(r, cm)) byClin[name].missed++;
      const p = rowPartner(r); if (p) byClin[name].partners.add(p);
      const st = rowState(r); if (st) byClin[name].states.add(st);
      const t = parseResponseTimeRobust(cm.responseTime ? r[cm.responseTime] : '');
      if (t !== null && t >= 0) byClin[name].times.push(t);
    });

    // By partner
    const byPartner = {};
    slaEligible.forEach(r => {
      const p = cm.partner ? (r[cm.partner] || 'Unknown') : 'Unknown';
      if (!byPartner[p]) byPartner[p] = { total: 0, met: 0, missed: 0, clinicians: new Set() };
      byPartner[p].total++;
      if (isSlaMet(r, cm)) byPartner[p].met++;
      if (isSlaMissed(r, cm)) byPartner[p].missed++;
      const cl = rowClinician(r); if (cl) byPartner[p].clinicians.add(cl);
    });

    // By modality
    const byModality = {};
    slaEligible.forEach(r => {
      const mod = rowModality(r) || 'Unknown';
      if (!byModality[mod]) byModality[mod] = { total: 0, met: 0, missed: 0, times: [] };
      byModality[mod].total++;
      if (isSlaMet(r, cm)) byModality[mod].met++;
      if (isSlaMissed(r, cm)) byModality[mod].missed++;
      const t = parseResponseTimeRobust(cm.responseTime ? r[cm.responseTime] : '');
      if (t !== null && t >= 0) byModality[mod].times.push(t);
    });

    // Date range
    const dates = filtered.map(r => parseDate(cm.date ? r[cm.date] : '')).filter(Boolean);
    const minDate = dates.length > 0 ? new Date(Math.min(...dates)) : null;
    const maxDate = dates.length > 0 ? new Date(Math.max(...dates)) : null;

    // Detected columns for diagnostics
    const detectedCols = Object.entries(cm).filter(([k,v]) => v).map(([k,v]) => `${k}: "${v}"`);

    return { totalOffered, canceled, slaTotal, slaMet, slaMissed, slaRate, avgTime, medianTime, over30, over60, byState, byClin, byPartner, byModality, minDate, maxDate, detectedCols };
  }, [filtered, cm, rowPartner, rowState, rowClinician, rowModality]);

  if (!actualsData || actualsData.length === 0) {
    return (
      <div className="empty-state">
        <div className="icon">&#128200;</div>
        <p>Upload actuals data via the <strong>+ Actuals</strong> button in the header to see performance metrics</p>
        <div className="hint">CSV with consult/visit rows — needs: Clinician Name, Date, Status, SLA Status, Response Time, Modality. Columns are auto-detected.</div>
      </div>
    );
  }

  if (!stats) return <div className="empty-state"><p>No matching data for current filters</p></div>;

  const stateRows = Object.entries(stats.byState).sort((a, b) => b[1].total - a[1].total);
  const clinRows = Object.entries(stats.byClin).sort((a, b) => b[1].total - a[1].total);
  const partnerRows = Object.entries(stats.byPartner).sort((a, b) => b[1].total - a[1].total);
  const modalityRows = Object.entries(stats.byModality).sort((a, b) => b[1].total - a[1].total);
  const activeFilterCount = [selPartners, selPrograms, selModalities, selStates, selClinicians].filter(a => a.length > 0).length + (dateFrom ? 1 : 0) + (dateTo ? 1 : 0);

  // Trend chart state & configs
  const autoGranularity = stats.minDate && stats.maxDate && (stats.maxDate - stats.minDate) > 60 * 86400000 ? 'week' : 'day';
  const [trendGranularity, setTrendGranularity] = useState(null); // null = auto
  const granularity = trendGranularity || autoGranularity;

  const trendBuckets = useMemo(() => bucketByPeriod(filtered, cm, granularity), [filtered, cm, granularity]);

  const trendSlaConfig = useMemo(() => {
    if (trendBuckets.length < 2) return null;
    const labels = trendBuckets.map(b => b.date);
    const slaData = trendBuckets.map(b => {
      const eligible = b.total - b.canceled;
      return eligible > 0 ? (b.met / eligible * 100) : null;
    });
    return {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'SLA Met %',
            data: slaData,
            borderColor: '#26AEBC',
            backgroundColor: 'rgba(38,174,188,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: trendBuckets.length > 30 ? 0 : 3,
            pointHoverRadius: 5,
          },
          {
            label: '90% Target',
            data: labels.map(() => 90),
            borderColor: '#FF264D',
            borderDash: [6, 4],
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false,
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 11 } } } },
        scales: {
          x: { ticks: { maxRotation: 45, font: { size: 10 }, maxTicksLimit: 20 } },
          y: { min: 0, max: 100, ticks: { callback: v => v + '%', font: { size: 10 } }, title: { display: true, text: 'SLA Met %', font: { size: 11 } } }
        }
      }
    };
  }, [trendBuckets]);

  const trendVolumeConfig = useMemo(() => {
    if (trendBuckets.length < 2) return null;
    const labels = trendBuckets.map(b => b.date);
    const volumes = trendBuckets.map(b => b.total);
    const avgTimes = trendBuckets.map(b => b.times.length > 0 ? (b.times.reduce((a,c) => a+c, 0) / b.times.length) : null);
    return {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: 'Visit Volume',
            data: volumes,
            backgroundColor: 'rgba(38,174,188,0.5)',
            borderColor: '#26AEBC',
            borderWidth: 1,
            yAxisID: 'y',
            order: 2,
          },
          {
            label: 'Avg Response (min)',
            data: avgTimes,
            type: 'line',
            borderColor: '#e8850c',
            backgroundColor: 'transparent',
            borderWidth: 2,
            pointRadius: trendBuckets.length > 30 ? 0 : 3,
            pointHoverRadius: 5,
            tension: 0.3,
            yAxisID: 'y1',
            order: 1,
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 11 } } } },
        scales: {
          x: { ticks: { maxRotation: 45, font: { size: 10 }, maxTicksLimit: 20 } },
          y: { position: 'left', beginAtZero: true, ticks: { font: { size: 10 } }, title: { display: true, text: 'Visits', font: { size: 11 } } },
          y1: { position: 'right', beginAtZero: true, grid: { drawOnChartArea: false }, ticks: { font: { size: 10 }, callback: v => v + 'm' }, title: { display: true, text: 'Avg Response (min)', font: { size: 11 } } }
        }
      }
    };
  }, [trendBuckets]);

  if (!ready || !actualsData) {
    return (
      <div style={{ textAlign: 'center', padding: '60px 20px' }}>
        <div style={{ fontSize: 24, marginBottom: 8 }}>⏳</div>
        <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>Processing {actualsData ? actualsData.length.toLocaleString() + ' records' : 'data'}...</div>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 8, flexWrap: 'wrap', alignItems: 'center' }}>
        <SLFilter value={serviceLine} onChange={setServiceLine} />
        <ModalityExclusionFilter actualsData={actualsData} cm={cm} excludedModalities={excludedModalities} setExcludedModalities={setExcludedModalities} />
      </div>
      {/* Date range + cascading multi-select filters */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 16, flexWrap: 'wrap', alignItems: 'flex-end' }}>
        <label style={{fontSize:12, display:'flex', flexDirection:'column', gap:2}}>From
          <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)}
            style={{padding:'4px 6px', border:'1px solid var(--border)', borderRadius:4, fontSize:11}} />
        </label>
        <label style={{fontSize:12, display:'flex', flexDirection:'column', gap:2}}>To
          <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)}
            style={{padding:'4px 6px', border:'1px solid var(--border)', borderRadius:4, fontSize:11}} />
        </label>
        {cascadeOptions.partners.length > 0 && (
          <MultiSelect label="Partner" options={cascadeOptions.partners} selected={selPartners} onChange={setSelPartners} placeholder="All Partners" countMap={cascadeOptions.pCount} />
        )}
        {cascadeOptions.programs.length > 0 && (
          <MultiSelect label="Program" options={cascadeOptions.programs} selected={selPrograms} onChange={setSelPrograms} placeholder="All Programs" countMap={cascadeOptions.prCount} />
        )}
        {cascadeOptions.modalities.length > 0 && (
          <MultiSelect label="Modality" options={cascadeOptions.modalities} selected={selModalities} onChange={setSelModalities} placeholder="All Modalities" countMap={cascadeOptions.mCount} />
        )}
        {cascadeOptions.states.length > 0 && (
          <MultiSelect label="State" options={cascadeOptions.states} selected={selStates} onChange={setSelStates} placeholder="All States" countMap={cascadeOptions.sCount} />
        )}
        {cascadeOptions.clinicians.length > 0 && (
          <MultiSelect label="Clinician" options={cascadeOptions.clinicians} selected={selClinicians} onChange={setSelClinicians} placeholder="All Clinicians" countMap={cascadeOptions.cCount} />
        )}
        {activeFilterCount > 0 && (
          <button className="btn btn-secondary btn-sm" style={{ alignSelf: 'flex-end', marginBottom: 0 }}
            onClick={() => { setSelPartners([]); setSelPrograms([]); setSelModalities([]); setSelStates([]); setSelClinicians([]); setDateFrom(''); setDateTo(''); }}>
            Clear All Filters
          </button>
        )}
        <button
          className={`btn btn-sm ${includeScheduled ? 'btn-primary' : 'btn-secondary'}`}
          style={{ alignSelf: 'flex-end', marginBottom: 0, borderColor: includeScheduled ? 'var(--accent-teal)' : 'var(--accent-orange)', color: includeScheduled ? '#fff' : 'var(--accent-orange)', background: includeScheduled ? 'var(--accent-teal)' : 'transparent' }}
          onClick={() => setIncludeScheduled(!includeScheduled)}
          title={includeScheduled ? 'Scheduled visits are included — click to exclude' : `${scheduledCount} scheduled visits are excluded — click to include`}>
          {includeScheduled ? '✓ Scheduled Included' : `▲ Scheduled Excluded (${scheduledCount})`}
        </button>
        <button className="btn btn-secondary btn-sm" style={{ alignSelf: 'flex-end', marginBottom: 0 }}
          onClick={() => exportToCSV(filtered, `performance_export_${new Date().toISOString().slice(0,10)}.csv`)}
          title="Download filtered data as CSV">
          &#11015; Export CSV
        </button>
      </div>

      {/* Date range banner */}
      <div style={{ background: 'var(--accent-teal-soft)', border: '1px solid #c5e8ec', borderRadius: 'var(--radius)', padding: '8px 14px', marginBottom: 16, fontSize: 12, color: 'var(--accent-teal-dark)' }}>
        <strong>Showing: {stats.minDate ? formatDate(stats.minDate) : '?'} &ndash; {stats.maxDate ? formatDate(stats.maxDate) : '?'}</strong>
        {' '}| {filtered.length.toLocaleString()} rows after filters
        {activeFilterCount > 0 && <span> | {activeFilterCount} filter(s) active</span>}
      </div>

      {/* KPI Grid */}
      <div className="kpi-grid">
        <KpiCard label="Total Visits Offered" value={stats.totalOffered.toLocaleString()} sub="all statuses" />
        <KpiCard label="Canceled" value={stats.canceled.toLocaleString()} sub="excluded from SLA" />
        <KpiCard label="SLA-Eligible" value={stats.slaTotal.toLocaleString()} sub="non-canceled visits" />
        <KpiCard label="SLA Met" value={stats.slaMet.toLocaleString()} sub={pct(stats.slaMet, stats.slaTotal)} className="good" />
        <KpiCard label="SLA Missed" value={stats.slaMissed.toLocaleString()} sub={pct(stats.slaMissed, stats.slaTotal)} className={stats.slaMissed > 0 ? 'alert' : ''} />
        <KpiCard label="SLA Met %" value={stats.slaRate.toFixed(1) + '%'} className={stats.slaRate < 80 ? 'alert' : stats.slaRate < 90 ? 'warn' : 'good'} />
      </div>
      <div className="kpi-grid" style={{ marginTop: 0 }}>
        <KpiCard label="Avg Response" value={stats.avgTime.toFixed(1) + 'm'} />
        <KpiCard label="Median Response" value={stats.medianTime.toFixed(1) + 'm'} />
        <KpiCard label=">30 min" value={stats.over30.toLocaleString()} sub={pct(stats.over30, stats.slaTotal)} className={stats.over30 / stats.slaTotal > 0.1 ? 'warn' : ''} />
        <KpiCard label=">60 min" value={stats.over60.toLocaleString()} sub={pct(stats.over60, stats.slaTotal)} className={stats.over60 > 0 ? 'alert' : ''} />
      </div>

      {/* Weekend Collapse & SLA Alerts (Module 2 Enhancement) */}
      {(() => {
        if (!filtered || filtered.length < 20) return null;
        const weekday = filtered.filter(r => { const d = parseDate(cm.date ? r[cm.date] : ''); return d && ctDow(d) >= 1 && ctDow(d) <= 5; });
        const weekend = filtered.filter(r => { const d = parseDate(cm.date ? r[cm.date] : ''); return d && (ctDow(d) === 0 || ctDow(d) === 6); });
        const wdMet = weekday.filter(r => !isCanceled(r, cm) && isSlaMet(r, cm)).length;
        const wdTotal = weekday.filter(r => !isCanceled(r, cm)).length;
        const weMet = weekend.filter(r => !isCanceled(r, cm) && isSlaMet(r, cm)).length;
        const weTotal = weekend.filter(r => !isCanceled(r, cm)).length;
        const wdRate = wdTotal > 0 ? (wdMet / wdTotal * 100) : 0;
        const weRate = weTotal > 0 ? (weMet / weTotal * 100) : 0;
        const delta = wdRate - weRate;
        const alerts = [];
        if (delta > 15 && weTotal > 10) alerts.push({ severity: 'critical', msg: `Weekend SLA collapse detected: weekday ${wdRate.toFixed(1)}% vs weekend ${weRate.toFixed(1)}% (−${delta.toFixed(1)}pt gap)` });
        if (stats.slaRate < 90 && stats.slaTotal > 50) alerts.push({ severity: 'warn', msg: `SLA trending below 90% target at ${stats.slaRate.toFixed(1)}% — breach risk` });
        if (alerts.length === 0) return null;
        return <div style={{ marginBottom: 12 }}>{alerts.map((a, i) => (
          <div key={i} className={`gap-alert${a.severity === 'warn' ? ' warn' : ''}`}>
            <strong>{a.severity === 'critical' ? '🚨 CRITICAL' : '⚠️ WARNING'}:</strong> {a.msg}
          </div>
        ))}</div>;
      })()}

      {/* Modality Category Summary — always shows all categories from slFilteredBase */}
      {(modalityCategorySummary.Async.total > 0 || modalityCategorySummary.Sync.total > 0 || modalityCategorySummary.Scheduled.total > 0) && (
        <div className="card" style={{ marginBottom: 16, padding: '14px 18px' }}>
          <div className="card-title" style={{ marginBottom: 10 }}>Modality Category Comparison {!includeScheduled && <span style={{ fontSize: 11, fontWeight: 400, color: 'var(--accent-orange)' }}> — Scheduled excluded from analysis above, shown here for reference</span>}</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 12 }}>
            {[
              { key: 'Async', color: '#26AEBC', icon: '📨' },
              { key: 'Sync', color: '#6366F1', icon: '📹' },
              { key: 'Scheduled', color: '#F59E0B', icon: '📅' }
            ].map(({ key, color, icon }) => {
              const c = modalityCategorySummary[key];
              if (c.total === 0) return null;
              const slaRate = c.total > 0 ? (c.met / c.total * 100) : 0;
              const avgTime = c.times.length > 0 ? (c.times.reduce((a, b) => a + b, 0) / c.times.length) : 0;
              return (
                <div key={key} style={{ background: 'var(--bg-primary)', border: `1px solid ${color}33`, borderLeft: `3px solid ${color}`, borderRadius: 'var(--radius)', padding: '12px 14px' }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color, marginBottom: 6 }}>{icon} {key} {key === 'Scheduled' && !includeScheduled && <span style={{ fontSize: 10, fontWeight: 400, color: 'var(--accent-orange)' }}>(excluded)</span>}</div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, fontSize: 12 }}>
                    <div><div style={{ color: 'var(--text-muted)', fontSize: 10 }}>Volume</div><div style={{ fontWeight: 700 }}>{c.total.toLocaleString()}</div></div>
                    <div><div style={{ color: 'var(--text-muted)', fontSize: 10 }}>SLA %</div><div style={{ fontWeight: 700, color: slaRate < 80 ? 'var(--accent-red)' : slaRate < 90 ? 'var(--accent-orange)' : 'var(--accent-teal)' }}>{slaRate.toFixed(1)}%</div></div>
                    <div><div style={{ color: 'var(--text-muted)', fontSize: 10 }}>Avg Resp</div><div style={{ fontWeight: 700 }}>{avgTime > 0 ? avgTime.toFixed(1) + 'm' : '-'}</div></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Trend Charts */}
      {(trendSlaConfig || trendVolumeConfig) && (
        <details open style={{ marginBottom: 16 }}>
          <summary style={{ cursor: 'pointer', fontWeight: 700, fontSize: 13, color: 'var(--text-primary)', marginBottom: 10, userSelect: 'none' }}>
            Trends Over Time
          </summary>
          <div style={{ display: 'flex', gap: 6, marginBottom: 12, alignItems: 'center' }}>
            <span style={{ fontSize: 11, color: 'var(--text-muted)', marginRight: 4 }}>Granularity:</span>
            {['day', 'week'].map(g => (
              <button key={g} className={`btn btn-sm ${granularity === g ? 'btn-primary' : 'btn-secondary'}`}
                style={{ padding: '3px 10px', fontSize: 11 }}
                onClick={() => setTrendGranularity(g === autoGranularity ? null : g)}>
                {g === 'day' ? 'Daily' : 'Weekly'}
              </button>
            ))}
            <span style={{ fontSize: 10, color: 'var(--text-muted)', marginLeft: 6 }}>
              ({trendBuckets.length} {granularity === 'week' ? 'weeks' : 'days'})
            </span>
          </div>
          <div className="grid-2">
            {trendSlaConfig && (
              <div className="card">
                <div className="card-title">SLA Rate Over Time</div>
                <ChartWrapper config={trendSlaConfig} height={280} />
              </div>
            )}
            {trendVolumeConfig && (
              <div className="card">
                <div className="card-title">Volume & Response Time</div>
                <ChartWrapper config={trendVolumeConfig} height={280} />
              </div>
            )}
          </div>
        </details>
      )}

      {/* By Partner */}
      {partnerRows.length > 1 && (
        <div className="card" style={{ marginBottom: 16 }}>
          <div className="card-title">Performance by Partner</div>
          <div className="table-wrap" style={{ maxHeight: 300, overflowY: 'auto' }}>
            <table>
              <thead><tr><th>Partner</th><th>SLA-Eligible</th><th>Met</th><th>Missed</th><th>SLA %</th><th>Clinicians</th></tr></thead>
              <tbody>
                {partnerRows.map(([p, d]) => (
                  <tr key={p}>
                    <td style={{ fontWeight: 600 }}>{p}</td>
                    <td>{d.total}</td>
                    <td>{d.met}</td>
                    <td style={{ color: d.missed > 0 ? 'var(--accent-red)' : 'inherit' }}>{d.missed}</td>
                    <td style={{ color: d.met/d.total < 0.8 ? 'var(--accent-red)' : 'inherit', fontWeight: 600 }}>{pct(d.met, d.total)}</td>
                    <td>{d.clinicians.size}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Partner SLA Scoreboard (Module 2A Enhancement) */}
      {partnerRows.length > 0 && (
        <details style={{ marginBottom: 16 }}>
          <summary style={{ cursor: 'pointer', fontWeight: 700, fontSize: 13, color: 'var(--text-primary)', marginBottom: 10 }}>
            📋 Partner SLA Scoreboard — Contractual Thresholds
          </summary>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 12 }}>
            {[1, 2, 3].map(tier => {
              const tierPartners = Object.entries(SLA_CONTRACTS).filter(([, c]) => c.tier === tier);
              if (tierPartners.length === 0) return null;
              return tierPartners.map(([pKey, contract]) => {
                const matchedPartner = partnerRows.find(([p]) => p.toLowerCase().includes(pKey));
                const pData = matchedPartner ? matchedPartner[1] : null;
                const slaRate = pData && pData.total > 0 ? pData.met / pData.total : null;
                return (
                  <div key={pKey} className={`card ${slaRate !== null ? slaCardClass(slaRate, contract.metrics[0]) : ''}`} style={{ padding: '12px 14px' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                      <span style={{ fontWeight: 700, fontSize: 13 }}>{contract.label}</span>
                      <span style={{ fontSize: 10, background: 'var(--bg-primary)', padding: '2px 8px', borderRadius: 10 }}>Tier {tier}</span>
                    </div>
                    {slaRate !== null ? (
                      <div>
                        <div style={{ fontSize: 22, fontWeight: 800 }} className={slaTrafficLight(slaRate, contract.metrics[0])}>{(slaRate * 100).toFixed(1)}%</div>
                        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>{pData.total} consults | {pData.met} met | {pData.missed} missed</div>
                        <div style={{ marginTop: 8, fontSize: 11 }}>
                          {contract.metrics.map((m, mi) => (
                            <div key={mi} style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0', borderTop: mi > 0 ? '1px solid var(--border)' : 'none' }}>
                              <span>{m.name}</span>
                              <span style={{ fontWeight: 600 }}>Target: {typeof m.target === 'number' && m.target < 1 ? (m.target * 100).toFixed(1) + '%' : m.target}</span>
                            </div>
                          ))}
                          {contract.metrics[0].breachRule && <div style={{ fontSize: 10, color: 'var(--accent-orange)', marginTop: 4 }}>⚠️ Breach: {contract.metrics[0].breachRule}</div>}
                        </div>
                      </div>
                    ) : (
                      <div style={{ color: 'var(--text-muted)', fontSize: 12 }}>No data for this partner in current filters</div>
                    )}
                  </div>
                );
              });
            })}
          </div>
        </details>
      )}

      {/* Hourly SLA Heatmap (Module 2B Enhancement) */}
      {filtered.length > 50 && (() => {
        const dowNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const heatGrid = {};
        filtered.forEach(r => {
          if (isCanceled(r, cm)) return;
          const d = parseDate(cm.date ? r[cm.date] : '');
          if (!d) return;
          const dow = ctDow(d);
          const hr = ctHour(d);
          const key = `${dow}-${hr}`;
          if (!heatGrid[key]) heatGrid[key] = { met: 0, total: 0 };
          heatGrid[key].total++;
          if (isSlaMet(r, cm)) heatGrid[key].met++;
        });
        return (
          <details style={{ marginBottom: 16 }}>
            <summary style={{ cursor: 'pointer', fontWeight: 700, fontSize: 13, color: 'var(--text-primary)', marginBottom: 10 }}>
              📊 Hourly SLA Heatmap — Day of Week × Hour
            </summary>
            <div className="card" style={{ overflowX: 'auto' }}>
              <table style={{ fontSize: 10, borderCollapse: 'collapse', width: '100%' }}>
                <thead>
                  <tr><th style={{ padding: 4 }}>DOW</th>{Array.from({ length: 24 }, (_, h) => <th key={h} style={{ padding: '4px 2px', textAlign: 'center' }}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {dowNames.map((name, dow) => (
                    <tr key={dow}>
                      <td style={{ fontWeight: 600, padding: 4 }}>{name}</td>
                      {Array.from({ length: 24 }, (_, hr) => {
                        const cell = heatGrid[`${dow}-${hr}`];
                        const rate = cell && cell.total > 0 ? cell.met / cell.total : null;
                        const bg = rate === null ? '#f5f5f5' : rate >= 0.95 ? '#d1fae5' : rate >= 0.85 ? '#fef3c7' : rate >= 0.70 ? '#fed7aa' : '#fecaca';
                        return <td key={hr} style={{ background: bg, textAlign: 'center', padding: '4px 2px', fontWeight: rate !== null && rate < 0.85 ? 700 : 400, color: rate !== null && rate < 0.80 ? 'var(--accent-red)' : 'inherit' }} title={cell ? `${name} ${hr}:00 — ${cell.met}/${cell.total} (${(rate * 100).toFixed(0)}%)` : 'No data'}>
                          {cell ? (rate * 100).toFixed(0) : ''}
                        </td>;
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 8 }}>
                Cells show SLA % by day-of-week and hour. <span style={{ background: '#d1fae5', padding: '1px 6px', borderRadius: 3 }}>≥95%</span>{' '}
                <span style={{ background: '#fef3c7', padding: '1px 6px', borderRadius: 3 }}>85-94%</span>{' '}
                <span style={{ background: '#fed7aa', padding: '1px 6px', borderRadius: 3 }}>70-84%</span>{' '}
                <span style={{ background: '#fecaca', padding: '1px 6px', borderRadius: 3 }}>&lt;70%</span>
              </div>
            </div>
          </details>
        );
      })()}

      {/* By Modality */}
      {modalityRows.length > 0 && (
        <div className="card" style={{ marginBottom: 16 }}>
          <div className="card-title">Performance by Modality</div>
          <div className="table-wrap" style={{ maxHeight: 300, overflowY: 'auto' }}>
            <table>
              <thead><tr><th>Modality</th><th>Category</th><th>SLA-Eligible</th><th>Met</th><th>Missed</th><th>SLA %</th><th>Avg Resp (min)</th></tr></thead>
              <tbody>
                {modalityRows.map(([m, d]) => {
                  const cat = classifyModality(m);
                  const catColor = cat === 'Async' ? '#26AEBC' : cat === 'Sync' ? '#6366F1' : cat === 'Scheduled' ? '#F59E0B' : '#94a3b8';
                  return (
                    <tr key={m}>
                      <td style={{ fontWeight: 600 }}>{m}</td>
                      <td><span style={{ fontSize: 10, fontWeight: 600, padding: '2px 8px', borderRadius: 10, background: catColor + '1A', color: catColor, border: `1px solid ${catColor}44` }}>{cat}</span></td>
                      <td>{d.total}</td>
                      <td>{d.met}</td>
                      <td style={{ color: d.missed > 0 ? 'var(--accent-red)' : 'inherit' }}>{d.missed}</td>
                      <td style={{ color: d.met/d.total < 0.8 ? 'var(--accent-red)' : 'inherit', fontWeight: 600 }}>{pct(d.met, d.total)}</td>
                      <td>{d.times.length > 0 ? (d.times.reduce((a,b)=>a+b,0)/d.times.length).toFixed(1) : '-'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      <div className="grid-2">
        <div className="card">
          <div className="card-title">Performance by State</div>
          <div className="table-wrap" style={{ maxHeight: 400, overflowY: 'auto' }}>
            <table>
              <thead><tr><th>State</th><th>Volume</th><th>Met</th><th>Missed</th><th>SLA %</th><th>Avg Resp</th><th>Clinicians</th></tr></thead>
              <tbody>
                {stateRows.map(([st, d]) => (
                  <tr key={st}>
                    <td style={{ fontWeight: 600 }}>{st}</td>
                    <td>{d.total}</td>
                    <td>{d.met}</td>
                    <td style={{ color: d.missed > 0 ? 'var(--accent-red)' : 'inherit' }}>{d.missed}</td>
                    <td style={{ color: d.met/d.total < 0.8 ? 'var(--accent-red)' : 'inherit', fontWeight: 600 }}>{pct(d.met, d.total)}</td>
                    <td>{d.times.length > 0 ? (d.times.reduce((a,b)=>a+b,0)/d.times.length).toFixed(1) + 'm' : '-'}</td>
                    <td>{d.clinicians.size}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <div className="card">
          <div className="card-title">Performance by Clinician</div>
          <div className="table-wrap" style={{ maxHeight: 400, overflowY: 'auto' }}>
            <table>
              <thead><tr><th>Clinician</th><th>Volume</th><th>Met</th><th>Missed</th><th>SLA %</th><th>Avg Resp</th><th>Partners</th><th>States</th></tr></thead>
              <tbody>
                {clinRows.slice(0, 100).map(([name, d]) => (
                  <tr key={name}>
                    <td style={{ fontWeight: 500 }}>{name}</td>
                    <td>{d.total}</td>
                    <td>{d.met}</td>
                    <td style={{ color: d.missed > 0 ? 'var(--accent-red)' : 'inherit' }}>{d.missed}</td>
                    <td style={{ color: d.met/d.total < 0.8 ? 'var(--accent-red)' : 'inherit', fontWeight: 600 }}>{pct(d.met, d.total)}</td>
                    <td>{d.times.length > 0 ? (d.times.reduce((a,b)=>a+b,0)/d.times.length).toFixed(1) + 'm' : '-'}</td>
                    <td style={{ fontSize: 11 }}>{[...d.partners].join(', ')}</td>
                    <td style={{ fontSize: 11 }}>{[...d.states].join(', ')}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {/* Column diagnostics */}
      <details style={{ marginTop: 16, fontSize: 11, color: 'var(--text-muted)' }}>
        <summary style={{ cursor: 'pointer' }}>Detected Columns ({stats.detectedCols.length})</summary>
        <div style={{ padding: 8, fontFamily: 'var(--font-mono)', background: 'var(--bg-primary)', borderRadius: 'var(--radius)', marginTop: 4 }}>
          {stats.detectedCols.map((c, i) => <div key={i}>{c}</div>)}
        </div>
      </details>
    </div>
  );
}

// ========================== TAB: INSIGHTS & ANALYSIS ==========================
function InsightsTab({ actualsData, forecast, history, masterRoster, shiftScheduleData, calloutData }) {
  const [serviceLine, setServiceLine] = useState('ALL');
  const cm = useMemo(() => buildColMap(actualsData), [actualsData]);
  const rowState = useCallback(r => cm.state ? (r[cm.state] || '') : '', [cm]);
  const rowClinician = useCallback(r => cm.clinician ? (r[cm.clinician] || '') : '', [cm]);
  const rowModality = useCallback(r => {
    const mod = cm.modality ? (r[cm.modality] || '') : '';
    return mod || (cm.consultType ? (r[cm.consultType] || '') : '');
  }, [cm]);

  // Filter by service line
  const slData = useMemo(() => {
    if (!actualsData || actualsData.length === 0) return [];
    if (serviceLine === 'ALL') return actualsData;
    return actualsData.filter(r => {
      const p = cm.partner ? (r[cm.partner] || '') : '';
      const e = cm.entityName ? (r[cm.entityName] || '') : '';
      if (serviceLine === 'TC') return (p + ' ' + e).toLowerCase().includes('transcarent') || r._detectedSL === 'TC';
      return (mapPartnerToSL(p) || mapEntityToSL(e)) === serviceLine || r._detectedSL === serviceLine;
    });
  }, [actualsData, serviceLine, cm]);

  // Exclude canceled rows
  const eligible = useMemo(() => slData.filter(r => !isCanceled(r, cm)), [slData, cm]);

  // ===== A. Day-of-Week Analysis =====
  const dowAnalysis = useMemo(() => {
    if (eligible.length === 0) return null;
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const buckets = days.map(() => ({ total: 0, met: 0, missed: 0, times: [], modCats: {} }));

    eligible.forEach(r => {
      const d = parseDate(cm.date ? r[cm.date] : '');
      if (!d) return;
      const dow = ctDow(d);
      buckets[dow].total++;
      if (isSlaMet(r, cm)) buckets[dow].met++;
      if (isSlaMissed(r, cm)) buckets[dow].missed++;
      const t = parseResponseTimeRobust(cm.responseTime ? r[cm.responseTime] : '');
      if (t !== null && t >= 0) buckets[dow].times.push(t);
      const cat = classifyModality(rowModality(r));
      if (!buckets[dow].modCats[cat]) buckets[dow].modCats[cat] = { total: 0, met: 0 };
      buckets[dow].modCats[cat].total++;
      if (isSlaMet(r, cm)) buckets[dow].modCats[cat].met++;
    });

    const avgVol = buckets.reduce((s, b) => s + b.total, 0) / 7;
    const alerts = [];
    buckets.forEach((b, i) => {
      if (b.total > 0 && b.total > avgVol * 1.3) {
        alerts.push({ day: days[i], pctAbove: ((b.total / avgVol - 1) * 100).toFixed(0) });
      }
    });

    return { days, buckets, avgVol, alerts };
  }, [eligible, cm, rowModality]);

  // DOW Volume chart config
  const dowVolumeConfig = useMemo(() => {
    if (!dowAnalysis) return null;
    return {
      type: 'bar',
      data: {
        labels: dowAnalysis.days,
        datasets: [{
          label: 'Volume',
          data: dowAnalysis.buckets.map(b => b.total),
          backgroundColor: dowAnalysis.buckets.map(b => b.total > dowAnalysis.avgVol * 1.3 ? 'rgba(239,68,68,0.6)' : 'rgba(38,174,188,0.5)'),
          borderColor: dowAnalysis.buckets.map(b => b.total > dowAnalysis.avgVol * 1.3 ? '#ef4444' : '#26AEBC'),
          borderWidth: 1,
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { font: { size: 10 } } }, x: { ticks: { font: { size: 11 } } } } }
    };
  }, [dowAnalysis]);

  // DOW SLA chart config
  const dowSlaConfig = useMemo(() => {
    if (!dowAnalysis) return null;
    return {
      type: 'line',
      data: {
        labels: dowAnalysis.days,
        datasets: [
          { label: 'SLA %', data: dowAnalysis.buckets.map(b => b.total > 0 ? (b.met / b.total * 100) : null), borderColor: '#26AEBC', backgroundColor: 'rgba(38,174,188,0.1)', fill: true, tension: 0.3, pointRadius: 5 },
          { label: '90% Target', data: dowAnalysis.days.map(() => 90), borderColor: '#FF264D', borderDash: [6, 4], borderWidth: 1.5, pointRadius: 0 }
        ]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 11 } } } }, scales: { y: { min: 0, max: 100, ticks: { callback: v => v + '%', font: { size: 10 } } }, x: { ticks: { font: { size: 11 } } } } }
    };
  }, [dowAnalysis]);

  // ===== B. Root Cause Indicators =====
  const rootCauses = useMemo(() => {
    if (eligible.length === 0) return null;
    const missed = eligible.filter(r => isSlaMissed(r, cm));
    const totalMissed = missed.length;
    if (totalMissed === 0) return { states: [], clinicians: [], modalities: [], totalMissed: 0 };

    // By state
    const stateCount = {};
    missed.forEach(r => { const st = rowState(r) || 'Unknown'; stateCount[st] = (stateCount[st] || 0) + 1; });
    const states = Object.entries(stateCount).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([st, c]) => ({ name: st, count: c, pct: (c / totalMissed * 100).toFixed(1) }));

    // By clinician (min 10 consults)
    const clinStats = {};
    eligible.forEach(r => {
      const cl = rowClinician(r) || 'Unknown';
      if (!clinStats[cl]) clinStats[cl] = { total: 0, missed: 0 };
      clinStats[cl].total++;
      if (isSlaMissed(r, cm)) clinStats[cl].missed++;
    });
    const clinicians = Object.entries(clinStats).filter(([, d]) => d.total >= 10).sort((a, b) => (b[1].missed / b[1].total) - (a[1].missed / a[1].total)).slice(0, 5)
      .map(([name, d]) => ({ name, total: d.total, missed: d.missed, missRate: (d.missed / d.total * 100).toFixed(1) }));

    // By modality category
    const modStats = {};
    eligible.forEach(r => {
      const cat = classifyModality(rowModality(r));
      if (!modStats[cat]) modStats[cat] = { total: 0, missed: 0 };
      modStats[cat].total++;
      if (isSlaMissed(r, cm)) modStats[cat].missed++;
    });
    const modalities = Object.entries(modStats).sort((a, b) => (b[1].missed / b[1].total) - (a[1].missed / a[1].total))
      .map(([cat, d]) => ({ name: cat, total: d.total, missed: d.missed, missRate: (d.missed / d.total * 100).toFixed(1) }));

    return { states, clinicians, modalities, totalMissed };
  }, [eligible, cm, rowState, rowClinician, rowModality]);

  // Root cause chart config
  const rootCauseConfig = useMemo(() => {
    if (!rootCauses || rootCauses.states.length === 0) return null;
    return {
      type: 'bar',
      data: {
        labels: rootCauses.states.map(s => s.name),
        datasets: [{ label: 'Misses', data: rootCauses.states.map(s => s.count), backgroundColor: 'rgba(239,68,68,0.6)', borderColor: '#ef4444', borderWidth: 1 }]
      },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { font: { size: 10 } } }, y: { ticks: { font: { size: 11 } } } } }
    };
  }, [rootCauses]);

  // ===== C. Variance Decomposition =====
  const variance = useMemo(() => {
    if (!history || history.length < 2) return null;
    const sorted = [...history].sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''));
    const current = sorted[0];
    const previous = sorted[1];
    if (!current || !previous) return null;
    const slaD = (current.slaRate || 0) - (previous.slaRate || 0);
    const volD = previous.consults > 0 ? ((current.consults - previous.consults) / previous.consults * 100) : 0;
    return { current, previous, slaDelta: slaD, volChange: volD };
  }, [history]);

  // ===== D. Forward-Looking Gaps =====
  const forwardGaps = useMemo(() => {
    if (!forecast) return null;
    const gaps = forecast.hours.filter(h => h.arrivals > 0).map(h => {
      const hourSla = h.arrivals > 0 ? ((h.arrivals - h.totalMiss) / h.arrivals * 100) : 100;
      const avgVph = masterRoster ? masterRoster.filter(c => c.vph > 0).reduce((s, c) => s + c.vph, 0) / Math.max(masterRoster.filter(c => c.vph > 0).length, 1) : 1.5;
      const hcNeeded = hourSla < 90 ? Math.ceil(h.arrivals / (avgVph * 0.9)) : h.headcount;
      return { label: h.label, hc: h.headcount, arrivals: h.arrivals.toFixed(1), misses: h.totalMiss.toFixed(2), sla: hourSla.toFixed(1), hcNeeded, deficit: Math.max(0, hcNeeded - h.headcount) };
    });
    const totalDeficit = gaps.reduce((s, g) => s + g.deficit, 0);
    return { gaps, totalDeficit };
  }, [forecast, masterRoster]);

  if (!actualsData || actualsData.length === 0) {
    return (
      <div className="empty-state">
        <div className="icon">&#128269;</div>
        <p>Upload actuals data to see insights and root cause analysis</p>
        <div className="hint">This tab analyzes patterns in your performance data to identify what's driving results</div>
      </div>
    );
  }

  // Root Cause Engine data (Module 6A)
  const causalChain = useMemo(() => {
    if (!slData || slData.length < 10) return null;
    const total = slData.filter(r => !isCanceled(r, cm)).length;
    const missed = slData.filter(r => !isCanceled(r, cm) && isSlaMissed(r, cm)).length;
    if (total === 0 || missed / total < 0.05) return null; // Only show if >5% miss rate
    const steps = [];
    // Step 1: Staffing gap?
    const hasStaffing = shiftScheduleData && shiftScheduleData.length > 0;
    let staffingFlag = false;
    if (hasStaffing) {
      const grid = Array(24).fill(0);
      shiftScheduleData.forEach(r => { if (r.hour >= 0) grid[r.hour]++; });
      const zeroSlots = grid.filter((v, h) => h >= 6 && h < 24 && v === 0).length;
      staffingFlag = zeroSlots > 2;
    }
    steps.push({ label: '1. Staffing Gap', detail: hasStaffing ? (staffingFlag ? 'Gaps detected' : 'Coverage OK') : 'No data', flagged: staffingFlag });
    // Step 2: Volume anomaly?
    const hourly = Array(24).fill(0);
    slData.forEach(r => { const d = parseDate(r[cm.date] || ''); if (d) hourly[ctHour(d)]++; });
    const days = new Set(slData.map(r => { const d = parseDate(r[cm.date] || ''); return d ? d.toDateString() : null; }).filter(Boolean)).size || 1;
    let volFlag = false;
    for (let h = 6; h < 22; h++) {
      const idx = h; // simplified — use average day
      const baseline = TC_ARRIVALS.length > idx ? TC_ARRIVALS[idx][24] : 0;
      if (baseline > 0 && (hourly[h] / days) / baseline > 1.25) { volFlag = true; break; }
    }
    steps.push({ label: '2. Volume Anomaly', detail: volFlag ? 'Exceeds baseline >25%' : 'Within range', flagged: volFlag });
    // Step 3: Clinician performance?
    const clinMisses = {};
    slData.filter(r => !isCanceled(r, cm)).forEach(r => {
      const c = (r[cm.clinician] || '').trim();
      if (!c) return;
      if (!clinMisses[c]) clinMisses[c] = { total: 0, missed: 0 };
      clinMisses[c].total++;
      if (isSlaMissed(r, cm)) clinMisses[c].missed++;
    });
    const topMissers = Object.entries(clinMisses).filter(([, v]) => v.total >= 5 && v.missed / v.total > 0.20).length;
    const clinFlag = topMissers >= 3;
    steps.push({ label: '3. Clinician Perf.', detail: clinFlag ? `${topMissers} high-miss clinicians` : 'Acceptable', flagged: clinFlag });
    // Step 4: Call-outs?
    const hasCallouts = calloutData && calloutData.length > 0;
    const recentCallouts = hasCallouts ? calloutData.filter(r => r.callOutDate && (new Date() - r.callOutDate) < 14 * 86400000).length : 0;
    const calloutFlag = recentCallouts >= 5;
    steps.push({ label: '4. Attendance', detail: hasCallouts ? (calloutFlag ? `${recentCallouts} recent call-outs` : `${recentCallouts} call-outs (OK)`) : 'No data', flagged: calloutFlag });
    // Step 5: Credential mix?
    const credCounts = { mddo: 0, nppa: 0 };
    if (hasStaffing) shiftScheduleData.forEach(r => { if (r.credClass === 'MD/DO') credCounts.mddo++; else if (r.credClass === 'NP/PA') credCounts.nppa++; });
    const credTotal = credCounts.mddo + credCounts.nppa;
    const credFlag = credTotal > 5 && credCounts.nppa / credTotal > 0.80;
    steps.push({ label: '5. Credential Mix', detail: credTotal > 0 ? (credFlag ? `${pct(credCounts.nppa/credTotal)} NP/PA` : 'Balanced') : 'No data', flagged: credFlag });
    // Primary driver
    const primary = steps.find(s => s.flagged) || steps[0];
    // Attribution weights
    const weights = { staffing: staffingFlag ? 30 : 5, volume: volFlag ? 25 : 5, clinician: clinFlag ? 20 : 10, attendance: calloutFlag ? 15 : 5, credential: credFlag ? 10 : 5 };
    const wTotal = Object.values(weights).reduce((a,b)=>a+b,0);
    const pcts = Object.fromEntries(Object.entries(weights).map(([k,v])=>[k, Math.round(v/wTotal*100)]));
    return { steps, primary, missRate: pct(missed / total), pcts };
  }, [slData, cm, shiftScheduleData, calloutData]);

  return (
    <div>
      <SLFilter value={serviceLine} onChange={setServiceLine} />
      {/* Root Cause Engine (Module 6) */}
      {causalChain && (
        <details open style={{ marginBottom: 16 }}>
          <summary className="section-toggle">🔍 Root Cause Analysis — SLA Miss Rate: {causalChain.missRate}</summary>
          <div className="card" style={{marginBottom:12}}>
            <div style={{fontSize:12,marginBottom:8,color:'var(--text-muted)'}}>Automated 5-step causal chain — primary driver highlighted</div>
            <div className="causal-chain">
              {causalChain.steps.map((s, i) => (
                <React.Fragment key={i}>
                  {i > 0 && <div className="causal-arrow">→</div>}
                  <div className={`causal-node ${s.flagged ? 'flagged' : 'clear'}`}>
                    <div style={{fontWeight:700,fontSize:11}}>{s.label}</div>
                    <div style={{fontSize:10,marginTop:4}}>{s.detail}</div>
                  </div>
                </React.Fragment>
              ))}
            </div>
            <div style={{marginTop:12,fontSize:12,fontWeight:600}}>
              Primary driver: <span style={{color:'var(--accent-red)'}}>{causalChain.primary.label}</span> — {causalChain.primary.detail}
            </div>
          </div>
          <div className="card">
            <div className="card-title">Performance Attribution</div>
            <div style={{display:'flex',height:28,borderRadius:6,overflow:'hidden',marginBottom:8}}>
              {Object.entries(causalChain.pcts).map(([k, v]) => {
                const colors = { staffing: '#3b82f6', volume: '#f59e0b', clinician: '#ef4444', attendance: '#8b5cf6', credential: '#14b8a6' };
                return v > 0 ? <div key={k} style={{width:`${v}%`,background:colors[k],display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:600}} title={`${k}: ${v}%`}>{v > 8 ? `${v}%` : ''}</div> : null;
              })}
            </div>
            <div style={{display:'flex',gap:12,flexWrap:'wrap',fontSize:11}}>
              {Object.entries(causalChain.pcts).map(([k, v]) => {
                const labels = { staffing: 'Staffing', volume: 'Volume', clinician: 'Clinician', attendance: 'Attendance', credential: 'Credential' };
                const colors = { staffing: '#3b82f6', volume: '#f59e0b', clinician: '#ef4444', attendance: '#8b5cf6', credential: '#14b8a6' };
                return <span key={k}><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:colors[k],marginRight:4,verticalAlign:'middle'}}></span>{labels[k]}: {v}%</span>;
              })}
            </div>
          </div>
        </details>
      )}

      {/* A. Day-of-Week Deep Dive */}
      {dowAnalysis && (
        <details open style={{ marginBottom: 16 }}>
          <summary style={{ cursor: 'pointer', fontWeight: 700, fontSize: 13, color: 'var(--text-primary)', marginBottom: 10 }}>Day-of-Week Deep Dive</summary>

          {/* Alerts */}
          {dowAnalysis.alerts.length > 0 && (
            <div style={{ marginBottom: 12 }}>
              {dowAnalysis.alerts.map((a, i) => (
                <div key={i} className="gap-alert" style={{ marginBottom: 4 }}>
                  <span className="alert-icon">!</span> <strong>{a.day}</strong> volume is {a.pctAbove}% above average
                </div>
              ))}
            </div>
          )}

          <div className="grid-2">
            {dowVolumeConfig && (
              <div className="card">
                <div className="card-title">Volume by Day of Week</div>
                <ChartWrapper config={dowVolumeConfig} height={250} />
              </div>
            )}
            {dowSlaConfig && (
              <div className="card">
                <div className="card-title">SLA % by Day of Week</div>
                <ChartWrapper config={dowSlaConfig} height={250} />
              </div>
            )}
          </div>

          {/* DOW × Modality Heat Table */}
          <div className="card" style={{ marginTop: 12 }}>
            <div className="card-title">SLA % by Day × Modality Category</div>
            <div className="table-wrap">
              <table>
                <thead>
                  <tr><th>Modality</th>{dowAnalysis.days.map(d => <th key={d}>{d}</th>)}</tr>
                </thead>
                <tbody>
                  {['Async', 'Sync', 'Scheduled'].map(cat => (
                    <tr key={cat}>
                      <td style={{ fontWeight: 600 }}>{cat}</td>
                      {dowAnalysis.buckets.map((b, i) => {
                        const mc = b.modCats[cat];
                        if (!mc || mc.total === 0) return <td key={i} style={{ color: 'var(--text-muted)', fontSize: 11 }}>-</td>;
                        const sla = (mc.met / mc.total * 100);
                        return <td key={i} style={{ fontWeight: 600, fontSize: 11, color: sla < 80 ? 'var(--accent-red)' : sla < 90 ? 'var(--accent-orange)' : 'var(--accent-teal)' }}>{sla.toFixed(0)}%</td>;
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </details>
      )}

      {/* B. Root Cause Indicators */}
      {rootCauses && rootCauses.totalMissed > 0 && (
        <details open style={{ marginBottom: 16 }}>
          <summary style={{ cursor: 'pointer', fontWeight: 700, fontSize: 13, color: 'var(--text-primary)', marginBottom: 10 }}>Root Cause Indicators ({rootCauses.totalMissed} total misses)</summary>

          <div className="grid-2">
            {/* Top States */}
            <div className="card">
              <div className="card-title">Top States Driving Misses</div>
              {rootCauseConfig && <ChartWrapper config={rootCauseConfig} height={200} />}
              <div style={{ marginTop: 8 }}>
                {rootCauses.states.map((s, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4, fontSize: 12 }}>
                    <div style={{ width: `${Math.min(100, parseFloat(s.pct))}%`, minWidth: 4, height: 6, background: 'var(--accent-red)', borderRadius: 3 }}></div>
                    <span style={{ fontWeight: 600 }}>{s.name}</span>
                    <span style={{ color: 'var(--text-muted)' }}>{s.count} misses ({s.pct}%)</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Top Clinicians with Worst SLA */}
            <div className="card">
              <div className="card-title">Clinicians with Highest Miss Rate (≥10 consults)</div>
              {rootCauses.clinicians.map((c, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6, fontSize: 12 }}>
                  <div style={{ width: `${Math.min(100, parseFloat(c.missRate))}%`, minWidth: 4, height: 6, background: 'var(--accent-orange)', borderRadius: 3 }}></div>
                  <span style={{ fontWeight: 600 }}>{c.name}</span>
                  <span style={{ color: 'var(--text-muted)' }}>{c.missed}/{c.total} ({c.missRate}%)</span>
                </div>
              ))}
            </div>
          </div>

          {/* Modality Miss Rates */}
          <div className="card" style={{ marginTop: 12 }}>
            <div className="card-title">Miss Rate by Modality Category</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 10 }}>
              {rootCauses.modalities.map((m, i) => {
                const color = parseFloat(m.missRate) > 20 ? 'var(--accent-red)' : parseFloat(m.missRate) > 10 ? 'var(--accent-orange)' : 'var(--accent-teal)';
                return (
                  <div key={i} style={{ padding: '10px 14px', background: 'var(--bg-primary)', borderRadius: 'var(--radius)', border: '1px solid var(--border)' }}>
                    <div style={{ fontWeight: 700, fontSize: 13 }}>{m.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{m.total} eligible</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color }}>{m.missRate}% miss rate</div>
                  </div>
                );
              })}
            </div>
          </div>
        </details>
      )}

      {/* C. Variance Decomposition */}
      {variance && (
        <details open style={{ marginBottom: 16 }}>
          <summary style={{ cursor: 'pointer', fontWeight: 700, fontSize: 13, color: 'var(--text-primary)', marginBottom: 10 }}>Period-over-Period Variance</summary>
          <div className="card">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16, marginBottom: 12 }}>
              <div style={{ padding: '12px', background: 'var(--bg-primary)', borderRadius: 'var(--radius)', textAlign: 'center' }}>
                <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>SLA Change</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: variance.slaDelta > 0 ? 'var(--accent-teal)' : 'var(--accent-red)' }}>
                  {variance.slaDelta > 0 ? '+' : ''}{variance.slaDelta.toFixed(1)}%
                </div>
                <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>{variance.previous.slaRate?.toFixed(1)}% → {variance.current.slaRate?.toFixed(1)}%</div>
              </div>
              <div style={{ padding: '12px', background: 'var(--bg-primary)', borderRadius: 'var(--radius)', textAlign: 'center' }}>
                <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>Volume Change</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: variance.volChange > 20 ? 'var(--accent-orange)' : 'var(--text-primary)' }}>
                  {variance.volChange > 0 ? '+' : ''}{variance.volChange.toFixed(1)}%
                </div>
                <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>{variance.previous.consults} → {variance.current.consults} consults</div>
              </div>
              <div style={{ padding: '12px', background: 'var(--bg-primary)', borderRadius: 'var(--radius)', textAlign: 'center' }}>
                <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>Current Period</div>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{variance.current.period}</div>
                <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>vs {variance.previous.period}</div>
              </div>
            </div>
            {variance.slaDelta < -2 && variance.volChange > 15 && (
              <div className="gap-alert"><span className="alert-icon">!</span> SLA dropped {Math.abs(variance.slaDelta).toFixed(1)}% while volume rose {variance.volChange.toFixed(0)}% — volume surge likely primary driver</div>
            )}
            {variance.slaDelta < -2 && variance.volChange <= 15 && (
              <div className="gap-alert"><span className="alert-icon">!</span> SLA dropped {Math.abs(variance.slaDelta).toFixed(1)}% with only {variance.volChange.toFixed(0)}% volume change — investigate staffing/efficiency</div>
            )}
          </div>
        </details>
      )}

      {/* D. Forward-Looking Gaps */}
      {forwardGaps && (
        <details open style={{ marginBottom: 16 }}>
          <summary style={{ cursor: 'pointer', fontWeight: 700, fontSize: 13, color: 'var(--text-primary)', marginBottom: 10 }}>Forward-Looking Staffing Gaps {forwardGaps.totalDeficit > 0 && <span style={{ color: 'var(--accent-red)', fontSize: 11 }}>({forwardGaps.totalDeficit} total clinician-hours needed)</span>}</summary>
          <div className="card">
            <div className="table-wrap" style={{ maxHeight: 400, overflowY: 'auto' }}>
              <table>
                <thead><tr><th>Hour</th><th>Current HC</th><th>Arrivals</th><th>Pred. Misses</th><th>Est. SLA %</th><th>HC for 90%</th><th>Deficit</th></tr></thead>
                <tbody>
                  {forwardGaps.gaps.map(g => (
                    <tr key={g.label} style={{ background: g.deficit > 0 ? 'var(--accent-red-soft)' : 'transparent' }}>
                      <td style={{ fontWeight: 600 }}>{g.label}</td>
                      <td>{g.hc}</td>
                      <td>{g.arrivals}</td>
                      <td style={{ color: parseFloat(g.misses) > 1 ? 'var(--accent-red)' : 'inherit' }}>{g.misses}</td>
                      <td style={{ fontWeight: 600, color: parseFloat(g.sla) < 80 ? 'var(--accent-red)' : parseFloat(g.sla) < 90 ? 'var(--accent-orange)' : 'var(--accent-teal)' }}>{g.sla}%</td>
                      <td>{g.hcNeeded}</td>
                      <td style={{ fontWeight: 700, color: g.deficit > 0 ? 'var(--accent-red)' : 'var(--accent-teal)' }}>{g.deficit > 0 ? `+${g.deficit}` : '✓'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {forwardGaps.totalDeficit > 0 && (
              <div style={{ marginTop: 10, padding: '10px 14px', background: 'var(--accent-orange-soft)', borderRadius: 'var(--radius)', fontSize: 12, fontWeight: 600, color: 'var(--accent-orange)' }}>
                To reach 90% SLA across all hours, need approximately {forwardGaps.totalDeficit} additional clinician-hour(s) of coverage
              </div>
            )}
          </div>
        </details>
      )}

      {/* E. Arrival Curve Analysis (Module 3A) */}
      {slData.length > 0 && (() => {
        const hourly = Array(24).fill(0);
        slData.forEach(r => { const d = parseDate(r[cm.date] || ''); if (d) hourly[ctHour(d)]++; });
        const uniqueDays = new Set(slData.map(r => { const d = parseDate(r[cm.date] || ''); return d ? d.toDateString() : null; }).filter(Boolean)).size || 1;
        const avgHourly = hourly.map(v => +(v / uniqueDays).toFixed(2));
        // Build TC baseline (average across week for simple comparison)
        const tcBaseline = Array(24).fill(0);
        for (let h = 0; h < 24; h++) {
          let sum = 0;
          for (let d = 0; d < 7; d++) { const idx = d * 24 + h; if (idx < TC_ARRIVALS.length) sum += TC_ARRIVALS[idx][24]; }
          tcBaseline[h] = +(sum / 7).toFixed(2);
        }
        const deviations = avgHourly.map((v, h) => tcBaseline[h] > 0 ? ((v - tcBaseline[h]) / tcBaseline[h]) : 0);
        const flagged = deviations.map((d, h) => Math.abs(d) > 0.25 ? h : -1).filter(h => h >= 0);

        const arrivalConfig = {
          type: 'line',
          data: {
            labels: Array.from({length: 24}, (_, h) => `${String(h).padStart(2,'0')}:00`),
            datasets: [
