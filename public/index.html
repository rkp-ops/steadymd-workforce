// ========================== SYNTHESIZE VPH FROM ACTUALS + SHIFTS ==========================
function synthesizeVphFromData(shiftScheduleData, actualsData) {
  if (!shiftScheduleData || !actualsData || shiftScheduleData.length === 0 || actualsData.length === 0) return [];
  const cm = buildColMap(actualsData);

  // Group shifts by clinician+date → total hours
  const shiftMap = {}; // key: normName|YYYY-MM-DD → { name, hours, credential, partner, sl, start, end }
  shiftScheduleData.filter(r => !r.unfilled && r.clinician).forEach(r => {
    const norm = normalizeName(r.clinician);
    const dateKey = r.start ? r.start.toISOString().slice(0, 10) : '';
    if (!dateKey) return;
    const k = norm + '|' + dateKey;
    if (!shiftMap[k]) shiftMap[k] = { name: r.clinician, norm, date: dateKey, hours: 0, credential: r.credential || '', sl: r.sl || '', shifts: 0 };
    shiftMap[k].hours += r.hours || 0;
    shiftMap[k].shifts++;
  });

  // Group actuals by clinician+date → visit count, modality distribution
  const visitMap = {}; // key: normName|YYYY-MM-DD → { visits, modalities }
  actualsData.forEach(r => {
    if (isCanceled(r, cm)) return;
    const name = cm.clinician ? r[cm.clinician] : (r[cm.name] || '');
    const norm = normalizeName(name);
    if (!norm) return;
    const dt = parseDate(cm.date ? r[cm.date] : '');
    if (!dt) return;
    const dateKey = dt.toISOString().slice(0, 10);
    const k = norm + '|' + dateKey;
    if (!visitMap[k]) visitMap[k] = { visits: 0, modalities: {} };
    visitMap[k].visits++;
    const mod = cm.modality ? (r[cm.modality] || 'Unknown') : 'Unknown';
    visitMap[k].modalities[mod] = (visitMap[k].modalities[mod] || 0) + 1;
  });

  // Join: for each shift record, find matching visit count
  const records = [];
  Object.entries(shiftMap).forEach(([k, s]) => {
    const v = visitMap[k];
    const visits = v ? v.visits : 0;
    const topMod = v ? Object.entries(v.modalities).sort((a, b) => b[1] - a[1])[0]?.[0] || '' : '';
    records.push({
      clinician_id: s.norm,
      clinician_name: s.name,
      credential: s.credential,
      partner: s.sl || '',
      partner_sl: s.sl || '',
      shift_date: s.date,
      shift_start: '',
      shift_end: '',
      scheduled_hours: s.hours,
      worked_hours: null,
      completed_visits: visits,
      modality: topMod,
      rel_hour: null,
      _synthetic: true,
    });
  });
  return records;
}

// ========================== TAB: VPH / VPCH ==========================
function VphTab({ actualsData, shiftScheduleData, masterRoster, showToast }) {
  const [subView, setSubView] = useState('org');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [selPartners, setSelPartners] = useState([]);
  const [selModalities, setSelModalities] = useState([]);
  const [trendMode, setTrendMode] = useState('daily');
  const [sortCol, setSortCol] = useState('adjustedVph');
  const [sortDir, setSortDir] = useState('desc');
  const [expandedClinician, setExpandedClinician] = useState(null);
  const [showQuality, setShowQuality] = useState(false);

  // Auto-synthesize VPH from actuals + shifts
  const syntheticVph = useMemo(() => synthesizeVphFromData(shiftScheduleData, actualsData), [shiftScheduleData, actualsData]);

  // Combined data: synthetic only (manual upload removed)
  const combinedVph = syntheticVph;

  // Validate all records
  const { validRecords, skippedRecords, flaggedRecords } = useMemo(() => {
    const valid = [], skipped = [], flagged = [];
    (combinedVph || []).forEach((rec, i) => {
      const v = validateVphRecord(rec);
      if (!v.valid) { skipped.push({ ...rec, _reason: v.error, _idx: i }); return; }
      const enriched = { ...rec, ...computeVphVariants(rec), _warnings: v.warnings, _idx: i };
      valid.push(enriched);
      if (v.warnings.length > 0) flagged.push(enriched);
    });
    return { validRecords: valid, skippedRecords: skipped, flaggedRecords: flagged };
  }, [combinedVph]);

  // Apply filters
  const filteredData = useMemo(() => {
    let data = validRecords;
    if (dateFrom) data = data.filter(r => r.shift_date >= dateFrom);
    if (dateTo) data = data.filter(r => r.shift_date <= dateTo);
    if (selPartners.length > 0) data = data.filter(r => selPartners.includes(r.partner_sl || r.partner));
    if (selModalities.length > 0) data = data.filter(r => selModalities.includes(classifyVphModality(r.modality)));
    return data;
  }, [validRecords, dateFrom, dateTo, selPartners, selModalities]);

  // Partner options for filter
  const partnerOptions = useMemo(() => [...new Set(validRecords.map(r => r.partner_sl || r.partner).filter(Boolean))].sort(), [validRecords]);
  const modalityOptions = ['Sync', 'Async', 'Mixed'];

  // Org-level aggregates
  const orgStats = useMemo(() => {
    if (filteredData.length === 0) return null;
    const totalVisits = filteredData.reduce((s, r) => s + (r.completed_visits || 0), 0);
    const totalSched = filteredData.reduce((s, r) => s + (r.scheduled_hours || 0), 0);
    const totalWorked = filteredData.reduce((s, r) => s + (r.worked_hours || 0), 0);
    const rawVphs = filteredData.filter(r => r.rawVph != null).map(r => r.rawVph);
    const vpchs = filteredData.filter(r => r.vpch != null).map(r => r.vpch);
    const adjVphs = filteredData.map(r => r.adjustedVph);
    const avg = arr => arr.length > 0 ? arr.reduce((s, v) => s + v, 0) / arr.length : 0;
    const platformVph = totalSched > 0 ? totalVisits / Math.max(totalSched, VPH_FLOOR_HOURS) : null;
    const clinicianCount = new Set(filteredData.map(r => r.clinician_id)).size;
    return { totalVisits, totalSched, totalWorked, platformVph, avgRaw: avg(rawVphs), avgVpch: avg(vpchs), avgAdj: avg(adjVphs), clinicianCount, recordCount: filteredData.length };
  }, [filteredData]);

  // Partner-level aggregates
  const partnerStats = useMemo(() => {
    const groups = {};
    filteredData.forEach(r => {
      const key = r.partner_sl || r.partner || 'Unknown';
      if (!groups[key]) groups[key] = { name: key, visits: 0, sched: 0, worked: 0, clinicians: new Set(), rawVphs: [], vpchs: [], adjVphs: [], modalities: new Set() };
      const g = groups[key];
      g.visits += r.completed_visits || 0;
      g.sched += r.scheduled_hours || 0;
      g.worked += r.worked_hours || 0;
      g.clinicians.add(r.clinician_id);
      if (r.rawVph != null) g.rawVphs.push(r.rawVph);
      if (r.vpch != null) g.vpchs.push(r.vpch);
      g.adjVphs.push(r.adjustedVph);
      g.modalities.add(classifyVphModality(r.modality));
    });
    return Object.values(groups).map(g => {
      const avg = arr => arr.length > 0 ? arr.reduce((s, v) => s + v, 0) / arr.length : 0;
      return { ...g, clinicianCount: g.clinicians.size, avgRaw: avg(g.rawVphs), avgVpch: avg(g.vpchs), avgAdj: avg(g.adjVphs), modalityMix: [...g.modalities].join(', ') };
    }).sort((a, b) => b.visits - a.visits);
  }, [filteredData]);

  // Shift-level aggregates
  const shiftStats = useMemo(() => {
    return filteredData.map(r => {
      const d = r.shift_date ? new Date(r.shift_date + 'T00:00:00') : null;
      const dow = d ? ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][ctDow(d)] : '?';
      const shift = r.shift_start && r.shift_end ? `${r.shift_start}–${r.shift_end}` : (r.rel_hour != null ? `Hour ${r.rel_hour}` : '—');
      return { ...r, dow, shift };
    }).sort((a, b) => (a.shift_date || '').localeCompare(b.shift_date || ''));
  }, [filteredData]);

  // Clinician-level aggregates
  const clinicianStats = useMemo(() => {
    const groups = {};
    filteredData.forEach(r => {
      const key = r.clinician_id;
      if (!groups[key]) groups[key] = { id: key, name: r.clinician_name, credential: r.credential, partner: r.partner_sl || r.partner, visits: 0, sched: 0, worked: 0, shifts: 0, rawVphs: [], vpchs: [], adjVphs: [], modalities: new Set(), records: [] };
      const g = groups[key];
      g.visits += r.completed_visits || 0;
      g.sched += r.scheduled_hours || 0;
      g.worked += r.worked_hours || 0;
      g.shifts++;
      if (r.rawVph != null) g.rawVphs.push(r.rawVph);
      if (r.vpch != null) g.vpchs.push(r.vpch);
      g.adjVphs.push(r.adjustedVph);
      g.modalities.add(classifyVphModality(r.modality));
      g.records.push(r);
    });
    const avg = arr => arr.length > 0 ? arr.reduce((s, v) => s + v, 0) / arr.length : 0;
    let rows = Object.values(groups).map(g => ({ ...g, avgRaw: avg(g.rawVphs), avgVpch: avg(g.vpchs), avgAdj: avg(g.adjVphs), modality: [...g.modalities].join('/') }));
    rows.sort((a, b) => sortDir === 'asc' ? (a[sortCol] || 0) - (b[sortCol] || 0) : (b[sortCol] || 0) - (a[sortCol] || 0));
    return rows;
  }, [filteredData, sortCol, sortDir]);

  // Trend data for org chart
  const trendData = useMemo(() => {
    if (filteredData.length === 0) return null;
    const buckets = {};
    filteredData.forEach(r => {
      if (!r.shift_date) return;
      let key = r.shift_date;
      if (trendMode === 'weekly') {
        const d = new Date(r.shift_date + 'T00:00:00');
        const mon = new Date(d); mon.setDate(mon.getDate() - mon.getDay() + (mon.getDay() === 0 ? -6 : 1));
        key = mon.toISOString().slice(0, 10);
      }
      if (!buckets[key]) buckets[key] = { visits: 0, sched: 0 };
      buckets[key].visits += r.completed_visits || 0;
      buckets[key].sched += r.scheduled_hours || 0;
    });
    const sorted = Object.entries(buckets).sort(([a], [b]) => a.localeCompare(b));
    return { labels: sorted.map(([k]) => k), values: sorted.map(([, v]) => v.sched > 0 ? (v.visits / v.sched).toFixed(2) : 0) };
  }, [filteredData, trendMode]);

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('desc'); }
  };
  const sortIcon = (col) => sortCol === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';

  const vphCell = (val, modality) => {
    if (val == null) return <span style={{ color: 'var(--text-muted)' }}>—</span>;
    const cls = vphThresholdClass(val, modality);
    return <span className={cls}>{val.toFixed(2)}</span>;
  };
  const vphCellBg = (val, modality) => {
    if (val == null) return {};
    const cls = vphThresholdClass(val, modality);
    return { className: cls.replace('vph-', 'vph-cell-') + ' ' + cls };
  };

  const hasAutoData = syntheticVph.length > 0;
  if (combinedVph.length === 0 && !hasAutoData) {
    return (
      <div className="card">
        <h3 style={{ marginBottom: 12, fontSize: 16 }}>VPH / VPCH Dashboard</h3>
        <p style={{ color: 'var(--text-muted)', fontSize: 13, marginBottom: 16 }}>VPH is <strong>auto-calculated</strong> when you upload both <strong>Actuals</strong> and <strong>Shift Schedule</strong> data (visits from actuals ÷ hours from shifts).</p>
        <div style={{ background: 'var(--bg-primary)', border: '1px solid var(--accent-teal)', borderRadius: 'var(--radius)', padding: '12px 16px', marginBottom: 16, fontSize: 13 }}>
          <strong style={{ color: 'var(--accent-teal-dark)' }}>💡 Auto-calculation:</strong> Upload Actuals + Shift Schedule via the header buttons → VPH computes automatically here. No separate file needed.
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* Upload + Filters Bar */}
      <div className="card" style={{ marginBottom: 16, padding: 14 }}>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, alignItems: 'center', marginBottom: 10 }}>
          <div style={{ display: 'flex', gap: 6, alignItems: 'center', fontSize: 12 }}>
            <label>From</label>
            <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} style={{ padding: '3px 6px', border: '1px solid var(--border)', borderRadius: 4, fontSize: 11 }} />
            <label>To</label>
            <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} style={{ padding: '3px 6px', border: '1px solid var(--border)', borderRadius: 4, fontSize: 11 }} />
          </div>
          {partnerOptions.length > 1 && <MultiSelect options={partnerOptions} selected={selPartners} onChange={setSelPartners} placeholder="All Partners" />}
          <MultiSelect options={modalityOptions} selected={selModalities} onChange={setSelModalities} placeholder="All Modalities" />
          {(dateFrom || dateTo || selPartners.length > 0 || selModalities.length > 0) && (
            <button className="btn btn-sm btn-secondary" onClick={() => { setDateFrom(''); setDateTo(''); setSelPartners([]); setSelModalities([]); }}>Reset Filters</button>
          )}
          <button className="btn btn-sm btn-secondary" style={{ marginLeft: 'auto' }} onClick={() => setShowQuality(q => !q)}>
            {showQuality ? '✕ Close' : '⚙ Data Quality'} ({validRecords.length} valid, {skippedRecords.length} skip, {flaggedRecords.length} warn)
          </button>
        </div>
        {showQuality && (
          <div style={{ background: 'var(--bg-primary)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: 10, fontSize: 11, maxHeight: 200, overflow: 'auto' }}>
            <strong>Data Quality Summary</strong>
            <div style={{ marginTop: 4 }}>Total records: {combinedVph.length} | Valid: {validRecords.length} | Skipped: {skippedRecords.length} | Flagged: {flaggedRecords.length}</div>
            {skippedRecords.length > 0 && <div style={{ marginTop: 6 }}><strong style={{ color: 'var(--accent-red)' }}>Rejected rows:</strong>{skippedRecords.slice(0, 10).map((r, i) => <div key={i} style={{ marginLeft: 8 }}>Row {r._idx + 1}: {r._reason} ({r.clinician_name || 'unknown'})</div>)}{skippedRecords.length > 10 && <div style={{ marginLeft: 8 }}>...and {skippedRecords.length - 10} more</div>}</div>}
            {flaggedRecords.length > 0 && <div style={{ marginTop: 6 }}><strong style={{ color: 'var(--accent-orange)' }}>Warned rows:</strong>{flaggedRecords.slice(0, 10).map((r, i) => <div key={i} style={{ marginLeft: 8 }}>Row {r._idx + 1}: {r._warnings.join('; ')} ({r.clinician_name})</div>)}{flaggedRecords.length > 10 && <div style={{ marginLeft: 8 }}>...and {flaggedRecords.length - 10} more</div>}</div>}
          </div>
        )}
      </div>

      {/* Sub-view Tabs */}
      <div className="vph-sub-tabs">
        {[{ id: 'org', label: 'Org-Wide' }, { id: 'partner', label: 'Partner / SL' }, { id: 'shift', label: 'Shift / Time' }, { id: 'clinician', label: 'Individual Clinician' }].map(v => (
          <button key={v.id} className={`vph-sub-tab ${subView === v.id ? 'active' : ''}`} onClick={() => setSubView(v.id)}>{v.label}</button>
        ))}
      </div>

      {/* Sub-view: Org-Wide */}
      {subView === 'org' && orgStats && (
        <div>
          <div className="kpi-grid" style={{ marginBottom: 16 }}>
            <KpiCard label="Platform VPH" value={orgStats.platformVph != null ? orgStats.platformVph.toFixed(2) : '—'} sub={`${orgStats.totalVisits.toLocaleString()} visits / ${orgStats.totalSched.toFixed(0)}h sched`} className={orgStats.platformVph != null ? 'vph-card-' + vphPillVariant(orgStats.platformVph, 'Sync') : ''} />
            <KpiCard label="Avg Raw VPH" value={orgStats.avgRaw.toFixed(2)} sub="visits / worked hours" className={'vph-card-' + vphPillVariant(orgStats.avgRaw, 'Sync')} />
            <KpiCard label="Avg VPCH" value={orgStats.avgVpch.toFixed(2)} sub="visits / scheduled hours" className={'vph-card-' + vphPillVariant(orgStats.avgVpch, 'Sync')} />
            <KpiCard label="Avg Adjusted VPH" value={orgStats.avgAdj.toFixed(2)} sub="visits / (sched − breaks)" className={'vph-card-' + vphPillVariant(orgStats.avgAdj, 'Sync')} />
          </div>
          <div style={{ display: 'flex', gap: 8, fontSize: 11, color: 'var(--text-muted)', marginBottom: 8 }}>
            <span>{orgStats.clinicianCount} clinicians | {orgStats.recordCount} shift records</span>
          </div>
          {trendData && (
            <div className="card" style={{ padding: 16, marginBottom: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <strong style={{ fontSize: 13 }}>Platform VPH Trend</strong>
                <div style={{ display: 'flex', gap: 0 }}>
                  {['daily', 'weekly'].map(m => (
                    <button key={m} className={`btn btn-sm ${trendMode === m ? 'btn-primary' : 'btn-secondary'}`} style={{ padding: '2px 10px', fontSize: 10, borderRadius: m === 'daily' ? '4px 0 0 4px' : '0 4px 4px 0' }} onClick={() => setTrendMode(m)}>{m}</button>
                  ))}
                </div>
              </div>
              <ChartWrapper height={260} config={{ type: 'line', data: { labels: trendData.labels, datasets: [{ label: 'Platform VPH', data: trendData.values, borderColor: '#26AEBC', backgroundColor: 'rgba(38,174,188,0.1)', fill: true, tension: 0.3, pointRadius: 3 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false, title: { display: true, text: 'VPH' } } } } }} />
            </div>
          )}
        </div>
      )}
      {subView === 'org' && !orgStats && <div className="empty-state"><div className="icon">📊</div><p>No valid VPH records match the current filters.</p></div>}

      {/* Sub-view: Partner / Service Line */}
      {subView === 'partner' && (
        <div className="card" style={{ padding: 16 }}>
          {partnerStats.length === 0 ? <div className="empty-state"><p>No partner data.</p></div> : (
            <div style={{ overflowX: 'auto' }}>
              <table className="data-table">
                <thead><tr>
                  <th>Partner / SL</th><th>Clinicians</th><th>Total Visits</th><th>Sched Hours</th><th>Raw VPH</th><th>VPCH</th><th>Adjusted VPH</th><th>Modality Mix</th><th>Status</th>
                </tr></thead>
                <tbody>
                  {partnerStats.map((p, i) => {
                    const dominant = p.modalityMix.includes('Async') ? 'Async' : 'Sync';
                    return (
                      <tr key={i}>
                        <td style={{ fontWeight: 600 }}>{p.name}</td>
                        <td>{p.clinicianCount}</td>
                        <td>{p.visits.toLocaleString()}</td>
                        <td>{p.sched.toFixed(0)}</td>
                        <td>{vphCell(p.avgRaw, dominant)}</td>
                        <td>{vphCell(p.avgVpch, dominant)}</td>
                        <td>{vphCell(p.avgAdj, dominant)}</td>
                        <td style={{ fontSize: 11 }}>{p.modalityMix}</td>
                        <td><span className={`vph-pill ${vphPillVariant(p.avgAdj, dominant)}`}>{vphThresholdClass(p.avgAdj, dominant) === 'vph-red' ? 'Below' : vphThresholdClass(p.avgAdj, dominant) === 'vph-yellow' ? 'Near' : 'On Target'}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* Sub-view: Shift / Time Slot */}
      {subView === 'shift' && (
        <div className="card" style={{ padding: 16 }}>
          {shiftStats.length === 0 ? <div className="empty-state"><p>No shift data.</p></div> : (
            <div style={{ overflowX: 'auto' }}>
              <table className="data-table">
                <thead><tr>
                  <th>Date</th><th>DOW</th><th>Shift</th><th>Clinician</th><th>Visits</th><th>Sched Hrs</th><th>Raw VPH</th><th>VPCH</th><th>Adj VPH</th><th>Modality</th>
                </tr></thead>
                <tbody>
                  {shiftStats.slice(0, 200).map((r, i) => {
                    const mod = classifyVphModality(r.modality);
                    const isRed = vphThresholdClass(r.adjustedVph, r.modality) === 'vph-red';
                    return (
                      <tr key={i} style={isRed ? { background: '#FDE8E8' } : {}}>
                        <td>{r.shift_date || '—'}</td>
                        <td>{r.dow}</td>
                        <td style={{ fontSize: 11 }}>{r.shift}</td>
                        <td>{r.clinician_name}{r.usedWorkedFallback && <span title="Break deduction estimated from worked hours — scheduled hours unavailable" style={{ color: 'var(--accent-orange)', marginLeft: 4, cursor: 'help' }}>⚠</span>}</td>
                        <td>{r.completed_visits}</td>
                        <td>{r.scheduled_hours != null ? r.scheduled_hours.toFixed(1) : '—'}</td>
                        <td>{vphCell(r.rawVph, r.modality)}</td>
                        <td>{vphCell(r.vpch, r.modality)}</td>
                        <td>{vphCell(r.adjustedVph, r.modality)}</td>
                        <td><span className={`vph-pill ${vphPillVariant(r.adjustedVph, r.modality)}`}>{mod}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              {shiftStats.length > 200 && <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 8 }}>Showing 200 of {shiftStats.length} records. Use date filters to narrow.</div>}
            </div>
          )}
        </div>
      )}

      {/* Sub-view: Individual Clinician */}
      {subView === 'clinician' && (
        <div className="card" style={{ padding: 16 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <strong style={{ fontSize: 13 }}>{clinicianStats.length} Clinicians</strong>
            <button className="btn btn-sm btn-secondary" onClick={() => exportToCSV(clinicianStats.map(c => ({ Name: c.name, Credential: c.credential, Partner: c.partner, Shifts: c.shifts, Visits: c.visits, SchedHrs: c.sched.toFixed(1), WorkedHrs: c.worked.toFixed(1), RawVPH: c.avgRaw.toFixed(2), VPCH: c.avgVpch.toFixed(2), AdjustedVPH: c.avgAdj.toFixed(2), Modality: c.modality })), 'vph_clinicians.csv')}>Export CSV</button>
          </div>
          {clinicianStats.length === 0 ? <div className="empty-state"><p>No clinician data.</p></div> : (
            <div style={{ overflowX: 'auto' }}>
              <table className="data-table">
                <thead><tr>
                  <th style={{ cursor: 'pointer' }} onClick={() => handleSort('name')}>Clinician{sortIcon('name')}</th>
                  <th>Cred</th>
                  <th>Partner</th>
                  <th style={{ cursor: 'pointer' }} onClick={() => handleSort('shifts')}>Shifts{sortIcon('shifts')}</th>
                  <th style={{ cursor: 'pointer' }} onClick={() => handleSort('visits')}>Visits{sortIcon('visits')}</th>
                  <th>Sched Hrs</th>
                  <th style={{ cursor: 'pointer' }} onClick={() => handleSort('avgRaw')}>Raw VPH{sortIcon('avgRaw')}</th>
                  <th style={{ cursor: 'pointer' }} onClick={() => handleSort('avgVpch')}>VPCH{sortIcon('avgVpch')}</th>
                  <th style={{ cursor: 'pointer' }} onClick={() => handleSort('avgAdj')}>Adjusted VPH{sortIcon('avgAdj')}</th>
                  <th>Modality</th>
                </tr></thead>
                <tbody>
                  {clinicianStats.map((c, i) => (
                    <React.Fragment key={i}>
                      <tr style={{ cursor: 'pointer' }} onClick={() => setExpandedClinician(expandedClinician === c.id ? null : c.id)}>
                        <td style={{ fontWeight: 600 }}>{expandedClinician === c.id ? '▾ ' : '▸ '}{c.name}</td>
                        <td>{c.credential || '—'}</td>
                        <td>{c.partner || '—'}</td>
                        <td>{c.shifts}</td>
                        <td>{c.visits}</td>
                        <td>{c.sched.toFixed(1)}</td>
                        <td>{vphCell(c.avgRaw, c.modality)}</td>
                        <td>{vphCell(c.avgVpch, c.modality)}</td>
                        <td>{vphCell(c.avgAdj, c.modality)}</td>
                        <td><span className={`vph-pill ${vphPillVariant(c.avgAdj, c.modality)}`}>{c.modality}</span></td>
                      </tr>
                      {expandedClinician === c.id && (
                        <tr><td colSpan={10} style={{ padding: 0 }}>
                          <div style={{ background: 'var(--bg-primary)', padding: '8px 16px', borderTop: '1px solid var(--border)' }}>
                            <strong style={{ fontSize: 11 }}>Shift-by-Shift Breakdown</strong>
                            <table className="data-table" style={{ marginTop: 6, fontSize: 11 }}>
                              <thead><tr><th>Date</th><th>Shift</th><th>Visits</th><th>Sched Hrs</th><th>Worked Hrs</th><th>Raw VPH</th><th>VPCH</th><th>Adj VPH</th><th>Break Ded.</th></tr></thead>
                              <tbody>
                                {c.records.map((r, j) => (
                                  <tr key={j}>
                                    <td>{r.shift_date || '—'}</td>
                                    <td>{r.shift_start && r.shift_end ? `${r.shift_start}–${r.shift_end}` : '—'}</td>
                                    <td>{r.completed_visits}</td>
                                    <td>{r.scheduled_hours != null ? r.scheduled_hours.toFixed(1) : '—'}</td>
                                    <td>{r.worked_hours != null ? r.worked_hours.toFixed(1) : '—'}</td>
                                    <td>{vphCell(r.rawVph, r.modality)}</td>
                                    <td>{vphCell(r.vpch, r.modality)}</td>
                                    <td>{vphCell(r.adjustedVph, r.modality)}</td>
                                    <td>{getBreakMinutes(r.scheduled_hours || r.worked_hours || 0)}min{r.usedWorkedFallback ? ' ⚠' : ''}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </td></tr>
                      )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* Clear data */}
      <div style={{ textAlign: 'right', marginTop: 12 }}>
        <button className="btn btn-sm btn-secondary" style={{ fontSize: 10, color: 'var(--text-muted)' }} onClick={() => { if (confirm('Clear all VPH data?')) { setVphData([]); showToast('VPH data cleared', 'info'); } }}>Clear VPH Data</button>
      </div>
    </div>
  );
}

// ========================== TAB: INCENTIVE SPEND ==========================
function IncentiveTab({ incentiveData, manualIncentiveData }) {
  // Multi-select filter state — empty array = "all"
  const [selPartners, setSelPartners] = useState([]);
  const [selPrograms, setSelPrograms] = useState([]);
  const [selStates, setSelStates] = useState([]);
  const [selClinicians, setSelClinicians] = useState([]);
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [sourceFilter, setSourceFilter] = useState('all'); // 'all' | 'looker' | 'manual'

  // Combine both sources into one array with _incentiveSource tags
  const combinedData = useMemo(() => {
    const looker = (incentiveData || []).map(r => ({ ...r, _incentiveSource: r._incentiveSource || 'looker' }));
    const manual = (manualIncentiveData || []).map(r => ({ ...r, _incentiveSource: 'manual' }));
    return [...looker, ...manual];
  }, [incentiveData, manualIncentiveData]);

  // Apply source filter
  const sourceFilteredData = useMemo(() => {
    if (sourceFilter === 'all') return combinedData;
    return combinedData.filter(r => r._incentiveSource === sourceFilter);
  }, [combinedData, sourceFilter]);

  const cm = useMemo(() => buildColMap(sourceFilteredData.length > 0 ? sourceFilteredData : (incentiveData || [])), [sourceFilteredData, incentiveData]);

  // Parse amount — handles "$45", "45", "45.00", commas
  const parseAmount = useCallback((r) => {
    const raw = cm.amount ? (r[cm.amount] || '0') : '0';
    const cleaned = String(raw).replace(/[^0-9.\-]/g, '');
    const v = parseFloat(cleaned);
    return isNaN(v) ? 0 : v;
  }, [cm]);

  // Row accessor helpers
  const rowPartner = useCallback(r => cm.partner ? (r[cm.partner] || '') : '', [cm]);
  const rowProgram = useCallback(r => cm.program ? (r[cm.program] || '') : '', [cm]);
  const rowState = useCallback(r => cm.state ? (r[cm.state] || '') : '', [cm]);
  const rowClinician = useCallback(r => cm.clinician ? (r[cm.clinician] || '') : '', [cm]);

  // Step 1: filter data by current selections (cascading) + date range
  const filtered = useMemo(() => {
    if (!sourceFilteredData || sourceFilteredData.length === 0) return [];
    return sourceFilteredData.filter(r => {
      if (selPartners.length > 0 && !selPartners.includes(rowPartner(r))) return false;
      if (selPrograms.length > 0 && !selPrograms.includes(rowProgram(r))) return false;
      if (selStates.length > 0 && !selStates.includes(rowState(r))) return false;
      if (selClinicians.length > 0 && !selClinicians.includes(rowClinician(r))) return false;
      if (dateFrom || dateTo) {
        const raw = cm.date ? r[cm.date] : (cm.launchedTime ? r[cm.launchedTime] : '');
        const dt = parseDate(raw);
        if (dt) {
          if (dateFrom && dt < new Date(dateFrom)) return false;
          if (dateTo) { const end = new Date(dateTo); end.setHours(23,59,59); if (dt > end) return false; }
        }
      }
      return true;
    });
  }, [sourceFilteredData, selPartners, selPrograms, selStates, selClinicians, rowPartner, rowProgram, rowState, rowClinician, dateFrom, dateTo, cm]);

  // Step 2: compute available options for each filter GIVEN the other filters
  // For each filter, we compute which values are possible if we ignore THAT filter but apply all others
  const cascadeOptions = useMemo(() => {
    if (!sourceFilteredData || sourceFilteredData.length === 0) return { partners: [], programs: [], states: [], clinicians: [] };

    const passesExcept = (r, skip) => {
      if (skip !== 'partner' && selPartners.length > 0 && !selPartners.includes(rowPartner(r))) return false;
      if (skip !== 'program' && selPrograms.length > 0 && !selPrograms.includes(rowProgram(r))) return false;
      if (skip !== 'state' && selStates.length > 0 && !selStates.includes(rowState(r))) return false;
      if (skip !== 'clinician' && selClinicians.length > 0 && !selClinicians.includes(rowClinician(r))) return false;
      return true;
    };

    const pSet = new Set(), prSet = new Set(), sSet = new Set(), cSet = new Set();
    const pCount = {}, prCount = {}, sCount = {}, cCount = {};

    sourceFilteredData.forEach(r => {
      const p = rowPartner(r), pr = rowProgram(r), st = rowState(r), cl = rowClinician(r);
      if (passesExcept(r, 'partner') && p) { pSet.add(p); pCount[p] = (pCount[p] || 0) + 1; }
      if (passesExcept(r, 'program') && pr) { prSet.add(pr); prCount[pr] = (prCount[pr] || 0) + 1; }
      if (passesExcept(r, 'state') && st) { sSet.add(st); sCount[st] = (sCount[st] || 0) + 1; }
      if (passesExcept(r, 'clinician') && cl) { cSet.add(cl); cCount[cl] = (cCount[cl] || 0) + 1; }
    });

    return {
      partners: [...pSet].sort(), programs: [...prSet].sort(), states: [...sSet].sort(), clinicians: [...cSet].sort(),
      pCount, prCount, sCount, cCount
    };
  }, [sourceFilteredData, selPartners, selPrograms, selStates, selClinicians, rowPartner, rowProgram, rowState, rowClinician]);

  if (combinedData.length === 0) {
    return (
      <div className="empty-state">
        <div className="icon">&#128176;</div>
        <p>Upload incentive data to see spend analysis</p>
        <div className="hint">Accepts Looker exports and manual incentive tracking CSVs — format is auto-detected</div>
      </div>
    );
  }

  const lookerCount = combinedData.filter(r => r._incentiveSource === 'looker').length;
  const manualCount = combinedData.filter(r => r._incentiveSource === 'manual').length;

  const totalSpend = filtered.reduce((s, r) => s + parseAmount(r), 0);
  const uniqueClinicians = new Set(filtered.map(rowClinician).filter(Boolean)).size;
  const claimedCount = filtered.filter(r => cm.claimedTime ? !!r[cm.claimedTime] : false).length;

  // Aggregations
  const byPartner = {}, byProgram = {}, byState = {}, byClinician = {};
  filtered.forEach(r => {
    const amt = parseAmount(r);
    const p = rowPartner(r) || 'Unknown';
    const pr = rowProgram(r) || 'Unknown';
    const st = rowState(r) || 'Unknown';
    const cl = rowClinician(r) || 'Unknown';

    if (!byPartner[p]) byPartner[p] = { count: 0, spend: 0, clinicians: new Set() };
    byPartner[p].count++; byPartner[p].spend += amt; if (cl !== 'Unknown') byPartner[p].clinicians.add(cl);

    if (!byProgram[pr]) byProgram[pr] = { count: 0, spend: 0, clinicians: new Set() };
    byProgram[pr].count++; byProgram[pr].spend += amt; if (cl !== 'Unknown') byProgram[pr].clinicians.add(cl);

    if (!byState[st]) byState[st] = { count: 0, spend: 0, clinicians: new Set() };
    byState[st].count++; byState[st].spend += amt; if (cl !== 'Unknown') byState[st].clinicians.add(cl);

    if (!byClinician[cl]) byClinician[cl] = { count: 0, spend: 0, partners: new Set(), states: new Set() };
    byClinician[cl].count++; byClinician[cl].spend += amt;
    if (p !== 'Unknown') byClinician[cl].partners.add(p);
    if (st !== 'Unknown') byClinician[cl].states.add(st);
  });

  const fmt$ = (v) => '$' + v.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  const activeFilterCount = [selPartners, selPrograms, selStates, selClinicians].filter(a => a.length > 0).length + (dateFrom ? 1 : 0) + (dateTo ? 1 : 0);

  return (
    <div>
      {/* Source toggle + filters */}
      {(lookerCount > 0 && manualCount > 0) && (
        <div style={{ display: 'flex', gap: 4, marginBottom: 10, alignItems: 'center' }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', marginRight: 6 }}>SOURCE:</span>
          {[
            { key: 'all', label: `All (${combinedData.length})` },
            { key: 'looker', label: `Looker (${lookerCount})` },
            { key: 'manual', label: `📋 Manual (${manualCount})` },
          ].map(s => (
            <button key={s.key} className={`sl-pill ${sourceFilter === s.key ? 'active' : ''}`}
              onClick={() => setSourceFilter(s.key)} style={{ fontSize: 11 }}>{s.label}</button>
          ))}
        </div>
      )}
      {manualCount > 0 && sourceFilter !== 'looker' && (
        <div style={{ background: '#FFF8E1', border: '1px solid #FFD54F', borderRadius: 'var(--radius)', padding: '8px 12px', marginBottom: 10, fontSize: 12, display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 16 }}>📋</span>
          <span><strong>{manualCount} manual incentive records</strong> included — these are team-audited, submitted for payroll. {lookerCount > 0 ? `Combined with ${lookerCount} Looker records.` : ''}</span>
        </div>
      )}

      {/* Cascading multi-select filters + date range */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 16, flexWrap: 'wrap', alignItems: 'flex-end' }}>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center', fontSize: 12 }}>
          <label style={{ fontSize: 11, fontWeight: 600 }}>From</label>
          <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} style={{ padding: '3px 6px', border: '1px solid var(--border)', borderRadius: 4, fontSize: 11 }} />
          <label style={{ fontSize: 11, fontWeight: 600 }}>To</label>
          <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} style={{ padding: '3px 6px', border: '1px solid var(--border)', borderRadius: 4, fontSize: 11 }} />
        </div>
        <MultiSelect label="Partner" options={cascadeOptions.partners} selected={selPartners} onChange={setSelPartners} placeholder="All Partners" countMap={cascadeOptions.pCount} />
        <MultiSelect label="Program" options={cascadeOptions.programs} selected={selPrograms} onChange={setSelPrograms} placeholder="All Programs" countMap={cascadeOptions.prCount} />
        <MultiSelect label="State" options={cascadeOptions.states} selected={selStates} onChange={setSelStates} placeholder="All States" countMap={cascadeOptions.sCount} />
        <MultiSelect label="Clinician" options={cascadeOptions.clinicians} selected={selClinicians} onChange={setSelClinicians} placeholder="All Clinicians" countMap={cascadeOptions.cCount} />
        {activeFilterCount > 0 && (
          <button className="btn btn-secondary btn-sm" style={{ alignSelf: 'flex-end', marginBottom: 0 }}
            onClick={() => { setSelPartners([]); setSelPrograms([]); setSelStates([]); setSelClinicians([]); setDateFrom(''); setDateTo(''); }}>
            Clear All Filters ({activeFilterCount})
          </button>
        )}
        <button className="btn btn-secondary btn-sm" style={{ alignSelf: 'flex-end', marginBottom: 0 }}
          onClick={() => exportToCSV(filtered, `incentive_export_${new Date().toISOString().slice(0,10)}.csv`)}
          title="Download filtered data as CSV">
          &#11015; Export CSV
        </button>
      </div>

      {/* KPIs */}
      <div className="kpi-grid">
        <KpiCard label="Total Spend" value={fmt$(totalSpend)} />
        <KpiCard label="Incentive Events" value={filtered.length.toLocaleString()} />
        <KpiCard label="Unique Clinicians" value={uniqueClinicians} />
        <KpiCard label="Avg per Event" value={fmt$(filtered.length > 0 ? totalSpend / filtered.length : 0)} />
        {claimedCount > 0 && <KpiCard label="Claimed" value={claimedCount.toLocaleString()} sub={pct(claimedCount, filtered.length)} />}
      </div>

      {/* Clinician Detail — always shown */}
      <div className="card" style={{ marginBottom: 16 }}>
        <div className="card-title">Clinician Breakdown</div>
        <div className="table-wrap" style={{ maxHeight: 500, overflowY: 'auto' }}>
          <table>
            <thead><tr><th>Clinician</th><th>Events</th><th>Spend</th><th>Avg</th><th>Partners</th><th>States</th></tr></thead>
            <tbody>
              {Object.entries(byClinician).sort((a, b) => b[1].spend - a[1].spend).map(([c, d]) => (
                <tr key={c}>
                  <td style={{ fontWeight: 600 }}>{c}</td>
                  <td>{d.count}</td>
                  <td style={{ fontFamily: 'var(--font-mono)' }}>{fmt$(d.spend)}</td>
                  <td style={{ fontFamily: 'var(--font-mono)', color: 'var(--text-muted)' }}>{fmt$(d.count > 0 ? d.spend/d.count : 0)}</td>
                  <td style={{ fontSize: 11 }}>{[...d.partners].join(', ')}</td>
                  <td style={{ fontSize: 11 }}>{[...d.states].join(', ')}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-title">Spend by Partner</div>
          <div className="table-wrap" style={{ maxHeight: 400, overflowY: 'auto' }}>
            <table>
              <thead><tr><th>Partner</th><th>Events</th><th>Spend</th><th>Avg</th><th>Clinicians</th></tr></thead>
              <tbody>
                {Object.entries(byPartner).sort((a, b) => b[1].spend - a[1].spend).map(([p, d]) => (
                  <tr key={p}>
                    <td style={{ fontWeight: 500 }}>{p}</td>
                    <td>{d.count}</td>
                    <td style={{ fontFamily: 'var(--font-mono)' }}>{fmt$(d.spend)}</td>
                    <td style={{ fontFamily: 'var(--font-mono)', color: 'var(--text-muted)' }}>{fmt$(d.count > 0 ? d.spend/d.count : 0)}</td>
                    <td>{d.clinicians.size}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <div className="card">
          <div className="card-title">Spend by State</div>
          <div className="table-wrap" style={{ maxHeight: 400, overflowY: 'auto' }}>
            <table>
              <thead><tr><th>State</th><th>Events</th><th>Spend</th><th>Clinicians</th></tr></thead>
              <tbody>
                {Object.entries(byState).sort((a, b) => b[1].spend - a[1].spend).map(([st, d]) => (
                  <tr key={st}>
                    <td style={{ fontWeight: 600 }}>{st}</td>
                    <td>{d.count}</td>
                    <td style={{ fontFamily: 'var(--font-mono)' }}>{fmt$(d.spend)}</td>
                    <td>{d.clinicians.size}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {Object.keys(byProgram).length > 1 && (
        <div className="card" style={{ marginTop: 16 }}>
          <div className="card-title">Spend by Program</div>
          <div className="table-wrap" style={{ maxHeight: 400, overflowY: 'auto' }}>
            <table>
              <thead><tr><th>Program</th><th>Events</th><th>Spend</th><th>Clinicians</th></tr></thead>
              <tbody>
                {Object.entries(byProgram).sort((a, b) => b[1].spend - a[1].spend).map(([p, d]) => (
                  <tr key={p}>
                    <td style={{ fontWeight: 500 }}>{p}</td>
                    <td>{d.count}</td>
                    <td style={{ fontFamily: 'var(--font-mono)' }}>{fmt$(d.spend)}</td>
                    <td>{d.clinicians.size}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Per-Record Detail Table — the granular drill-down */}
      <div className="card" style={{ marginTop: 16 }}>
        <div className="card-title" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span>Incentive Detail — All Records ({filtered.length})</span>
          <button className="btn btn-secondary btn-sm" onClick={() => {
            const el = document.getElementById('incentive-detail-table');
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
          }}>Toggle Table</button>
        </div>
        <div id="incentive-detail-table" style={{ maxHeight: 600, overflowY: 'auto', overflowX: 'auto' }}>
          <table style={{ fontSize: 11, whiteSpace: 'nowrap' }}>
            <thead><tr>
              <th>#</th>
              <th>Date</th>
              <th>Clinician</th>
              <th>Credential</th>
              <th>Partner</th>
              <th>State</th>
              <th>Rate</th>
              <th>Launched</th>
              <th>Claimed</th>
              <th>Time on Board</th>
              <th>Reason</th>
              <th>Source</th>
              {cm.submittedBy && <th>Submitted By</th>}
              {cm.incentiveReason && <th>Incentive Reason</th>}
            </tr></thead>
            <tbody>
              {filtered.slice(0, 500).map((r, i) => {
                const dateVal = cm.date ? (r[cm.date] || '') : '';
                const clinician = rowClinician(r);
                const credential = cm.licenseType ? (r[cm.licenseType] || '') : '';
                const partner = rowPartner(r);
                const state = rowState(r);
                const amount = parseAmount(r);
                const launched = cm.launchedTime ? (r[cm.launchedTime] || '') : '';
                const claimed = cm.claimedTime ? (r[cm.claimedTime] || '') : '';
                const timeOnBoard = cm.timeInBoard ? (r[cm.timeInBoard] || '') : '';
                const reason = cm.reasonForVisit ? (r[cm.reasonForVisit] || '') : '';
                const source = r._incentiveSource || 'unknown';
                const submittedBy = cm.submittedBy ? (r[cm.submittedBy] || '') : '';
                const incReason = cm.incentiveReason ? (r[cm.incentiveReason] || '') : '';

                return (
                  <tr key={i} style={{ background: source === 'manual' ? '#FFF8E1' : 'transparent' }}>
                    <td style={{ color: 'var(--text-muted)' }}>{i + 1}</td>
                    <td style={{ fontWeight: 500 }}>{dateVal}</td>
                    <td style={{ fontWeight: 600 }}>{clinician}</td>
                    <td>{credential || '—'}</td>
                    <td>{partner || '—'}</td>
                    <td>{state || '—'}</td>
                    <td style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, color: amount >= 100 ? '#dc2626' : amount >= 50 ? '#d97706' : 'var(--text-primary)' }}>{amount > 0 ? fmt$(amount) : '—'}</td>
                    <td style={{ fontSize: 10 }}>{launched || '—'}</td>
                    <td style={{ fontSize: 10 }}>{claimed || '—'}</td>
                    <td style={{ fontSize: 10 }}>{timeOnBoard || '—'}</td>
                    <td style={{ fontSize: 10, maxWidth: 150, overflow: 'hidden', textOverflow: 'ellipsis' }} title={reason}>{reason || '—'}</td>
                    <td><span style={{ fontSize: 9, padding: '1px 5px', borderRadius: 3, background: source === 'manual' ? '#FFD54F' : '#dbeafe', fontWeight: 600 }}>{source}</span></td>
                    {cm.submittedBy && <td style={{ fontSize: 10 }}>{submittedBy}</td>}
                    {cm.incentiveReason && <td style={{ fontSize: 10, maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis' }} title={incReason}>{incReason}</td>}
                  </tr>
                );
              })}
            </tbody>
          </table>
          {filtered.length > 500 && <div style={{ padding: 8, fontSize: 11, color: 'var(--text-muted)' }}>Showing 500 of {filtered.length} records. Export CSV for full dataset.</div>}
        </div>
      </div>

      {/* Column diagnostics */}
      <details style={{ marginTop: 16, fontSize: 11, color: 'var(--text-muted)' }}>
        <summary style={{ cursor: 'pointer' }}>Detected Columns</summary>
        <div style={{ padding: 8, fontFamily: 'var(--font-mono)', background: 'var(--bg-primary)', borderRadius: 'var(--radius)', marginTop: 4 }}>
          {Object.entries(cm).filter(([k,v]) => v).map(([k,v], i) => <div key={i}>{k}: "{v}"</div>)}
        </div>
      </details>
    </div>
  );
}

// ========================== TAB: COMPARE (PERIOD vs PERIOD) ==========================
function CompareTab({ actualsData, shiftScheduleData, incentiveData, manualIncentiveData, forecast, excludedModalities }) {
  const [slFilter, setSlFilter] = useState('ALL');
  const [partnerFilter, setPartnerFilter] = useState([]);  // empty = ALL
  const [programFilter, setProgramFilter] = useState([]);
  const [modalityFilter, setModalityFilter] = useState([]);
  const [periodAStart, setPeriodAStart] = useState('');
  const [periodAEnd, setPeriodAEnd] = useState('');
  const [periodBStart, setPeriodBStart] = useState('');
  const [periodBEnd, setPeriodBEnd] = useState('');
  const [showPartnerBreakdown, setShowPartnerBreakdown] = useState(false);
  const [showProgramBreakdown, setShowProgramBreakdown] = useState(false);
  const [showModalityBreakdown, setShowModalityBreakdown] = useState(false);

  const isoDate = d => ctDateStr(d);
  const dayLabel = d => d.toLocaleDateString('en-US', { timeZone: CT_TZ, weekday: 'short', month: 'short', day: 'numeric' });

  // Quick-set helpers — DAY-OVER-DAY
  const setYesterdayVsPrior = () => {
    const now = new Date(); now.setHours(0,0,0,0);
    const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
    const dayBefore = new Date(now); dayBefore.setDate(now.getDate() - 2);
    setPeriodAStart(isoDate(dayBefore)); setPeriodAEnd(isoDate(dayBefore));
    setPeriodBStart(isoDate(yesterday)); setPeriodBEnd(isoDate(yesterday));
  };
  const setTodayVsYesterday = () => {
    const now = new Date(); now.setHours(0,0,0,0);
    const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
    setPeriodAStart(isoDate(yesterday)); setPeriodAEnd(isoDate(yesterday));
    setPeriodBStart(isoDate(now)); setPeriodBEnd(isoDate(now));
  };
  const setSameWeekdayLastWeek = () => {
    const now = new Date(); now.setHours(0,0,0,0);
    const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
    const lastWeekSameDay = new Date(yesterday); lastWeekSameDay.setDate(yesterday.getDate() - 7);
    setPeriodAStart(isoDate(lastWeekSameDay)); setPeriodAEnd(isoDate(lastWeekSameDay));
    setPeriodBStart(isoDate(yesterday)); setPeriodBEnd(isoDate(yesterday));
  };

  // Quick-set helpers — WEEK-OVER-WEEK
  const setLastWeek = () => {
    const now = new Date();
    const dow = now.getDay();
    const lastMonEnd = new Date(now); lastMonEnd.setDate(now.getDate() - dow - 1);
    const lastMonStart = new Date(lastMonEnd); lastMonStart.setDate(lastMonEnd.getDate() - 6);
    const prevMonEnd = new Date(lastMonStart); prevMonEnd.setDate(lastMonStart.getDate() - 1);
    const prevMonStart = new Date(prevMonEnd); prevMonStart.setDate(prevMonEnd.getDate() - 6);
    setPeriodAStart(isoDate(prevMonStart)); setPeriodAEnd(isoDate(prevMonEnd));
    setPeriodBStart(isoDate(lastMonStart)); setPeriodBEnd(isoDate(lastMonEnd));
  };

  const setLastWeekend = () => {
    const now = new Date();
    const dow = now.getDay();
    const lastSun = new Date(now); lastSun.setDate(now.getDate() - dow); if (dow === 0) lastSun.setDate(lastSun.getDate() - 7);
    const lastSat = new Date(lastSun); lastSat.setDate(lastSun.getDate() - 1);
    const prevSun = new Date(lastSat); prevSun.setDate(lastSat.getDate() - 1);
    const prevSat = new Date(prevSun); prevSat.setDate(prevSun.getDate() - 1);
    setPeriodAStart(isoDate(prevSat)); setPeriodAEnd(isoDate(prevSun));
    setPeriodBStart(isoDate(lastSat)); setPeriodBEnd(isoDate(lastSun));
  };

  const setLast2Weeks = () => {
    const now = new Date();
    const dow = now.getDay();
    const thisMonday = new Date(now); thisMonday.setDate(now.getDate() - ((dow + 6) % 7));
    const w2End = new Date(thisMonday); w2End.setDate(thisMonday.getDate() - 1);
    const w2Start = new Date(w2End); w2Start.setDate(w2End.getDate() - 6);
    const w1End = new Date(w2Start); w1End.setDate(w2Start.getDate() - 1);
    const w1Start = new Date(w1End); w1Start.setDate(w1End.getDate() - 6);
    setPeriodAStart(isoDate(w1Start)); setPeriodAEnd(isoDate(w1End));
    setPeriodBStart(isoDate(w2Start)); setPeriodBEnd(isoDate(w2End));
  };

  const cm = useMemo(() => buildColMap(actualsData || []), [actualsData]);
  const incCm = useMemo(() => buildColMap(incentiveData || manualIncentiveData || []), [incentiveData, manualIncentiveData]);

  // Combine incentive sources
  const allIncentives = useMemo(() => {
    const l = (incentiveData || []).map(r => ({ ...r, _src: 'looker' }));
    const m = (manualIncentiveData || []).map(r => ({ ...r, _src: 'manual' }));
    return [...l, ...m];
  }, [incentiveData, manualIncentiveData]);

  // SL options
  const availableSLs = useMemo(() => {
    if (!actualsData) return [];
    const sls = new Set();
    actualsData.forEach(r => { if (r._detectedSL) sls.add(r._detectedSL); });
    return ['ALL', ...sls];
  }, [actualsData]);

  // Extract unique partners, programs, modalities from actuals
  const availablePartners = useMemo(() => {
    if (!actualsData || !cm.partner) return [];
    const set = new Set();
    actualsData.forEach(r => { const v = (r[cm.partner] || '').trim(); if (v) set.add(v); });
    return ['ALL', ...[...set].sort()];
  }, [actualsData, cm]);

  const availablePrograms = useMemo(() => {
    if (!actualsData || !cm.program) return [];
    const set = new Set();
    actualsData.forEach(r => { const v = (r[cm.program] || '').trim(); if (v) set.add(v); });
    return ['ALL', ...[...set].sort()];
  }, [actualsData, cm]);

  const availableModalities = useMemo(() => {
    if (!actualsData || !cm.modality) return [];
    const set = new Set();
    actualsData.forEach(r => { const v = (r[cm.modality] || '').trim(); if (v) set.add(v); });
    return ['ALL', ...[...set].sort()];
  }, [actualsData, cm]);

  // Filter function for a date range + SL + partner/program/modality
  const filterByRange = useCallback((data, start, end, dateFn) => {
    if (!data || !start || !end) return [];
    const from = new Date(start);
    const to = new Date(end + 'T23:59:59');
    return data.filter(r => {
      if (slFilter !== 'ALL') {
        const sl = r.sl || r._detectedSL || mapPartnerToSL(cm.partner ? (r[cm.partner] || '') : '') || mapEntityToSL(cm.entityName ? (r[cm.entityName] || '') : '');
        if (sl && sl !== slFilter) return false;
      }
      if (partnerFilter.length > 0 && cm.partner) {
        const p = (r[cm.partner] || '').trim();
        if (!partnerFilter.includes(p)) return false;
      }
      if (programFilter.length > 0 && cm.program) {
        const p = (r[cm.program] || '').trim();
        if (!programFilter.includes(p)) return false;
      }
      if (modalityFilter.length > 0 && cm.modality) {
        const m = (r[cm.modality] || '').trim();
        if (!modalityFilter.includes(m)) return false;
      }
      // Global modality exclusion (chart_addendum, prior_auth, etc)
      if (excludedModalities && excludedModalities.size > 0 && isExcludedModality(r, cm, excludedModalities)) return false;
      const dt = dateFn(r);
      if (!dt) return false;
      return dt >= from && dt <= to;
    });
  }, [slFilter, partnerFilter, programFilter, modalityFilter, excludedModalities, cm]);

  const actualDateFn = useCallback(r => parseDate(cm.date ? r[cm.date] : ''), [cm]);
  // Parsed shifts have .start as Date already; raw shifts have column name
  const shiftDateFn = useCallback(r => {
    if (r.start instanceof Date) return r.start;
    return parseDate(r._shiftStart || (cm.shiftStart ? r[cm.shiftStart] : ''));
  }, [cm]);
  const incDateFn = useCallback(r => parseDate(incCm.date ? r[incCm.date] : (incCm.launchedTime ? r[incCm.launchedTime] : '')), [incCm]);

  // Compute metrics for a period
  const computePeriod = useCallback((actuals, shifts, incentives) => {
    const result = {
      // Volume
      totalVisits: actuals.length,
      // SLA
      slaMet: 0, slaMissed: 0, slaPct: 0,
      // Response time
      avgResponseMin: 0,
      // Headcount (unique clinicians in actuals)
      headcount: 0,
      // Credential breakdown
      npCount: 0, mdCount: 0, unknownCredCount: 0,
      // Shifts
      totalShifts: 0, filledShifts: 0, unfilledShifts: 0,
      totalShiftHours: 0, filledShiftHours: 0, unfilledShiftHours: 0,
      fillRate: 0,
      // Incentives
      incentiveShifts: 0, incentiveSpend: 0,
      incentiveFilled: 0, incentiveUnfilled: 0,
      incentiveRates: {},
      // State distribution
      stateBreakdown: {},
      // Clinician-level detail
      clinicianHours: {},
      // Partner & modality breakdowns
      partnerBreakdown: {},
      modalityBreakdown: {},
      // Hourly arrival pattern (24 buckets, 0-23)
      hourlyArrivals: new Array(24).fill(0),
      // Dimensional breakdowns
      partnerBreakdown: {},
      programBreakdown: {},
      modalityBreakdown: {},
      // Incentive types
      rtIncentiveCount: 0, rtIncentiveSpend: 0,  // Real-time: dollar amounts
      hourlyIncentiveCount: 0, hourlyIncentiveSpend: 0, // Hourly: multipliers
      hourlyMultipliers: {},
    };

    // Actuals metrics
    const clinicians = new Set();
    const credMap = {}; // clinician lowercase -> 'NP' or 'MD'
    actuals.forEach(r => {
      const cl = cm.clinician ? (r[cm.clinician] || '') : '';
      if (cl) clinicians.add(cl.toLowerCase().trim());

      // Hourly arrival pattern
      const dtStr = cm.date ? r[cm.date] : '';
      const dt = dtStr ? parseDate(dtStr) : null;
      if (dt) {
        const hr = ctHour(dt);
        if (hr >= 0 && hr < 24) result.hourlyArrivals[hr]++;
      }

      const sla = cm.slaStatus ? (r[cm.slaStatus] || '').toLowerCase() : '';
      if (sla.includes('met') || sla.includes('within')) result.slaMet++;
      else if (sla.includes('miss') || sla.includes('breach') || sla.includes('over')) result.slaMissed++;

      const rt = parseResponseTimeRobust(cm.responseTime ? r[cm.responseTime] : '');
      if (rt != null && rt >= 0) result.avgResponseMin += rt;

      const state = cm.state ? (r[cm.state] || '') : '';
      if (state) result.stateBreakdown[state] = (result.stateBreakdown[state] || 0) + 1;

      // Modality extraction for breakdowns
      const mod = cm.modality ? (r[cm.modality] || '').trim() : '';
      if (mod) {
        if (!result.modalityBreakdown[mod]) result.modalityBreakdown[mod] = { visits: 0, slaMet: 0, slaMissed: 0 };
        result.modalityBreakdown[mod].visits++;
        if (sla.includes('met') || sla.includes('within')) result.modalityBreakdown[mod].slaMet++;
        else if (sla.includes('miss') || sla.includes('breach') || sla.includes('over')) result.modalityBreakdown[mod].slaMissed++;
      }

      // Credential from actuals license type
      const cred = cm.licenseType ? (r[cm.licenseType] || '').toUpperCase() : '';
      if (cred && cl) {
        const clKey = cl.toLowerCase().trim();
        if (cred.includes('NP') || cred.includes('NURSE') || cred.includes('PA') || cred.includes('FNP') || cred.includes('DNP')) credMap[clKey] = 'NP';
        else if (cred.includes('MD') || cred.includes('DO') || cred.includes('PHYSICIAN') || cred.includes('DR')) credMap[clKey] = 'MD';
      }

      // Partner breakdown
      const partner = cm.partner ? (r[cm.partner] || '').trim() : '';
      if (partner) {
        if (!result.partnerBreakdown[partner]) result.partnerBreakdown[partner] = { visits: 0, slaMet: 0, slaMissed: 0, avgRT: 0, rtSum: 0 };
        const pb = result.partnerBreakdown[partner];
        pb.visits++;
        const sla2 = cm.slaStatus ? (r[cm.slaStatus] || '').toLowerCase() : '';
        if (sla2.includes('met') || sla2.includes('within')) pb.slaMet++;
        else if (sla2.includes('miss') || sla2.includes('breach') || sla2.includes('over')) pb.slaMissed++;
        const rt2 = cm.responseTime ? parseFloat(r[cm.responseTime]) : NaN;
        if (!isNaN(rt2)) pb.rtSum += rt2;
      }

      // Program breakdown
      const program = cm.program ? (r[cm.program] || '').trim() : '';
      if (program) {
        if (!result.programBreakdown[program]) result.programBreakdown[program] = { visits: 0, slaMet: 0, slaMissed: 0 };
        const prb = result.programBreakdown[program];
        prb.visits++;
        const sla3 = cm.slaStatus ? (r[cm.slaStatus] || '').toLowerCase() : '';
        if (sla3.includes('met') || sla3.includes('within')) prb.slaMet++;
        else if (sla3.includes('miss') || sla3.includes('breach') || sla3.includes('over')) prb.slaMissed++;
      }

      // Modality breakdown
      const modality = cm.modality ? (r[cm.modality] || '').trim() : '';
      if (modality) {
        if (!result.modalityBreakdown[modality]) result.modalityBreakdown[modality] = { visits: 0, slaMet: 0, slaMissed: 0 };
        const mb = result.modalityBreakdown[modality];
        mb.visits++;
        const sla4 = cm.slaStatus ? (r[cm.slaStatus] || '').toLowerCase() : '';
        if (sla4.includes('met') || sla4.includes('within')) mb.slaMet++;
        else if (sla4.includes('miss') || sla4.includes('breach') || sla4.includes('over')) mb.slaMissed++;
      }
    });

    result.headcount = clinicians.size;
    const slaTotal = result.slaMet + result.slaMissed;
    result.slaPct = slaTotal >= 5 ? (result.slaMet / slaTotal * 100) : null; // null = insufficient data (< 5 eligible)
    result.slaEligible = slaTotal;
    result.avgResponseMin = actuals.length > 0 ? result.avgResponseMin / actuals.length : 0;
    // Finalize partner avg RT
    Object.values(result.partnerBreakdown).forEach(pb => { pb.avgRT = pb.visits > 0 ? pb.rtSum / pb.visits : 0; });

    // Shift metrics — handles both parsed shift objects ({clinician, hours, unfilled}) and raw CSV rows
    shifts.forEach(r => {
      result.totalShifts++;
      const isParsed = r.hasOwnProperty('unfilled');
      const unfilled = isParsed ? r.unfilled : (r._unfilled || (r[cm.clinician] || '').toLowerCase().includes('not assigned') || (r[cm.clinician] || '').trim() === '');
      if (unfilled) result.unfilledShifts++;
      else result.filledShifts++;

      const hrs = isParsed ? (r.hours || 0) : (r._hours || parseFloat(r[cm.scheduledHrs] || '0') || 0);
      result.totalShiftHours += hrs;
      if (unfilled) result.unfilledShiftHours += hrs;
      else result.filledShiftHours += hrs;

      // Credential from shifts (fills in credMap for clinicians not found in actuals)
      const shiftCred = isParsed ? (r.credClass || r.credential || '') : (cm.credential ? (r[cm.credential] || '') : '');
      if (shiftCred && cl && !unfilled) {
        const clKey = cl.toLowerCase().trim();
        if (!credMap[clKey]) {
          const cu = shiftCred.toUpperCase();
          if (cu.includes('NP') || cu.includes('PA') || cu.includes('FNP') || cu.includes('DNP')) credMap[clKey] = 'NP';
          else if (cu.includes('MD') || cu.includes('DO')) credMap[clKey] = 'MD';
        }
      }

      // Clinician hours tracking
      const cl = isParsed ? (r.clinician || '') : (cm.clinician ? (r[cm.clinician] || '').trim() : '');
      if (cl && !unfilled) {
        const key = cl.toLowerCase();
        result.clinicianHours[key] = (result.clinicianHours[key] || 0) + hrs;
      }
    });
    result.fillRate = result.totalShifts > 0 ? (result.filledShifts / result.totalShifts * 100) : 0;

    // Tally NP/MD from combined credMap (actuals + shifts)
    Object.values(credMap).forEach(c => {
      if (c === 'NP') result.npCount++;
      else if (c === 'MD') result.mdCount++;
    });

    // Incentive metrics — differentiate real-time (dollar amounts) from hourly (multipliers)
    incentives.forEach(r => {
      result.incentiveShifts++;
      const amtRaw = String(incCm.amount ? (r[incCm.amount] || '0') : '0').trim();
      const amt = parseFloat(amtRaw.replace(/[^0-9.\-]/g, '')) || 0;
      result.incentiveSpend += amt;

      const claimed = incCm.claimedTime ? !!r[incCm.claimedTime] : false;
      if (claimed) result.incentiveFilled++;
      else result.incentiveUnfilled++;

      // Detect if this is a multiplier-based (hourly) incentive or a real-time (dollar) incentive
      // Hourly multipliers look like "1.5x", "2x", "2.0x" or a Bonus column with multiplier
      const bonusVal = (r.Bonus || r.bonus || r['Bonus'] || '').toString().trim();
      const isMultiplier = /^\d+\.?\d*x$/i.test(amtRaw) || /^\d+\.?\d*x$/i.test(bonusVal);
      const hasHighDollar = amt >= 30; // Real-time incentives are per-visit dollar amounts ($45, $75, $105+)

      if (isMultiplier || (!hasHighDollar && bonusVal && !amtRaw.includes('$'))) {
        // Hourly/multiplier incentive
        result.hourlyIncentiveCount++;
        const mult = bonusVal.match(/([\d.]+)x/i)?.[1] || amtRaw.match(/([\d.]+)x/i)?.[1] || '';
        const multLabel = mult ? mult + 'x' : (amt > 0 ? '$' + amt : 'unknown');
        result.hourlyMultipliers[multLabel] = (result.hourlyMultipliers[multLabel] || 0) + 1;
      } else if (amt > 0) {
        // Real-time dollar incentive
        result.rtIncentiveCount++;
        result.rtIncentiveSpend += amt;
      }

      // Rate bucketing (legacy — keep for overall view)
      let rateBucket = 'unknown';
      if (isMultiplier) {
        const mVal = parseFloat((bonusVal.match(/([\d.]+)x/i) || amtRaw.match(/([\d.]+)x/i) || [])[1] || '0');
        if (mVal >= 2) rateBucket = '2x+';
        else if (mVal >= 1.5) rateBucket = '1.5x';
        else if (mVal >= 1) rateBucket = '1x';
        else rateBucket = '<1x';
      } else {
        if (amt >= 105) rateBucket = '$105+';
        else if (amt >= 75) rateBucket = '$75';
        else if (amt >= 45) rateBucket = '$45';
        else if (amt > 0) rateBucket = '<$45';
      }
      result.incentiveRates[rateBucket] = (result.incentiveRates[rateBucket] || 0) + 1;
    });

    return result;
  }, [cm, incCm]);

  // Filter data for both periods
  const periodA = useMemo(() => {
    const a = filterByRange(actualsData, periodAStart, periodAEnd, actualDateFn);
    const s = filterByRange(shiftScheduleData, periodAStart, periodAEnd, shiftDateFn);
    const inc = filterByRange(allIncentives, periodAStart, periodAEnd, incDateFn);
    return computePeriod(a, s, inc);
  }, [actualsData, shiftScheduleData, allIncentives, periodAStart, periodAEnd, slFilter, partnerFilter, programFilter, modalityFilter, filterByRange, computePeriod, actualDateFn, shiftDateFn, incDateFn]);

  const periodB = useMemo(() => {
    const a = filterByRange(actualsData, periodBStart, periodBEnd, actualDateFn);
    const s = filterByRange(shiftScheduleData, periodBStart, periodBEnd, shiftDateFn);
    const inc = filterByRange(allIncentives, periodBStart, periodBEnd, incDateFn);
    return computePeriod(a, s, inc);
  }, [actualsData, shiftScheduleData, allIncentives, periodBStart, periodBEnd, slFilter, partnerFilter, programFilter, modalityFilter, filterByRange, computePeriod, actualDateFn, shiftDateFn, incDateFn]);

  const fmt$ = v => '$' + Math.round(v).toLocaleString();
  const fmtPct = v => v.toFixed(1) + '%';
  const fmtDelta = (a, b, type) => {
    if (a === 0 && b === 0) return { text: '—', color: 'var(--text-muted)' };
    const delta = b - a;
    if (delta === 0) return { text: '—', color: 'var(--text-muted)' };
    const pctChange = a !== 0 ? ((b - a) / a * 100) : (b > 0 ? 100 : -100);
    const arrow = delta > 0 ? '▲' : '▼';
    let color;
    if (type === 'higher-better') color = delta > 0 ? '#059669' : '#dc2626';
    else if (type === 'lower-better') color = delta < 0 ? '#059669' : '#dc2626';
    else color = delta > 0 ? '#059669' : '#dc2626'; // neutral defaults to green=up, red=down
    const valStr = type === 'pct' ? Math.abs(delta).toFixed(1) + 'pp'
      : type === 'dollar' ? fmt$(Math.abs(delta))
      : Math.abs(Math.round(delta)).toLocaleString();
    return { text: `${arrow} ${delta > 0 ? '+' : '-'}${valStr} (${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(0)}%)`, color };
  };

  const compRow = (label, a, b, format, deltaType) => {
    const fmtVal = format === '$' ? fmt$ : format === '%' ? fmtPct : v => Math.round(v).toLocaleString();
    const aNull = a === null || a === undefined;
    const bNull = b === null || b === undefined;
    const d = (aNull || bNull) ? { text: '—', color: 'var(--text-muted)' } : fmtDelta(a, b, deltaType || 'neutral');
    return (
      <tr key={label}>
        <td style={{ fontWeight: 600, fontSize: 12 }}>{label}</td>
        <td style={{ fontFamily: 'var(--font-mono)', textAlign: 'right' }}>{aNull ? <span style={{color:'var(--text-muted)',fontSize:10}}>N/A</span> : fmtVal(a)}</td>
        <td style={{ fontFamily: 'var(--font-mono)', textAlign: 'right' }}>{bNull ? <span style={{color:'var(--text-muted)',fontSize:10}}>N/A</span> : fmtVal(b)}</td>
        <td style={{ fontFamily: 'var(--font-mono)', textAlign: 'right', color: d.color, fontSize: 11 }}>{d.text}</td>
      </tr>
    );
  };

  const hasData = periodAStart && periodAEnd && periodBStart && periodBEnd;

  if (!actualsData && !shiftScheduleData) {
    return (
      <div className="empty-state">
        <div className="icon">&#128200;</div>
        <p>Upload actuals and/or shift data to use the comparison tool</p>
      </div>
    );
  }

  return (
    <div>
      <div className="card" style={{ marginBottom: 16 }}>
        <div className="card-title">Period Comparison Setup</div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 8, flexWrap: 'wrap', alignItems: 'center' }}>
          <span style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-muted)', letterSpacing: '0.5px' }}>DAY:</span>
          <button className="btn btn-secondary btn-sm" onClick={setTodayVsYesterday} style={{ fontSize: 11 }}>Today vs Yesterday</button>
          <button className="btn btn-secondary btn-sm" onClick={setYesterdayVsPrior} style={{ fontSize: 11 }}>Yesterday vs Day Before</button>
          <button className="btn btn-secondary btn-sm" onClick={setSameWeekdayLastWeek} style={{ fontSize: 11 }}>Yesterday vs Same Day Last Week</button>
        </div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap', alignItems: 'center' }}>
          <span style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-muted)', letterSpacing: '0.5px' }}>WEEK:</span>
          <button className="btn btn-secondary btn-sm" onClick={setLastWeek} style={{ fontSize: 11 }}>Last Week vs Prior</button>
          <button className="btn btn-secondary btn-sm" onClick={setLastWeekend} style={{ fontSize: 11 }}>Last Wknd vs Prior</button>
          <button className="btn btn-secondary btn-sm" onClick={setLast2Weeks} style={{ fontSize: 11 }}>2 Wks Ago vs Last Wk</button>
        </div>
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', alignItems: 'flex-end' }}>
          <div style={{ border: '2px solid #93c5fd', borderRadius: 'var(--radius)', padding: 12, flex: 1, minWidth: 220 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#1d4ed8', marginBottom: 6 }}>PERIOD A (Baseline)
              {periodAStart && <span style={{ fontWeight: 400, marginLeft: 6 }}>{dayLabel(new Date(periodAStart + 'T12:00:00'))}{periodAStart !== periodAEnd ? ' — ' + dayLabel(new Date(periodAEnd + 'T12:00:00')) : ''}</span>}
            </div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <input type="date" value={periodAStart} onChange={e => setPeriodAStart(e.target.value)} style={{ padding: '4px 6px', border: '1px solid var(--border)', borderRadius: 4, fontSize: 12 }} />
              <span style={{ fontSize: 11 }}>to</span>
              <input type="date" value={periodAEnd} onChange={e => setPeriodAEnd(e.target.value)} style={{ padding: '4px 6px', border: '1px solid var(--border)', borderRadius: 4, fontSize: 12 }} />
            </div>
          </div>
          <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--text-muted)', alignSelf: 'center' }}>vs</div>
          <div style={{ border: '2px solid #86efac', borderRadius: 'var(--radius)', padding: 12, flex: 1, minWidth: 220 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#059669', marginBottom: 6 }}>PERIOD B (Current)
              {periodBStart && <span style={{ fontWeight: 400, marginLeft: 6 }}>{dayLabel(new Date(periodBStart + 'T12:00:00'))}{periodBStart !== periodBEnd ? ' — ' + dayLabel(new Date(periodBEnd + 'T12:00:00')) : ''}</span>}
            </div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <input type="date" value={periodBStart} onChange={e => setPeriodBStart(e.target.value)} style={{ padding: '4px 6px', border: '1px solid var(--border)', borderRadius: 4, fontSize: 12 }} />
              <span style={{ fontSize: 11 }}>to</span>
              <input type="date" value={periodBEnd} onChange={e => setPeriodBEnd(e.target.value)} style={{ padding: '4px 6px', border: '1px solid var(--border)', borderRadius: 4, fontSize: 12 }} />
            </div>
          </div>
          <SLFilter value={slFilter} onChange={setSlFilter} options={availableSLs} />
        </div>
        {/* Dimensional multi-select filters */}
        <div style={{ display: 'flex', gap: 8, marginTop: 12, flexWrap: 'wrap', alignItems: 'center' }}>
          {availablePartners.length > 1 && (
            <MultiSelectDropdown label="Partner" options={availablePartners.filter(p => p !== 'ALL')} selected={partnerFilter} onChange={setPartnerFilter} color="amber" />
          )}
          {availablePrograms.length > 1 && (
            <MultiSelectDropdown label="Program" options={availablePrograms.filter(p => p !== 'ALL')} selected={programFilter} onChange={setProgramFilter} color="blue" />
          )}
          {availableModalities.length > 1 && (
            <MultiSelectDropdown label="Modality" options={availableModalities.filter(m => m !== 'ALL')} selected={modalityFilter} onChange={setModalityFilter} color="green" />
          )}
          {(partnerFilter.length > 0 || programFilter.length > 0 || modalityFilter.length > 0) && (
            <button onClick={() => { setPartnerFilter([]); setProgramFilter([]); setModalityFilter([]); }}
              style={{ fontSize: 10, color: '#dc2626', background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline' }}>Clear all filters</button>
          )}
        </div>
      </div>

      {hasData && (
        <div>
          {/* Volume & SLA */}
          <div className="card" style={{ marginBottom: 16 }}>
            <div className="card-title">Volume & Service Level</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Metric</th><th style={{ textAlign: 'right' }}>Period A</th><th style={{ textAlign: 'right' }}>Period B</th><th style={{ textAlign: 'right' }}>Change</th></tr></thead>
                <tbody>
                  {compRow('Total Visits', periodA.totalVisits, periodB.totalVisits, '#', 'neutral')}
                  {compRow('SLA Met', periodA.slaMet, periodB.slaMet, '#', 'higher-better')}
                  {compRow('SLA Missed', periodA.slaMissed, periodB.slaMissed, '#', 'lower-better')}
                  {compRow('SLA %', periodA.slaPct, periodB.slaPct, '%', 'higher-better')}
                  {compRow('Avg Response (min)', periodA.avgResponseMin, periodB.avgResponseMin, '#', 'lower-better')}
                </tbody>
              </table>
            </div>
          </div>

          {/* Arrival Pattern (Hourly) */}
          {(periodA.totalVisits > 0 || periodB.totalVisits > 0) && (() => {
            const peakHourA = periodA.hourlyArrivals.indexOf(Math.max(...periodA.hourlyArrivals));
            const peakHourB = periodB.hourlyArrivals.indexOf(Math.max(...periodB.hourlyArrivals));
            const maxVal = Math.max(...periodA.hourlyArrivals, ...periodB.hourlyArrivals, 1);
            const totalDeviation = periodA.hourlyArrivals.reduce((sum, v, i) => sum + Math.abs((periodB.hourlyArrivals[i] || 0) - v), 0);
            const avgDeviation = periodA.totalVisits > 0 ? (totalDeviation / periodA.totalVisits * 100).toFixed(1) : '0';
            const fmtHr = h => { const ap = h >= 12 ? 'p' : 'a'; const hh = h === 0 ? 12 : h > 12 ? h - 12 : h; return hh + ap; };

            return (
              <div className="card" style={{ marginBottom: 16 }}>
                <div className="card-title">Arrival Pattern (Hourly)</div>
                <div style={{ display: 'flex', gap: 12, marginBottom: 12, flexWrap: 'wrap', fontSize: 11, color: 'var(--text-muted)' }}>
                  <span>Peak A: <strong style={{ color: '#1d4ed8' }}>{fmtHr(peakHourA)}</strong> ({periodA.hourlyArrivals[peakHourA]})</span>
                  <span>Peak B: <strong style={{ color: '#059669' }}>{fmtHr(peakHourB)}</strong> ({periodB.hourlyArrivals[peakHourB]})</span>
                  <span>Pattern Deviation: <strong style={{ color: parseFloat(avgDeviation) > 30 ? '#dc2626' : parseFloat(avgDeviation) > 15 ? '#d97706' : '#059669' }}>{avgDeviation}%</strong></span>
                </div>
                {/* Bar chart */}
                <div style={{ display: 'flex', alignItems: 'flex-end', gap: 1, height: 120, marginBottom: 4, padding: '0 2px' }}>
                  {Array.from({ length: 24 }, (_, h) => {
                    const aVal = periodA.hourlyArrivals[h];
                    const bVal = periodB.hourlyArrivals[h];
                    const aH = maxVal > 0 ? (aVal / maxVal * 100) : 0;
                    const bH = maxVal > 0 ? (bVal / maxVal * 100) : 0;
                    const deviation = aVal > 0 ? ((bVal - aVal) / aVal * 100) : (bVal > 0 ? 100 : 0);
                    const devColor = Math.abs(deviation) > 50 ? '#dc2626' : Math.abs(deviation) > 25 ? '#d97706' : '#9ca3af';
                    return (
                      <div key={h} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1 }} title={`${fmtHr(h)}: A=${aVal}, B=${bVal}, Δ=${deviation.toFixed(0)}%`}>

                          <div style={{ flex: 1, height: `${aH}%`, background: '#93c5fd', borderRadius: '2px 2px 0 0', minHeight: aVal > 0 ? 2 : 0 }}></div>
                          <div style={{ flex: 1, height: `${bH}%`, background: '#6ee7b7', borderRadius: '2px 2px 0 0', minHeight: bVal > 0 ? 2 : 0 }}></div>
                        </div>
                        {Math.abs(deviation) > 25 && (aVal > 0 || bVal > 0) && (
                          <div style={{ fontSize: 8, color: devColor, fontWeight: 700, lineHeight: 1 }}>{deviation > 0 ? '+' : ''}{deviation.toFixed(0)}%</div>
                        )}
                      </div>
                    );
                  })}
