          detail: `${v.visits} visits in actuals but not found on the shift schedule. May be working off-schedule, a name mismatch, or a different service line.`,
          evidence: { visits: v.visits },
          status: 'pending',
          created_at: new Date().toISOString()
        });
      }
    });

    // Sort: critical first, then high, then by clinician name
    const sevOrder = { critical: 0, high: 1, medium: 2, low: 3 };
    newFlags.sort((a, b) => (sevOrder[a.severity] || 3) - (sevOrder[b.severity] || 3) || a.clinician_name.localeCompare(b.clinician_name));

    setFlags(newFlags);
    setGenerated(true);
    showToast(`${newFlags.length} flag(s) generated from cross-referencing shift schedule and actuals`);

    // Save to Supabase
    if (newFlags.length > 0 && user) {
      supabase.from('flags').insert(newFlags.map(f => ({
        id: f.id,
        clinician_name: f.clinician_name,
        category: f.category,
        severity: f.severity,
        detail: f.detail,
        evidence: f.evidence,
        shift_window_start: f.shift_window_start || null,
        shift_window_end: f.shift_window_end || null,
        status: 'pending'
      }))).then(({ error }) => {
        if (error) console.warn('Flag save error:', error.message);
      });
    }
  };

  // Load existing flags from Supabase on mount
  useEffect(() => {
    if (!user) return;
    supabase.from('flags').select('*').order('created_at', { ascending: false }).then(({ data, error }) => {
      if (data && data.length > 0) {
        setFlags(data);
        setGenerated(true);
      }
    });
  }, [user]);

  // Review a flag
  const reviewFlag = async (flagId, decision) => {
    const reviewerName = profile?.full_name || user?.email || 'Unknown';
    const now = new Date().toISOString();

    setFlags(prev => prev.map(f => f.id === flagId ? { ...f, status: decision, reviewed_by_name: reviewerName, reviewed_at: now } : f));

    // Save to Supabase
    await supabase.from('flags').update({
      status: decision,
      reviewed_by: user?.id,
      reviewed_by_name: reviewerName,
      reviewed_at: now
    }).eq('id', flagId);
  };

  const addReviewNote = async (flagId, note) => {
    setFlags(prev => prev.map(f => f.id === flagId ? { ...f, review_note: note } : f));
    await supabase.from('flags').update({ review_note: note }).eq('id', flagId);
  };

  // Export kept flags to CSV
  const exportKeptFlags = () => {
    const kept = flags.filter(f => f.status === 'kept');
    if (kept.length === 0) { showToast('No kept flags to export'); return; }
    const rows = kept.map(f => ({
      'Clinician': f.clinician_name,
      'Flag Category': f.category.replace(/_/g, ' '),
      'Severity': f.severity,
      'Detail': f.detail,
      'Shift Window': f.shift_window_start && f.shift_window_end ? `${f.shift_window_start} to ${f.shift_window_end}` : '',
      'Approved By': f.reviewed_by_name || '',
      'Approved At': f.reviewed_at ? new Date(f.reviewed_at).toLocaleString('en-US', { timeZone: CT_TZ }) : '',
      'Note': f.review_note || ''
    }));
    exportToCSV(rows, `wfm_escalation_flags_${new Date().toISOString().slice(0,10)}.csv`);
    showToast(`Exported ${kept.length} flag(s) to CSV`);
  };

  // Filtered flags
  const displayed = flags.filter(f => filterStatus === 'all' || f.status === filterStatus);
  const pendingCount = flags.filter(f => f.status === 'pending').length;
  const keptCount = flags.filter(f => f.status === 'kept').length;
  const declinedCount = flags.filter(f => f.status === 'declined').length;

  const categoryLabels = {
    scheduled_no_visits: '🔴 Scheduled / No Visits',
    scheduled_low_volume: '🟠 Scheduled / Low Volume',
    high_sla_miss: '🟡 High SLA Miss Rate',
    unscheduled_visits: '🔵 Unscheduled Visits',
    vph_below_threshold: '🟣 VPH Below Threshold',
    other: '⚪ Other'
  };

  const severityColors = {
    critical: { bg: 'var(--accent-red-soft)', color: 'var(--accent-red)', label: 'CRITICAL' },
    high: { bg: '#fef3cd', color: '#856404', label: 'HIGH' },
    medium: { bg: '#d1ecf1', color: '#0c5460', label: 'MEDIUM' },
    low: { bg: 'var(--bg-primary)', color: 'var(--text-muted)', label: 'LOW' }
  };

  // Empty state
  if (!shiftScheduleData && !actualsData) {
    return (
      <div className="empty-state">
        <div className="icon">🔍</div>
        <p>Upload both <strong>Shift Schedule</strong> and <strong>Actuals</strong> data to generate review flags</p>
        <div className="hint">The system cross-references who was scheduled vs who had visits to flag absences, low volume, and SLA issues for WFM/leadership review.</div>
      </div>
    );
  }

  return (
    <div>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, flexWrap: 'wrap', gap: 8 }}>
        <div>
          <h3 style={{ margin: 0, fontSize: 16 }}>🔍 Review & Escalation</h3>
          <p style={{ margin: '4px 0 0', fontSize: 12, color: 'var(--text-muted)' }}>
            Cross-references shift schedule and actuals to flag clinicians for WFM/leadership review
          </p>
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          <button className="btn btn-primary btn-sm" onClick={generateFlags}
            disabled={!shiftScheduleData || !actualsData}
            title={!shiftScheduleData ? 'Upload shift schedule first' : !actualsData ? 'Upload actuals first' : 'Regenerate flags from current data'}>
            &#9889; {generated ? 'Regenerate Flags' : 'Generate Flags'}
          </button>
          {keptCount > 0 && (
            <button className="btn btn-secondary btn-sm" onClick={exportKeptFlags}>
              ⬇ Export Kept Flags ({keptCount})
            </button>
          )}
        </div>
      </div>

      {/* Data status */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 12, fontSize: 11 }}>

                      <span style={{ fontSize: 10, color: 'var(--text-muted)' }}>{categoryLabels[f.category] || f.category}</span>

                    <p style={{ margin: '4px 0 0', fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.4 }}>{f.detail}</p>
                    {f.shift_window_start && (

                  <div style={{ display: 'flex', gap: 4, flexShrink: 0 }}>
                    {f.status === 'pending' && (<>
                      <button onClick={() => {
                        const note = window.prompt('Add a note (optional):');
                        if (note !== null) { addReviewNote(f.id, note); reviewFlag(f.id, 'kept'); }
                      }}

                        Keep Flag

                        Decline

                      <button onClick={() => { reviewFlag(f.id, 'pending'); addReviewNote(f.id, ''); }}

// ========================== TAB: ATTENDANCE & RELIABILITY (Module 5) ==========================
function AttendanceTab({ calloutData, setCalloutData, actualsData, masterRoster, showToast }) {
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [selSLs, setSelSLs] = useState([]);

  // Parse & upload call-out CSV
  const handleCalloutUpload = (data, filename) => {
    const cm = buildColMap(data);
    const parsed = data.map(r => {
      const clinName = r[cm.clinician] || r[cm.name] || '';
      const coDate = parseDate(r[cm.callOutDate] || r[cm.incidentDate] || r[cm.date] || '');
      const shDate = parseDate(r[cm.shiftDateCol] || r[cm.shiftStart] || '');
      let hBefore = parseFloat(r[cm.hoursBefore]);
      if (isNaN(hBefore) && coDate && shDate) hBefore = (shDate - coDate) / 3600000;
      const sl = r[cm.sl] || mapEntityToSL(r[cm.partner] || '') || '';
      return {
        clinician: normalizeName(clinName), callOutDate: coDate, shiftDate: shDate,
        hoursBefore: isNaN(hBefore) ? null : Math.round(hBefore * 10) / 10,
        sl, backfill: (r[cm.backfillStatus] || '').toLowerCase(),
        violation: !isNaN(hBefore) && isCalloutViolation(hBefore),
        raw: r
      };
    }).filter(r => r.clinician);
    setCalloutData(prev => { const updated = [...prev, ...parsed]; saveUploadData('callouts', updated, filename); return updated; });
    showToast(`${parsed.length} call-out records loaded from ${filename}`);
  };

  // Filter data by date range and SL
  const filtered = useMemo(() => {
    let d = calloutData || [];
    if (dateFrom) d = d.filter(r => r.callOutDate && r.callOutDate >= new Date(dateFrom));
    if (dateTo) { const end = new Date(dateTo); end.setHours(23,59,59); d = d.filter(r => r.callOutDate && r.callOutDate <= end); }
    if (selSLs.length > 0) d = d.filter(r => selSLs.includes(r.sl));
    return d;
  }, [calloutData, dateFrom, dateTo, selSLs]);

  // KPIs
  const kpis = useMemo(() => {
    const total = filtered.length;
    const violations = filtered.filter(r => r.violation).length;
    const violRate = total > 0 ? violations / total : 0;
    const avgHours = total > 0 ? filtered.reduce((s, r) => s + (r.hoursBefore || 0), 0) / total : 0;
    // Repeat offenders (5+ call-outs)
    const byClin = {};
    filtered.forEach(r => { byClin[r.clinician] = (byClin[r.clinician] || 0) + 1; });
    const repeatCount = Object.values(byClin).filter(c => c >= CALLOUT_THRESHOLDS.action).length;
    return { total, violations, violRate, avgHours, repeatCount };
  }, [filtered]);

  // Repeat offender data
  const offenders = useMemo(() => {
    const map = {};
    filtered.forEach(r => {
      if (!map[r.clinician]) map[r.clinician] = { name: r.clinician, total: 0, violations: 0, sls: {} };
      map[r.clinician].total++;
      if (r.violation) map[r.clinician].violations++;
      map[r.clinician].sls[r.sl || 'Unknown'] = (map[r.clinician].sls[r.sl || 'Unknown'] || 0) + 1;
    });
    return Object.values(map).sort((a, b) => b.total - a.total).map(o => ({
      ...o, violRate: o.total > 0 ? o.violations / o.total : 0,
      severity: calloutSeverity(o.total), topSL: Object.entries(o.sls).sort((a,b) => b[1] - a[1])[0]?.[0] || '-',
      // Cross-reference roster for credential and VPH
      roster: masterRoster.find(m => normalizeName(m.name) === o.name)
    }));
  }, [filtered, masterRoster]);

  // Alerts
  const alerts = useMemo(() => {
    const a = [];
    const now = new Date();
    const week = filtered.filter(r => r.callOutDate && (now - r.callOutDate) < 7 * 86400000);
    const weekViolations = week.filter(r => r.violation);
    if (weekViolations.length > 0) a.push({ level: 'HIGH', msg: `${weekViolations.length} under-24hr violation(s) in last 7 days` });
    const postShift = filtered.filter(r => r.hoursBefore !== null && r.hoursBefore < 0);
    if (postShift.length > 0) a.push({ level: 'CRITICAL', msg: `${postShift.length} post-shift-start call-out(s) detected — negative notice hours` });
    const escOffenders = offenders.filter(o => o.severity === 'Escalation');
    if (escOffenders.length > 0) a.push({ level: 'HIGH', msg: `${escOffenders.length} clinician(s) at Escalation level (10+ call-outs): ${escOffenders.map(o => o.name).join(', ')}` });
    // SL concentration: 3+ from same SL in 7 days
    const slWeek = {};
    week.forEach(r => { slWeek[r.sl || 'Unknown'] = (slWeek[r.sl || 'Unknown'] || 0) + 1; });
    Object.entries(slWeek).filter(([, c]) => c >= 3).forEach(([sl, c]) => {
      a.push({ level: 'MEDIUM', msg: `${c} call-outs from ${sl} in past 7 days — possible systemic issue` });
    });
    return a;
  }, [filtered, offenders]);

  // SL options for filter
  const slOptions = useMemo(() => [...new Set((calloutData || []).map(r => r.sl).filter(Boolean))].sort(), [calloutData]);

  // Top offender chart data
  const offenderChartData = useMemo(() => {
    const top = offenders.slice(0, 8);
    return { labels: top.map(o => o.name.split(' ').slice(-1)[0]), datasets: [
      { label: 'Violations', data: top.map(o => o.violations), backgroundColor: 'rgba(192,57,43,0.7)' },
      { label: 'Other Call-Outs', data: top.map(o => o.total - o.violations), backgroundColor: 'rgba(189,195,199,0.6)' },
    ]};
  }, [offenders]);

  if (!calloutData || calloutData.length === 0) {
    return (
      <div>
        <h2>📋 Attendance & Reliability</h2>
        <p style={{color:'var(--text-muted)',marginBottom:16}}>Upload call-out data to track attendance violations, repeat offenders, and staffing impact.</p>
        <UploadZone onData={handleCalloutUpload} label="Drop Call-Out / Attendance CSV here" hint="Expected columns: Clinician, Call Out Date, Shift Date, Hours Before, Service Line, Backfill Status" />
      </div>
    );
  }

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <h2 style={{margin:0}}>📋 Attendance & Reliability</h2>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <UploadZone onData={handleCalloutUpload} label="+ Add Call-Out Data" hint="CSV: Clinician, Call-Out Date, Shift Date, Hours Before, Service Line, Backfill Status" />
          <button className="btn-secondary" onClick={() => exportToCSV(filtered.map(r => ({
            Clinician: r.clinician, 'Call-Out Date': r.callOutDate ? formatDate(r.callOutDate) : '',
            'Shift Date': r.shiftDate ? formatDate(r.shiftDate) : '', 'Hours Before': r.hoursBefore ?? '',
            'Service Line': r.sl, Violation: r.violation ? 'YES' : '', Backfill: r.backfill, Severity: calloutSeverity(
              (offenders.find(o => o.name === r.clinician) || {}).total || 0)
          })), 'callout_report.csv')}>⬇ Export CSV</button>
          <button className="btn-secondary" style={{color:'var(--accent-red)'}} onClick={() => {
            if (window.confirm('Clear all call-out data?')) { setCalloutData([]); showToast('Call-out data cleared'); }
          }}>✕ Clear</button>
        </div>
      </div>

      {/* Alert Panel */}
      {alerts.length > 0 && (
        <div style={{marginBottom:16}}>
          {alerts.map((a, i) => (
            <div key={i} className={`gap-alert ${a.level === 'MEDIUM' ? 'warn' : ''}`}>
              <strong>{a.level === 'CRITICAL' ? '🔴' : a.level === 'HIGH' ? '🟠' : '🟡'} {a.level}:</strong> {a.msg}
            </div>
          ))}
        </div>
      )}

      {/* Filters */}
      <div className="filter-bar">
        <label>From <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} /></label>
        <label>To <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} /></label>
        {slOptions.length > 1 && <MultiSelect label="Service Line" options={slOptions} selected={selSLs} onChange={setSelSLs} />}
        <span style={{color:'var(--text-muted)',fontSize:12}}>{filtered.length} records</span>
      </div>

      {/* KPI Row */}
      <div className="kpi-grid">
        <KpiCard label="Total Call-Outs" value={kpis.total} />
        <KpiCard label="24hr Violation Rate" value={pct(kpis.violRate)} className={kpis.violRate > 0.15 ? 'sla-red' : kpis.violRate > 0.10 ? 'sla-yellow' : ''} />
        <KpiCard label="Repeat Offenders (5+)" value={kpis.repeatCount} className={kpis.repeatCount > 0 ? 'sla-red' : ''} />
        <KpiCard label="Avg Hours Notice" value={kpis.avgHours.toFixed(1)} className={kpis.avgHours < 24 ? 'sla-yellow' : ''} />
      </div>

      {/* Call-Out Tracker Table */}
      <details open style={{marginTop:16}}>
        <summary className="section-toggle">📊 Call-Out Tracker</summary>
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Date</th><th>Clinician</th><th>Service Line</th><th>Shift Date</th>
              <th>Hrs Before</th><th>Violation?</th><th>Backfill</th><th>Severity</th>
            </tr></thead>
            <tbody>
              {filtered.slice(0, 200).map((r, i) => {
                const off = offenders.find(o => o.name === r.clinician);
                const sev = calloutSeverity(off ? off.total : 0);
                return (
                  <tr key={i} style={r.hoursBefore !== null && r.hoursBefore < 0 ? {background:'var(--accent-red-soft)'} : r.violation ? {background:'var(--accent-orange-soft)'} : {}}>
                    <td>{r.callOutDate ? formatDate(r.callOutDate) : '-'}</td>
                    <td>{r.clinician}</td>
                    <td>{r.sl || '-'}</td>
                    <td>{r.shiftDate ? formatDate(r.shiftDate) : '-'}</td>
                    <td style={{textAlign:'right'}}>{r.hoursBefore !== null ? r.hoursBefore : '-'}</td>
                    <td>{r.violation ? <span className="violation-badge">YES</span> : ''}</td>
                    <td>{r.backfill || '-'}</td>
                    <td><span className={calloutSeverityClass(sev)}>{sev}</span></td>

            </tbody>
          </table>
          {filtered.length > 200 && <div style={{color:'var(--text-muted)',fontSize:11,marginTop:4}}>Showing first 200 of {filtered.length} records</div>}
        </div>

      {/* Repeat Offender Dashboard */}
      <details open style={{marginTop:16}}>
        <summary className="section-toggle">🔄 Repeat Offender Dashboard</summary>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
            <div>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Clinician</th><th>Total</th><th>Violations</th><th>Viol %</th><th>Top SL</th><th>VPH</th><th>Severity</th></tr></thead>
                  <tbody>
                    {offenders.filter(o => o.total >= CALLOUT_THRESHOLDS.caution).slice(0, 20).map((o, i) => (

                        <td style={{textAlign:'right'}}>{o.violations}</td>
                        <td style={{textAlign:'right'}}>{pct(o.violRate)}</td>

          const withBackfill = filtered.filter(r => r.backfill && ['yes','y','true','covered','filled'].includes(r.backfill.toLowerCase()));

                        <td style={{textAlign:'right'}}>{pct(v.total > 0 ? v.backfilled / v.total : 0)}</td>
                      </tr>
                    ))}

          );
        })()}
