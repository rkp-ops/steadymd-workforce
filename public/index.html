// ========================== MAIN APP ==========================
function App() {
  const { user, profile, signOut } = useAuth();
  const [activeTab, setActiveTab] = useState('overview');
  // serviceLine removed from global — each tab manages its own SL filter now
  const [lookbackValue, setLookbackValue] = useState('6w');
  const [status, setStatus] = useState('ready');

  // Global modality exclusion — chart_addendum and prior_authorization excluded by default
  const [excludedModalities, setExcludedModalities] = useState(() => new Set(DEFAULT_EXCLUDED_MODALITIES));

  // Pre-aggregated actuals — computed once on upload, used by tabs instead of raw 55k rows
  const [actualsAgg, setActualsAgg] = useState(null);

  // Data stores
  const [rosterData, setRosterData] = useState(null);
  const [actualsData, setActualsData] = useState(null);
  const [incentiveData, setIncentiveData] = useState(null); // Looker incentives
  const [manualIncentiveData, setManualIncentiveData] = useState(null); // Manual/audit incentives
  const [vphData, setVphData] = useState([]);
  const [incidentData, setIncidentData] = useState(null);
  const [calloutData, setCalloutData] = useState(() => {
    try { return JSON.parse(localStorage.getItem('smw_callout_data') || '[]'); } catch { return []; }
  });
  const [shiftScheduleData, setShiftScheduleData] = useState(null);
  const [forecast, setForecast] = useState(null);

  // Pre-aggregate actuals when data changes (deferred to not block render)
  useEffect(() => {
    if (!actualsData || actualsData.length === 0) { setActualsAgg(null); return; }
    const cm = buildColMap(actualsData);
    // Defer to next frame so UI doesn't freeze
    const t = setTimeout(() => {
      const agg = preAggregateActuals(actualsData, cm);
      setActualsAgg(agg);
    }, 100);
    return () => clearTimeout(t);
  }, [actualsData]);
  const [history, setHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem('smw_history') || '[]'); } catch { return []; }
  });
  const [toast, setToast] = useState(null);
  const [pendingUpload, setPendingUpload] = useState(null);
  const [smartImportData, setSmartImportData] = useState(null);
  const [weeklyPerfData, setWeeklyPerfData] = useState({});

  // Master Clinician Roster — persisted in localStorage, seeded from TC_CLINICIANS
  const [masterRoster, setMasterRoster] = useState(() => {
    try {
      const stored = JSON.parse(localStorage.getItem('smw_master_roster'));
      if (stored && stored.length > 0) return stored;
    } catch {}
    return TC_CLINICIANS.map(c => ({
      name: c[0], credential: c[1], stateCount: c[2], restricted: c[3], vph: c[4],
      stateFlags: c[5], source: 'seed', lastUpdated: new Date().toISOString(),
      vphHistory: [{ vph: c[4], date: new Date().toISOString(), source: 'seed' }]
    }));
  });
  const [rosterChangelog, setRosterChangelog] = useState(() => {
    try { return JSON.parse(localStorage.getItem('smw_roster_changelog') || '[]'); } catch { return []; }
  });

  const lookbackLabel = LOOKBACK_OPTIONS.find(o => o.value === lookbackValue)?.label || lookbackValue;
  const lookbackDays = LOOKBACK_OPTIONS.find(o => o.value === lookbackValue)?.days || 42;

  // Save history
  useEffect(() => {
    localStorage.setItem('smw_history', JSON.stringify(history));
  }, [history]);

  // Persist roster & changelog
  useEffect(() => {
    localStorage.setItem('smw_master_roster', JSON.stringify(masterRoster));
  }, [masterRoster]);

  // One-time migration: re-parse names/credentials through parseNameCredential
  useEffect(() => {
    const MIGRATION_KEY = 'smw_roster_migrated_v2';
    if (localStorage.getItem(MIGRATION_KEY)) return;
    let changed = false;
    const migrated = masterRoster.map(c => {
      const parsed = parseNameCredential(c.name);
      const updatedName = parsed.cleanName || c.name;
      const updatedCred = ((!c.credential || c.credential === '?') && parsed.credential) ? parsed.credential : c.credential;
      if (updatedName !== c.name || updatedCred !== c.credential) { changed = true; }
      return { ...c, name: updatedName, credential: updatedCred || c.credential };
    });
    if (changed) {
      setMasterRoster(migrated);
      console.log('[Migration] Roster names & credentials normalized via parseNameCredential');
    }
    localStorage.setItem(MIGRATION_KEY, Date.now().toString());
  }, []);

  useEffect(() => {
    localStorage.setItem('smw_roster_changelog', JSON.stringify(rosterChangelog.slice(-200)));
  }, [rosterChangelog]);
  useEffect(() => {
    if (calloutData && calloutData.length > 0)
      localStorage.setItem('smw_callout_data', JSON.stringify(calloutData.slice(-3000)));
  }, [calloutData]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

  // Restore persisted uploads from Supabase on login (once only)
  const [restoring, setRestoring] = useState(false);
  const hasRestoredRef = React.useRef(false);
  useEffect(() => {
    if (!user || hasRestoredRef.current) return;
    hasRestoredRef.current = true;
    setRestoring(true);
    loadAllUploadData().then(stored => {
      if (!stored) { setRestoring(false); return; }
      let restored = [];
      if (stored.actuals?.data?.length) { setActualsData(stored.actuals.data); restored.push(`${stored.actuals.data.length} actuals`); }
      if (stored.shifts_raw?.data?.length) { setRosterData(stored.shifts_raw.data); restored.push(`${stored.shifts_raw.data.length} shifts`); }
      if (stored.shifts_parsed?.data?.length) { setShiftScheduleData(stored.shifts_parsed.data.map(r => ({ ...r, start: r.start ? new Date(r.start) : null, end: r.end ? new Date(r.end) : null }))); }
      if (stored.incentives?.data?.length) { setIncentiveData(stored.incentives.data); restored.push(`${stored.incentives.data.length} incentives`); }
      if (stored.manual_incentives?.data?.length) { setManualIncentiveData(stored.manual_incentives.data); restored.push(`${stored.manual_incentives.data.length} manual incentives`); }
      if (stored.incidents?.data?.length) { setIncidentData(stored.incidents.data); restored.push(`${stored.incidents.data.length} incidents`); }
      if (stored.callouts?.data?.length) { setCalloutData(stored.callouts.data); restored.push(`${stored.callouts.data.length} callouts`); }
      if (restored.length > 0) showToast(`Restored: ${restored.join(', ')}`);
      setRestoring(false);
    });
    // Also restore weekly perf data
    loadWeeklyPerfData().then(wprData => {
      if (wprData && Object.keys(wprData).length > 0) {
        setWeeklyPerfData(wprData);
      }
    });
  }, [user]);

  // Refresh: force recalculation of all derived state (does NOT clear uploaded data)
  const [refreshTick, setRefreshTick] = useState(0);
  const handleRefresh = () => {
    setRefreshTick(t => t + 1);
    setStatus('running');
    setTimeout(() => {
      setStatus('ready');
      showToast('All calculations refreshed');
    }, 300);
  };

  // Centralized shift upload handler (used by StaffingTab + header button)
  const handleShiftUpload = (data, filename) => {
    setRosterData(data);
    const parsed = parseShiftCSV(data, masterRoster);
    const uniqueSLs = new Set(parsed.map(r => r.sl).filter(Boolean));
    if (uniqueSLs.size > 15) parsed.forEach(r => { r.sl = ''; });
    setShiftScheduleData(parsed);
    showToast(`${parsed.length} shift records loaded from ${filename}`);
    saveUploadData('shifts_raw', data, filename);
    saveUploadData('shifts_parsed', parsed, filename);
  };

  // Smart Import handlers
  const handleSmartImportShifts = (filteredRawData, filename) => {
    handleShiftUpload(filteredRawData, filename);
    setSmartImportData(null);
  };

  const handleSmartImportRoster = (filteredRows, filename) => {
    const clinMap = new Map();
    filteredRows.forEach(r => {
      if (r._unfilled) return;
      const norm = normalizeName(r._name);
      if (!norm) return;
      if (!clinMap.has(norm)) {
        clinMap.set(norm, { name: r._name, credential: r._credential, sls: new Set(), hours: 0 });
      }
      const entry = clinMap.get(norm);
      if (r._sl) entry.sls.add(r._sl);
      entry.hours += r._hours || 0;
      if (!entry.credential && r._credential) entry.credential = r._credential;
    });

    const updated = [...masterRoster];
    const changes = [];
    clinMap.forEach((info, norm) => {
      const idx = updated.findIndex(m => normalizeName(m.name) === norm);
      if (idx >= 0) {
        // Update existing — fill in missing credential
        if ((!updated[idx].credential || updated[idx].credential === '?') && info.credential) {
          changes.push({ type: 'credential_changed', name: info.name, from: updated[idx].credential, to: info.credential, source: 'arya-import:' + filename, date: new Date().toISOString() });
          updated[idx] = { ...updated[idx], credential: info.credential, lastUpdated: new Date().toISOString() };
        }
      } else {
        // Add new clinician
        updated.push({
          name: info.name, credential: info.credential || '?', stateCount: 0, restricted: false,
          vph: 0, stateFlags: new Array(24).fill(0), source: 'arya-import:' + filename,
          lastUpdated: new Date().toISOString(), vphHistory: [], unmatched: true
        });
        changes.push({ type: 'added', name: info.name, source: 'arya-import:' + filename, date: new Date().toISOString() });
      }
    });

    setMasterRoster(updated);
    if (changes.length > 0) setRosterChangelog(prev => [...prev, ...changes]);
    showToast(`${clinMap.size} clinicians processed (${changes.filter(c => c.type === 'added').length} new, ${changes.filter(c => c.type === 'credential_changed').length} updated) from ${filename}`);
    setSmartImportData(null);
  };

  // Clear all uploaded data (separate action)
  const handleClearAll = () => {
    if (window.confirm('Clear ALL uploaded data? This removes actuals, incentives, roster, and forecast results. History log is preserved.')) {
      setRosterData(null);
      setActualsData(null);
      setIncentiveData(null);
      setManualIncentiveData(null);
      setVphData([]);
      setForecast(null);
      setIncidentData(null);
      setCalloutData([]);
      setShiftScheduleData(null);
      setWeeklyPerfData({});
      setStatus('ready');
      clearUploadData(); // wipe all persisted uploads from Supabase
      clearWeeklyPerfData(); // wipe weekly perf snapshots
      showToast('All uploaded data cleared');
    }
  };

  // Upload commit logic — shared by confirmUpload and auto-confirm
  const commitUpload = (pending, overrideSL) => {
    const { data, filename, type } = pending;

    if (type === 'actuals') {
      const finalSL = overrideSL || pending.detectedSL;
      data.forEach(r => { r._detectedSL = finalSL; r._sourceFile = filename; });
      const accumulated = actualsData ? [...actualsData, ...data] : data;
      setActualsData(accumulated);
      const slLabel = finalSL === 'Unknown' ? 'Unknown SL — edit in Historical Log' : finalSL;
      showToast(`${data.length} records loaded (${slLabel}) — ${filename}`);

      // Auto-save history snapshot
      const cm = buildColMap(data);
      const nonCanceled = data.filter(r => !isCanceled(r, cm));
      const met = nonCanceled.filter(r => isSlaMet(r, cm)).length;
      const slaTotal = nonCanceled.length;
      const dates = data.map(r => parseDate(cm.date ? r[cm.date] : '')).filter(Boolean);
      const minD = dates.length > 0 ? formatDate(new Date(Math.min(...dates))) : '?';
      const maxD = dates.length > 0 ? formatDate(new Date(Math.max(...dates))) : '?';

      setHistory(h => [...h, {
        period: `${minD} - ${maxD}`,
        serviceLine: finalSL,
        consults: data.length,
        slaEligible: slaTotal,
        slaRate: slaTotal > 0 ? (met / slaTotal * 100) : 0,
        filename: filename,
        savedAt: new Date().toLocaleString()
      }]);

      // Auto-reconcile clinician roster from actuals
      const { updatedRoster, changes } = reconcileRosterFromActuals(masterRoster, data, cm, filename);
      if (changes.length > 0) {
        setMasterRoster(updatedRoster);
        setRosterChangelog(prev => [...prev, ...changes]);
        showToast(`Roster updated: ${changes.length} change(s) detected`);
      }
      // Persist ACCUMULATED actuals to Supabase (all uploads combined)
      const slsInAccumulated = [...new Set(accumulated.map(r => r._detectedSL).filter(Boolean))];
      const persistSL = slsInAccumulated.length === 1 ? slsInAccumulated[0] : 'Mixed';
      saveUploadData('actuals', accumulated, filename, persistSL);
    } else if (type === 'incentives') {
      // Detect manual vs Looker format
      const isManual = isManualIncentiveFormat(data);
      if (isManual) {
        // Tag each row as manual source
        data.forEach(r => { r._incentiveSource = 'manual'; r._sourceFile = filename; });
        const accManual = manualIncentiveData ? [...manualIncentiveData, ...data] : data;
        setManualIncentiveData(accManual);
        showToast(`📋 ${data.length} manual incentive records loaded from ${filename}`);
        saveUploadData('manual_incentives', accManual, filename);
      } else {
        // Looker format
        data.forEach(r => { r._incentiveSource = 'looker'; r._sourceFile = filename; });
        const accIncentives = incentiveData ? [...incentiveData, ...data] : data;
        setIncentiveData(accIncentives);
        showToast(`${data.length} Looker incentive records loaded from ${filename}`);
        saveUploadData('incentives', accIncentives, filename);
      }
    } else if (type === 'shifts') {
      setRosterData(data);
      const parsed = parseShiftCSV(data, masterRoster);
      // Sanity check: if too many unique SLs, the SL column was misdetected
      const uniqueSLs = new Set(parsed.map(r => r.sl).filter(Boolean));
      if (uniqueSLs.size > 15) parsed.forEach(r => { r.sl = ''; });
      setShiftScheduleData(parsed);
      showToast(`${parsed.length} shift records loaded from ${filename}`);
      saveUploadData('shifts_raw', data, filename);
      saveUploadData('shifts_parsed', parsed, filename);
    }
  };

  // Upload preview flow — Phase 1: prepare preview
  const prepareUpload = (data, filename, type, fileSizeBytes) => {
    const detectedSL = type === 'actuals' ? detectServiceLineFromData(data) : type === 'shifts' ? 'Shifts' : 'N/A';
    const cm = buildColMap(data);
    const dates = data.map(r => parseDate(cm.date ? r[cm.date] : '')).filter(Boolean);
    const minD = dates.length > 0 ? formatDate(new Date(Math.min(...dates))) : '?';
    const maxD = dates.length > 0 ? formatDate(new Date(Math.max(...dates))) : '?';
    const fileSize = fileSizeBytes < 1024 ? fileSizeBytes + ' B' : fileSizeBytes < 1048576 ? (fileSizeBytes / 1024).toFixed(1) + ' KB' : (fileSizeBytes / 1048576).toFixed(1) + ' MB';

    // Shifts → Smart Import modal for interactive filtering
    if (type === 'shifts') {
      setSmartImportData({ rawData: data, filename, fileSizeBytes });
      return;
    }
    if (type === 'actuals' && ['TC', 'CSL', 'WSL'].includes(detectedSL)) {
      commitUpload({ data, filename, type, detectedSL });
      return;
    }
    // Show modal for ambiguous cases
    setPendingUpload({ data, filename, type, detectedSL, cm, dateRange: `${minD} — ${maxD}`, fileSize });
  };

  // Upload preview flow — Phase 2: confirm and commit (from modal)
  const confirmUpload = (overrideSL) => {
    if (!pendingUpload) return;
    commitUpload(pendingUpload, overrideSL);
    setPendingUpload(null);
  };

  const cancelUpload = () => { setPendingUpload(null); };

  const tabs = [
    { id: 'overview', label: '📊 Overview' },
    { id: 'forecast', label: 'Forecast' },
    { id: 'staffing', label: 'Staffing' },
    { id: 'performance', label: 'Performance' },
    { id: 'insights', label: 'Insights & Analysis' },
    { id: 'diagnostics', label: '🔬 Diagnostics' },
    { id: 'review', label: 'Review & Escalation' },
    { id: 'coverage', label: 'State Coverage' },
    { id: 'clinicians', label: 'Clinicians' },
    { id: 'vph', label: 'VPH / VPCH' },
    { id: 'incentives', label: 'Incentive Spend' },
    { id: 'compare', label: '⚖️ Compare' },
    { id: 'weeklyPerf', label: '📋 Weekly Report' },
    { id: 'history', label: 'Historical Log' },
    { id: 'help', label: 'Help & Formulas' },
  ];

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-title">
          <span className="logo">SteadyMD</span> Workforce Intelligence
        </div>
        <div className="header-controls">
          <button className="btn btn-primary btn-sm" onClick={handleRefresh} title="Recalculate all metrics and predictions">&#8635; Refresh</button>
          <button className="btn btn-secondary btn-sm" onClick={handleClearAll} title="Clear all uploaded data (history preserved)" style={{ fontSize: 11 }}>Clear Data</button>
          <span className={`status-badge status-${status}`}>
            {status === 'ready' ? 'Ready' : status === 'running' ? 'Running...' : 'Complete'}
          </span>
          {profile && (
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'var(--text-muted)', marginLeft: 8, borderLeft: '1px solid var(--border)', paddingLeft: 12 }}>
              <span style={{ width: 22, height: 22, borderRadius: '50%', background: 'var(--accent-teal)', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700 }}>
                {(profile.full_name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2)}
              </span>
              <span style={{ fontWeight: 600 }}>{profile.full_name}</span>
              <button onClick={signOut} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: 10, textDecoration: 'underline' }}>Sign out</button>
            </span>
          )}
        </div>
      </div>

      {/* Data Status Banner */}
      <div className="lookback-banner">
        <span style={{ fontWeight: 700 }}>Data Loaded:</span>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 12 }}>
          {actualsData ? (
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent-green)', display: 'inline-block' }} />
              {actualsData.length.toLocaleString()} actuals
            </span>
          ) : (
            <span style={{ opacity: 0.5 }}>No actuals</span>
          )}
          {(incentiveData || manualIncentiveData) ? (
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent-green)', display: 'inline-block' }} />
              {((incentiveData?.length || 0) + (manualIncentiveData?.length || 0)).toLocaleString()} incentive records
              {manualIncentiveData && <span style={{ fontSize: 10, color: 'var(--accent-orange)', fontWeight: 600 }}>({manualIncentiveData.length} manual)</span>}
            </span>
          ) : (
            <span style={{ opacity: 0.5 }}>No incentives</span>
          )}
          {rosterData ? (
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent-green)', display: 'inline-block' }} />
              {rosterData.length.toLocaleString()} shifts
            </span>
          ) : (
            <span style={{ opacity: 0.5 }}>No roster</span>
          )}
        </span>
      </div>

      {/* Tab Bar */}
      <div className="tab-bar">
        {tabs.map(t => {
          // Badge counts
          let badge = null;
          if (t.id === 'performance' && actualsData) badge = actualsData.length;
          if (t.id === 'incentives' && (incentiveData || manualIncentiveData)) badge = (incentiveData?.length || 0) + (manualIncentiveData?.length || 0);
          if (t.id === 'vph' && vphData && vphData.length > 0) badge = vphData.length;
          if (t.id === 'history' && history.length > 0) badge = history.length;
          if (t.id === 'forecast' && forecast) badge = '✓';
          if (t.id === 'staffing' && shiftScheduleData) badge = shiftScheduleData.length;
          // review tab badge handled inside ReviewTab
          return (
            <button key={t.id} className={`tab-btn ${activeTab === t.id ? 'active' : ''}`}
              onClick={() => setActiveTab(t.id)}>
              {t.label}
              {badge !== null && <span style={{ marginLeft: 4, fontSize: 9, fontWeight: 700, padding: '1px 5px', borderRadius: 8,
                background: activeTab === t.id ? 'rgba(38,174,188,0.15)' : 'var(--bg-primary)',
                color: activeTab === t.id ? 'var(--accent-teal)' : 'var(--text-muted)' }}>{typeof badge === 'number' ? badge.toLocaleString() : badge}</span>}
            </button>
          );
        })}
        <div style={{ flex: 1 }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 8px' }}>
          <label className="btn btn-secondary btn-sm" style={{ cursor: 'pointer', margin: 0 }}
            title="Performance tab: CSV with consult/visit rows. Needs: Clinician Name, Date, Status, SLA Status, Response Time, Modality/Visit Type. Optional: Partner, Program, State.">
            + Actuals
            <input type="file" accept=".csv" style={{ display: 'none' }}
              onChange={e => { if (e.target.files[0]) { const f = e.target.files[0]; const r = new FileReader(); r.onload = ev => prepareUpload(parseCSV(ev.target.result), f.name, 'actuals', f.size); r.readAsText(f); e.target.value = ''; }}} />
          </label>
          <label className="btn btn-secondary btn-sm" style={{ cursor: 'pointer', margin: 0 }}
            title="Incentives tab: CSV with incentive rows. Needs: Clinician Name, Amount, Date. Optional: Partner, Modality, State.">
            + Incentives
            <input type="file" accept=".csv" style={{ display: 'none' }}
              onChange={e => { if (e.target.files[0]) { const f = e.target.files[0]; const r = new FileReader(); r.onload = ev => prepareUpload(parseCSV(ev.target.result), f.name, 'incentives', f.size); r.readAsText(f); e.target.value = ''; }}} />
          </label>
          <label className="btn btn-secondary btn-sm" style={{ cursor: 'pointer', margin: 0 }}
            title="Shift schedule: CSV with Clinician Name, Shift Start/End, Service Line, Credential">
            + Shifts
            <input type="file" accept=".csv" style={{ display: 'none' }}
              onChange={e => { if (e.target.files[0]) { const f = e.target.files[0]; const r = new FileReader(); r.onload = ev => prepareUpload(parseCSV(ev.target.result), f.name, 'shifts', f.size); r.readAsText(f); e.target.value = ''; }}} />
          </label>
        </div>
      </div>

      {/* Content */}
      <div className="content">
        {restoring && <div className="card" style={{ textAlign: 'center', padding: 40 }}>Restoring your data...</div>}
        {activeTab === 'overview' && (
          <OverviewTab actualsData={actualsData} shiftScheduleData={shiftScheduleData} incentiveData={incentiveData ? (manualIncentiveData ? [...incentiveData, ...manualIncentiveData] : incentiveData) : manualIncentiveData} vphData={vphData} masterRoster={masterRoster} excludedModalities={excludedModalities} setExcludedModalities={setExcludedModalities} />
        )}
        {activeTab === 'forecast' && (
          <ForecastTab rosterData={rosterData} onForecastComplete={setForecast} masterRoster={masterRoster} />
        )}
        {activeTab === 'staffing' && (
          <StaffingTab shiftScheduleData={shiftScheduleData} setShiftScheduleData={setShiftScheduleData} masterRoster={masterRoster} showToast={showToast} onShiftUpload={handleShiftUpload} />
        )}
        {activeTab === 'performance' && (
          <PerformanceTab key={refreshTick} actualsData={actualsData} lookbackWeeks={lookbackDays} excludedModalities={excludedModalities} setExcludedModalities={setExcludedModalities} />
        )}
        {activeTab === 'insights' && (
          <InsightsTab actualsData={actualsData} forecast={forecast} history={history} masterRoster={masterRoster} shiftScheduleData={shiftScheduleData} calloutData={calloutData} />
        )}
        {activeTab === 'diagnostics' && (
          <DiagnosticsTab actualsData={actualsData} forecast={forecast} shiftScheduleData={shiftScheduleData} masterRoster={masterRoster} calloutData={calloutData} showToast={showToast} />
        )}
        {activeTab === 'review' && (
          <ReviewTab shiftScheduleData={shiftScheduleData} actualsData={actualsData} masterRoster={masterRoster} showToast={showToast} />
        )}
        {activeTab === 'history' && (
          <HistoricalTab history={history} setHistory={setHistory} />
        )}
        {activeTab === 'coverage' && (
          <StateCoverageTab forecast={forecast} />
        )}
        {activeTab === 'clinicians' && (
          <ClinicianTab actualsData={actualsData} masterRoster={masterRoster} setMasterRoster={setMasterRoster} rosterChangelog={rosterChangelog} setRosterChangelog={setRosterChangelog} showToast={showToast} incidentData={incidentData} setIncidentData={setIncidentData} calloutData={calloutData} />
        )}
        {activeTab === 'vph' && (
          <VphTab actualsData={actualsData} shiftScheduleData={shiftScheduleData} masterRoster={masterRoster} showToast={showToast} />
        )}
        {activeTab === 'incentives' && (
          <IncentiveTab key={refreshTick} incentiveData={incentiveData} manualIncentiveData={manualIncentiveData} />
        )}
        {activeTab === 'compare' && (
          <CompareTab actualsData={actualsData} shiftScheduleData={shiftScheduleData} incentiveData={incentiveData} manualIncentiveData={manualIncentiveData} forecast={forecast} excludedModalities={excludedModalities} />
        )}
        {activeTab === 'weeklyPerf' && (
          <WeeklyPerfTab weeklyPerfData={weeklyPerfData} setWeeklyPerfData={setWeeklyPerfData} showToast={showToast} />
        )}
        {activeTab === 'help' && (
          <HelpTab />
        )}
      </div>

      {/* Upload Preview Modal */}
      {pendingUpload && (
        <UploadPreviewModal
          pending={pendingUpload}
          onConfirm={confirmUpload}
          onCancel={cancelUpload}
        />
      )}

      {/* Smart Import Modal */}
      {smartImportData && (
        <SmartImportModal
          rawData={smartImportData.rawData}
          filename={smartImportData.filename}
          fileSizeBytes={smartImportData.fileSizeBytes}
          masterRoster={masterRoster}
          onCommitShifts={handleSmartImportShifts}
          onCommitRoster={handleSmartImportRoster}
          onCancel={() => setSmartImportData(null)}
          showToast={showToast}
        />
      )}

      {/* Toast */}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthWrapper />);
</script>
</body>
</html>
